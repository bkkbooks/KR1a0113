body:
  text: 古周易訂詁卷十二明何楷撰繫辭下傳此夫子第六翼也八卦成列象在其中矣因而重直龍反之爻在其中矣剛柔相推變在其中矣繫辭焉而命孟喜本作明之動在其中矣吉凶悔吝者生乎動者也剛柔者立本者也變通者趣時者也吉凶者貞勝姚信本作稱者也天地之道貞觀古喚切者也日月之道貞明者也天下之動貞夫一者也夫乾確説文作寉然示人易以䜴切矣夫坤隤孟作退陸董姚作妥然示人簡矣爻也者效此者也象也者像此者也爻象動乎內吉凶見乎外功業見乎變聖人之情見乎辭上篇言聖人作易之理備矣此章居下篇之首專以動言蓋易書之乍不過教人慎動以避凶趨吉而已欲慎動莫若以正故獨提貞之一言即易之所為立本而成列者也八卦者三畫之卦成列者謂乾一兊二離三震四巽五坎六艮七坤八相次之行列即上篇所言兩儀生四象四象生八卦八卦之列既成則無窮之象具載於其中矣如説卦所列乾為天又為首又為馬之類因此八卦而重之每一卦各以八卦加於其上則為六畫之卦凡有六卜四卦每卦六爻一爻各有一義則三百八十四爻之理又畢偹於其中矣所謂因重之象以邵子次序圗觀之似為親切而排之者亦復不少邵子之書曰一分為二二分為四四分為八八分為十六十六分為三十二三十二分為六十四夫一分為二者儀二分為四者象四分為八者卦此傳文所有也若十六與三十二何名乎乃邵子肇造耳其來彈射者以此雖然此非邵子之師心也自然之象數也夫重卦之時或即加一卦於一卦之上未必如邵子之逐爻漸生不可知顧自然之象數既有之矣雖存之何害甚矣近儒之褊也善乎朱子之言曰若旋生逐爻則更加三變方成六十四卦若併生全卦則只用一變便成六十四卦雖有遲速之不同然皆自然漸次生出各有行列次第畫成之後然後見其可盡天下之變又曰邵子之前論重卦者多只是説先天八卦於內每卦上復畫八卦於外而後得六十四卦是出於人為與此之天然者不同矣此語殊有義理請以邵子所圖者默識於心知六畫卦有自然之位序而不必標十六與三十二之痕可也其重卦之人王弼虞翻孔穎達陸震陸德明以為伏羲鄭康成淳于俊以為神農孫盛以為夏禹司馬遷揚雄皇甫謐以為文王今按書大禹謨云龜筮協從則重卦其來已久周官三易其經卦皆八其别皆六十四亦重卦也斯禹雖敘疇文雖演易原非重卦之人至若稱引神農尤無稽據按淮南子曰伏羲為之六十四變周室增以六爻所謂六爻蓋指爻辭也然則伏羲既畫八卦即自重為六十四卦淮南比諸儒最為近古所傳當得其實剛柔相推者剛柔二畫互相推而去之剛易柔柔易剛也蓍數九六之變涵於此相推中矣變以蓍言蓍未揲則未有九六故曰變在其中繫辭於此爻之下而命名此爻之占為吉為凶則人之動作營為而或吉或凶盡載於此辭中矣動以人言雖未有之而理已具故曰動在其中夫人之吉凶悔吝不自生必生於動故揲蓍求卦亦必以變動之爻觀之易六十四卦三百八十四爻不過九六而已易有九六是為之本無九六則以何者為本故或剛或柔各有一定之畫者植立其本根者也若蓍變之變而不常卦變之通而不滯蓋隨時而趨埋所當然故剛或以柔柔或以剛向乎時者也趣者向也夫吉凶者悔吝之積也有趣時必有勝負然必正者勝不正者負貞者固守以正而不妄動也一部易經皆利於正蓋以道義配禍福也故為聖人之書惟正則勝不論吉凶也術家獨言禍福不配以道義如此而詭遇獲禽則曰吉得正而斃焉則曰凶京房郭璞是也韓康伯云貞者正也一也夫有動則未免乎纍殉吉則未離乎凶盡會通之變而不纍於吉凶者其惟貞者乎老子云王侯得一以為天下貞萬變雖殊可以執一御也道者天地日月之正理觀示也即下確然示人隤然示人意天地之所以示人日月之所以照臨惟是貞耳天地日月不能違而况人乎天下之動雖多而要之於貞則一孰舍正而别為一吉凶哉人能動合夫貞則動獲夫吉矣確然者健貌隤然者順貌易中爻象雖多槩於乾坤而止凡九皆乾凡六皆坤而乾坤之道槩於易簡而止易簡者乾坤之貞一也聖人作易爻也者不過效此貞一而作象也者不過像此貞一而立使不效像乎此則聖人之易與天地不相似矣爻象方動於蓍策之中吉凶即見於辭命之際故謂爻象之在書者為內吉凶之在事者為外理有同然觸之自應趣避得宜功業立見聖人所以諄諄焉而命之者蓋欲人擬之議之就其功業所謂變而通之以盡利也雖然唯恐人不與吉會者聖人之仁而唯恐人不與正合者尤聖人之義若乃教人不論吉凶必以貞勝而歸於一者則繫辭覺民之本指也故曰情見乎辭不爾而區區談吉凶則瞽史之術耳因而重之為六十四卦圖乾乾太陽夬有大大壯小畜需畜大泰履卦兌兌睽歸妹中孚節損臨人同卦離陽少革離豐人家既濟賁明夷無妄卦震隨嗑噬震益屯頥復卦隂儀太極姤過大巽少隂鼎恆巽井蠱升卦訟困坎未濟解渙坎蒙師卦陽遁咸艮太旅過小漸蹇艮謙卦否萃坤晉豫觀此剝坤卦隂儀天地之大德曰生聖人之大寶孟喜本作保曰位何以守位曰仁王肅玊伯玊桓玄明僧紹本同陸德明本作人何以聚人曰財理財正辭禁民為非曰義古者包古文又作庖犧古本又作羲孟喜京房作戲氏之王于况反天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地王昭素謂與地之間多有天字未必然司馬貞史記補引此亦無天字之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情作結繩而為網古文作网罟以佃音田古本亦作田以漁古本亦作魚蓋取諸離包犧氏沒神農氏作斫木為耜楺木為耒陸德明云一本或作楺木為之耒耨非耒耨之利以教天下蓋取諸益日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通古一本無此三字通則久是以自天祐古文亦作佑之吉無不利黃帝堯舜垂衣裳而天下治蓋取諸乾坤刳陸德明作挎木為舟剡陸本作掞木為楫古本又作楫舟楫之利以濟不通致逺以利天下古一本無此一句蓋取諸渙服説文作犕牛乘馬引重致逺以利天下古一本無此四字蓋取諸隨重直龍反門擊柝説文作柝以待暴鄭本作客蓋取諸豫斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽上古穴居而野處後世聖人易之以宮室上棟下宇以待風雨蓋取諸大壯古之葬者厚衣於既反之以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨蓋取諸大過上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬此章言聖人作易用經世之事天地之大德曰生者天主生物之始地主生物之成也董仲舒云王者欲有所為宜求端於天天道之大者在隂陽陽為德隂為刑刑主殺而德主生是故陽常居大夏而以生育長養為事隂常居大冬而積於空虛不用之處以此見天之任德不任刑也天使陽出布施於上而主嵗功使隂入伏於下而時出佐陽陽不得隂之助亦不能獨成歲終陽以成歲為名此天意也王者承天意以從事故任德教而不任刑刑者不可任以治世猶隂之不可任以成嵗也仲舒此論悉大德曰生之義矣或曰物過盛而當殺不殺天地何能容芻狗之説蓋亦近理大德曰生設教然耳曰毋患天地之不能容自鴻荒至於今不積矣蓋盈虛消息之氣相半人雖求生而為生甚難益之以必消之氣故存之與亡正相等如又殺之消當更多易書中隂陽分半也聖人不聽其自分而常扶陽抑隂以為生之甚難而殺之甚易也朱子云天地以生物為心蓋天地之間品物萬形各有所事惟天則確然於上地則隤然於下一無所為只以生物為事天地生物生人又生合德之聖以居君師之位為人物之主而後天地之所生得以各遂其生聖人之大可貴重者曰君師之位苟有其德而無其位則亦不能相天地以遂人物之生故位為聖人之大寶所謂崇高莫大乎富貴也韓康伯云夫無用則無所寶有用則有所寶也無用而常足者莫妙乎道有用而𢎞道者莫大乎位故曰聖人之大寶曰位守位之道在於仁愛所謂大德曰生也財者天地所生之物以養天地所生之人以財發身仁之道也陸績云人非財不聚故聖人觀象制器備物盡利以業萬民而聚之也蓋取聚人之本矣理財者備物致用立成器以為天下利以乾坤為本以隂陽為端以四時為序以日星為紀月以為量而五行水火木金土皆可得而財也既理財矣而又立名定分以正其辭而又明刑勑法以禁其為非義也所以行其仁者也下文作網罟教耒耜日中為市刳舟剡楫服牛乘馬造柞臼蓋宮室易棺槨皆理財之事垂衣裳用書契皆正辭之事重門擊柝弦弧剡矢皆禁民為非之事聖人得富貴之位本仁以愛人明義以立政然後可以保蒸民之生配天地之大故以羲農黃帝堯舜實之皆聖人之富貴者也先言包犧觀物制易繼言聖人觀易制物皆尚象之事為是物先卦耶為是卦先物耶知者復通為一史稱包犧氏取犧牲以充包厨故號曰包犧氏後世音謬故或謂之伏犧或謂之虙犧又鄭玄云包聚也鳥獸全具曰犧又虞翻云炮啖犧牲號庖犧氏其名義蓋不可考即太昊也仰觀俯法謂觀法其隂陽剛柔之理氣之有文者曰象形之有理者曰法漢書藝文志相地為形法家天有雷風日月雷風氣也日月象也言象可以兼氣地有水火山澤水火質也山澤形也言形可以兼質觀鳥獸之文與地所宜之植物本乎天者親上凡動物首向上故屬之天本乎地者親下凡植物本向下故屬之地抱朴子云八卦生鷹隼之所被六甲出靈龜之所負蓋謂鷹隼羽文亦有八卦之象而朱子亦謂龜背上文中間一簇成五段兩邊各插四段共成八段于八段之外兩邊周圍共有二十四段中間五段者五行也兩邊插八段者八卦也周圍二十四段者二十四氣也箇箇如此然則包犧則圗書而作易當不過如是蓋亦觀察中一事耳近取諸身若乾為首坤為腹之類逺取諸物不兼動植言只如乾為金玊坤為布釡之類朱子云俯仰逺近所取不一然不過以驗隂陽消息兩端而已於是始作八卦精以通神明之德從觀天察地來也粗以類萬物之情從觀鳥獸以下來也神明之德幽而難測故曰通萬物之情雜而難辨故曰類夫自八卦作又重而為六十四卦則天地人物之理畢備於斯而歷聖之創制立法不能外矣故曰易冒天下之道下文取離取益等事亦以其義其象與卦有相合者耳必謂尚易象而制器非也教民肉食自包犧始蓋上古未有耕種則鮮食乃其先也南軒張氏云古者禽獸多而人民少故伏羲氏為之網罟以佃以漁非徒使民皆知鮮食之利抑亦去其害而安其居也以散絲散麻絆緊而合之曰結結之以為繩也罔以取獸曰佃罟以取魚曰漁或曰罔罟通用上古之時已有結繩矣作之而為罔罟者羲皇也或曰結繩而治亦自羲皇始結繩罔罟二事結繩以防欺詐因以為罔罟而佃漁也二説未詳孰是取諸離者其象則離卦中爻為巽繩之象也離為目旁實中虛互離為兩目網罟之兩目相承者似之其義則離一隂麗二陽之中其德為麗魚獸之物麗于網罟之中者似之蓋者髣佛之辭包犧氏沒凡十五世而神農氏作民厭鮮食而食草木之實於是帝始教民稼穡號為神農沙隨程氏云飛走之類實害禾稼唯網罟佃漁之制立然後耒耨之利見於天下耜者耒之首斫木使鋭而為之所以入土俗呼犂壁今又加以鐵鏵謂之犂頭耒者耜之柄楺木使曲而為之所以運耜俗呼犂衝總呼之則為犂耨耘除草也取諸益者其象則巽入震動中爻互坤土木入土而動耒耜象互艮為手下震為足上巽為股進退震足動耜艮手持耒進退田中耕之象也又震巽二木皆行於春也其義則益下之道莫大於耕鄭康成淳于俊謂神農重卦蓋泥此以包犧取離乃八卦之名而神農取益取噬嗑則重卦之名故也神農又教民為市開封耿氏云有菽粟者或不足乎禽魚有禽魚者或不足於菽粟罄者無所取積者無所散則利不布養不均矣日中者萬物相見之時也按周官有三市此獨言日中者或創市之初惟用日中後王乃增朝夕二市與五十里為市而各致其民則天下之民無不致矣市各聚其貨則天下之貨無不聚矣交互貿易而退各得其所願所事取諸噬嗑者其象則離日在上日中象震動在下交易象震為足又為大塗互艮為徑路致民象中爻坎水艮山有貨所出聚貨象日昃則散離震之象皆不見矣其義則噬嗑食也市井交易飲食之道且天下之人其業不同天下之貨其用不同今不同者皆於市而合之以其所有易其所無各得其所亦猶物之有間者齧而合之此噬嗑之義也古説取音相同而以噬嗑為市合殊附會不經合沙鄭氏云十三卦始離次益次噬嗑所取者食貨而已食貨者生氏之本也神農氏與民並耕而食饔飱而治草衣無辨民不知貴賤之等逮殁後八代而黃帝氏作以及堯舜始制為典禮文物孔穎達云既云黃帝即云堯舜者略舉五帝之終始則少皥顓頊帝嚳在其間也風氣漸開不可如朴略之世數聖人流通其窮而當變之事使民勸於趨事而不怠倦繇之而莫知其所以然者神也以漸而相忘於不言之中者化也神而化之所以使民宜之凡此皆易理也易之為道窮極則改變改變則流通遞變遞通然後可以久而無弊是以自天祐之吉無不利天者理而已矣故上傳為君子之用易者言之下傳乂為聖人之通變者言之也蓋自黃帝至舜而制作始備故孔子曰後世雖有作者虞舜為弗可及矣當時垂作會之衣絺繡之裳而天下治蓋恭己正南面之容也抑上衣下裳如天尊地卑所以彰其身而示人上下之禮以止邪僻於未萌也禮達而分定故天下治取諸乾坤者其象則乾為衣坤為裳其義則陽尊而在上隂卑而在下故周易首乾繼以坤焦竑云十三卦獨乾坤合而不分上古衣裳相連乾坤相依君臣一體也後世衣裳離而為二尊君卑臣上下判隔失古意逺矣今獠川苗寨多衣統裙上下相連猶是古法所謂禮失而求諸野也刳者剖而使空也書刳剔孕婦之刳剡者斬削也刳木中虗為行水之舟剡木末鋭為行舟之楫濟不通者橫渡水也與濟人溱洧濟字同溪澗江河或東西阻絶或南北阻絶皆不通也致逺為句或逆水而上或放流而下皆致逺也近而可以濟不通逺而可以致逺均之為天下利矣取諸渙者其象則巽木在坎水之上故彖曰利涉大川彖傳曰乘木有功又上五畫中虛有舟象初畫偶有二楫象其義則阻絶隔逺之地若無舟楫以通其往來天下皆渙散也舟楫之利既興則日月所照霜露所墮莫不拭目觀化天下如一家中國如一人矣牛以順為道故服而馴之以引重為其力也馬以行為事故乘而駕之以致逺為其敏也天下之人皆受其利程子云服牛乘馬皆因其性而為之胡不乘牛而服馬乎理之所不可也取諸隨者其象則下動上説震下兑上震本坤所變坤為牛一竒畫在後者陽實而大引重之象也兌本乾所變乾為馬一偶畫在前者大道開張致逺之象也中爻互巽為繩互艮為鼻又為手震為足服之乘之象也其義則動靜行止皆隨人意不勞而得其欲故動而説此隨之義也川塗既通則暴客至矣不可無禦之之術故設重門以闌之擊柝以警之以備為暴之人取諸豫者其象則坤為闔戶互艮為門闕重門象震為木又為善鳴柝象艮為手擊象中爻坎為盜暴客象或云上二偶畫象重門一竒在中象擊柝於門內而坤衆安居於內其義則豫者逸也又備也謙輕而豫怠逸之意也恐逸豫故豫備前此民知粒食而不知脫粟截木為舂粟之杵掘地為容粟之臼臼杵之利使民茹其精而辭其糲咸得濟其所欲取諸小過者其象則上震為木下艮為土上動象杵下止象臼中爻兑為毁折斷與掘之象也艮為手大象坎陷臼舂之象也其義則既已粒食又杵臼以治之使精小事之過詳者然而萬民以濟亦所謂可小事者與外有擊柝以防暴客內有杵臼以治粒食而無以威不軌則雖有險而不能守雖有粟而不得食於是張弦於木為弓剡鋭木端為箭弧矢之設所以示有警備而使天下知畏此其利也取諸睽者其象則互坎為絲弦象坎又為木堅木象兑為毁折剡象互坎為弧弧中弣強上下兩稍弱故象坎離為矢矢前鏃後括實中笴虛故象離其義則睽乖然後威以服之此合睽之具也故有張弧説弧之占云黃帝以前未有宫室冬則居營窟夏則居橧巢後世聖人謂黃帝堯舜始易之以外垣四周之宫戶牗以內之室有直承而上之棟有兩垂而下之宇以備震風凌雨棟屋脊檩也宇簷也考工記棟尊而宇卑則吐水疾而霤逺以隤下為宇是也取諸大壯者其象震動在上乾健在下風雨動物棟宇健物風雨動於上棟宇健於下大壯象也或云棟取四剛象宇取二柔象其義即壯固之意古之藏尸者以薪藉其下覆其上若衣服然葬之郊野之土中不近山川也不崇土為墳不植木為識居喪之期無日月多少之數後世聖人以衣薪為不足以藏之始易之以內棺外槨按禮有虞氏瓦棺夏后氏聖周殷人棺槨瓦棺始不衣薪也聖周始有槨之象然皆陶冶之器陶冶出於土及其久也必復於土不能無使土親膚故殷人以木易之今歸諸黃帝堯舜所作未詳取諸大過者其象下巽上兑大象坎坎為隱伏葬埋象虞翻云巽為木為入處兑為口乾為人木而有口乾人入處棺斂之象鄭玄云初六在巽體巽為木上六位在己己當巽位巽又為木二木在外以夾四陽四陽互體為二乾乾為君為父二木夾君父是棺槨之象其義則大過者過厚也杵臼養生不足當大事故取小過之義棺槨送死足以當大事故取大過之義焉黃帝以前民淳事簡事之小大唯結小大之繩以識之亦足以為治至後世欺詐漸生而書契不容不作矣聖人易之以刀筆畫木簡為文字之書言有不能記者書識之刻木為一二三四之畫而中分之豫者執左取者執右以為合約之契事有不能信者契驗之百官用之以治其職萬民用之以察于事取諸夬者其象則乾兌皆金乾為言兑為決金以鐫言決事象決五竒書與契皆始于一畫積至五而變上畫偶又象契上端分處其義則夬乃君子決小人之卦有書契則考核精詳稽驗明白所以決去小人之偽而小人不得欺亦夬義十三卦終於夬者蓋器利用便則巧偽生憂患作聖人憂之故終之以書契書契立而討官邪搜民慝雖天雨粟鬼夜哭傳之後來不無深文舞文便文具文諸失而所得終多非一時之利實萬世之大利也十三卦之制作自畫卦而始至書契而終蓋萬世文字之祖肇於畫卦而備於書契也夫是十三卦者謂先有是象而數聖人規規然法之以制器萬萬不然然亦足以徴易理之博矣孔子曰吾觀殷道是故之宋而不足徴也吾得坤乾焉夫以坤乾之易盡殷道則亦猶之取十三卦之意也至若網罟等作一智者可創何必聖人雖蚩羿鯀桀之暴亦有所作顧作而仁者必聖人是以人懷其利也且非獨一聖人為之而已更歷五聖人而後備蓋聖人能為之而能不為以待夫時之自為時乎未至聖人不先故非後聖人能加於前聖人前聖人能留以俟後聖人也甚矣斯人生生之道若此其難而聖人所以生生斯人者若此其勞也故曰如古之無聖人人之類滅久矣鄧元錫云乾坤者造之物聖人者制之器造物者同將以用之而備物制器者因其用而用之者也天時有生也地理有宜也人官有能也物曲有利也聖人通變宜民神化之以成能而已矣莊子者知天而不知人者也以服牛乘馬治埴斫木為失其真性不知服之乘之治之斫之皆因其性然而制之也令馬不乘牛不服而聽其踐霜雪齕草飲水翹足而陸已也何獨廢伯樂抑且廢馬其言曰民有常性織而衣耕而食是謂同德一而不黨而織必裂麻枲耕必破埴塊食必刈稻黍梁稷而炊之何謂性也埴麻稻黍之性豈顧願人裂之破之夷刈而炊之哉故牛馬四足天也絡馬首牽牛鼻而服之乘之人也亦天也令穿馬之首而絡牛之鼻車以濟涉而舟航驅之陸也必不行矣何也失其性也唯然知制器備用之為性也尚易也尚易尚象也尚八卦自然之象而已矣是故易者象也象也者像孟京虞董姚本還作象也彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也此章專言卦之取象是故二字承上章論制器尚象而言易未有文字之時但以卦畫之象示人而已所謂象者像也以彼方此之謂像神明之德像萬物之情在六畫中其所肖似之象未有不髣佛可見者此伏羲之易也彖則舉一卦所具之材質而繫之辭以言其全體之象爻則廣摹天下之群動而繫之辭以言其一節之象材可用而未離於朴天下之動則雕琢多而情偽無乎不有故象必得辭而始顯此文王周公之易也更三聖人易理大備是故吉凶生而悔吝著令人可趨可避也蘇子瞻云象者像也像之言似也其實有不容言也故以其似者告也達者因似以識真不達則又見其似似者而日以逺矣彖楊用修云茅犀之名豨神是已犀形獨角知幾知祥是則彖者取于幾也木挺曰材材幹也爻蘇子瞻云折俎也古者謂折俎為爻其文蓋象折俎之形後世以易有六爻也故加肉為肴以别之爻則何為取于折俎也爻者效天下之動分卦之材裂卦之體而適險易之變也效呈獻也生者從此而生出也著者自微而著見也吉凶在事本顯故曰生悔吝在心尚微故曰著悔有改過之意至于吉則悔之著也吝有文過之意至于凶則吝之著也原其始而言吉凶生于悔吝要其終而言則悔吝著而為吉凶也按蔡氏攸云昔者聖人之作易也始畫八卦而象在其中象與卦並生以寓天下之賾故曰易者象也蓋俯仰以觀逺近以取神明之德可通鬼神之情狀可得而况於人乎况於萬物乎及因而重之發揮於剛柔而生爻則擬諸其形容者其變不一而象亦為之滋矣故邑屋宫庭舟車器械服帶簪履下至鳥獸蟲魚金石草木之類皆在所擬至纖至悉無所不有所謂其道甚大百物不廢者此也其在上古尚此以制器其在中古觀此以繫辭而後世之言易者乃曰得意在忘象得象在忘言一切指為魚兔筌蹄殆非聖人作易前民用以教天下之意也是説也愚欲取以告學者凡愚之於易有不通者必以象求之而後得其説象者畫之義疏也理合矣而象未合不敢從也象合矣而理未合不敢從也象與理合而真象真理出矣或取諸正體或取諸互體或兼取正互之變體甚有正互變之所不可例而偶出于一時之妙合者要之無一而不出于自然自王輔嗣詮理不詮象而以孔子之傳繫辭不言象為口實不知文王周公之言象備矣孔子變之而言理此所以為先後聖兩行之書也然小過之彖曰有飛烏之象焉則孔子未嘗不言象也特略之耳夫隔垣而望者未能辨其人之真姑自其衣冠膚髮聲音笑貌以求之亦什常得九故意既得則我能造象何象不忘若意未得象何可忘也何者彼之所謂意未必四聖人之所謂意也愚之詁易也從象入下學之學也大雅誚余余無憾焉陽卦多隂隂卦多陽其故何也陽卦竒隂卦耦其德行下孟反何也陽一君而二民君子之道也隂二君而一民小人之道也此解六子之卦也震坎艮陽卦也而其畫一陽二隂則多隂矣巽離兌隂卦也而其畫一隂二陽則多陽矣夫既多隂矣而卦何以謂之陽既多陽矣而卦何以謂之隂哉設問辭也蓋少者多之所宗衆者一之所歸震坎艮雖多隂而竒者為主是以謂之陽卦也巽離兌雖多陽而耦者為主是以謂之隂卦也宋史姦臣傳曰君子雖多小人用事其象為隂小人雖多君子用事其象為陽正此意也朱義以四五之畫言非是乃若其德行則何也上問其故是迹之粗者此問其德行是理之精者隂陽雖相勝而無兩大陽為君道隂為民道不可易也人盡民也君一而已主必致一民無二王陽卦一君而二民以一君為主則名分正定此君子之道常道也隂卦二君而一民二君共為主則政出多門乃小人之道非常道也此陽卦之所以為貴而隂卦之所以為賤也不曰一民二君而曰二君一民者蓋不欲亢民於君之上亦尊陽之意然在諸卦為陽卦者未必皆君子之道為隂卦者未必皆小人之道蓋但以隂陽之大分言耳易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉往者屈也來者信韋昭云古伸字也屈信相感而利生焉尺蠖之屈以求信也龍蛇陸德明本作蛇之蟄以存身也精義入神以致用也利用安身以崇德也過此以往未之或知也窮神知化德之盛也易曰困于石據于蒺藜入于其宮不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期陸德明本作其將至妻其可得見邪易曰公用射食亦反下同隼于高墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也子曰小人不恥不仁不畏不義不見利不勸舉正作動不威不懲小懲而大誡此小人之福也易曰屨校滅趾無咎此之謂也善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易曰何河可反校滅耳凶子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑子曰德薄而位尊知小而謀大力小而任重鮮陸德明本作鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝音升其任也子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉漢書引此有凶字之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復無祗悔元吉天地絪緼古文又作氤氲説文作一一萬物化醇男女搆鄭元本作覯云合也精萬物化生易曰三人行則損一人一人行則得其友言致一也子曰君子安其身而後動易以䜴反其心而後語定其交而後求君子修此三者故全也危以動則民不與舉正作輔也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶此章錯舉十爻皆教人安身之理而其理則備于咸九四一爻非泛釋也下經首咸下傳亦首咸咸者感也人以身涉世不能無感而害恆起于感絶感非也妄感亦非也惟退藏于密敬小慎微感而無感之心者能神于感此一章之大旨焦竑以經分上下隂陽各有定數上繫七爻起中孚鳴鶴在隂下繫十一爻起咸憧憧往來卦氣圗自復至咸八十八陽九十二隂自姤至中孚八十八隂九十二陽咸至姤凡六日七分中孚至復亦六日七分隂陽自然之數也此未必然蓋偶合耳咸九四心學也語無心之心也其曰憧憧往來用從爾思者爻以貞吉悔亡為義咸卦象人身四居三陽之中當心之位上下二陽各有所比而不能專於所應四則去二與上逺乃無心無為而自然得其正應者故貞則吉而悔可亡若憧憧往來是遊思也所思之用將隨四之思而至譬如空華非有實也蓋戒之也故聖人特於此爻發明心學之要心之官則思慮不出于心之思但思之深耳天下何思何慮所謂何思非不思也謂其思皆莫之思而思也所謂何慮非不慮也謂其慮皆莫之慮而慮也所以然者何也天下萬變紛紜而理各有定理之在心者同因事之不同而所行之塗各殊理之在心者一因事之不一而所發之慮有百塗雖殊慮雖百而應事之理則同而一也故定心應事動而無動則亦何思何慮之有且夫人心無不往不來之理寂感動靜人心之往來也如日月寒暑之往來皆出于自然未嘗以往來為病惟憧憧則失其往來自然之本體耳故日月互相推去而相代之明生寒暑互相推去而四時之嵗成往者屈矣來亦時信往即來之屈來即往之信屈信相感而有明生歲成之利此天道往來自然之感也不假思慮無事安排若憧憧之感則害矣張子云屈信相感而利生焉感以誠也情偽相感而利害生雜以偽也夫既曰屈信相感而利生矣恐人知信之利而不知屈之所以利也故以尺蠖龍蛇明之蠖屈蟲郭璞云蝍􅠸也漢志云蠖之義蓋取諸尺蚓之義蓋取諸引蒦于尺伸于引今人布指求尺一縮一伸如蠖之步其尺蠖謂乎龍蛇至冬則必蟄所以伏氣山林冬暖而蛇出者往往多死是無以存身也尺蠖不屈則其行不能信既信而再行則又屈龍蛇不蟄則其來歲之身不能奮既奮於來歲則又蟄此物自發其天機也彼惡知所以然惟人有知有知則鑿其機故以往感來以來感往而不勝其計度之私自然者以漓此用知之過也蓋聖人不思而得故曰何思何慮學者須以思學聖人之不思專取屈蟄言之者亦主靜之意非主靜則不能精義非精義則無以研幾大凡聖人之學非黜知而不用取合自然而已故思慮不無而終無一思慮君子知無往無來之謂義而究之於無心知自往自來之謂義而究之於無心之心義不以無心裁不以有心裁天則也夫是之謂精義妙之乎屈伸往來之中而無方者神乎究其義至於極精而入神觸手之所提觸目之所揣不爽錙銖其致用皆不期然而然用無不利身無不安泰宇常定天光自發德之所繇崇也此君子繇賢入聖之功蘇子瞻云精義者窮理也入神者盡性以至于命也窮理盡性以至于命豈徒然哉將以致用也譬之於水知其所以浮知其所以沈盡水之變而皆有以應之精義者也知其所以浮沈而與之為一不知其為水入神者也與水為一不知其水未有不善遊者也而况以操舟乎此之謂致用也故善遊者之操舟也其心間其體舒是何故則用利而身安也事至於身安則物莫吾測而德崇矣然此之為境猶可得而知也過此以往則繇勉而安不思而得寂然不動感而遂通如日月寒暑之往來屈伸相感而利生焉所謂窮神知化德之盛也超超絶特不可以知知也蓋入神者猶二之窮神而天不能為之制矣淺言之為義深言之為化化者天事也窮神則知變化之道矣神不可測安所容吾窮然乃曰窮神正窮乎其所無容窮者也化不可為安所容吾知然乃曰知化正知乎其所無容知者也窮無窮知無知斯乃為德之盛也夫德盛而崇非所言矣無心之盡以至於無心之不盡耳少容心焉譬之一塵亦塵而太虛為之障吾未見其能通天下而不隔少不盡心則又厭塵離塵吾未見其能通天下而不隔未合自然故也經文言貞而此言義義也貞也一也下九爻皆以發明此爻之義困三解上噬嗑初上否五鼎四共六爻言安身也豫二復初兩爻言精義也損三益上兩爻言往來也夫擇地而蹈所以安身也困之六三履非其地欲上于四而四不納是困于九四之石也三又乘二二是剛陽非已所乘是下據于九二之蒺藜也周禮罷民之有過惡者坐諸嘉石石非所宜困而三困焉雖未麗於法名已辱矣罪加重而置于叢棘者入圜土收教之不能改而出圜土者殺蒺藜非所宜據而三據焉死期將至身何危如之卦以剛見掩為困而爻以柔掩剛為危小人固不足惜然亦可為不擇地者戒也相時而動所以安身也解之上六上為天位六為飛鳥飛而戻天象小人之鷙害者憑權怙勢至此時惡已熟矣四居上公之位用以解悖坎弓離矢射上六之隼於高墉之上應手獲之既有其具又善相時故也君子不患無獲患無時不患無時患無器揆道必周藏身必固非時無倡明於屈信信屈之感慎慮以靜善其器而藏之豈為不豫哉藏而後發發以時動其動也中矣括謂結礙動無結礙故出則有獲以語乎其器完成而後動者也不知合變者不可以師張一目之羅不可以求烏也器未成而亟自用其如幸之不可強徼何所謂尺蠖之屈龍蛇之蟄九四有焉動而不括斯利用安身矣釁戾之積常自纖纖也勿謂何傷其禍將長小人以小惡為無傷而弗去也仁義無小彼弗為也見利輒動被之惡名而不恥恐之以清議禍福而不畏故惡積而不可掩罪大而不可解原其初焉無責耳矣此噬嗑初上所以始於滅趾終於滅耳也身將滅焉其何能安不足道也故君子勤修甚哉人之不可有所恃也安其位者勢必危保其存者勢必亡有其治者勢必亂保者自矜而守之之意若謂存可長保者是以君子在上雖當全盛之時而不敢忘倚伏之警國家固于磐石鞏於覆盂安身可知矣否九五所以有包桑之固者以常存其亡之心故也故君子去恃古人君之用人必度其德量其知與力而後授之官為之臣者亦必自度其德自量其知與力而後居其任雖百工胥史且猶不苟况三公乎屠羊説之所以見稱也君子將欲有為于天下非固却大任之來然必其有以受之非徒貪爵祿也貪爵祿而不返如赴火之蛾鮮不及矣鼎九四以陽居隂又乘兩陽剛之上不勝其任故有覆餗之凶公餗覆矣身將不免故君子審己是之六爻也為君子者二為小人者四君子未有不自全者小人未有不自災者安危之道可以觀矣素位而行之行無越思如農之有畔憧憧焉何益老子云吾所大患為吾有身苟吾無身吾有何患聖人所謂身則為天地立心為生民立命之身也是故言道必及身夫惟大雅既明且哲聖人取焉安身本于精義精義乂要在察幾若豫之知幾復之庶幾可謂能精義者也明于屈與蟄者也周子云動而未形有無之間者幾也是幾也境與意皆有之豫六二之幾幾之在境者也萬事之變其幾必有先動者至人於凡事之交驀然而來猝然而往雖意象紛綸眩惑萬方而輕重緩急等差降殺濳行而不窒冥會而不糾若素嘗較量於尺度權衡而停審之極又神觸神覺神覺神應若手自持足自蹈取物於掌股而不勞若飲食起居而忘其為巨大艱難不常有之事顧盻即起而致行之不疑者知幾故也蓋知至於幾而神矣然人心至神本無不燭獨心有所繫天明為蔽夫故當幾而不知苟其心一無所繫如六二之上交不諂下交不瀆則此心空洞如水映鑑燭何不足知幾之有豫之九四以不中不正為豫之主三比之初應之初與三皆四之黨與也二中正自守在初與三之間非惟不阿附四之權勢雖四之黨與亦不與之深交蓋杜絶依附之事於幾微之時上交以上卦之四言下交以下卦之初三兩爻言瀆褻狎也幾之動也朕而未著故曰微適其幾則無弗吉故曰吉之先見而不言凶朱義引漢書吉之之間有凶字贅也試觀豫初曰凶三曰悔而二獨以貞吉稱則吉之先見可知己見幾而作不俟終日言赴幾之速也介判決意夫人赴幾之不速無亦見之依違不斷故苟如石之鋸裂截然兩判寧用終日故曰斷可識矣臨川吳氏云穆生得免申白之禍者能見幾而作也劉栁竟陷伾文之黨者不能見幾而作也君子知微以下重咏嘆之也知微知彰微而能彰介于石也知柔知剛柔而能剛不終日也其為衆所瞻仰有以夫故曰萬夫之望復初九之幾幾之在意者也殆者將也庶近也言顔氏之子其將近于知幾乎知幾其神即窮神之神也聖人所以窮神者知幾而已顔之不逺復庶幾聖人之神歟聖心無動無靜止體自如顔子或不無微動於意然動即覺覺即止所以為不逺復所謂小而辨物復以自知也韓退之云顔子之過非發於行彰於言之謂也生於其心則為過矣顔子止之於始萌絶之未形所以為庶幾程子云顔子無形顯之過夫子謂其庶幾未能不勉而中所欲不踰矩是有過也合之可識不逺復不二過之義或云於幾處透徹則定靜安慮而得其所止幾者兩間止者中極惟顔子殆庶故能擇一善於不善之中亦可味復者陽反來復也初陽來復處卦之初復之最先故不至於悔而有元吉顔子以之夫能知幾則能窮義之精以入于神然後可以其身試于往來之途出而與人相感或者見世途多艱遂欲冥感却應非也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣無感無應則何以成世界故又舉損益二爻終之以明交感之義損自下乾上坤而變六三一爻上下相交者也絪麻枲也縕綿絮也借字以言天地之氣纒綿交結之意醇者凝厚也本醇酒亦借字也以卦象言地在中爻上下皆天有天將地纒綿之象故曰天地絪緼以二卦言少男在上少女在下男止女説有男女搆精之象絪緼者氣之交也故物之以氣化者其氣醲厚而能醇搆精者形之交也故物之以形化者其精凝聚而能生致一只是搆精男女之精俱到凝結而為一故能化生一到一不到不可言搆不可言一也兩則能相與三則亂矣詳在本爻下夫艮三索而得男乾道之所以成也兊三索而得女坤道之所以成也使損之三上不易則艮兊之象不見故所謂損下益上者專在六三一爻焉以卦義言君民相與之道亦猶是也咸損皆山澤之象觀損之三爻以不繫於初二兩陽而得其正應則咸九四貞吉之義其理亦可推矣上下不交為否初四相易為益上處卦極頑然不動猶之上下不交者也彼不肯益下故下還擊之無交所致也夫君子之蒞民也以財發身不以身發財故能安其身安其身斯可以動矣若自處于可危之地而驟欲動民則民不與也仰不愧俯不怍故能易其心易其心斯可以語矣我實不德而以空文令未免有疑之心則民不應也下之親上也如子弟之親其父兄是謂定其交定其交斯可以求矣素無恩于民卒有緩急而望民之拯援已則民不與也夫上好仁下未有不好義者也不然傷之者至矣凡此皆上九不恆其德而孑立之象也抑微獨君之於民而已人不能逃虛而自為也將矯憧憧而斷絶其往來焉惡可非徒無以經世恐亦無以安身矣所貴乎精義者謂其能劑量天下也雖有褊心不怨權衡故可以自安亦可以安人進而知幾則入於神而用益利身長無患而人益來歸此以無往來而致往來于不窮者也守此道不廢可以為感應主况又有窮神知化而過此者乎故此一篇大文字也爻之指尚狹而聖意之所存者蓋濶宋儒誤以為隨一時之所欲言而或者欲取上下繫十八爻之辭同列于乾坤文言之後則淺之淺者也子曰乾坤其易之門古本又有戶字邪乾陽物也坤隂物也隂陽合德而剛柔有體以體天地之撰以通神明之德其稱名也雜而不越説文作􅫝於稽其類其衰世之意耶夫易彰往而察來而微顯闡幽開而當句名辨物正句言斷辭則備矣其稱名也小其取類也大其旨逺其辭文其言曲而中丁仲反其事肆而隱因二以濟民行下孟反以明失得之報此章專論乾坤為易之門乃六十四卦之所從出而贊彖象繫辭之妙乾謂竒坤謂偶門者物之所從出者也易之變化從乾坤而起猶人之興動從門而出故曰乾坤其易之門不以闔戶闢戶言有形質曰物射禮畫於地以置足者亦謂之物一竒象陽一偶象隂則有形質矣隂陽合德謂二物交錯往來剛柔有體謂成諸卦爻之體隂陽之德未嘗不合然其體質之剛柔不易也以體天地之撰以通神明之德正于其合而分分而合得之撰數也九天數六地數三百八十四爻皆受天地之數也有形可擬故曰體隱藏謂之神著見謂之明隂陽交通乃謂之德有理可推故曰通體天地之撰承剛柔有體言兩體字相應通神明之德承隂陽合德言兩德字相應以上俱指卦畫言稱名謂所稱之名一卦有一卦之稱名一爻有一爻之稱名或言物象或言事變是也雖稱名龎雜而莫能越乎隂陽之類於歎聲歎其稽核之審也易上古未有辭至文王周公始作意者見中古以來人心日澆迷謬愈甚不得不詳詔之若當盛世則卦畫足矣焉用此為所謂人病而後求藥不病不求藥也聖人之心痌矣侯果云言邪示疑不欲切指也夫易書所載彰明於己定之理而昭察於方來之事而其彰察之妙有可言者人事屬顯易則以天道而微妙人事之顯蓋以人事本之天道也天道屬幽易則以人事而闡發天道之幽蓋以天道用可之人事也開示切當使人曉然而無所疑確然而不易所謂開而當也名辨物正承雜而不越言名即稱名之名名以物而辨物即隂陽之物物得名而正斷辭則備承彰往察來開而當言斷辭謂斷吉斷凶之辭備者理盡意盡無復餘也此句與以言乎天地之間則備矣語氣正同按言天下之賾言天下之動亦以言字起語舊讀非是其稱名也小以下覆上文而贊之也牝馬遺音之象卦之稱名者小也茅棘豕雉之象爻之稱名者小也而其所取之類皆本于乾之陽坤之隂非其取類也大乎類即上文稽其類之類彰往察來微顯闡幽其旨之所示者何逺也而其繫之為辭者罕有直言必假諸稱名以文飾之非其辭文乎凡委曲其文者未必皆中乎理易之辭雖文而旨則逺其言曲而中也將以迪人從也肆陳也凡敷陳其事者無有隱而不彰易之取類雖大而稱名則小其事肆而隱也將以啓人思也若此者何為也哉上古民心出于一睢睢盱盱無得無失報于何有衰世民心二矣情偽愛惡相感相攻而吉凶雜矣聖人因其二而明失得之報以警之若曰庶有惕乎報猶應也失得之報吉凶之應也於以度之危而措之安濟民陷溺端在於此蓋至以報言而聖人之心滋戚矣故曰衰世之意易之興也其於中古乎作易者其有憂患乎是故履德之基也謙德之柄也復德之本也恆德之固也損德之修馬融本作循也益德之裕也困德之辨也井德之地也巽德之制也履和而至謙尊而光復小而辨於物恆雜而不厭損先難而後易以䜴反益長丁丈反裕而不設困窮而通井居其所而遷巽稱尺證反而隱履以和行謙以制禮復以自知恆以一德損以逺于萬反害益以興利困以寡怨井以辨義巽以行權此章論聖人以九卦修德上經三下經六依經文之序而舉之雖以處憂患言其實聖學莫備于此中古謂文王時易乃伏羲所作然無其辭文王已前不過為占卜之書而已至文王始有彖辭教人以反身修德之道則易書之著明而興起者自文王始也文王拘羑里而作易故於處憂患之道曲而盡文王之易出而伏羲無窮之精義始著其辭皆前所未有故不云述而曰作程子云仁者不憂又却言作易者其有憂患須要知用處各别也天下只有一箇憂字一箇患字既有此二字聖人安得無之第二節言九卦為修德之具第三節以卦之體言第四節以人之用卦言德者行道而有得于身也入道先從復禮始禮者聖人之成法卑如地者也人之欲無窮不範之以禮則萬過所繇藂故履為德基基者積纍之所始如築土下址也然心不自下雖勉而繇禮弗終也故次之以謙滿招損謙受益故為德之柄柄者以此自持如言以謙為把柄也夫人未有不繇履與謙而能脫於憂患者然而復其本也故次之以復復者反也朱子云如孟子所謂自反心不外而善端存也又陸子云復而先以履謙蓋履上天下澤而人居其中先辨一身所以舉措動作之繇謙以自持使精神收聚于內則此心斯可得而復亦是至於復而學始有根柢還得其本心矣猶慮夫擇焉而弗能固也故次之以恆恆者守不變而常且久也至於恆而根柢乃堅固心始不動矣德既固矣焉用損或以欲牽或以見溷皆蝕吾德者也不減損則其所執為德者竟非德矣本無者日損而德始修治故曰損德之修也德既修矣然以粹白自足而不務深造無乃猶有遺德遷善改過則本有之道心日長故曰益德之裕也居常履順而懷德易耳不從困中過如金不經鍛鍊不可為鏌鎁木不經椎鑿不可成宫室必困而德始辨焉遭非意之變而所造因以日精日徹故曰辨非自他人觀之也此一句乃三陳九卦之本旨至是而德可以濟天下矣必親為之日亦不足故居至靜以待天下之動若井之在地而往來井井靜而不勞施而不匱可也故曰井德之地也天下之事無窮載籍有所不備父師有所不傳當機審宜間不容髮非天下之最善制者孰能定而非最精心以巽順于理者孰能制故以巽為德之制終焉或謂此九卦無次第然觀履以德之基言而終于巽乃可與權之事則朱義所云有序理或然也夫履之為卦上天下澤六三一隂安處于三陽之下各履其位而得其和者也和則疑於平易而非極至之義然各得其所而不亂天理之至孰加焉是履之德也謙之為卦地中有山九三一陽退處于三隂之下迹在乎自卑則不尊矣意存乎自晦則不光矣然自卑而人尊之雖自晦而道彌光是謙之德也復之為卦一陽生于五隂之下可謂小矣然與衆隂却不相亂如幽暗中一點白故曰小而辨於物物指五隂是復之德也男女雜居苟不得其當未有久而不厭者惟恆以長男正位乎上長女正位乎下乃天地之大義人道之常經故雖雜而不相厭是恆之德也損上艮下兊君子取象以懲忿窒欲或謂忿如山欲如壑必摧山以塞澤則兩患俱減是先難也然夷高就卑自非難事故曰後易亦通是損之德也益上巽下震以學言遜志為巽時敏為震彖傳曰益動而巽日進無疆故能充長寬裕而不假造作是益之德也困下險上説在險能説則有不為困困者在身雖窮而道則通故彖傳曰困而不失其所亨是困之德也井下卦巽二陽之水下居井中不動而上卦坎一陽之水汲上而及物蓋內足者不求於物而物求之故居其所而能遷是井之德也巽一隂在下二陽在上其義入也伏也不止卑順之謂凡有所遲疑顧慮從權變而入者皆巽也故能稱量事物之宜如風之行而不露其形迹是巽之德也九卦之體各有其德如此是故學者用九卦以修德亦各有所屬焉以用也履者禮也憤驕而不可係者其惟人心乎用禮以約之而制行始和此履所以為德之基也所貴乎禮者以其為德之品節也然惟讓為禮之實不讓不為禮故用謙以制之此謙所以為德之柄也擇善者吾身修德之始事也則用復以自知而擇之此復所以為德之本也固執者吾身修德之終事也則用恆以一德而守之此恆所以為德之固也人欲者吾德之害也則用損以逺之此損所以為德之修也天理者吾德之利也則用益以興之此益所以為德之裕也不知其命之當安未免怨天無以為君子矣則用困以寡之此困所以為德之辨也施而無私者義之方也然必安而後能慮則用井以辨之此井所以為德之地也至於巽以行權而後其變化時出與易同體非義精仁熟者不能此巽所以為德之制也朱子云巽是入細底意説在九卦之後是這八卦事了方可以行權焦竑云三陳皆有辨困之辨辨于已復之辨辨于物井則人已之間兩極其辨也九德雖以處憂患言然易道至此備矣蓋聖人挈要之微言可弗玩夫蘇子瞻云此九卦者為憂患者言也其意以屬文王歟孔子於文王也見其禮樂讀其易考其行事而得其為人其必有以合此九卦者而世莫足以知之也馮時可云易之為卦六十有四而聖人獨舉九卦也曰作易者其有憂患則以是九者為處困之道乎曰非也聖人之憂患者憂患天下之迷復也乃其處困又何憂患焉是故九卦者所以釋天下之憂患也其重在於復而先之以履與謙則有意乎其言之也夫道與器不相離而神與迹不相判也然而以道自命者率以器為拘以神為玩者率以迹為滯易之為道盡性至命變動不居者也故貴虛樂肆者依焉此聖人所深憂也憂之如何以禮朂之而已履者禮之所以行謙者禮之所自起也履以間邪於外謙以聚精於內心可復矣復而不固其復有時而失也故不可以不知恆恆而不通其恆有時而泥也故不可以不知損益能知損益則私欲日消天理日瑩雖處危困而此心卓然不動然後左右逢原如井之勿幕處處皆足至此則觸機而動順天而應如風之無所不入而無所阻礙故可以行權也學至於行權則此心真體渾然全復矣然必以禮為之基謙為之柄則聖人之學可知也是故禮非明也易非幽也易為之動禮為之主雖不可為典要而未嘗無典要也虛無放蕩之論詘於是矣而雲峯胡氏則曰此章三陳九德雖夫子偶即九卦言之然上經自乾至履九卦下經自恆至損益亦九卦上經履至謙五卦下經益至困井亦五卦上經謙至復又九卦下經井至巽又九卦上經自復而後八卦而為下經之恆下經自巽而未濟亦八卦復為上經之乾上下經對待又似非偶然者或於此可見文王之心焉對待凡十卦置乾不言乾為君也文王常存事君之小心而不知其有君民之大德者也九卦上下體無離文王晦其明者也然有互體離在焉實未嘗不明也新安朱氏升又云夫子言邦無道危行言孫九卦前三卦危行也後六卦言孫也上經取履于乾先天之乾所以父巽離兊於上者敘倫於履矣取謙於坤先天之坤所以母震坎艮於下者敘倫於謙矣復卦乾陽反動於坤隂之下復禮為仁之本也而三才之道備矣恆為下經巽體之首下經十一卦有巽體惟益反為損升反為困名義相形可以表巽道之用故並取四卦以見意益巽于外井巽于內而又以重巽終焉蓋至是而內外上下無非巽矣愚按朱子不取九卦合陽數之説以為觀聖人之經正不當如此天下道理只在聖人口頭開口便是道理偶説此九卦意思自足若更添一卦也不妨更不説一卦也不妨只就此九卦中亦自儘有道理若以困為處憂患底卦則屯蹇非處憂患而何此論蓋得之胡朱之説非其至者姑録之以廣聞見云爾易之為書也不可逺為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要唯變所適其出入以度外內使知懼又明於憂患與故無有師保如臨父母初率其辭而揆其方既有典常苟非其人道不虛行此章因論卦變而言易之為用雖變易之為理則常欲人觀象玩辭而得之也夫易以前民用作也其為書曷容逺索哉顧其為道也屢遷凡書皆各因一事而發故指趣有定歸惟易不然役隂陽而為道隨時變通而不滯乎物是以九六之畫更互變動不恆居一體而周遍流動在六位之虛此變動以卦變言與蓍無涉通章皆主易之為書言亦與人占卦無涉卦雖六位然剛柔往來如寄非實有也故曰六虛鶴山魏氏云六畫六爻六位六虛四者相近而不同爻者動也專指九六則父母之策也畫者卦也兼七八九六則包男女之策也總而言之畫即為爻析而言之爻與畫異畫之見者又為位爻之變者又為虛故曰變動不居周流六虛位從爻而為虛也曰六畫成卦六位成章虛從畫而為位也然其實皆自竒偶之畫始竒偶則太極之分者也外三爻為上內三爻為下上下無常者九六之爻周流于虛位之間或上或下而無常也剛柔相易者如乾之一陽與坤之一隂相易而震生焉坤之一隂與乾之一陽相易而巽生焉是也是皆不可拘以典常繩以要約惟其變畫所往何位耳朱子云易不可為典要易不是確定硬本子揚雄太玄却是可為典要他排定三百五十四贊當晝三百五十四贊當夜晝底吉夜底凶吉之中又自分輕重凶之中又自分輕重易却不然有陽居陽爻而吉底又有凶底有隂居隂爻而吉底又有凶底有有應而吉底有有應而凶底是不可為典要之書也是有那許多變所以如此出入以爻言外內以卦言出者自內之外所謂往也入者自外之內所謂來也承上文言卦變之不常如此然其爻出入所居之位莫不各有截然之法度其卦之居於內外者又皆各著其相合之體以使人知懼此二句指卦中兩體及六爻之象言而聖人又於出入外內之中繫之辭焉以明其可憂又明其可憂之故明其可患又明其可患之故雖無師保在上而常若父母臨之此則文王周公所以教愛天下之至也蘇子瞻云卦所以有內外爻所以有出入者為之立敵而造憂患之端使知懼也有敵而後懼懼而後用法此物之情也憂患之來苟不明其故則人有苟免之志而怠於避禍矣故易明憂患又明其所以致之之故辭卦爻辭也方辭所指之向也初率其辭而揆其指之所向則其道雖不可為典要而其書則既有典可循有常可蹈矣上言卦畫之變其道變而不常此言彖爻之辭其道常而不變然通全易而言則以屢遷為道者固終未始有常也故曰苟非神明默成之人則易之道不虛行人能𢎞道無人則道虛離方以求道者非執方以為道者抑猶非所貴學易者固將以行之也能無望于得其人哉言初即含有終意言既即含未了意蘇子瞻云初者為未達者言也未達者治其書用其出入之度審其內外之懼明其憂患之故而蹈其無常可以寡過達者行其道無出無入無內無外周流六位無往不適雖為聖人可也易之為書也原始要終以為質也六爻相雜唯其時物也其初難知其上易知本末也初辭擬之句卒成之終句若夫雜物撰鄭玄本作算德辨是與非則非其中爻不備噫亦要存亡吉凶則居可知矣知音智者觀其彖辭則思過半矣二與四同功而異位其善不同二多譽四多懼近也郭京舉正載王弼注懼云懼近也誤將近也字作經柔之為道不利逺者其要無咎其用柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝耶此章統論爻畫而歸重于彖辭説易之法莫備于此易之為書綱紀在卦卦必合爻之全而後成卦一畫不似便成它局聖人之係卦也為之推原其始要約其終彌綸全卦之理而包羅含蓄於彖辭之內如物之有體質即三章所謂彖者材也至於係爻則異此就其所處之一節而分疏之蓋卦猶天王也爻猶列國也承乘比應愛惡相攻逺近相取情偽相感雜揉紛綸不可殫紀故吉凶得失之變多聖人係辭亦惟相其六位之時而導之宜因其隂陽之物而立之像然其大旨要不過推演彖辭之意愚嘗謂易更四聖人之手而其理已宣泄無餘矣畫不足而立之彖彖者畫之注疏也彖不足而立之象象者彖之注疏也彖象又不足而佐之傳傳者彖與象之注疏也合之皆以明畫有是四者而猶不悟聖人末如之何矣夫存畫于心本之以觀彖象則未有不瞭然者也即六畫備而卦名生稽其字義則其卦義亦未有不瞭然者也而况於彖與象之詳且盡乎所以必宗傳者嘵嘵之學各是其師故衆言淆亂折諸聖也是故傳者學易之準的也而從來之為義者第以文字求之而已即曰某乘也某承也某比應也某當位不當位也特從而為之辭者耳其於六畫固未能豁然而貫通且間有彖與象與傳互相矛盾者吾不知其解也假令易一爻而示之恐郢書燕説之笑端比比而是故愚之説易也專以六畫為主有能得象而忘言則彖象且無庸進之得意而忘象則畫亦無庸庶幾旦暮遇之爾其初難知以下承六爻句折言之其初難知五句言初上二爻雜物撰德三句言中四爻初爻者卦之本本則其質未明時物中藏而難知上爻者卦之末末則其質已著從其本而推之則易究是以聖人繫辭之時擬議其初甚似不容易及其卒也則就所擬者成之終爾若夫雜物撰德廣肆而言之者則唯中四爻始備蓋兼正體互體言也內外既有二正卦之體中四爻又成二互體之卦然後其義愈無遺闕非以此正體互體並觀則其義猶有不備互體如屯卦震下坎上就中間四爻觀之自二至四為坤自三至五為艮是也在爻有之坤坎為師而六五之爻曰長子帥師則以正應九二而言蓋取九二六三六四為震也坤艮為謙而初六之爻曰用涉大川蓋自二而上則六二九三六四為坎也愚此書中言互體頗備蓋祖夫子之説物即隂陽之物互雜而取其畫謂上取此畫為上卦下又取此畫為下卦撰猶數也二卦固各有德自其中四爻之隂陽雜而互之又成兩卦是別算其德也按互體之説本於左傳漢儒皆用之自王輔嗣棄而不道後之言易者皆祖焉蓋利其簡便故耳愚則謂中爻之象兼取互體者正所以識别其畫也二體之中又分二互因其所取之象而諦觀之則若爻之居若位截然無遁情矣聖心名理觸處洞然其重卦也猶之合兩物為一物云耳兩合為一則上下之交將隔而不屬夫惟雜之以互而一二三為卦二三四又為卦三四五為卦四五上又為卦合而分分而合無不聨者政如常山之蛇擊首尾應擊尾首應擊其中則首尾以應也其義類之精至於如此若乃成卦之指則仍是上下兩體為主專以互體言易非也棄互體而不言亦非也以六畫言則二三四五為初上之中以二三四五言則三四又當二五之中故三四之為互體也各二而二五之為互體也各一總謂之曰中爻得其位曰是不得其位曰非噫嘆美辭亦要存亡吉凶則居可知矣統六爻言之也存亡者隂陽之消息吉凶者人事之失得繇六爻以要約存亡吉凶之所歸則居然易見可指掌而知矣然智者能見事於未形雖不觀各爻之義但觀卦首之彖辭則所思已得十分之五六矣蓋彖舉其綱爻言其目彖辭或論二體或論主爻雖未十分詳盡而已得其大要是以不待觀六爻而已可見也凡解彖者而未能使六畫之理了然目前不至為他卦所溷未為能解彖也王輔嗣云夫彖者何也統論一卦之體明其所繇之主者也夫衆不能治衆治衆者至寡者也夫動不能制動制天下之動者貞夫一者也故衆之所以得咸存者主必致一也動之所以得咸運者原必無二也物無妄然必繇其理統之有宗會之有元故繁而不亂衆而不惑故六爻相錯可舉一以明也剛柔胡乘可立主以定也自統而尋之物雖衆則知可以執一御也繇本以觀之義雖博則知可以一名舉也故處璇璣以觀大運則天地之動未足怪也據會要以觀方來則六合輻輳未足多也故舉卦之名義有主矣觀其彖辭則思過半矣夫少者多所貴也寡者衆所宗也一卦五陽一隂則隂為主五隂一陽則陽為主夫隂所求者陽也陽所求者隂也陽苟一焉五隂何得不同而歸之隂苟隻焉五陽何得不同而從之故隂爻雖賤而為一卦之主者處其至少之地也或有遺爻而舉二體者卦體不繇乎爻也繁而不憂亂變而不憂惑約以存博簡以濟衆其惟彖乎亂而不能惑變而不能渝非天下之至賾其孰能與於此故觀彖以斯義可見矣章首第一句言彖第二句總言六爻既又總言六爻而復歸重於彖蓋為結語與章首起語相終始下文則又更端而言中四爻也雜物撰德兼言中爻之互體二四三五同功異位專論中爻之本體而同功二字則又連上互體而言二與四同居隂位自二至四互成一卦故其功同也異位者謂異其近君逺君之位君指五其善不同者其可名之善相懸絶也即下文之所謂譽二多譽為其逺君而易為名也四多懼為其近君而難為名也有善之名而近於君則懼矣故二之善宜著而四之善宜隱也多者謂不盡然而若此者衆近也二字專釋四多懼此下四句釋二多譽柔者有依而後能立二四皆以柔道處柔位者四近五有依而二逺五無依疑於四利而二不利然而二要歸無咎則以其用柔而居下卦之中也今之仕宦者類樂內遷而憚外補讀此亦可灑然月逺日則光滿近則光微此多譽多懼之説也然月太隂之精也與日正相望而光乃比於日又柔中之譬也三與五同居陽位自三至五互成一卦故其功同也而異其五為君三為臣之位上文二四之位以逺近言此位字以貴賤言與六位隂陽之位不同三常以賤而受其責五常以貴而享其功貴賤之差等也柔危剛勝或指五言或指三言或兼言之皆有未通此剛柔字與易中凡言剛柔字稍異五君也其位貴其道剛三臣也其位賤其道柔柔而居剛危而多凶剛而居剛勝而多功故曰其柔危其剛勝耶曰多曰邪皆未必然之辭六十四卦惟謙卦九三勞謙許之以吉所謂三多凶也若五之多功則有不可勝舉者王輔嗣云二五多譽卦之宗也三四多懼爻及中也苟獲其中雖弱必治苟非其正雖強必災是以大有六五柔非其體在卦之宗雖柔猶吉同人九三剛得其位非爻之中雖剛猶危強而失正則強不足安弱而得中則弱不足患東鄰百勝而亳社斯表周雖陶穴而有汝墳自此觀之斷可識矣愚按篇末覆舉中爻雖以三四與二五並言其意全為二五而發蓋二五居上下卦之中六爻之德莫優于此故復表而出之所以略初上不言者蓋初上之文九六處其後二三四五之文九六處其前初上非不論德行而非用事之地故所重在時位中四爻非不論時位而用事之地故惟重在德行也若夫卦主在初上者則不可以此例論也此章為易中卦爻之凡例求卦爻之義者執此以求之而已然僅曰要曰多曰過半則雖聖人猶未敢輕言之也韋編三絶有以夫易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉上章析論初上二五三四此章統六爻言之而以爻畫之序三分焉亦易書中一義也上篇所云三極之道正此通上三章各以易之為書也起語故宜各為一章廣大者體統渾淪也悉備者條理詳密也又荀爽云以隂易陽謂之廣以陽易隂謂之大易始于三畫之卦有天人地之理流行於此焉謂上畫象天中畫象人下畫象地也天不兩則獨陽無隂地不兩則獨隂無陽人不兩則隂陽亦混而不分故必兼天人地三者之才而兩之則天人地各有隂陽全而不偏是故聖人重三畫為六畫説文一手持二秉為兼才者能也天能覆地能載人能參天地故曰才六畫非他也三才之理之流行也初為地之陽二為地之隂三為人之陽四為人之隂五為天之陽上為天之隂然是天地人之理流行于六畫視其在三畫也亦有更變移動焉惟初為地道上為天道兩畫不改移其中四畫皆有改移也二人也而為地三天也而為人四地也而為人五人也而為天必六畫而後三兩之理始全故名其六位隂陽交錯相間者為爻三畫之卦不曰爻者無隂陽相間也各爻之畫有比並而不同者或剛或柔而小大有等故謂之物物即隂陽二物也爻虛位不可以言物有等則謂之物矣一不獨立二則為文隂陽兩物互相間雜於六位中故名為交錯之文隂陽純而不雜則不成文也不當者非專指陽居隂位隂居陽位也卦情若淑或以不當為吉卦情若慝反以當位為凶要在隨時變易得其當而已卦必舉始終而成體故上章以質言爻必雜剛柔而為用故此章以文言季彭山云按卦爻之乘承比應或逺或近或寡或多各趨所重不但隂陽有不當位而已自聖人處之剛中有柔柔中有剛位不宜剛而遇剛亦不至於太抗位不宜柔而遇柔亦不至於太卑隨其所遇而能相濟皆吉道也在常人則剛柔之遇倚於一偏而卦爻之凶者不能避矣故文不當而凶或害之者自小人言也不然則雖凶亦吉何吉凶之可並言哉易之興也其當殷之末世周之盛德邪當文王與紂之事邪是故其辭危危者使平易以䜴反者使傾其道甚大百物不廢懼以終始其要無咎此之謂易之道也此章言文王作易之大旨紂在位久文王遭時不幸激之不可徇之不可讀易羑里正化剛為柔持中養和之日故曰盛德夫無寇言備寇者不若遭寇者之為用無虎言防虎者不若遇虎者之為工意之者不如履之者也文王遭紂禍而演易不以已之憂患忘天下後世之憂患其心懼故其辭危欲人知所警而不蹈凶幾非謂遇禍而始懼也危懼故得平安慢易則必傾覆使者天理之自然若或使之也所謂殖有禮覆昏暴天之道即易之道也百物猶云百事近而語默動靜之得失逺而天下國家之興亡靡不繇此應若影響無能違者故曰其道甚大百物不廢人能因其辭之危而承以心之懼自始至終莫不皆然則其大要歸于無咎恐人有求吉之心也但曰無咎而已要之能無咎則吉可知故易之道以一體盡之防乎其防易之大綱也此文王作易教人之心亦夫子誨人讀易之訣也或云辭即彖辭爻辭皆文王所作若以文王止作彖辭則彖辭未見所謂危者惟爻辭則多有之謂爻辭非文王所作可乎占法不變者斷以彖變者斷以爻謂文王不作爻辭不知占法者之妄論云耳此説亦可信存之以俟知者誠齋楊氏云紂殷王也仲尼殷後也而仲尼貶殷為末世褒周為盛德指紂之名而不諱稱文王之王而不抑其不以一家之私沒天下之公與大哉文王之聖與大哉仲尼之公與夫乾天下之至健也德行下孟反下同恆易以䜴反以知險夫坤天下之至順也德行恆簡以知阻能説音悅諸心能研諸侯之二字疑衍慮定天下之吉凶成天下之亹亹者是故變化云為吉事有祥象事知器占事知來天地設位聖人成能人謀鬼謀百姓與去聲能八卦以象告爻彖以情言剛柔雜居而吉凶可見矣變動以利言吉凶以情遷是故愛惡烏路反相攻而吉凶生逺近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶句或害句之悔句且吝句將叛者其辭慚中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭遊失其守者其辭屈此繫傳之末章也總論聖人體乾坤易簡之德以知險阻故能作易以前民用與首篇第一章相首尾首章原作易之本此章著作易之事健順者乾坤之性德者乾坤藴蓄之德行者乾坤生成之迹易簡者乾坤無私之理也易與險相反惟中心易直者能照天下險巇之情簡與阻相反惟行事簡靜者能察天下煩壅之機夫自為險阻而求天下無險阻者無有故非易簡不能知而易簡非無町畦之謂也惟乾至健惟坤至順因理之自然而行其所無事大清不淆大寧不搖是故恆易簡而知險阻也蘇子瞻云已險而能知險已阻而能知阻者天下未嘗有也夫險阻在躬則天下莫不備之天下莫不備之則其所備者衆矣又何暇知人哉是故處下以傾高則高者畢赴用晦以求明則明者必見易簡以觀險阻則險阻無隱情矣朱子云險是自上視下見下之險故不敢行阻是自下觀上為上所阻故不敢進自山下上山為阻故指坤而言自山上觀山下為險故指乾而言因登山而明險阻之義又云乾雖至健知得險了却不下去坤雖至順知得阻了更不上去有人于此能以此易簡之德行玩味之於心而心與理會能以此易簡之德行研磨之於臨事之思慮而理因慮審則知險阻者乾坤而之人亦能知險阻矣于以決斷天下之吉凶而作成天下之趨事者必此人也下文所謂聖人是也故起之以能字而終之以者字焉侯之二字定屬羡文注疏強解非是愚於易本文中所不從者惟此二字耳是故在天道則有變化在人事則有云為云言語也為行事也凡人事之與吉逢者其先必有祥兆天人相感志一之動氣也聖人作易正以迪人于吉故獨以吉事言之與吉之先見同義取變化之理以象人事則能知形下之器取變化之理以占人事則能知朕兆之來器謂隂陽來謂來物知器知來皆從知乾坤之理而出此易書之所繇作所以教人趨吉避凶而成天下之亹亹也夫自天地設位而易即行乎其中矣然天地能知險知阻而不能以告人也聖人則完成天地之所不能者而能之創為象占之法凡人有事先與人謀之又問之於筮而與鬼神謀則雖日用不知之百姓亦可與及于聖人之能也百姓與能此聖人所以成天地之能者也韓康伯云不假思慮而失得自明不勞探討而吉凶自著類萬物之情通幽深之故故百姓與能樂推而不厭也八卦以象告謂卦畫之以象示人也爻彖以情言謂繫辭之以言論人也八卦即六十四卦也以上下二體各有八卦故但言八卦情即象之情在彖則言其一卦之情在爻則言其本爻之情以象告者伏羲先天之易也以情言者文王周公後天之易也剛柔雜居而吉凶可見此二句明八卦以象告也變動以利言吉凶以情遷而下明爻彖以情言也然言爻彖之情者不同自彖辭觀之卦體本以變動而成故彖辭專言其變通之利如柔來文剛剛自外來而為主于內之類雖睽蹇明夷至不美之卦其彖皆有所利蓋因變而成卦則以成卦者為利此彖之情也變情言利者正與下文愛惡相攻逺近相取情偽相感三者為爻之情對看蓋指其藴而言故曰變動以利言自爻辭觀之一爻有一爻之情故或吉或凶以逐爻之情而遷其説在下皆言吉凶以情遷之事而以六爻之情與辭明之爻之相得者為愛不相得者為惡曰相攻者謂兩相愛兩相惡而辭之或吉或凶生焉爻之逺者為應近者為比曰相取者謂逺取逺近取近而辭之或悔或吝生焉爻之以實意往來者為情以虛情結託者為偽曰相感者謂情感情偽感偽而辭之利與無攸利生焉相感者情之始交故以利害言之相取則有事矣故以悔吝言之相攻則其事極矣故以吉凶言之總而明之曰吉凶也凡易之道六爻必取正應初與四應二與五應三與上應其或有舍正應而從近比者必其果有相得之情則不可以此為例苟非正應又不相得雖貪密邇道終致凶或招患害往必致悔且有羞吝也則凶二字絶句或害二字又絶句與或擊之文法同之悔二字又絶句之往也大學之其所畏敬哀矜論語之三子告皆以之字起語且吝二字自為句若連之悔二字讀則亦從論語使驕且吝之例也蓋凶害悔吝四者俱有而總之皆凶道耳舊讀則凶或害之為句難通且專主近比言不得其旨王輔嗣云夫爻者何也言乎變者也變者何也情偽之所為也夫情偽之動非數之所求也故合散屈伸與體相乖形躁動靜質柔愛剛體與情反質與願違巧歷不能定其算數聖明不能為之典要法制所不能齊度量所不能均也為之乎豈在夫大哉陵三軍者或懼於朝廷之儀暴威武者或困於酒色之娛近不必比逺不必乖同聲相應高下不必均也同氣相求體質不必齊也召雲者龍命吕者律故二女相逺而剛柔合體隆墀永嘆逺壑必盈投戈散地則六親不能相保同舟而濟則胡越何患乎異心故苟識其情不憂乖逺苟明其趣不煩強武能説諸心能研諸慮睽而知其類異而知其通其惟明爻者乎故有善邇而逺至命宫而啇應修下而高者降與彼而取此者服矣是故情偽相感逺近相追愛惡相攻屈伸相推見情者獲直往則違非天下之至變其孰能與於此哉又云夫卦者時也爻者適時之變者也夫時有否泰故用有行藏卦有小大故辭有險易一時之制可反而用也一時之吉可反而凶也故卦以反對而爻亦皆變是故用無常道事無軌度動靜屈伸唯變所適故名其卦則凶吉從其類存其時則動靜應其用尋名以觀其吉凶舉時以觀其動靜則一體之變繇斯見矣夫應者同志之象也位者爻所處之象也承乘者逆順之象也逺近者險易之象也內外者出處之象也初上者終始之象也是故雖逺而可以動者得其應也雖險而可以處者得其時也弱而不懼於敵者得所據也憂而不懼於亂者得所附也柔而不憂於斷者得所御也雖後而敢為之先者應其始也物競而獨安靜者要其終也故觀變動者存乎應察安危者存乎位辨逆順者存乎承乘明出處者存乎內外近逺終始各存其會僻險尚逺趣時貴近比復好先乾壯惡首明夷務暗豐尚光大吉凶有時不可犯也動靜有適不可過也犯時之忌罪不在大失其所適過不在深動天下滅君王而不可危也侮妻子用顔色而不可易也故當其列貴賤之時其位不可犯也遇其憂悔吝之時其介不可慢也觀爻思變變斯盡矣末言六辭者以象爻中所列之辭也上文言爻之情盡矣命辭之法必各象其爻之情爻之辭從情而變亦猶人之辭繇情而遷故舉六辭以譬之所謂學易而有得者可以知言也大抵歉于中者必愧于外秦武陽色變而荆軻為之辭謝是也故曰將叛者其辭慙將有言于人而逆疑其不售也必左右其説以詳之此不有售焉則彼必售矣啇鞅之説孝公是也故曰中心疑者其辭枝直情無所煩言至正無所揣摩申公之對武帝是也故曰吉人之辭寡人惟無躁競也人而躁競則危言以眩世而無所忌強聒以撼人而不能已能令人厭亦能令人喜厭者察其空空而喜者意其有挾也淳于髠之見梁惠王連語三日三夜是也故曰躁人之辭多小人之疾君子而欲毁之也必深匿其毁之之迹疾之愈甚則毁之愈緩或顯譽其人而隂寓其忮或泛為之説以旁見其意故毁行而人不悟公孫𢎞之譛董仲舒汲黯是也故曰誣善之人其辭遊人之心未有無所主者所主者義乎攻之者愈衆而主之者愈堅所主者不義乎外必周為之防而內必深窒其隙幸而遇庸人雖欲攻之莫知其所以攻之者不幸而遇智者先得其隙而入之逆奪其防而據之則一語而折夷之之見孟子是也故曰失其守者其辭屈卦爻之辭亦猶是也聖人準望此六者以繫爻如化工肖物直使人因爻之辭以見爻之情然吉一而已若叛若疑若躁若誣若失守且居其五亦足盡險阻之變矣以上皆言吉凶以情遷之事上下篇為繫辭作傳故以論辭終焉按繫辭傳上篇多談理下篇多釋義而始終于易簡蓋易之象括于乾坤而易之道則括于易簡也晏子譏孔子以為當年莫能究其禮纍世莫能殫其學莊生譏孔子之仁義大謾司馬談謂儒者之學博而寡要勞而難從皆不知聖學之易簡也非學易也烏見聖人之心哉古周易訂詁卷十二
