  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1a0113_WYG_007-1a, image: WYG0036/WYG0036-0282a.png}
body:
  text: 古周易訂詁卷七明何楷撰彖傳上卦之繇辭為彖王輔嗣云彖者統論一卦之體陸德明云彖者斷也按説文彖豕走也從互從豕省象形互音計豕之頭也象其鋭而上見彖傳所以名為彖者蓋取其發揚卦藴無藏匿也又楊用修謂彖者茅犀之名狀如犀而獨角善知吉凶禨祥然則彖之名彖當亦取先知之意而趙凡夫引劉協言篆者傳也傳者轉也易傳謂之篆渻而作彖其義遂晦恐未然也其辭文王所繫傳者孔子所以釋經之辭此十翼之首也上下篇依經大哉乾元萬物資始乃統天雲行雨施品物流形太明終始六位時成時乘六龍以御天乾道變化各正性命保合大和乃利貞首出庶物萬國咸寧凡彖辭象辭皆押韻解已逐注於經文之下今不重注至哉坤元萬物資生乃順承天坤厚載物德合無疆含𢎞光大品物咸亨牝馬地類行地無疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶讀如羌文言傳必有餘慶叶殃詩農夫之慶叶臧急就章所不侵龍未央伊嬰齊翟回慶皆用羌音又羌亦通作慶漢書恐网兩之責景兮慶未得其云己師古注與羌同安貞之吉應地無疆屯剛柔始交而難去聲生動乎險漢劉修碑作儉誤也中大亨貞雷雨之動滿盈天造草昧宜建侯而鄭康成讀而曰能能猶安也不通不寧蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告古毒反下同以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位鄭康成音涖不必從乎天位以正中也朱子云以正中以中正也即一般只要協韻利涉大川往有功也訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也師衆也貞正也能以衆正可以王陸德明云王如字物歸往也又古徐注及程傳皆作往况反矣剛中而應臨無妄萃升同行險而順以此毒天下而民從之吉又何咎矣比毗志反下同吉也郭京王昭素皆謂誤增也字非比輔也下順從也原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也履柔履剛也説音兊而應乎乾是以履虎尾不嘻人亨剛中正履帝位而不疚陸績本作疾光明也泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外陰內健而外順內君子而外小人君子道長丁丈反小人道消也否備鄙反之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內陰而外陽內柔而外剛內小人而外君子小人道長丁丈反君子道消也同人柔得位得中而應乎乾曰同人同人曰同人于野亨利涉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志大有柔得尊位大中而上下應之曰大有其德剛健而文明應乎天而時行是以元亨謙亨天道下濟而光明地道卑而上行天道虧馬融本作毁盈而益謙地道變盈而流謙鬼神害盈而福京房本作富後漢劉修碑同謙人道惡烏路反盈而好呼報反謙謙尊而光卑而不可踰君子之終也豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒京房本作貣聖人以順動則刑罰清而民服豫之時義大矣哉言時義大矣哉者凡四卦豫遁姤旅隨剛來而下柔動而説音恱隨大亨句古一本有利字舉正同貞無咎而天下隨時王肅本作之鄒德漙云古篆之為之時為峕蓋傳者誤也今不從隨時之王肅本作之時鄒云此又因上文之誤而誤今不從義大矣哉蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也臨剛浸而長丁丈反説音恱而順剛中而應大亨以正天之道也至于八月有凶消不久也大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以陸德明本無以字神道設教而天下服矣頥中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也賁亨柔來而文剛故亨分剛上而文柔故小利有攸往郭京舉正據王弼本有剛柔交錯四字天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下剝剝舉正有落字也柔變剛也不利有攸往小人長丁丈反也順而止之觀象彖傳言象者三剝鼎小過也君子尚消息盈虛天行也復亨剛反句動而以順行是以出入無疾朋來無咎反復其道七日來復天行也利有攸往剛長丁丈反也復其見天地之心乎無妄剛自外來而為主于內動而舉正有愈字健剛中而應大亨以正天之命也其匪正有眚不利有攸往無妄之往何之矣天命不祐陸德明本作佑馬融本作右云天不右行行矣哉大畜剛健篤實句虞翻如此讀輝光日新句鄭玄虞翻如此讀其德剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也頥貞吉養正則吉也觀頥觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頥之時大矣哉大過大者過也棟橈本末弱古本一作溺也剛過而中巽而説音恱行利有攸往乃亨大過之時大矣哉習舉正按王弼本云習字上脫卦名坎字卦首同坎重直龍反險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉離麗古作麗説文作䕻也日月麗乎天百榖草木麗乎土王肅本作地重直龍反明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也古周易訂詁卷七
