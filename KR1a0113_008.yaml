body:
  text: 古周易訂詁卷八明何楷撰彖傳下此夫子第二翼也咸感也柔上而剛下二氣感應以相與止而説音恱男下女是以亨利貞取七具反女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣恆久也剛上而柔下雷風相與巽而動剛柔皆應恆恆亨無咎利貞久於其道也天地之道恆久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恆而天地萬物之情可見矣遁亨遁而亨也剛當位而應與時行也小利貞浸而長丁丈反也遁之時義大矣哉大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也明入地中明夷象傳同內文明而李鼎祚本無而字外柔順以蒙大難乃旦反下同文王以鄭玄荀爽本作似之王肅本作惟文王能用之利艱貞晦其明也內難而能正其志箕子以鄭荀本作似之家人女正位乎內男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣睽火動而上澤動而下二女同居其志不同行説音恱而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉蹇難也險在前也見險而能止知音智矣哉蹇利西南往得中也三國志鄧艾伐蜀夢坐山上而有流水袁紹曰易山上有水蹇孔子曰蹇利西南往有功也與此文異不利東北其道窮也利見大人往有功也當位貞吉以正邦荀陸本作國為漢朝諱也蹇之時用大矣哉解險以動動而免乎險解解利西南往得衆也李鼎祚本有無所往三字其來復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆甲拆古本作坼馬鄭陸本俱作宅鄭云皮曰甲根曰宅宅居也馬陸亦云根也解之時大矣哉損損下益上其道上行損而有孚元吉無咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虛與時偕行益損上益下民説音恱無疆自上下下其道大光利有攸往中正有慶利涉大川木道乃行益動而巽日進無疆天施地生其益無方凡益之道與時偕行夬決也剛決柔也健而説音恱決而和揚于王庭柔乘五剛也孚號戶羔反有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長丁丈反乃終也姤遇也柔遇剛也舉正也下有女壯字勿用取女舉正無女字不可與長丁丈反也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉萃聚也順以説音恱剛中而應故聚也王假更白反有廟致孝享也利見大人亨舉正據王弼本亨下有利貞字聚荀爽本作取以正也九家易及李鼎祚本也下有利貞字與舉正異用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也困剛掩古本又作掩也險以説音恱困而不失其所句或連下讀者非郎顗引此句無亨字亨其惟君子乎貞大人吉以剛中也有言不信尚口乃窮也巽乎水而上水井井養而不窮也改邑不改井舉正據王弼本此句下有無喪無得往來井井二句乃以剛中也荀爽李鼎祚本此句下有無喪無得往來井井二句與舉正異汔至亦未繘井未有功也荀爽本也下有井字羸其瓶是以凶也説文引易有井法也之語今文所無今按此語乃見于鄭玄注革水火相息説文作熄二女同居其志不相得曰革已日乃孚革而信之古一本無之字文明以説音恱大亨以正革而當去聲其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉鼎象也以木巽火亨普庚反下亨以大亨之亨俱同飪也聖人亨以享上帝而大亨舉正無而大亨三字以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨震亨震來虩虩恐致福也笑言古本一作語啞啞後有則也震驚百里驚逺而懼邇也舉正此句下有不喪匕鬯四字朝氏志云天禧中諤昌撰證墜簡一卷其書類郭京舉正如震卦彖辭內云脫不喪匕鬯四字程正叔取之自謂其學出於李處約許堅出可以守宗廟社稷以為祭主也艮止也時止則止時行則行動靜不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也漸句之進也女歸吉也王肅郭京本俱無也字王肅吉字下有利貞二字進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也歸妹天地之大義也天地不交而萬物不興歸妹人之終始也説音恱以動所古一本所下有以字歸妹也征凶位不當也無攸利柔乘剛也豐大也明以動故豐王假庚白反之尚大也勿憂宜日中宜照天下也日中則昃孟喜本作稷月盈則食陸德明云或作蝕非天地盈虛與時消息而况於人乎况於鬼神乎旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉重直龍反巽以申命郭京據王弼注命乃行也未有不巽而命行也云謹按命乃行也一句誤入注觀文尋義義亦相連了不關注剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人兑説音恱下同也剛中而柔外説以利貞是以順乎天而應乎人説以先民民忘其勞説以犯難乃旦反民忘其死説之大民勸矣哉渙亨剛來而不窮柔得位乎外而上同王假庚白反有廟王乃在中也利涉大川郭京本川下有利貞二字乘木有功也節亨剛柔分而剛得中苦節不可貞其道窮也説音悅以行險當位以節中正以通郭京據王弼本有然後乃亨也一句云誤將入注天地節而四時成節以制度不傷財不害民中孚柔在內而剛得中説音恱而巽孚乃化邦也豚魚吉信及豚魚郭京本無豚魚二字也利涉大川乘木舟虛也中孚以利貞乃應乎天也小過小者過而亨也過以利貞與時行也柔得中是以小事吉也吳澄云石經作是以可小事也郭京本同剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也既濟亨小者亨也利貞剛柔正而位當侯果李鼎祚本作當位也初吉柔得中也終止則亂其道窮也未濟亨柔得中也小狐汔濟未出中也濡其尾無攸利不續終也雖不當位剛柔應也古周易訂詁卷八
