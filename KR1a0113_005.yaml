body:
  text: 古周易訂詁卷五明何楷撰自夬至鼎為下經之中夬姤兊巽包乾萃升兊巽包坤困井兊巽包坎革鼎兊巽包離凡八卦下經之中主受客來故乾坤坎離四客卦以次入于兊上巽下包括之內不及震艮者震艮陽也兊巽隂也下經易之隂體也蕭氏云兊巽為下經之主猶乾坤為上經之主其卦均其體敵自卦體而觀上經乾坤之體十二坎八震艮七離六兊巽四乾坤最尊也下經兊巽之體十二離十艮震九坎八乾坤四兊巽最貴也乾坤居上經其體十二兊巽在下經其體十二豈非兊巽與乾坤並乎此下經中一節之卦象所以有兊巽而無震艮也然上經乾坤最尊而乾又尊於坤下經兊巽最貴而兊又貴於巽何也先天圖太極生兩儀兩儀生四象四象生八卦圖內太陽一象加一竒而為乾加一偶而為兊乾一兊二乾兊實並立乎太陽一象之上他卦不得並焉此兊乾所以能相視為敵體此乾所以為上經之主兊獨能轉上經而為下經而以其體居六十八體之最先而為主也然不特下經之象其體居先自上經後一節十二卦首之以隨蠱一對已居其最先矣知微知彰知柔知剛觀卦序之象者思過半矣第七對夬姤雜卦傳曰姤遇也柔遇剛也又曰夬決也剛決柔也君子道長小人道憂也姤以一柔遇五剛當防其漸夬以五剛決一柔當成其終君子與小人勢不兩立君子長則小人憂小人以遭遇為喜決去為憂者也鄧汝極云夬姤乾合巽兊也下經之中貴巽兊乾坤坎離從合焉夫非主一隂之卦耶而夬主決隂姤主遇隂猶之乾適主也爾夬易而觀為姤乍其夬之無何而姤之間不容髮危乎危亦微乎微矣反之身夬危之微自克必盡曰夬果之也有不盡者蘖矣故危其辭以慮終姤微之危自防必慎曰姤駭之也一不戒者害矣故危其辭以謹始上經天道剝而復見天地之心焉下經人道夬而姤嚴天人之介也爾且也下經主震艮巽兊遁大壯乾合震艮也夬姤乾合巽兊也四卦合而乾不復見經吁􅐵達天難而五運之勝復正反凜其亟矣乾下兊上夬揚于王庭孚號户羔反爻內並同有厲告自邑不利即戎利有攸往夬本作叏説文云分決也從工丨象決形徐鍇云工物也丨所以決之按工丨俱不成字趙凡夫云爾雅肉勝好曰璧好勝肉曰環肉好一曰玦左傳賜之環則還賜之玦則決古二器圜者環闕者玦工象環缺之形即徐氏訓物者是也中貫者索類即鍇言所以決之者是也從乂為手以手持之也形兼事意加玊作玦轉注也夬為玦字審矣愚按夬玦同字别無經見惟翼傳訓夬為決左傳謂賜玦者決義既相合以象形觀似若可信為卦五陽在下長而將極一隂在上消而將盡衆陽上進決去一隂所以為夬三月之卦也髙舉在上曰揚推播在前曰揚五為君位乃王之居上在五前王之庭也一隂處五陽之上又且近王故曰揚于王庭猶詩言在前上處也孚指五五與上比得坎半體故稱孚卦爻中三號字皆指上六兊為口故稱號一隂在五陽之上處不自安孤立將亡而與五比故號呼以求援于五五為夬主苟以狎眤之故信其號呼遂不察其中心之狡而哀憐之則有危道也小人失勢則祈哀乞憐于其所親厚之君子及稍得志則傾害君子不遺餘力君子豈可因其號呼而遽信之哉有厲者今雖未危將有危之漸也告自邑不利即戎上六自告也兊口有告象夬卦本從坤變坤為邑為衆隂消將盡僅存上六之一畫是邑削小幾于無衆勢已孤援已絶矣上六計無復之於是告其同邑之人曰如此景象豈可即戎蓋不敢與陽敵也乾金兊亦金兩金相敵有戎象是惟九五不信上九之號故至此然尤在利于往而上進一決之後則為純乾矣他卦言利有攸往以效言此言利有攸往以事言觀翼傳言剛長乃終蓋云陽剛雖盛尚有一隂是剛長尚未終未可遽止故云利有攸往往而決盡一隂剛長乃為終極否則九仞之山功虧一簣猶為未終耳此卦以五為卦主曰孚曰往皆指九五言六爻皆變為山地剝張希獻云夬言利有攸往蓋欲其為純乾剝言不利有攸往蓋不欲其為純坤此亦崇陽抑隂之微意乾上兊下為履序卦傳曰益而不已必決故受之以夬夬者決也流于既溢之餘發于持滿之未益極必決此益與夬所以相受也彖傳曰夬決也剛決柔也健而説決而和揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也夬為決義五陽決上之一隂也健而説以二體言惟健則不怯以容其惡惟説則不驟以激其變總言決而和者言以健説相濟之道決去一隂也陽進至五僅存一隂尚未悻悻然遽去之和之象也君子以天下萬物為一體如陽德之無所不及其於小人未嘗仇視而物畜之也惟獨恐其剝陽以為世道纍則不容于不去耳而矜惜之意未嘗不存此和意也楊敬仲云下卦乾健上卦兊説雖健而説雖決而和未嘗怒也未嘗私也怒則私矣覆載之間皆吾之赤子彼昏而為小人良可念也小人不可居上天道也決而去之何私怒之有動于怒則我已為小人矣已當在所去之類安能去人是故健而悅決而和卦出此象以教君子也揚于王庭者言一柔乘五剛之上夬之時一隂雖微而處説極為能説于五陽有乘凌之象小人之凌君子不必據勢乘權也堅行辨言博學澤順能以似是而非之迹使人皆悅而象之以變易其心術其憑陵之勢乃有甚于在位者又比近九五之側此君側之惡人也彼其髮雖短而心甚長能無懼乎九五能知比近隂柔為危不以其號呼求援而孚信之則陽明不為隂柔所蔽而陽德光矣是其危者乃所以為光也坤邑削小徒役盡散上六一人不能獨與陽為難故以不利即戎告其同邑則一隂所加尚于五陽者至是勢乃窮窘也陽剛雖長至五尚有一隂更當決去則君子之道純一而無害之矣乃剛長之終也夫必利往而後有終若坐失機會庸知死灰不復然乎此警切之辭胡仲虎云易於剛乘柔不書柔乘剛則書志變也復利有攸往剛長也夬利有攸往剛長乃終也小人有一人之未去猶足為君子之憂復之陽必至于純陽為乾方為剛長乃終也朱子云今人以為陽不能無隂中國不能無夷狄君子不能無小人故小人不可盡去觀剛長乃終之言聖人豈不欲小人之盡去耶但所以決之者自有道耳象傳曰澤上於天夬君子以施祿及下居德則忌兊澤之氣上騰于天則成雨而下降和之至也雲上于天必須待然後成雨故為需澤上于天一決注便即成雨故為夬其解隂蕩濁則有決小人之意而天下沾其潤也施祿及下即膏澤下于民之謂君子能去小人之害物雖有以施德於天下然苟自居其德不推功于衆則未免為羣陽所忌當夬之時一隂猶存五陽自當協力以決之不宜自相乖異也此亦聖人扶陽之意也繫辭下傳曰上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬解見本傳初九壯于前趾荀爽本作止往不勝為咎變巽為大過此卦大率似大壯只爭一畫故初與三猶存壯之名而初象又與壯同曰壯于前趾者初為趾前趾謂上卦之下與初同位蓋指四也初九乾體剛健在上之物乃在下而居夬初欲急進于四陽大壯之位近九五以決上六蓋少年新進之豪不勝嫉邪之心急于一決以快志者彼其志要以決去小人非咎也然使決而不勝適乃貽害于國家故告以往不勝為咎蓋欲其得必勝之算而後往也舊謂往必不勝亦不察于辭旨矣毛伯玊云勝在往前者兵法也必往之道也往不勝為咎者逺慮也所以戒其往也變巽為躁卦亦壯往象卦以五陽決一隂然貴於得中下三陽健體初與三過剛而暴則戒之上二陽説體四過柔而懦則戒之象傳曰不勝而往咎也君子慮勝而後動故勝在往前不能必勝而往能無咎乎此正釋往不勝為咎意胡氏允云京房欲去恭顯而卒困于恭顯劉蕡欲去宦官而卒困于宦官皆不勝而往之咎也徐子與云君子自治甚嚴治人甚寬固不為蒺惡之己甚未嘗容惡而不去也俾小人自知惡大罪積不可久居其上而甘心於退屈也衆剛從而決之則不勞餘力一決而為乾矣若虞朝之去四凶周室之誅三監藹藹賢才之盛無復貞勝之憂是得決之義也後世衆賢在位得時得君之始未嘗不欲去小人以除君側之惡大抵不知夬夬之義而勇于一決機失事敗禍亂相尋卒貽衆君子之害而家國從之者何可勝數可不戒哉九二惕荀爽翟玄本作錫云賜也號莫音暮夜有戎勿恤變離為革互體乾變巽惕警懼也剛中實故能惕號與戎俱指上六而言二為地位變離為日日在地下莫夜之象也離又為戈兵暮夜見戈兵有戎之象也上六恃其應三而比五號使助己二與三為鄰與五為應聞上之號安得不惕雖其伺隙而動或興戎于暮夜之時二第守中不動則上必自窮何能為乎如周亞夫軍中夜驚而亞夫堅臥是也彖所謂不利即戎者惟上六當之二自勿勞憂恤為矣變離明于幾故善用其壯若此五代史載唐明宗時路晏夜適厠有盜伏焉晏心動取燭照之盜即告晏請勿驚其稟命有自察公正直不敢動劒匣劔而去繇是晝夜驚懼以備不虞召董賀筮遇夬二爻用事曰察象徴辭大有害公之心然難已過但守其中正請釋憂心晏亦終無患朱子語録載王子獻占遇夬九二占者曰必夜有驚恐後有兵權未幾果夜遇寇旋得洪帥象傳曰有戎勿恤得中道也得中則不恃剛而能惕能惕則有備故雖有戎而無憂也此與大壯九二同故皆稱得中九三壯于頄鄭玄本作頯云夾面也蜀才本作仇有凶君子夬夬獨行遇雨若濡有愠無咎變兊為重兊互體乾變離約象乾變巽順面顴頰間骨也三乾首故象頄取象與咸艮異咸艮合兩爻成象夬三四頄臀倒置蓋以分體取之三與上應當夬之時應爻乃其所欲決者聖人獨懼其不中也故為之戒曰與小人處而剛壯見于顔面凶道也何者小人我疑也小人我疑則反噬之禍必不免矣君子誠有夬而又夬之心則雖獨行與其配為友至于和洽成雨迹若為所濡衆陽且有我愠者而終必能以此道決去小人何咎之有何者不如是不足以濟其夬也夬三與五皆曰夬夬者三應隂五比隂非倍其決不可故曰夬夬復六四隂處隂中獨復以應陽夬九三陽處陽中獨行以應隂故皆言獨獨者違衆自立之辭也上六為成兊之主澤上于天降而成雨故稱雨又吳幼清云九三變為柔則三四五上肖坎象雨象濡亦通以其適值而非本心也故稱遇本非濡也而迹類之故稱若或觀其迹而不察其心也故稱有愠其用益密其惕益深而未嘗少露其幾正與壯頄之象相反王允之于董卓溫嶠之于王敦顔杲卿之于安祿山狄仁傑之于武氏皆似之健極故有壯順象變而純兊兩情交恱故又有遇雨若濡之象楊敬仲云遵道而行何怒之有動于怒雖未必至于凶而有凶之道焉君子雖夬夬大義不可易而斷不動于意健而説決而和故曰遇雨也彼不知道者以為君子既夬夬安能與之和既和安能夬夬不知道心如天地寂然無思無為而有風雨有雷霆有霜雪變化無私象傳曰君子夬夬終無咎也惟其志在夬夬不恃其剛始雖若懦有愠而終能決去之故無咎與壯而有凶者異矣九四臀無膚其行次七私反古本一作趑説文及鄭玄本同説文云倉卒也馬融云卻行不前也又吉本或作且七餘反馬云語助也古本一作趄或作跙牽子夏本作掔羊悔亡聞言不信變坎為需互體乾變兊約象乾變離兊上為口下為臀乘九三之剛其下不柔臀無膚也膚隂柔之物故噬嗑睽言膚皆指隂爻次且即趑趄王肅云行止之礙也九四以剛居柔又為説體果決不足夬之諸陽皆欲上行以決一隂四當乾陽上行之衝止則不安其前則五比于上行則不進猶之臀傷而不能行者然一説凡易中言臀者皆坎也人身出腹中之物皆在于臀臀字從殿殿者後也坎為溝瀆臀之象也故姤九三及此爻變坎曰臀困下卦坎初六亦曰臀羊指上六兊為羊倒巽為繩四為人位羊居前而人在後牽之之象張子云牽羊讓而先之蓋牽羊者非挽拽之謂也當其前而與之爭則羊與人抗唯縱之前而牽制其後焉欲逸則繩約在手欲止則鞭䇿在手陽順之而隂實制之不激不隨此牽羊之術正駕馭小人之法也上居五前四在其後迤邐而進如牽羊者讓羊而先之耳豈果不欲前乎故告之曰汝之決隂若能如是則悔可亡其如繫于兊體遲疑不斷雖聞言而不信何則悔之不終亡也可戒夫四變柔成坎耳然本剛實塞而不虛耳之不聰者也又坎為耳痛故有聞言不信之象象傳曰其行次且位不當也聞言不信聰不明也位不當者以剛居柔也聰不明者坎耳塞也剛然後能明處位不當失其剛決故不良于行而亦不明于聽九五莧古本一作莞陸蜀才本作睦云親也夬夬中行無咎變震為大壯約象乾變兊莧澤草也今馬齒莧葉柔根小堅且赤埤雅云莧莖葉皆髙大而見故字從見指事也莧指上六夬三月之卦莧始生之時故取象于莧亦如瓜五月生故姤取瓜象陸者莧所生之地也地之髙平曰陸九五變震為大塗故有陸象陸地非澤草所生而生焉以喻九五本有剛中之德蠱于上六柔邪不能保其德者也幸上之柔脆易除猶之莧然則急圖芟剪不俟再計故以夬而又夬䇿之三之夬夬以心言五之夬夬以事言蓋三居下位但取勿相應而已五居君位操迸逐之權與三不同中行者五本居中得正為近上六隂陽相比則心事不光明能夬夬則復其中行之舊故無咎也又項平甫云莧音凡山羊也陸其羣行之路猶鴻漸于陸之陸按説文莧山羊細角者從兔足苜象形吳幼清謂上從草羊之角也中從目羊之目也鄧伯羔云兊為羊羊角獸在陸髙亢之地剛可決柔之象也考莧音同莞虞翻亦謂讀如夫子莞爾之莞古本又一作莞解為山羊似若可信然説文草部實有莧字孟喜易注莧胡見切則漢人已作草解矣吾從古象傳曰中行無咎中未光也程子云爻辭言夬夬則於中行為無咎矣象復盡其義云中未光也夫人心正意誠乃能極中正之道而充實光輝五心有所比以義之不可而決之雖行于外不失中正之義可以無咎然于中道未得為光大也蓋人心一有所欲則離道矣夫子于此示人之意深矣焦弱侯云五比于隂而能自決以保其中僅可免咎而已未光大也蓋五原為上所深入谷永所云公志未專私好頗存者也下三爻乾體純剛故戒其過而取其中四五兊體少剛故四次且五未光上六無號終有凶變乾為重乾上六當夬之時號呼其正應之三是九三所稱惕號者也今三且夬夬則正應不可號矣又號呼其近比之五是彖辭所稱孚號者也今五亦夬夬則近比不可號矣夫以五陽上進一隂豈能久存而猶號呼者所謂將死之鳴垂盡之音也故絶之曰無以號為爾之終有凶固其宜也且亦以戒三五也曰不必惜其號彼之終當有凶不能免也蓋小人計畫無理必求合于君子君子或忽其孤而不虞其變為調停包荒之説使其餘孽尚存未有不為所復者唐之五王不除三思其監也或曰小人寧可盡去乎曰小人不能使不盡于下不可使不盡于朝盡之之道非有他也黨則漸散于外魁則必置于刑斯義也解卦備之矣曰解拇曰射隼是也上當兊口號象變剛為純乾一隂消亡故無號而凶象傳曰無號之凶終不可長也幸之之辭譬之垓下非無勝也而終已焉矣其能長久乎謂之曰終亦示困獸猶鬭之意以為君子戒胡仲虎云於剝見剝一陽之易於夬見決一隂之難君子難進易退小人易進難退故也為君子者安可以易心處之也哉巽下乾上姤古文作遘鄭玄本同馮椅云王洙易改今文為姤按雜卦傳石經亦作遘女壯勿用取七喻反陸德明本作娶女舉正無女字姤説文云偶也從女后聲古文作遘説文云遇也與翼傳合宜從古文為正吳幼清云女之邂逅而與男遇為姤卦從乾來一隂始生于下以其本非所望而卒然值之有不期而遇之義五月之卦也復之來人心之所期也姤之遇人心之所驚也下卦巽為長女一隂始生遽稱壯何哉以方來言也來而信勢必及壯觀翼傳不可與長句可見非謂此時為壯也女壯則男弱欲杜其侵必絶之始故戒勿用取如是之女林甫進而唐禍丁謂進而宋危嘻可懼已焦弱侯云五陽之盛而一隂生是以聖人謹於微齊桓公七年始霸十四年陳完奔齊亡齊者己至矣漢宣帝甘露三年胸奴來朝而王政君已在太子宫唐太宗以武德丙成即位而武氏已生於前二十宋藝祖受命之二年女真來貢而宣和之禍乃作于女真張藝叟云易者極深而研幾當潛而勿用之時必知有亢當履霜之時必知有戰周省貞云復小女壯遙對道心惟微已復尚憂其小人心惟危乍遇即嫌其壯六爻皆變為地雷復巽上乾下為小畜序卦傳曰夬者決也決必有所遇故受之以姤姤者遇也程子云物之決判則有遇合本合則何遇彖傳曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉夬一隂也姤亦一隂也夬曰剛決柔主剛也姤而主柔何隂方長也月建午曰蕤賔則陽固為之賔矣巽女入于內而女為主非如小畜之乾為主于內其于巽女可以妻而可以婦也彖曰勿用取女蓋謂此女將漸壯隂長則陽消故必杜之其始也且夫姤之所以可慮者以自姤而往為遁為否為觀為剝為坤皆初六為之也如但一隂相遇而後無具繼者則姤亦何不善之有姤者乾之末坤之始天地相遇象也以四時言之月至姤辰為午萬物相見乎離而蕃衍乎大夏品物咸章之際也剛指二中正指五當姤之時九五以中正之德統衆陽尊臨于上九二當初上進之衝力遏其來二五以同德相遇故隂雖生而未遽長僅止于初而已夫自遁至復為六二者六自剝至大壯為六五者六六二則無其臣矣六五則無其君矣若夫二五皆九唯乾與夬與姤而已未易得之時也夬稱剛長乃終矣姤尚有君臣而席全盛之後君子之欲有為無所不可故告之曰剛遇中正天下大行也然則勿用取女之戒正謂後來女之漸壯故耳處斯時者宜有以豫待之治亂之機實繫于此其義至大可不謹哉聖人之心皇皇矣朱子云上面説天地相遇至天下大行也正是好時節而不好之漸已生于微矣故當謹於此象傳曰天下有風姤后以施命誥四方天下有風與風行地上義頗同觀為地上之風旁行遍歷姤為太虛之風自上而下風行天下物無不遇姤之象也施乾象命巽象誥四方取風吹號萬籟之象月令以夏正之日施命令誥四方發此於姤正與閉關之説相應馮元成云后之施命豈得已哉上世言德而不言化中古言化而不言命以命誥四方者不能無虞也勿用取女命誥之謂也李氏云誥命出于后則無姤之變邵子云履霜之慎在此初六繫于金柅子夏傳作鑈蒼頡篇作栮王肅本作柅從手蜀才本作尼云止也貞吉有攸往見句凶羸豕孚蹢古文作蹄一作擲躅古文作􅤳一作闕變乾為重乾金柅謂九二也柅説文云篗柄本作杘從木尸聲或從木尼聲篗即絡絲篗也柅其柄也子夏傳作鑈云絡絲趺是也通作檷巽為繩故取柅象於義甚合惟馬季長以為柅者在車之下所以止輪令不動者先儒多從之然古無此訓爻無此象誤可知也金者乾象二本乾體初處二下為二所尼不得上進故有繫于金柅之象繫字最妙與包例看即牿牛牙豕之意包繫皆在不激不弛之間豫之以恩使知為善之利董之以威使有逺罪之心正卦辭勿娶之作用也金柅有兩義乾金巽木仁義之合體也初若能貞吉繫二更不上往則吉若更往而進以消陽巽體本伏往則著見陽勢猶盛往必不敵凶之道也戒初六使不進也羸豕瘠豕豕本坎象巽則坎外體變無肉有骨為羸初二相比得坎半體故稱孚蹢躅不靜也初六雖與九二相孚而應于四為二所據不得從應其心不靜如羸形之豕雖暫爾制伏而常懷蹢躅之心夫若是則繫之猶恐其逸况縱之使往乎巽為進退故有繫有往巽為股其究為躁卦故蹢躅體風亦動搖之貌象傳曰繫于金柅柔道牽也牽連也初與二連故二得而繫之使初之不遽上進者九二之力也九二包古本一作庖荀爽本作胞有魚無咎不利賔變艮為遁互體乾變巽魚者初六也賔者九四也巽為魚初巽主也故稱魚虞仲翔云巽為白茅在中稱包詩曰白茅包之是也包字有力與繫豕包瓜同意君子遇小人自己要豎立得定於人又要包容古之小人所以亂天下者往往君子激之也二曰包有魚則不視小人為異類而直以兼容之量包之既不邇之使近亦不激之使無所容其何咎焉夫初與四為正應則魚本四之有也今二與初遇遂包而有之則二之近比者為主而四之正應者反為賔矣二所以先賔而包此魚者蓋以此魚腥機不利見賔故也朱子云制之在已故猶可以無咎若不制而使遇于衆則其為害廣矣變艮為止有不及賔之象象傳曰包有魚義不及賔也二以此魚既不利于賔義不可以此魚及賔也是以寧早包之待其及賔則已遲矣九三臀無膚其行次且二音見夬厲無大咎變坎為訟互體乾變離約象乾變巽巽為股三居上臀也又焦弱侯云坐則臀在下故困於初言之行則臀在中故夬姤於三四言之亦通姤之三即夬之四也故臀無膚其行次且之象同與損五益二一例夬一隂在上故下之五陽皆趨而上姤一隂在下故上之五陽皆反而下初六以一柔遇五剛則九三亦與初遇者然以剛居剛是豈甘心與初遇者以初之隂伏于其下故坐則不安欲使之翩然而向初則行又不果唯惕惕危厲以陽德自持則隂邪亦莫之能傷故無大咎大謂陽也三去初尚逺故其象如此變坎為陷亦行次且象象傳曰其行次且行未牽也三之却步不行不肯與小人同事未與柔道相牽連所以無大咎也九四包無魚起凶變巽為重巽互體乾變兊約象乾變離九四與初六正應彖慮初之女壯也既有勿用取女之戒矣二當初上進之衝力止其往而初遂為二所得故二之包中有魚而四之包中無魚也無魚非凶也二雅不欲以凶貽四故包而有之而四猶不悟乃據正應之理欲起而與二爭則凶之道也夫惟安于無魚焉則得矣變則失應亦無魚象象傳曰無魚之凶逺民也初隂為四陽之民四之無魚而致凶者蓋以己逺民之故起而欲與二爭此民也豈知初非順民使其得志而上往即四寧有幸乎卦中所賴者唯九二一爻初以有攸往而凶四以不安于無魚而凶總之隂不欲其長聖人謹防之耳九五以子夏傳作作舉正作似杞包子夏傳作匏瓜子夏傳曰作杞匏瓜薛虞記云杞杞栁也杞性柔創宜屈橈似匏瓜含章有隕自天變離為鼎約象乾變兊以用也杞指二巽隂木故取杞象爾雅杞枸檵説文云枸杞也左傳我有圃生之杞兮詩隰有杞桋是也春名天精子夏名苟杞葉秋名却老枝冬名地骨根瓜者隂柔在下之物指初也姤五月之卦瓜五月始生故取為姤初象以杞包瓜即九二包有魚之事蘇子瞻云金柅也包也杞也皆九二也豕也魚也瓜也皆初六也杞枸檵也木之至庳者也包瓜者籠而有之也瓜之為物得所附而後止不得所附則攀援而求無所不至幸而遇喬木則雖欲抑之不可得矣故授之以杞則杞能籠而有之杞之所至瓜之所及也九五者姤之主也知初六之勢將至于剝盡而後止故授之以九二九二之所至初六之所及也此爻變離有文明章美之意又居中有包含之意夫制隂於方長亦難矣乃不以決而以包其包也又不自而以人此其靈幾默運天下見以為恭已無為爾矣而孰知其制之神與夫故曰含章所以苦心調劑如此者蓋以有陽不能無隂有君子不能無小人一隂午中反生重淵姤從乾來有隕自天亦倚伏循環之理也善制之使不為害斯可矣必閉其門絶其類焉勢則安能微乎微乎唐虞之包朱均周公之包懿親含之又含人無得而名焉彖傳所謂剛遇中正天下大行正此爻也乾為離健而明故其神于用如此蘇君禹云昔人謂陽一隂二是故治日常少亂日常多君子常少小人常多以柔遇剛甚無樂乎有此遇也夫遇豈可一日無顧其遇之何如耳以隂陽之流行觀之復為天根陽含隂也姤為月窟隂含陽也不有天根孰為之顯不有月窟孰為之藏如陽不遇隂隂不遇陽即天地亦無以成咸章之化而况于世道哉聖人之心天地而已謂隂之可與長而不抑之固非也謂隂之可終絶而使之不遇亦非也女不可使之壯豕不可使之蹢躅何其峻也魚可包也瓜可包也何其宏也凜凜然有履霜堅冰之防而休休然有納汚藏垢之量兹遇也不亦謂之善遇乎兜工比周庶頑殄行三監不靖殷士怙寵豈不駸駸乎蹢躅之漸而侯明撻記引以並生教告要囚毖于式訓未嘗引繩而批根之也春秋諸國下凌上替孰不謂其可以無遇然而孔子于七十二君何國不遇陽貨可見公山佛肸可往何人不遇未嘗已甚而絶之也聖人凡以化之于包容之中而潛消其不典之慮使天下之小人盡為君子亦如品物之並生於天地間而後快也故曰聖人之心天地而已象傳曰九五含章中正也有隕自天志不舍命也九五有居中得正之德所以能含章也初之一隂雖有隕自天然九五不委于氣運必思所以挽之此之謂志不舍命志苟不切則慮不深而幾露故即含章而知其志之不舍命也夫能舉隂伏之小人惟君子之所左右則邪可使正亂可使治而挽回世道造化之權固在我矣陸敬與所謂君相造命傳所謂天下大行以此蘇子瞻云隂長而消陽天之命也有以勝之人之志也君子不以命廢志上九姤其角吝無咎變兊為大過楊敬仲云上九剛而上窮有角之象夫其所以與人姤遇者如角然剛固之過枯稿而不和洽吝道也狷者之疵為吝然嚴徑剛介異乎輕肆故逸者矣故無咎變兊為羊兊上故稱角象傳曰姤其角上窮吝也上者窮地窮故吝也楊敬仲云言其窮而少通也泄栁閉門而不納段干木踰垣而避之是謂姤其角孔子見南子欲從佛肸公山之召變通之道也第八對萃升雜卦傳曰萃聚而升不來也上為往下為來聚于下者勢必往于上升于上者勢不來于下夫聖人于五陽一隂之卦且警戒極其諄切萃升則兊巽與坤合體四隂二陽聖人得無意哉觀卦辭一則曰利見大人一則曰用見大人彖傳則皆曰剛中而應萃二陽在上五剛中萃有位以得衆而羣隂皆萃升二陽在下二剛中孚用禴以獲上而其勢必升故萃以五為大人升以二為大人皆聖人重陽之微意也抑下經坤首合離為晉明夷此合巽兊三女共合母而坤不復見經故以繼夬姤之後坤下兊上萃亨馬融鄭玄陸績虞翻本俱無此字王假更白反有廟利見大人亨利貞用大牲吉利有攸往萃説文云草貌從草卒聲蓋如草之聚左思吳都賦謂橚矗森萃是也上兊為説下坤為衆説以得衆萃聚之象聚之為事其道必通故亨按馬鄭陸虞本無亨字程子疑為羡文今觀彖傳不另釋恐或然也六爻一隂為主于上三隂順而聚于二陽之下五為天子上為宗廟上爻又隂故有廟象五以陽承之故有王假有廟之象凡兊卦多言祭祀假格也王者仁孝其精神與祖考相為感格如但曰至于太廟淺矣程子云羣生至衆也而可一其歸仰人心莫知其鄉也而能致其誠敬鬼神之不可度也而能致其來格天下萃合人心總攝衆志之道非一其至大莫過于宗廟又云萃渙皆立廟因其精神之萃而形于此為其渙散故立此以收之按萃與渙稍異渙初立廟而萃則假廟也大人即王當萃之時有假廟之王者在上上以萃祖考之精神下以萃天下之人心而天下之人則利見此大人方得亨通何也九五陽剛中正其萃天下與天下萃之皆出于正故也萃比皆陽統隂之卦相似而實不同比九五一陽為主一則專專則衆隂順從唯五之歸萃九五九四二陽為主二則分分則衆隂莫知所萃若從大人之五則貞促非大人之四則非貞曰利見大人亨歆其萃于五也曰利貞戒其萃于四也李季辨云宗廟者人心所係武王伐商載主而行髙帝初與立漢社稷皆以係人心也必得九五之位然後為萃之主故曰利見大人萃不以正其終必離故曰利貞用大牲吉承王假有廟言大牲指下三爻坤為牛故稱大牲又李鼎祚云巽木下尅坤土煞牛象也利有攸往承利見大人言言下三爻宜往而從乎九五也此王者受命而興合萬國之歡心以事先王之卦孝經云昔者周公郊祀后稷以配天宗祀文王于明堂以配上帝故四海之內各以其職來助祭所謂用大牲吉而利有攸往者也六爻皆變為山天大畜坤上兊下為臨序卦傳曰姤者遇也物相遇而後聚故受之以萃萃者聚也物相會遇則成羣萃所以次姤也先王體國經野設官分職居民奠物控師禦戎無不使之部按班理羣分類聚而萃之于一君故立之朝廷聚羣工使之受要束于上立之省署聚羣工使之胥參驗于中立之都邑閭里聚羣有司萬民使之共率循于下皆有分數多多而益辦皆有脈絡繩繩而有條故能如身使臂臂使指令出而化行如馳心懷而威動萬里也管子亦曰四民者國之石民也不可使雜處雜處則其言哤其事亂是故聖王之處士必于聞燕處農必就田野處工必就官府處商必就市井少而習焉其心安焉不見異物而遷焉其父兄之教不肅而成其子弟之學不勞而能是故士之子常為士農之子常為農工之子常為工商之子常為商彖傳曰萃聚也順以説剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣卦之名萃其義為聚也坤順兊恱下順而奉上上恱而臨下二五居中得正五以剛中而下交二以柔中而上應內外君臣皆相聚會所以名萃也王假有廟者王者萃祖考之神以萃天下人心之道也致孝者盡志之謂也致享者盡物之謂也利見大人亨言下三隂聚而上隨九四以見九五之大人則所聚者得其正是以亨也按郭京舉正亨下有利貞字彖傳類舉全文當是佚也用大牲吉利有攸往而皆曰順天命者王者身膺天命故備物以事其先天下人知天命有歸故無敢自外于王皆順天命也為天下往者之為王故曰利有攸往也夫天下共戴一王止矣居王之上者有宗廟焉王假有廟萃道之至也祭祀之報本于人心人之本乎祖猶萬物之本乎天故天地萬物之情無不相聚者觀其所聚而天地萬物之情可見則一本之謂也明乎郊社之禮禘嘗之義治國其如示諸掌乎徐子與云天地萬物髙下散殊咸則見其情之通恆則見其情之久萃則見其情之同不于其聚而觀之情之一者不可得而見矣象傳曰澤上於地萃君子以除戎器戒不虞地上有澤水之聚也不言澤在地上而云澤上於地言上於地則為水方聚之義也水聚則決必有以防之水乃瀦人聚則亂必有以制之人乃定王注謂聚而無防則衆心生是也除者去舊取新之謂戎器久則必敝除而修之非右武也特戒不虞而已天下之患多生于所不虞度故戒之彖言假廟而象言除戎者於盛聚之時而防其衰散於至順之時而虞其不順也抑國之大事在祀與戎此兩者非萃道之至大者乎丘行可云天生五材誰能去兵用兵亂也去兵亦亂也如秦皇之銷鋒鏑鑄金人李唐之議銷兵則非謂之除戎器漢武席文景富庶之極至窮兵黷武以事四夷又豈戒不虞之義乎兊西方金戎器之象坤平地無險阻可恃不虞之象初六有孚不終乃亂乃萃若號户羔反一握傅氏作渥為笑勿恤往無咎變震為隨初四正應有人來孚初者四也大象肖坎故四為有孚不終者初之應四不終也五為萃主初雖應四而惑于二陽不能堅決故不終乃亂者惑亂其心也坤為迷亂象乃萃者無所適主而與其同類羣聚也坤為衆萃象若號者四求初之切其聲似號呼也兊為口號象一握者四一握初之手也初爻居一自二至四互艮為手一握象笑者四得初而笑也兊為説笑象始也求初而不得故號繼握初之手則説而笑夫初之所以應四而不終者意其為疑主之臣耳不知四五同德又為兊體四與五恱乃萃人心以效之五者非敢與五分民也故告之曰若四號汝而一握汝之手以為笑則女勿以失身從四為憂也蓋四亦純臣因四以通于五胡為不可往而依焉無咎必矣坤為震動以順也故往無咎大象坎此爻變則不成坎亦勿恤象象傳曰乃亂乃萃其志亂也初之失其正應而與羣隂萃也蓋起于疑故本其乃亂于志云六二引吉無咎孚乃利用禴蜀才本作躍劉瓛本作變坎為困互體艮變離下卦中又多引其類如泰與小畜之二是也本爻與五為正應引初六六三以萃于五為得君臣之大義吉道也雖比隂何咎互艮為手引之象也又來矣鮮云引引弓也本爻大象坎又此爻變坎坎為弓凡人開弓射物必專心于物當物之中不偏于左不偏于右方得中箭蓋中德不變之象也亦通孚乃利用禴一句以二五相應取象正彖所謂王假有廟利見大人者以本爻變坎大象肖坎故象孚又象禴孚者二五相孚也禴古作礿禮記王制祭統皆言春曰礿或云此夏商禮也周禮宗伯以禴夏享先王其享以樂為主故改勺而從籥籥樂之竹管三孔以和衆聲也從品者三孔之象從侖者言樂有倫理也易詩周禮並有礿石經並改作禴坎為律蓋象上下空而陽實其中坎又為耳主聽又坎方黃鍾之本故取作樂象王者作樂以薦祖考然必合萬國之歡心而後可以祭二既引初三之同類以聚于五剛中而應上下交孚四海之內各以其職來助祭順莫大焉是乃利用禴也舊説以禴為薄祭謂下能以誠意上孚則不須備禮於經旨何涉象傳曰引吉無咎中未變也中未變言二得中道貞守不變故能與五相孚異于初之有孚不終三之萃如嗟如者是以吉而無皆六三萃如嗟如無攸利往無咎小吝變艮為咸互體艮變巽約象巽變乾萃如者與下二隂相萃也嗟如者自嗟也三與二隂聚于下而上無應比四則五為萃主于心不安故自嗟嘆本爻倒兊兊口內向自嗟象也中心惶惑不定何利之有然當萃之世要以利見大人為正尚往而因四以萃于五則無咎若但以隂小自安而不上往求陽則吝矣初三兩爻皆欲萃五但非比非應不得已初必因其正應之四三必因其近比之四以求萃于五故皆決之曰往無咎變咸九三亦以下比同體曰往吝象傳曰往無咎上巽也三連四五成巽故曰上巽聚以正而亨此所以往無咎也孔子此爻明以互體示人矣九四大吉無咎變坎為比互體艮變坤約象巽變艮當萃之世弱之必趨強暗之必趨明勢也九四近臣非其位而有聚物之嫌咎所伏也必大吉然後無咎何謂大吉體兊為説部率三隂之順以媚于天子則有以全其大而吉且于義為無咎否則強君在上威權太逼未有不召釁産禍者九四可以戒矣卦四隂二陽唯四剛而逼變柔為比六四比賢以從上義正相合象傳曰大吉無咎位不當也必大吉然後無咎何以其非君位而萃天下之心也此位字與萃有位相應楊敬仲云不當者不安之意人心不歸君而歸臣故不安也伊尹周公之事也九五萃有位無咎匪孚元永貞悔亡變震為豫約象巽變坎六二九五二孚字相應九五以陽居尊得其位矣有位而為下所萃則為萃其所當萃豈有咎哉然五之所孚者二耳若初為四之應三為四之比皆將萃于四而匪孚于我者也其惟有比九五元永貞之德然後悔可亡比萃體段相似而實不同比獨以九五為主故元永貞言于象萃有兩陽爻故元永貞言于五所謂元即陽剛中正之德也永貞者長守其元德而不變也程子云元首也長也為君德首出庶物君長羣生有尊大之義焉有主統之義焉而又恆永貞固則通於神明光於四海無思不服矣乃無匪孚而其悔亡也所謂悔志之未光心之未慊也變則失陽象傳曰萃有位志未光也比九五權無所分故曰顯比吉萃九五其權旁落故曰志未光萃比之異以此上六齎咨虞翻李鼎祚本作資涕洟無咎變乾為否下五爻皆言萃象此爻在九五之上彖所謂王假有廟者也上宗廟之地也齎咨涕洟者九五也齎持也咨者傷嗟也齎咨猶言懷傷也兊為口咨之象也自目出曰涕自鼻出曰洟兊為澤涕洟之象也按古本作齎資中爻巽為進故稱齎下體坤為財故稱資蓋因其財物而致其義政假廟用大牲之重禮也於象甚合然傳訛巳久不可改矣祭則何以齎咨涕洟禮曰祭之日樂與哀半饗之必樂巳至必哀事死者如事生思死者如不欲生故王假有廟而有悽愴慘怛之象焉但言無咎者孝子之祭也明薦之而已矣不求其為故無敢有獲福之心也以為僅免于匱祀之咎而已兊為乾其氣發揚于上為昭明則神之著也象傳曰齎咨涕洟未安上也王者富有四海而還顧其祖若考已不可得見矣雖用大牲以祭而仰視榱桷常若不安其親之在上者故齎其咨以與神明交而至于涕洟蓋孝愛之極也禮曰明君在上則諸臣服從崇事宗廟則子孫順孝萃天下之道孰過于此巽下坤上升鄭玄本作升元亨用古本或作利見大人勿恤南征吉升進而上也按説文升籥也從斗象形十合為升無上進之義據康成本作升説文云日上也從日升聲古只用升詩云如日之升是也內卦巽巽為木一隂在下象木之根二陽在上象木之幹從根達幹有自小而大自卑而髙之象大象所謂積小以髙大是也外卦坤三隂在上順以受二陽之升蘇子瞻云巽之為物非能破堅達強者幸而遇坤故能升是也周省貞云乾艮巽坤後天四維之卦也乾艮合體為畜巽坤合體為升乾艮皆陽陽宜升進而反畜止者陽居北氣方動而未舒也巽坤皆隂隂宜畜止而反升進者隂居南氣尚舒而未已也元以二陽之大而言坤隂順之故有亨通之理胡仲虎云晉與升皆取進之義晉則明已出于地上方進而未已故不假言亨升則木方生于地中他日可必其進而未已故言元亨大人指二陽為大二為人位與五正應故六五用見九二之大人下見上如飛龍在天人人快覩故曰利見上見下如束帛戔戔賁于丘園非虛心下士者不能故曰用見勿恤南征吉俱主九二言九二既得五之應則九二不必憂恤本卦大象坎有憂恤之象曰南征者文王卦位巽居東南坤居西南巽坤之中有離九二歷三以入于坤則其行經過南離故有南征之象與蹇解利西南一例皆取虛位若東行則至震非升矣離者文明之地南離居中坤巽交映所謂君明臣良相得益章也吉孰如之卦取升名以自下而上漸進為義五為君位上為天位皆不可升者初之所升至四而止總歸一人非謂九二一陽之外别有九三一陽也六爻皆變為天雷無妄巽上坤下為觀序卦傳曰萃者聚也聚而上者謂之升故受之以升物之積聚則益髙大日磊而上故謂之升荀子云積微者月不勝日時不勝月嵗不勝時凡人好敖慢小事及大事至然後興之務之如是則常不勝是何也小事之至也數其縣日也博其為積也大大事之至也希其縣日也淺其為積也小故善日者王善時者霸補漏者危大荒者亡故王者敬日霸者敬時財物貨寶以大為重政教功名反是能積微者速成詩曰德輶如毛民鮮克舉之此之謂也彖傳曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也柔以時升指下卦言巽隂柔之卦故謂柔又巽為髙故謂升以時猶言以漸即大象之所謂積也木之升也雖非地所能圉然本卦巽猶在坤之下待詩而後升故曰柔以時升巽而順以二體言下巽而上順也剛中而應以二五言九二有剛中之德而六五為之應也如此則得其可升之時矣是以大亨萃與升皆剛中而應萃剛中在上其衆心萃升剛中在下其勢必升故萃以五為大人升以二為大人六五既用見九二之大人則九二不必憂恤以有隂陽會合之慶也南征吉者南離乃萬物相見之時大夏亨嘉之候巽之求坤坤之求巽來會于此下有明德日新之臣上有嚮明而治之君君臣道合則九二之大人必能遂其升而行其志是以吉也有慶志行即元亨也象傳曰地中生木升君子以順德積小以髙大風行地上不入地中於水澤亦然故大過升中孚皆取木象不象風木性升固也然必生地中而後升則以坤德之順能遂其長也故不曰木生地中而曰地中生木君子察焉以順其德之自然故能自微小積之以至于髙大行逺自邇登髙自卑順其序也有事勿正勿忘勿助順其機也若未能其卑而遽騖于髙未能其小而遽荒于大始而凌躐終而扞格皆不順之害也積謂自下畫始初之柔小也二三之剛大也自下升上髙也順德坤地象積小以髙大巽木象楊敬仲云孔子曰據於德德得也實得於道也非言語之所及非思慮之所通故中庸曰苟不至德至道不凝焉夫道一而已矣豈有道德之異哉人心有昏明之間故聖賢立言辨析其所以異自古昔以來崇道者紛紛而得道者千無一萬無一學者以思慮之所到為道以言語之所及為道則安能無所不通變化無窮哉據之為言非若有若無惚恍之間也實有而實可據也惟其未嘗思而思也未嘗為而為也蒙以養正養此也順是而養之自漸至于髙大不可揠苗也揠苗者是無妄之疾而施藥也愈益其疾矣惟蒙可以養之蒙者文王之不識不知也孔子之無知也善養德者莫善於此道雖洞明質有故習故習難於頓釋也順而養之意態不作則本德自明白神自無不善自髙大矣本無髙因人之卑陋而名其不卑陋者之為髙本無大因人之小狹而名其不小狹者之為大曰順曰積皆設為之辭自得自信者自知之彼未有德者往往徇名失義徇名失實是謂章句儒初六允説文作升大吉變乾為泰初六巽主居下猶木之根也而得地氣以滋之其升也允矣允升者信其必能升也所以為升者巽也所以為巽者初也為梁為棟繇此始基自初六之小升而為九二九三之大吉孰如之傳説起版築而逢恭默思治之主用克霖雨天下其斯爻之微與説文引此允作進也言始進而升也亦通卦變泰即拔茅彚征之爻亦升而吉義象傳曰允升大吉上合志也上謂上卦也而居上卦之尊位者五也或主二或主四盩矣升以初為卦主六爻惟初最吉所謂合抱之木始于拱把者也九二孚乃利用禴無咎變艮為謙互體兊變坎升大象肖坎故二有孚象自二至四互體兊兊為祭祀故二四皆取祭享象孚乃利言用禴辭與萃六二同而取義取象各别彼兼二五相應此但主本爻之應五言夏祭曰禴升合坤巽成卦拱離于中故彖曰南征爻曰用禴五居君位而才弱二居臣位而質剛疑剛柔未能相合唯孚誠在中于以用禴雖鬼神猶將降格何况人主所謂南征吉者此是也又何咎巽為艮巽以承君而不過故其象如此象傳曰九二之孚有喜也周公曰無咎孔子曰有喜者蓋九二雖不言升而積誠可以上孚則豈惟無咎且有升進之喜也九三升虛邑變坎為師互體兊變震約象震變坤升上進而不下來者也下卦三爻漸次而升至九三則將入坤矣坤為邑隂虛故稱虛邑三之剛陽其才也正而巽者其德也進臨于坤者其時也備此三者進孰禦哉葵軒黃氏云虛邑非空虛無人之謂禮讓之國以推賢讓能為尚而無疾賢傾陷之風九三值之矣又朝以道云四邑為丘四丘為虛虛邑山階皆坤象亦通變坎則約象為坤亦虛邑象象傳曰升虛邑無所疑也三以剛德進臨坤順如入無人之境莫之或格復何所疑阻哉六四王用亨許兩反于岐山吉無咎變震為恆互體兊變乾約象震變兊初之上升者至四而止過此則君位矣王文王也或謂周公作爻辭者於是知其指文王也四以隂居隂雖勢已近君而其德柔正小心謹畏無失臣節象我先君文王三分有二侯度益謹惟祭境內之山川止矣終不敢越分而修禋祀者也此臣道之至純者吉又何咎鄭康成解升卦義云木生地中日長而上猶聖人在諸侯之中明德日益髙大也故謂之升正合此爻之義岐山在禹貢雍州境南坤西南象升卦惟二四兩爻不言升者二應五四承五避逼上之嫌也又按儀禮云祭山丘陵升疏云祭山曰庪縣不言升此山丘陵云升者升即庪縣也然則享于岐山自不得以升言耳變震有百里主鬯象象傳曰王用亨于岐山順事也體坤為順文王之位幾于五矣三分天下其二已歸心矣而文王惟祭其境內之山川以柔順為事六與四皆隂柔順象也六五貞吉升階變坎為井約象震變離六五下應九二即彖言剛中而應者貞字宜自為句程子云五以下有剛中之應故能居尊位而吉然質本隂柔必守貞固乃得其吉也若不能貞固則信賢不篤任賢不終安能吉也曰升階者主九二言坤為土三偶畫如地之自下而髙有階象二之升至五如升階然此人君升進賢臣與共天位之象也非六五之貞信乎二何以至此舜禹之宅揆當之一説巽東南坤西南二五相應有賔階阼階之義亦通舊以升階作踐阼于理未妥若天子之位可以漸造得無為居攝勸進者嚆矢乎變則失應象傳曰貞吉升階大得志也大指九二剛畫而言二得五之應故大遂其欲升之志即彖傳所謂有慶志行者也上六冥升利于不息之貞變艮為蠱冥與冥豫之冥同上居天之上杳冥之間隂畫昏暗升至此猶升而不已是曰冥升夫人自生以往誰非當死之年自仕以往誰非當止之年而乃求生不己枉理而保身求仕不己枉道而保位鐘鳴漏盡而夜行不休罪人也所謂知足不辱知止不殆者何哉期足而後知足必無足時期止而後知止必無止日無非可足可止是稱知足知止反是則冥升躓道矣升至上六升將安之亦惟施于不息之正者則可求之有道得之有命求在外者此不息之不正者也求則得之舍則失之求在我者此不息之正者也一息尚存此志不容少懈吾未見其止雖然謂處世戒冥升而學道乃利不息之貞可乎道味愈深世味愈淺相為用者也道味愈深則不驚愚而為怪若食息起居自無他異異之即息機非常道也蓋自天下有好進者而後知足知止稱焉有輕生者而後養生稱焉有重生者而後無生稱焉聖人則大常而已冥升無所往矣無所往必不息之貞而後可不息之貞常道也戒其冥升而啓以利不息之貞聖言之妙于引掖若此變艮為止升而知止亦無𡨕升之誚矣象傳曰冥升在上消不富也消不富謂柔畫剛為息柔為消剛實為富柔虛為不富所謂冥升在上蓋以柔畫之消而不富者在上也此冥升也以之求道則可以之從欲則不可以之從欲則淪于昏暗忘反之歸以之求道則實有清虛日來之妙象義云冥升不顯惟德之義也大業富有奉身而退直與無聲無臭者合德故曰消不富大業至此而虛其先為虛邑其終為不富一也此意甚好楊敬仲云冥升正道不息悠久蒙以養正乃作聖之功孔子既曰發憤忘食可謂不息矣而又曰吾有知乎哉無知也然則孔子之不息未嘗有知知則動於思慮動於思慮則息矣非進德也又曰忠信所以進德也忠信非思慮如斯而已矣如斯而已何思何慮思慮一作即有穿鑿即失忠信文王不識不知順帝之則者冥升之貞也顔子三月不違者冥升之貞也其餘月至者一月之冥升也日至者一日之冥升也自一日一月三月之外不能無違者意微動故也未精未熟故也熟則意不復作如孔子之皓皓矣象曰消不富者消則虛不富者不實也不實而虛者非意之也人心無體無體則何所有未始不虛也意動故不虛此虛明無體本無進退因故習積久故蒙養以漸消其習氣其間有惰者故以不惰者為不息非思亦非為有思有為皆息皆惰孔子止以顔子為好學餘月至日至者亦不與罪其惰也故曰知及之仁不能守之雖得之必失之不息之貞仁也第九對困井雜卦傳曰井通而困相遇也井居其所而人即之困欲行而遇剛掩也以通與遇為反對則遇為相抵而不通之象矣合井與困見吾道通塞之機蓋嘗論之井之為源藏于九地之深而人不知其所來去之尋文而他濬其源不至即至焉味色或殊故或髙岸峻巔而井在焉或鑿之數十仞不得泉夏則冽寒人入之股栗冬乃暖氣迸出溫溫蒸融雖沍凍而不冰通也人之與人非異貌殊狀也而心或隔于九嶷不可以通逺之猶可遇之必否其為葛藟為蒺藜也不可以一二名狀然則氣類相應浚井可通苟非其類同堂胡越井與困之反如此廣而論之菟絲無根而生感茯苓也磁石召鐵以氣攝也月望而蚌蛤實羣隂盈月晦而蚌蛤虛羣隂虧銅山崩而洛鐘應礎石潤而大雨來黃河清而聖人生羣龍見而聖人出鵲巢知風蟻穴知雨養由基調矢而猿號鐘子期彈琴而魚沫申喜聞歌而得母髙宗發夢而獲賢隱志相及憂思相感神出于誠而應乎心故或有身在秦所親往齊死而志氣不安精感往來也政者有日而所被攻者不樂非或聞之神者先告也皆井通之理也人莫不欲其臣之忠而忠未必信伍貟流于江萇𢎞死藏其血三年化為碧人莫不欲其子之孝而孝未必愛故孝己疑曽子悲萬物之情人倫之傳成則毁大則衰廉則銼尊則虧直則骩合則離愛則隳多智則謀不肖則欺胡可得而必乎存乎遭而已魯酒薄而邯鄲圍城門火而池魚殃非有召禍之道而禍從之時命適然陳有醜人曰敦洽讐麋陳侯説之楚合諸侯陳侯病使敦洽讐麋往楚王惡其醜以陳侯為侮己也而伐之君子曰不宜遇而遇者必廢陳侯是已此亦困相遇之説也蓋凡物之理惟祥風和氣無所不宜善氣與惡氣相見一勝一不勝戾氣與戾氣相併遭之必凶時遭其窮雖曰人事謂非天道不可也謝君直云困井相表裏困為塞井為通困則井中無水井則木上有水困有未濟井有既濟困塞而井通明矣胡仲虎云澤無水命也井有水性也知困之義則知安命知井之義則知盡性易性命之書而言之明且切者莫困井二卦若也鄧汝極云下經坎始合震艮為蹇解此合于兊為困合于巽為井也困而亨則貞人達天而大故以為德之辨無蹇已井靜以居所動而屢遷化權妙焉何解之足言哉大傳三陳九卦云可以入患井困偕焉深夫坎下兊上困亨貞大人吉無咎有言不信困説文云故廬也從木在囗中徐鍇云舊所居廬故其木久而困弊也吳幼清云此坎下兊上之卦而名之曰困困窮悴也字象木在囗中四面不得通達二之一剛為初三二柔所掩四五二剛為三上二柔所掩蔽塞其前後無繇通達故為困錢國端云坎為流水之體兊為止水之體流水在止水之下象其阻抑不通坎為雨潤之體兊為秋斂之體雨澤當收斂之時象其閼鬱不鬯胡氏云天地之氣繇西而北則其勢順故兊下坎上為節自北而西則其勢逆坎下兊上斯為困矣此知化之言邵子觀杜鵑鳴亦是此意困有亨道陽剛健體未有抑而不伸者然非貞弗能故繼之曰貞大人吉無咎貞正而固也固守其陽剛之德而不變也大人指二五言陽為大二五為人位二五剛中均負大人之德必將以同德相與故能不終于困迹雖困而道則亨吉又何咎不然因困而喪其所守則不惟無以獲吉而困且不免矣有言不信戒之也有言指上六兊為口舌上兊之主畫也故以言屬之二五之交方深則剛不終為柔掩矣然小人隂陽玩弄之計無時而已其或有來與我言而欲脫我于困者則未可遽信以為實然如上六所謂曰動悔者是也亦惟是守正不渝沉幾以俟之耳矣自三至上大象坎四五二心在中此九五不信之象也下卦坎坎兊相違此九二不信之象也六爻皆變為山火賁坎上兊下為節序卦傳曰升而不已必困故受之以困受大祿者必有大任肩大任者必蒙大怨而叢大詬親大勞集大責也奚怪哉孫叔敖遇狐丘丈人狐丘丈人曰僕聞之有三利必有三害子知之乎爵髙者人妬之官大者主惡之祿厚者怨歸之孫叔敖曰吾爵益髙吾志益下吾官益大吾心益小吾祿益厚吾施益博可以免于患乎狐丘丈人曰善哉言乎堯舜其猶病諸狐丘丈人之所稱病蓋料理勢之終不能也則不若順而止之觀象也廉頗既老猶被甲上馬以示可用致困郭開之口馬援老矣據鞍顧盼自請為將卒有壺頭之厄郭子儀勳名已滿天下年八十餘猶為節度元帥不求退身竟為德宗册罷此皆升而不已者也彖傳曰困剛掩也險以説困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也卦所以名困者坎一陽陷二隂之中兊一隂蔽二陽之上卦中剛爻盡為柔所掩矣故名困彖傳不曰柔掩剛而但曰剛掩者何也無所歸咎故以剛自掩為辭蓋卦為君子設也既困矣何以能亨以二體言內雖處險而外能説此其中必有不為困困者在矣所如艮止其所之所則二五之剛中是也剛則不撓而折于困中則不躁而重其困此非君子不能大人即君子也陽爻之通稱不失其所所謂貞也吉即亨也有言不信則小人之以口為尚而欲愚弄我者乃窮于無所售適所以自困也聖人作易教人於凡逆境必求所以處之之法使專論其困而無以通之是徒知其疾而不能用藥也如是則亦安用易為哉象傳曰澤無水困君子以致命遂志曰屯曰蹇曰困皆以坎名也然而莫若困甚者坎在內也坎在內欲動如屯止如蹇不可得也解與渙坎亦在內然得雷而動得風而散水在澤下則涸之象也故名困君子不得其時猶澤之無水也致命非見危授命之謂致猶委也人不信其命則死生禍福營為百端居貞之志何以自遂今一委之命則志在我我自握之天亦不得而我制也不以命二志者夫且能以忘立命致命有坎陷之象遂志有兊説之象繫辭下傳曰困德之辨也窮然後見君子人以此辨君子君子亦以此自辨也又曰困窮而通困而不失其所故亨又曰困以寡怨不怨天也初六臀困于株木陸德明作术音張一反入于幽谷三嵗不覿變兊為重兊卦名困以剛為柔所困也然以柔掩剛非理之正長惡不悛將自及也柔亦自此困矣故六爻别言之柔之困也以犯剛為忌以退守為安剛之困也以動躁為戒以靜俟為福蓋隂困其宜也陽困其變也而株木葛藟金車亦紱其詞低昂則聖人扶抑之意也人之體行則趾為下坐則臀為下初六居困體之下故曰臀徐鍇云木入土曰根在土上曰株按株從木從朱樂書云一在木下為本在木上為末在木中為朱木之為物含陽于內南方之火所自藏也今借為丹朱之朱以此推之則株乃木身也株又無枝無葉之稱當指二言坎于木為堅多心變兊為毁折初欲困二剷落枝葉故象株木而不虞其臀即見傷于株木也臀既困則不能行矣然且計無復之益迷暗妄動于是舉身入幽谷之中至三嵗之久而人猶不得而見之是其先本欲困君子究失其所據而祇以自困可戒已坎為陷為隱伏初坎窞也入地下之位為幽坎水下注為谷卦惟初四有應然困隂爻皆掩剛者故無相應之義自初至四歷三爻故稱三嵗自二至四互離初在離外故稱不覿象傳曰入于幽谷幽不明也言幽者不明之辭也離明在外故不明初六以隂柔處困之底居暗之甚入于幽谷固其所耳九二困于酒食朱紱鄭玄本作韍方來利用亨許兩反祀征凶無咎變坤為萃互體離變艮凡易言酒者皆坎也言食者皆兊也故未濟與坎皆言酒需中爻兊兼言酒食也二方受掩姑以酒食優遊自養處之泰然不知所訴但見其困于酒食而已所謂困而不失其所也又鄭康成云二據初辰在未未上值天厨酒食象未詳紱鞸也蔽膝之服以韋為之古作市通作芾亦作韍鄭玄詩箋云冕服謂之芾他服謂之韓朱紱指五赤紱指二説文云天子朱芾諸侯赤芾詩曰朱芾斯皇君紱也以是知其指五也又曰赤芾三百臣紱也以是知其指二也自九二期待九五之通困而言則曰朱紱方來自九五推本九二之方困而言則曰困于赤紱五所以取朱紱象者自二至五肖離為朱又為牛有施朱于韋之象九五中正陽明之君必求九二中正陽明之臣朱紱方來言九五行且來于二二但當家食奉祀以俟命而已不必干進以取困也征則為變其所守不能相時而動既自陷于凶而降志隕節之咎亦何以自免乎坎隱伏有人鬼象故言祀二五俱以祀言者明既困于人或幽可感于神耳韓子云惟乖於時乃與天通處困之道也變萃利用禴亦亨祀象象傳曰困于酒食中有慶也得中應五君臣同德終能有為而濟困故曰有慶六三困于石據于蒺藜入于其宫不見其妻凶變巽為大過互體離變乾約象巽變乾三以隂體而承乘皆陽小人而志武者也進遏乎四則如戴石退據乎二則如坐刺困之甚也然其犯剛之志猶未已也有傷而進無交而求上六已將征矣而猶欲合之為助其孰與應故曰入于其宫不見其妻也凶孰大焉石指四兊為剛有石象或謂三只掩二不掩四者此迂説也卦之以隂陷陽者惟坎本卦政以下卦坎自三至上肖坎兩坎相重故為困且三隂之中惟三爻之辭其凶特甚以此知其不特掩二兼掩四也蒺藜指二坎為叢棘而木多心故有蒺藜象坎為宫互巽為入故有入其宫之象三陽位上隂位三坎男上兊女上似三之妻也然實兩柔不相應三雖有離目能視而上處離宫之外隔絶不得見故有不見其妻之象合下三爻觀初六在坎下故為入于幽谷即坎初之入于坎窞也九二在坎中故為困于酒食即需五之需于酒食也六三在困上進則困于九四之石退則據于九二之蒺藜即坎三所謂來之坎坎者也變巽為大過之棺槨真所謂死期將至者矣左傳襄公二十五年崔杼欲娶棠薑筮之遇困之大過史皆曰吉示陳文子文子曰夫從風風隕妻不可娶也且其繇曰困于石往不濟也據于蒺藜所恃傷也入于其宫不見其妻凶無所歸也杜預注云坎中男曰夫變巽曰從風風隕物者變而隕故妻不可娶象傳曰據于蒺藜乘剛也入于其宫不見其妻不祥也曰乘剛則知蒺藜之謂二矣知蒺藜之為二則知石之謂四不言困于石者坎二隂之意正在掩二以掩四非三初心故不言困于石也祥善也吉也不祥即爻所謂凶也繫辭下傳曰易曰困于石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見邪解見本傳九四來徐徐子夏傳作荼荼翟子玄本同云內不定之意王肅本作余余困于金車古本一作輿吝有終變坎為重坎互體離變震約象巽變艮自下而上曰往自上而下曰來來徐徐者四來于初也所以徐徐者以困于金車故也互巽為進退為不果故徐徐金車指二坎為輿九二得乾金中畫故曰金車初六雖四之配而實掩九二者四欲應初而二阻之四與二同德見初之以柔掩剛也故遲遲吾行而不果于應靳縮之象也然上比于五志合道同必能相與有終亦何以戀初為哉中爻變艮止有困于金車之象對無初反言之曰有終變坎行有尚故可必其有終象傳曰來徐徐志在下也雖不當位有與也志在下者志在初也初既掩陽而四不幸與之為應則四之所處亦不當位矣然五為近比則四之可與者固自有在去柔而就剛惟九四自決之耳九五劓荀爽王肅陸績本作臲刖荀王陸本作卼京房本作劊按説文云斷也鄭玄云劓則當為倪㐳未詳困于赤紱乃徐有説音恱利用祭古本一作享祀變震為解約象巽變坎九五以陽剛中正之德居大君之位操拯困之權下與九二同德相應忿其為初三隂柔所掩故用劓刖之刑以加之變震有用威武象劓刖之象甚竒割鼻曰劓艮為鼻九二下連初六則少艮下一畫是劓初之鼻也截足曰刖震為足九二上連六三則少震上一畫是截三之足也小懲大誡總之不欲使其掩迫君子耳然而初三之陷陽甚巧其勢猶未可卒去則九五之困亦已甚矣赤紱指九二也按禮再命赤紱黝珩三命赤紱蔥珩下卦坎為赤互體離為韋施赤于韋上赤紱象也楊敬仲云朱色含赤色發困于赤紱者言為九二而困也乃徐者來徐徐之徐即九四也有説者四説也兊為説五唯勤于拯二如此四亦陽德既不果于應初徐徐而行亦説五而上比之以拯二也三陽同心共濟在二既得脫于險難而五亦得釋其焦勞斯時也利用祭祀將天神地祇亦隂祐之寬心以俟百福之來集而已兊為巫故言祭祀變震主鬯象亨祀人臣所以祀宗廟祭祀天子所以禮百神君臣異辭也困之時利于徐圖之不可求速效亨祀祭祀亦皆此意困本剛被柔掩故求通皆利于祭享象傳曰劓刖志未得也乃徐有説以中直也利用祭祀受福也志未得者以下坎二隂猶在也四之來徐徐而上説乎五者以五有中直之德也五居上卦之中是其中也與九二陽剛相應是其直也君臣同德則受福可知故利用祭祀爻於二五不言吉象傳於二云有慶於五云受福即彖大人吉之旨也上六困于葛藟古本又作虆于臲説文作劓薛本同卼説文作􅝨云不安也薛本作杌曰動悔有悔征吉變乾為訟蘇子瞻云柔而牽己者葛藟三之謂葛藟剛而難乘者臲卼五之謂臲卼按上與三應三四五體巽為木上以柔纒繞巽木之上葛藟象臲卼不安貌巽為髙五巽上畫上居五上臲卼象困至九五而有説則困已通而隂柔之掩陽剛者皆已除矣上六一爻獨居兊極乃小人之善為媚悅以取髙位者而猶顧惜黨類不能自割是困于葛藟也陽剛已出于困君子嚮用邪黨寒心上六處非其地是并困于臲卼也蒙上困字故不復言困至此而上六亦有悔心之萌矣曰者兊口之言也其言若曰向我不宜掩剛故困今當動而改悔然徒言之而已終非其本心未嘗實見之行也彖所謂有言而不可信者也如是而欲望其免于有悔其將能乎惟翻然行遁而去之變其所為掩剛者以避陽則吉曰動悔者言之虛故有悔征者行之實故吉以是知陽剛之不終于困而掩陽者之徒自取咎也故困者小人之所為困君子無困也語曰聖人無危地其然哉鄭氏剛中云困有不可動九二是也故征凶有不可不動上六是也故征吉變乾乾行健征象象傳曰困于葛藟未當也動悔有悔吉行也困于葛藟居剛之上而掩乎剛所處未當也徒言動悔終不免于有悔欲求致吉之道惟在于征行也行者柔變剛之謂變剛則不掩剛矣卦以三柔掩三剛為義然剛為柔掩者皆吉而柔掩剛者凶特甚則掩人祇自掩也云爾巽下坎上井改邑不改井無喪息浪反無得往來井井汔至亦未繘井羸蜀才本作纍其瓶凶井古文作井許慎云八家一井象耩韓形􅜍之象也按韓井垣也􅜍汲瓶也為卦巽下坎上坎水也巽之象則木也巽之義則入也巽木下入而取坎水至上汲井之象故為井古者黃帝創百物始作井又推井韓形以畫野田方九百畝為井八家曰井四井為邑改邑不改井者邑或有時而改井則無所事改也井水鍾地脈古者立邑必相水泉所在不得水泉難以立邑則當改邑以就之上卦坎一陽在中泉象也二隂在外為陷陷井之象也坎從坤來坤為邑坎為井變坤為坎改邑不改井之象無喪無得者不為汲者喪而竭不為不汲者得而盈井之德也井所以無喪無得者以其剛中也天一之水為坎坎流則失其貞能保其貞者惟井也冬溫而夏涼不變于寒暑不剝于風雨霜露惟其剛中而能保其貞也往來井井者合六畫取象上謂往下謂來剛往五而上體成坎則井水之至上者柔來初而自四至初肖坎則井水之在下者是上下皆井也汔至亦未繘井者申言上體之井也汔幾也近也汔至者水幾至上而未出井也謂水至坎中畫未至坎上畫則汲未出井口亦與未施繘于井者同耳繘關西人謂之綆汲水索也井道以已出為功故井卦至上六而始元吉也卦有巽巽為繩繘象羸其瓶凶者申言自四至初肖坎之井也羸毁敗也瓶汲器以瓦為之二三為在下之井水自二至四肖離外堅中虛為缶瓶象二三之水已實在汲井之瓶而下一畫偶猶瓶底傷損而水下漏則終不能貯水矣故凶即九二之甕敝漏是也又互體兊為毁折亦羸象此兩句反言之見人當盡汲之功以得往來井井之利也六爻皆變為火雷噬嗑巽上坎下為渙序卦傳曰困乎上者必反下故受之以井孔子厄于陳蔡之間語弟子曰居不幽則思不逺身不約則智不廣三折肱而成良醫人君不困不成王列士不困不成行湯困于夏臺文王困于羑里秦穆困于殽齊桓困于長勺句踐困于會稽晉文困于驪氏夫困之為道從寒之及暖暖之及寒也唯賢者獨知而難言也易曰困亨貞大人吉無咎有言不信聖人所與人難信也陳蔡之間吾與二三子庸知其非激憤勵志之始乎按此所解有言不信與愚異而旨則可味愚為之廣其説曰夫事有髙世人而非其至者求其至必反于庸而後可而庸又為人之所棄此擇術之所難也事之至髙者不在賢人而在愚人不在愚人之口而在愚人之身愚人不能言而能身此事之精者也故辨困于上而反于下必庸言之信行困于上而反于下必庸行之謹井德之地也彖傳曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也巽入也於五材為木非木巽水下則水不上出故曰巽乎水而上水非木巽火中則火不能自傳故曰以木巽火易井鼎水火之大用也或疑古無桶象所云瓶甕皆瓦器故朱子不取巽木象按鄭康成云巽木桔橰也言桔橰引瓶下入泉口汲水而出井之象也楊用修謂北方井制如此三聖皆北人取象繫辭必據其物以桔橰引瓶正莊子所謂鑿木為機後重前輕挈水若抽者井養而不窮歎美井德愈汲愈生故其給養于人無有窮已也此句包無喪無得往來井井之義改邑不改井乃以剛中者坤之邑變為坎之井則剛畫居坤卦之中指九五言也剛中者泉在中也井以不變為德故繫辭曰井德之地也雖使汲水幾至井上然未出乎井亦與未繘井同井以濟用為功水出乃為用未用則何功也瓶所以上水而致用也羸敗其瓶則汲之用廢矣是以凶也象傳曰木上有水井君子以勞民勸相木承水而上之乃器汲水而出井之象井有養道君子觀之勞來其民各盡乃力坎為勞卦如使民鑿井而飲之類勸勉其民使相佐助巽為申命如使民同井相養之類繫辭下傳曰井德之地也天下有無根之水其出易窮不足以喻性也惟井水鍾地脈乃水有本者李氏謂井泉之水喻血脈川流之水喻涕洟性之淵泉而時出誠象之矣此井所以為德之地也又曰井居其所而遷老子云既以為人己愈有既以與人己愈多其此之謂又曰井以辨義義者心之制事之宜也資之既深則左右逢源一往一來自井井然有辨矣初六井泥不食舊井無禽變乾為需井與鼎皆物也就物以為義井以陽剛為泉隂柔為土初六隂柔在水之下為泥故不可食凡言食者皆兊口也二三四互兊在初之外不食象也又巽為臭亦不可食之象也王輔嗣云最在井底上又無應沉滯滓穢故曰井泥不食也井泥而不可食則是久井不見泄治者也久井不見泄治禽所不饗而况人乎按淮南子八方風至浚井取新泉四時皆服之管子鑽燧改火杼井易水古人蓋以未浚未易水之井皆稱舊矣凡井在卑地者禽鳥或食其水杜詩鸕鷀窺淺井是也泥而不可食不但為人所棄雖禽鳥亦不下顧理蓋有之自初至四肖小過有禽象以無應故無禽或云凡易言禽者皆坎也故師六五變坎應坎曰田有禽比九五體坎曰失前禽恆大象肖坎此卦上體坎但二卦下體皆巽巽深入禽髙飛之物安肯深入乎故皆曰無禽亦通一説北方謂轆轤之軸為禽所以運繘汲水者井既廢并轆轤俱廢矣未可深信變乾為需所以致養象傳曰井泥不食下也舊井無禽時舍也吳幼清云下謂在六畫之下井之上出者為可食之水其在下者為不可食之泥也舍不用也時所不用非但人不食禽鳥亦不來也九二井谷射荀爽本作耶鮒甕説文作甕云汲缶也鄭玄本作瓦云停水器也敝漏變艮為蹇互體兊變坎溪谷出水從上而注于下井之為道以下給上者也而無應于上反下與初似谷中之水下注者然井而似谷故曰井谷莊周所稱缺甃之崖是也上陽爻下隂爻兩開谷之象也又變艮山下有井必因谷所生亦谷之象也射者衝射也猶言注也互變坎為弓射之象也初巽為魚鮒之象也埤雅云鮒小魚即今之鯽也此魚旅行吹沫如星以相即也謂之鯽以相附也謂之鮒井魚不識巨海鮒其井魚之類乎水既下注惟衝射以活小魚而已故曰射鮒自二至五肖離為甕二剛實象水實甕中互兊為毁折敝之象也下隂爻有坼水下漏之象也又巽體覆盂亦有甕敝漏之象彖所謂羸其瓶者此也巽下也伏也變艮為止下伏而止井不汲也故但射鮒象傳曰井谷射鮒無與也二五不相應故稱無與程傳曰井以上出為功二以在下而上無應援是以下比而射鮒若上有與之者則當汲引而上成井之功矣一説無與非無應之謂二之上無隂不能相與以成井亦通徐子與云在井而射鮒在甕而敝漏皆無與之故也嘗謂人才生世自非果於暴棄甘於下流之歸者皆可與為善苟陽剛之稟資質之美者皆可以進德良繇上無應與而為之誘掖汲引者故上達之難下達之易也九三井泄不食為我心惻可用汲王明並受其福變坎為重坎互體兊變震約象離變艮九三處下卦之上異初六井泥之時得位而有應于上非九二射鮒之象但井以上出為用猶在下體故雖泄治未為人所食也泄不停汚之謂也巽為潔齊泄之象也卦中惟三與五以剛居剛為可食之清泉五居上體在兊口上三居下體在兊口下故五見食而三不見食也為我心惻代正應之上六言所謂知已興嗟輿論稱屈者坎為加憂心惻象也可用汲者雖以汲水言其實即汲引之汲上六應三而比五乃井收勿幕之相故欲以長綆汲三使三見知于五也三四五體離為明賢者為明王所知則得大行其道君民上下無不並受其福猶井之為人所食而有益于人也必曰王明者賢者在下暗然而不自露非遇明王孰能加以特達之知而天下咸被其澤哉蓋聖人之屬望深矣變坎上下皆坎有往來井井養而不窮之象象傳曰井泄不食行惻也求王明受福也爻言心惻象傳言行惻以明上六之惻非為私應也譬竒寶橫道而不收則行道之人皆歎息之矣况在上而為應者能不惻然此好賢之公心也求王明之求即爻所云可用汲者乃上六汲引之以求王之汲非九三自求也然亦以並受其福故求王明不然何皇皇若是哉楊廷秀云可食者泉也不食者人也井何惻焉人之行者惻之非為井惻也為有才德之君子不見用于上者惻也井一用一邑受其福君子一用天下受其福有美井無善汲則如無井有賢者無明王則如無賢仲尼曰明王不興天下孰能宗豫故微明揚之堯帝則大舜雷澤之漁父微明哲之髙宗則傳説巖野之胥靡六四井甃無咎變兊為大過互體兊變乾約象離變乾蘇子瞻云陽為動為實隂為靜為虛泉者所以為井也動也實也井者泉之所寄也靜也虛也故三陽為泉三隂為井初六最下故曰泥上六最上故曰收六四居其間而不失正故曰甃甃以甎壘井馬季長云為瓦裏下達上也自三至五體離四為坤土之中畫以離火燒坤土瓦甓之象居得其位如井之四旁甃砌完整故曰井甃甃則井旁之土不崩頽而井中之水不汚壞矣故無咎變兊為食井既潔則水於是可食也象傳曰井甃無咎修井也無咎非謂甃也謂夫甃之者也故釋之以修井修甃砌也丘行可云三在內卦泄井內以致其潔四在外卦甃井外以禦其汚蓋不泄則汚者不潔不甃則潔者易汚此君子內外交相養之道也九五井冽寒泉食變坤為升約象離變震冽甘潔也五變坤為甘以陽居陽為潔坎正北方為寒乃水之正性甘潔而又寒冷五之中正具此數美也諸坎皆言水此獨云泉者蓋直指本體言五為坎主故曰原泉居兊口之上食象當三之井泄初泥已浚二漏已修可以食矣然尚居甃下汲之不及不若五得坎正體而浮溢于甃上日為人汲也五于井道為至善顧不言吉者以未上出井口此彖辭所謂汔至亦未繘井者蓋井必至上而後成功也或云不言吉利者最有深意聖學盡人盡物只是盡性功利不足言也意思重在寒泉寒泉其本真食其餘事耳此意自好變坤萬物之所致養也泉而食乃克致養象傳曰寒泉之食中正也必言寒泉者清而冷者水之本性遇物然後濁而溫故言寒泉以表潔也蘇子瞻云其正與九三一也所以食者中也楊敬仲云寒泉冽然無喪無得寂然不動也食者及物也中正之道自不動自有及物之功非索之外者人心之所自有也上六井收荀爽本作甃勿于寶本作网幕有孚元吉變巽為重巽上為井口水至井口在瓶之水也故曰井收收汲器之出以鹿盧收繘也坎為車應巽繩為繘收象畫偶在井上有鹿盧雙柱對立之象變為剛而動有收綆之象幕蓋覆也説文幕在上曰幕覆食案亦曰幕勿者禁止之也勿幕者欲人人可汲溥其功用偶畫開而不塞井口不蔽覆之象有孚謂其出有源而不窮也上六比五而應三兩爻體坎中實皆有孚象彖所謂無喪無得往來井井者也惟其不擅其有不私其利故五之列三之泄皆得及物而井道成矣此乃所稱井養而不窮也井以上出為功故上之德為首而吉他卦之終為極為變唯井與鼎終乃為成功焦弱侯云觀王明並受其福之語此非獨為井論者上六居九五之上大臣師保之地也臣道之行與不行君澤之布與不布皆繫其人世有君欲用賢賢欲上進而不能遂者大臣壅而蔽之也聖人勿幕之戒其為慮逺矣變巽為行權德孚天下而可與權故能養天下而不窮此井巽相繼所以居十三卦之終也合六爻觀之子瞻以三陽為泉三隂為井蓋陽實隂虛初曰泥四曰甃上曰收非井象乎二曰射三曰泄五曰列非泉象乎以卦序而言則初之泥方掘之井也四之甃已修之井也上之收則出汲之井矣二之射始達之泉也三之泄已潔之泉也五之冽則可食之泉矣又以二爻為一例則初二皆在井下不見于用故初為泥而二為谷三四皆在井中將見于用故三為泄而四為甃五上皆在井上而已見于用矣故五言食而上言收也以人事擬之初二如巢許三四如孔孟五上則堯舜伊周之徒也象傳曰元吉在上大成也大指三五之陽剛而言上六能汲之至上故其陽剛濟物之功得以成也蘇君禹云坎者水也江淮溪澗水之流也源泉混混水之原也極其流則注大壑而不知其津涯窮晝夜而莫知其止息遡其源則淆之不濁注之不盈此川上之歎有本之稱聖人所為咨嗟而徘徊也試觀人之一心淵然其未波澄然而不滓瑩瑩然其畢照生生乎其惡可己兹其人性之真體干古之淵源乎自夫逐流之士望洋而失狂瀾之倒齧石而奔欲竇一開泥沙乘之而溷世味一動舊染積之而汚便辟之相引則敝焉而漏垂成之不力則至焉而螺於是清者汩明者晦而為天地間之棄人矣古之君子其間邪以存誠也如井之甃而恐其淆也其日新而又新也如九仞之掘必及泉而後已也其冽焉而食也吾之性不加盈也其泄焉而不食也吾之性不加損也此禹稷之事功顔子之陋巷支流異而淵源一也至于井收勿幕則與天俱生與地俱成民無疵癘物無天扎而太和之象在宇宙間矣今之論養道大成者莫不曰唐虞成周之世吾觀詩書所記周禮所述克明慎徽關雎麟趾本如此其豫也六府三事相為維持八政八則相為經緯法如此其密也艱食鮮食時厪規戒豳風無逸日進論思慮如此其周也率俾之化遍于荒服蠻夷咸若之休暨于草木鳥獸澤如此其溥也而孰知執中建極以澄其源無荒亦保以遏其流其所謂有孚元吉者固真性之淵泉使然哉噫上世之君與民為生中世之君聽民之自為生末世之君民無以自為生豈法制異耶則本心之生生異也至于已不生生使民無以為生而貪泉毒泉之禍遍於天下矣吾安得井甃井泄者而見之第十對革鼎雜卦傳曰革去故也鼎取新也革火金相克故為去故鼎木火相生故為取新已日乃革則去故之事顛趾出否則取新之事也下經離始合巽兊為家人為睽易置之為革為鼎火遇澤而革其性異耶火巽木而鼎其性同耶惟性同故家人與鼎皆以著其合惟性異故睽與革皆以表其違離下兊上革已日乃孚元亨利貞悔亡革説文云獸皮治去其毛革更之又云古文作革從三十三十年為一世而遒更也故革為改舊之義為卦兊上離下兊為金離為火火鼓鑄而金從革以火革金也舊説皆謂水滅火火溷水則至于相無恐非革之作用且以兊為水則是冒坎之名也已日即六二所謂已日也乃孚即九三九四九五所謂有孚也悔亡即九四所謂悔亡也所以云已日者以易卦納甲推之離納已説見蠱彖下離又為日六二離之主爻也天有十日甲至戊為前五日已至癸為後五日變革天下之事不當輕遽乃能孚信于人故以十日為率革于未及中半之前不若革於己過中半之後則無輕遽之失一説十干歷已而庚庚革也自庚至已十日浹矣已日浹日也革不即孚浹日乃孚乃難辭也一説金曰從革於干為庚兊之行也遇離而革先庚一日為已居金之間當其時矣一説戊巳屬土而已則隂土也文王圎圍離兊中間乃坤土凡離火燒兊金斷裂者惟土可接續故月令于金火之間置一中央土彖以離兊皆隂故但舉隂土也理皆可通然似于六二未切所以云孚者以積象言自二至上肖坎三四五中實坎有孚象也夫王者與天下更始以不妄動之心行不得已之事非合德于乾不可惟不求便于一已而期公于天下則其道大通不期便于一時而期守于百世則其道正固夫然後事後之追悔可亡所以云元亨利貞者中爻三四五體乾故備乾四德也六爻惟九五最善而彖獨指九四言者下三爻方欲革故而為新故有謹重不輕革之意上三爻則故者已革而為新矣九四當上下卦之交正改命之時故悔亡獨於九四見之即彖傳所云革而當其悔乃亡者也乾九四曰乾道乃革義同讀彖辭便識全卦之義聖言之精若此蔡子木云元亨利貞乾道也隨者隨物革者改物物不可以徇心隨故元亨利貞而得無咎物不可以妄心改故元亨利貞而得悔亡六爻皆變為山水蒙離上兊下為睽序卦傳曰井道不可不革故受之以革張幼于云井道常道也革者非革常道也革其壞常者也後漢書禮儀志引古禮云立秋浚井改水冬至鑽燧改火改水即井道之革也彖傳曰革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以説大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉夫坎水離火男女之道也其質根隂根陽其用相勝相逮此造物之權似滅息而成其生息者也故水以木生火火以金生水有相息之道焉至澤與火則不然澤女也火亦女也二女同居無生息之理李子思云兊非北方之正水少隂之氣不能以敵南方之正火兊之隂畫下有二陽畫限之而離火從下暵之此火能革澤水也故有溫泉而無寒火蘇子瞻云二女同居則睽所以不睽者兊欲下而遇離離欲上而遇兊雖欲相違而不能也既不相得又不相違則不能無相攻攻而不已必有一勝勝者斯革之矣火能革金離革兊者也故曰革或云離中女兊少女長少紊序必反而之正革象也亦通已日乃孚已者十日中半之後待此時而後革則謹審而不輕遽故革而人信之內離為文明則見理必盡外兊為説説則無咈于人情而又備乾之四德大亨則無所不通利貞則無所不正要皆因其宜革者革之以時斯故得其至當而其悔亡也悔吝之所生生于變動者也革而當矣又何悔下經卦元亨利貞四德具惟革重革也明革以天耳推是革之道也自天地聖王莫不皆然春夏為陽盡于離秋冬為隂起于兊此天地革而四時成之象也六畫則五為天爻三畫則二為人爻二五相應順天應人之象也湯武以之王者之興受命于天故易世謂之革命李氐云不可犯者聖人之常不可回者天人之變極吾之常遇彼之變適然契乎此心者理之融也聖人以天心所嚮為從違以人心所屬為去就而以吾心之至理為的凖不忍斯民擠于不可救藥而寧自冒其不可測知之勢德少慙乎吾身將大安乎天下樂未善乎一時將大聲乎後世君臣之分森乎千四百年之餘天人之際清乎六十七王之久槩之心融之理孰知自素契于順應之先哉如其喜事僥覬妄意更張一之不成亂危已繼而聖人本心始不表襮于千古作易者懼之故以革之大者著之彖聖人之杜其漸如此禮云湯放桀武王伐紂時也革而當其可之謂時時之未至聖人不欲先時之已至聖人不敢後故贊之曰革之時大矣哉時字與已日意正相關按順天應人革兊二卦皆言之蓋順而應者説道也革重事也而必以説道行之其義大矣象傳曰澤中有火革君子以治厯明時吳幼清云澤為容水之處澤中有火以消乾其水蓋海之尾閭名為焦釡之谷水入其中如沃焦釡消乾而無復有是為澤中之火水熄大者也而反為澤中之火所熄改變其常也故名為革愚謂幼清之解澤中有火是已然以火熄水為革則有滅息而無生息似于下文治厯之義不協按屈原天問云東流不溢孰知其故栁子厚對之云東窮歸墟又環西盈脈穴土區而濁濁清清墳壚燥疏滲渴而升充融有餘泄漏復行器運浟浟又何溢為此則在改革中有生息之理也君子法之修治紀日月星辰所歷之書以明作訛成易之時正彖傳所云天地革而四時成者蓋必推日月考中星而後可以定四時也王汝極云因革象得治厯法厯須年年改革不改革則天度漸差此嵗差法也定厯元特其統體耳夫日行不由赤道畫長在赤道北畫短在赤道南别名黃道赤道如兩交差自冬至為始冬至後漸近北夏至後漸轉而南至次年冬至復元度此一嵗周天之説也正東為卯正西為酉正南為午正北為子一日十二時而日歷十二位乃定方也天以各經宿分十二次乃動體也日躔既有嵗差則昏旦亦必有差唐虞初昏乃今戌亥之時其後仲冬日差在卯則斗柄夜半指子差在午則平旦指子差在酉則中日方指子世謂斗柄指兩辰謂之閏者非也唐虞之時仲冬日在虛漢大初冬至日在牽牛唐宋在斗元明已入于箕矣自漢武較帝堯時已差一二十度自皇明較帝堯時今差五十餘度三代已先未有嵗差之法晉虞喜始覺天日異行嵗有差法以為五十年差一度宋何承天以為太速倍之百年差一度隋劉焯又折衷之以七十五年差一度皆臆説也逮唐一行以八十三年差一度而始有定論至元郭守敬以為百年差一度半上考往古每百加一秒下驗將來每百減一秒前法差數嵗嵗如一未有先加後減之妙但其加減之數古今氣運遲速不同若嵗積之久又當有更革也且唐虞時日躔冬至在子夏至在午春分在卯秋分在酉今未四千年而冬至在寅夏至在申春秋二分在己亥計其嵗差退四十五度則繇帝堯萬餘年冬至日反躔午夏至日反躔子春分在酉秋分在卯矣若非如帝堯考中星以定四時嵗功何由而成乎杜元凱云治厯者當順天以求合非為合以驗天賈侍中云聖人必厯象日月星辰明數不可貫數千嵗必改更先矩求度數取合日月星辰所在而已楊敬仲云天道不可窮盡可窮盡者非天道故厯當數以求合其中而天道終非法數之所能盡田氏云自乾至革其卦凡四十有九大衍之用也分而象兩天地革矣揲之以四四時成矣是以至革則治厯又按古者考天象驗人時皆以火為證三月火出于辰五月火中于午七月火流于申十月火伏于亥是也南方火之本位秋冬春夏皆取相生惟自夏徂秋自離轉兊火金之氣不免相尅賴坤土以聮屬于其間而五行始相生不斷故特取兊離相合之卦表天地革而四時成之義此亦前人所未發初九鞏用黃牛之革變艮為咸鞏以韋束物也離為牝牛離爻本坤黃牛之象也指六二言黃中色牛順物初剛在外故為革本皮也去其毛為革則其稱革也亦有變革之義特别異之為黃牛之革耳初九陽剛本有可革之才然以時則初也動於事初則無審慎之意以位則下也上無應援則無體勢之重故當以六二中順之德自固不妄動也此象也殆文王三分有二以服事殷之時乎離明于幾者變艮為止當革之初見幾而止故其象如此象傳曰鞏用黃牛不可以有為也時在初位在下上無應援不可以有為但當以中順自以蓋慎始重革也六二已日乃革之征吉無咎變乾為夬互體巽變乾已日十干之中也此時乃變革之離納已在卦中為中半之義二以柔順中正為文明之主上應剛陽之君可以有為之時也又不敢輕遽直至十干之半而舉革變之事以此征行上進從五吉又何咎王輔嗣云二五雖有澤火之異同處厥中隂陽相應往必合志不憂咎也玩辭當為伊尹就湯吕望歸周之爻變乾為夬是能往而決隂者象傳曰已日革之行有嘉也行有嘉即征吉之謂二五正應而革行猶隂陽正配而偶成凡卦中言嘉者皆二與五應如隨之孚于嘉遁之嘉遁是也九三征凶貞厲革言三就有孚變震為隨互體巽變艮約象乾變巽六爻至四始言改命內三爻皆不欲輕革之二中正猶必待已日乃可革之初則固守而不可動九三雖當位而不中未可以革也時未至也離性炎上變震為躁動故戒以征行則凶然當革之時豈可拘守故常而不進若膠於貞而硜硜然為小人之諒則亦不免于厲惟審察當革之言至再至三而皆合以此上往則已可自信而亦可為衆所信矣革言謂以改革之論相籌度也士喪禮云馬纓三就注刺繡一匝還復刺為一就今云三就猶言三匝也三上正應兊上為口言象三歷四與五而革道始成至上則閲三爻矣有三就象冇孚者積坎中實象四五二爻放此此爻也武王以之八百諸侯不期而會皆曰紂可伐雖欲己得乎變震為威武卦變隨天下隨之者也當革之時明而威武天下我隨故其象如此象傳曰革言三就又何之矣稽之衆論至于三就曽無異辭事至當也又何之矣猶言更何往也義當進革無所逃避特稍需時耳欲不革不可得矣蓋決之之辭九四悔亡有孚改命吉變坎為既濟互體巽變坎約象乾變離黃廣宇云四近五位乃湯武之為諸侯時也水火之際當革之時但以剛居柔不任其剛雖有為天下之志而不能無顧慮之心如湯曰慚德武曰無良是也然事勢窮極詩云上帝臨汝無二爾心此其時也故雖有悔而可亡何者剛而居柔遵養時晦天下已信其志在救民矣已日乃孚而不革則百姓有過在豫一人何以祇承上帝衽席生民故曰有孚改命吉命厯數之命即彖傳所謂湯武革命順乎天而應乎人也愚按九四革之盛也故以彖所稱悔亡歸之其夏令改而為秋令之時乎所以不言革而言改命也約象乾為命四變有改命象一説二三四互巽巽為命令四變則為變易其命令亦通變卦為既濟亦大事克濟之象象傳曰改命之吉信志也信志解有孚即彖傳革而信之之信孟子言湯非富天下天下信之即此信志之義九五大人虎變未占有孚變震為豐約象乾變兊革之為義變故而新也下三爻故事未變之時也上三爻則變而為新事矣故或言改或言變而皆不言革大人指九五九五剛中居尊蓋自諸侯而升為天子矣天命既新則典章法度國勢人心無一不變而更新之如謹權量蕃法度修廢舉逸興滅繼絶之類皆是虎者離象自五至初大象肖離五下應二二為離主爻贊襄革事九五以剛健中正應之于上拱手而受成焉是內之文明形見于外者也故曰虎變初九黃牛之革以去毛之皮而言此曰變者蓋離夏轉而兊秋則向之希革者且變為毛毨也或云虎為西方之獸兊乃西方之卦堯舜之揖遜天下惟德之見故曰龍湯武之征伐則有威存焉故曰虎亦通未占有孚謂不必問之鬼神早己知其為人所信嚮矣爻于三四皆言有孚是也聞之先正云禮有定而易無定聖人不寓教於一定之禮而寓教於無定之易何以立人極哉易之為教寓有定於無定者也吉凶之數對峙而立循環而來至無定也如以吉凶立教而已則若探鈎鑽瓦必有修而凶悖而吉者而易不然也寄吉凶於上下六畫之中六畫定則彞倫昭而時位定符與不符其分已久符者無論已不符者或處卑地而得尊爻弗敢居也或履違事而得善爻弗能居也或秉弱資而得強爻弗可居也故穆薑知己之無隨而子服伯子䇿南蒯之將敗彼二人者得凶固凶得吉亦凶不能反而吉然則易之為教實制於禮而未始無預定者也未占有孚聖人為世之借湯武為口實者防易之通例也變震帝出乎震非開創之大人其孰能擬之象傳曰大人虎變其文炳也炳者如火日之光明也象以文炳解虎變可知虎取離象上六君子豹變小人革面征凶居貞吉變乾為同人上六與九三為應君子豹變指九三言陽爻稱君子豹似虎而圜文三以體離亦有文明象然三乃離之外畫與主爻之二不同故但稱豹也虎有文而能神豹有文而不能神此虎豹之别豹變非徒開國承家列爵分土之謂上有革命創制之主則下有潤色洪業之臣虎變文章之大者也豹變文章之小者也君之神理寄于經綸臣之道術飾乎法令况當三之時而革言三就己有孚矣此小人所以革面也小人革面指本爻言隂爻稱小人居外卦之上故為面上與三正應兊説見于上有回面內向之象斯時復何求哉功成則事損事損則無為若復有所往則躁擾而凶惟居貞不動則吉也變則失應胡仲虎云革非得已之事初未可革當中順以自守上既已革當靜正以自居蘇君禹六爻總論云天下之變勢為之也夫使天下常治而無偏而不舉之處聖人亦循循焉與斯世相安于無事而何樂乎其為變也哉惟夫法久則弛俗久則偷如不鼓之軍不調之瑟因循積日將釀成極弊而莫之救是以因其變而用其權不得不與天下相更始者勢也然變革之事重矣事出于急遽則後先易舛權制于獨任則謗讟易興慮不顧後則為烏喙之食計不便民則為治絲之棼聖人蓋懼之也是故明以審之説以順之亨貞以成之時尚持久則鞏用黃牛而不嫌其固時尚變通則有孚改命而不憚其勞言必三就而不厭其詳孚必已日而不求其速至於圖回周密之後然後制作一新而文炳文蔚之治舒徐以觀其成焉聖人之慮始何其難而其令終何其久也蓋觀商周之際然後歎曰聖人之慮深矣夫以遷國圖安而羣言搖動羣小比周而頑民未變以後世之君當嚴刑以威之而盤庚洛誥及多方多士諸書示之以祖父要之以明神懼之以要囚引之以迪簡至再至三汲汲乎其以言柔之聖人於變更之際其不忍咈民心固若此也至於攸居既奠保釐既成聖人有改制之實而天下不知其變兹豈有發徴期會哉後世商君之革令行於棄灰安石之革利竭於手實其始也無已日之孚而其究也為莫大之悔矣嗟夫謀人國者寧安靜而無功無寧輕變以速禍哉象傳曰君子豹變其文蔚也小人革面順以從君也虎大而文疏曰炳豹小而文密曰蔚則君主要臣主詳之較也蔚如草木之茂盛以指九三言二三四互體巽巽為草木故稱蔚曰順以從君則心革可知己巽下離上鼎元吉亨鼎説文云三足兩耳和五味之寶器易卦巽木於下為鼎象析木以炊也蓋木字篆作今鼎下作乃􅜨之破體故曰象析木也周禮亨人掌共鼎鑊以給水火之齊鑊煮牲體魚臘之器既熟乃脀于鼎烹調之為卦巽木居下離火居上互體乾兊乾兊皆金木火在外金在其內鼎鑊烹飪之象也鼎之為物端而重凝而固大而能容古人取之以象大寶之位故其卦直曰元吉亨彖傳備矣爻辭惟上九言大吉無不利與彖相應蓋鼎至上九則鼎功之成也元吉即大吉也亨即無不利也程子疑彖傳止稱元亨而以吉字為羡似太泥六爻皆變為水雷屯巽上離下為家人序卦傳曰革物者莫若鼎故受之以鼎程子云鼎之為用所以革物也變腥而為熟易堅而為柔水火不可同處也能使相合為用而不相害是能革物也鼎所以次革也彖傳曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨諸卦多以義名如頥井鼎皆以象名故即鼎以示例聖人畫卦不專取象惟義與象合則因象以名卦也卦之下一畫偶鼎足之象二三四三畫竒鼎腹中實以牲體之象五畫偶鼎耳之象上一畫竒鼎鉉之象此言鼎之體也以木巽火亨飪也七字為句巽火巽字最精巽入也烹飪之法本欲火氣入物然火太緩不入大緊愈不入故言巽巽即文武火之謂也火之用惟燔與烹燔不假器故取烹象為鼎飪熟食也以巽木入于離火之內煮物而熟之此言鼎之用也烹飪所供不過祭祀賔客二事祭祀則天神為大賔客則聖賢為重故舉其重大則輕小可知享帝直言亨養聖賢則言大亨者享帝貴誠用犢而已養聖賢則饔飱牢醴當極其盛故亨上加大也李宏甫云夫頥口也何足齒及而在聖人則養賢以及萬民鼎烹也本無大事而在聖人則養聖賢以享上帝苟不能大亨以養聖賢則雖欲以享上帝上帝必不享矣然則聖賢之在天地間豈細哉巽而耳目聰明者下卦巽上離為目六五為鼎之耳中虛聰明之象孔仲達云聖人既能謙巽大養聖賢聖賢獲養則憂其事而助于已明目達聰不勞已之聰明則不為而成矣五為君位以柔進而上行重柔字得上卦之中而下應九二之剛重中字柔則謙卑和順德之基也中而應剛則虛心下賢德之輔也有如是之德此所以天祐人歸保世滋大也彖辭所贊其大善而亨者以此大吉無不利爻屬上九而彖傳以六五為元亨者五為卦主舉鼎者雖上九之鉉而非有六五之黃耳則鉉無所施故以元亨贊焉象傳曰木上有火鼎君子以正位凝命以木入火則火然木而木上有火焰以成烹飪之用其象為鼎君子觀鼎之象以正位凝命正者端莊鎮重之謂鼎譬之位命譬之實鼎之器正然後可凝其所受之實君之位正然後可凝其所受之命命亦取卦中互乾象革以改命鼎以凝命蓋凝其已改之命也以鼎繼革所以示變革之後當端重以守之其旨微矣抑鼎為重器聖人之所寶古者傳國以鼎猶後世之璽也庖羲氏興神鼎一統天地萬物而一之也黃帝作寶鼎三象三才也禹鑄九鼎象九州也武王克商遷九鼎于洛邑義士猶或非之王孫滿對楚子以為在德不在鼎則亦正位凝命之説也初六鼎顛趾利出否悲已反得妾以其子無咎變乾為大有六爻皆鼎也當其處者有其象故以初為趾顛倒也否惡也鼎以足峙趾何可顛以舊有否穢之積故利用倒趾向上以傾出之所以致潔也故孔子曰鼎取新也禮祭先夕溉鼎滌濯沈存中云古鼎中三足皆空所以容物者所謂鬲也煎和之法常欲清在下體在上則易熟而不偏爛及升鼎則濁滓皆歸足中鼎卦初爻鼎顛趾利出否謂濁否在下須先瀉而虛之九二陽爻始為鼎有實今京師大庖釣懸而煮不使著釡底亦古人遺意也沈之説得象意可補注疏之缺初當卦始鼎未有實倒而滌之足顧居上口反居下故曰顛趾此合全象而觀舊説以初上應四為趾顛之象不可通也得妾以其子者正以倒象言之即前卦兊上離下也兊為妾故曰得妾三陽在下若妾所孕育之子然其在鼎即鼎實也陽為男隂為女以在下皆陽畫故稱子妾本不宜居上取其生子為後故待之以母道所謂春秋之義母以子貴鼎趾本不宜向上以欲瀉惡納新故不得不顛趾象傳以未悖釋之正此意也鼎卦合六爻取象拘拘就正應推測末已變乾為大有以衆子貴大有之象象傳曰鼎顛趾未悖也利出否以從貴也鼎趾也而顛宜若已悖倒以瀉否豈謂悖哉貴對否言否穢為賤新潔為貴出否將以受實故曰以從貴也貴指三陽畫趾譬妾從貴即譬以其子象取倒體又象中設象竒甚九二鼎有實我仇有疾不我能即吉變艮為旅互體乾變巽易以陽為實九二陽實居中故其象為鼎有實我九二自我也仇指初嘉耦曰妃怨耦曰仇二與初雖近比而非正應故曰仇疾隂柔之疾乃初爻之所謂否也即就也初向病舊穢之未除業已倒趾而傾出之矣徐乃實物于其中和五味羞百珍且以饗帝且以養聖賢何初之疾能即我哉蓋承初爻出否之後舉成事而言也吉孰加焉鼎與井相似井以陽剛為泉鼎以陽剛為實井初為泥二為泉而二視初則為鮒鼎初為否二為實而二視初則為疾皆隂惡之象也變艮為山風雖蕩其如山何故為仇疾不能即之象象傳曰鼎有實慎所之也我仇有疾終無尤也夫鼎烹而熟之至于可食而後已苟有不善者在焉則善與不善皆烹而並熟而善者棄矣及其未有實而顛之以出其不善則善者可全如待其有實則夫不善已汙之矣故曰鼎有實慎所之也蓋慎之於初也初既顛趾出否而後可置實于鼎中此慎所往之道也夫如是則我仇之初雖有疾其何能我即所以終無過尤者此耳九三鼎耳革其行塞雉膏不食方雨虧悔終吉變坎為未濟互體乾變離約象兊變坎鼎耳六五也五為鼎主言于三何三與上敵應內卦木九三木之盛也外卦火上九火之盛也兩皆過中水火迅烈鼎中騰沸并其耳已革變為炎熱而不可舉故為鼎耳革之象凡物皆行以足獨鼎之舉措在耳故行以耳耳既革故其行塞雖有雉膏之珍不見食矣此人臣之有才德而過于激烈以自塞者也三以剛居剛承乘皆剛故有此象震為大塗三四五成兊震之中畫塞矣故曰其行塞互體變離為雉下體變坎為膏約象兊為口三居口下故不見食又三既變則不成兊亦不食象也雖然三之所以病者獨以其不變故耳變則為坎方雨象也隂陽和故成雨虧悔者言變盈為虧改悔其舊也陽畫實為盈隂畫虛為虧既改悔則有水火均調之意然後炎勢息鼎沸平既不患失應又不至病五故終吉象傳曰鼎耳革失其義也義者宜也析木以炊不可過不可不及方得烹飪之宜今木火過烈不知所以裁之故耳革也上九象言剛柔節節字即義字之意九四鼎折足覆公餗其形渥形渥古本作刑剭新唐史元載以罪誅傳贊引此即周禮秋官司烜氏屋誅之刑也鄭玄本渥亦作剭凶變艮為蠱互體乾變兊約象兊變震足初也餗糝也八珍之膳鼎之實也三為公位公餗公所食之餗也渥沾濡之貌公餗既覆體為渥沾也鼎之量極于四其上則耳矣受實必有餘量以為溢地也加之不已至與鼎平則足不勝任勢必至于折也初未有鼎實故顛趾而出否四已有鼎實故折足而覆餗又顛與折異顛則舍舊而圖新折則鼎毁而用廢受其至辱災必居身凶可知己離為艮火焚山敗其實亦鼎折覆餗之象象傳曰覆公餗信如何也不量其力必致凶災未驗而言之人必不信今果如何也繫辭下傳曰子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也六五鼎黃耳金鉉利貞變乾為姤約象兊變乾鼎之舉措在耳為鼎之主也五為上卦之主以偶畫居鼎之上耳之象也黃坤土中色離得坤中畫故其色黃金鉉以上九而言鉉者鼎之扄所以橫貫鼎耳而舉之者也上九一陽橫亘乎六五之上有鉉象本乾畫故稱金言以金為鉉也鉉耳二物不相離鼎中有實非耳則鼎無繇舉非鉉則耳不自舉然于五言之者則以五實用之故也五虛中能受又得陽剛師保之臣以佐之故其象如此變則無柔進上行得中應剛之美象傳曰鼎黃耳中以為實也中以為實者九二居中而鼎有實也二五正應二有實而五舉之彖傳云得中而應乎剛正指此上九鼎玊鉉大吉無不利變震為恆陽剛在上及物之功全繫此爻蓋鼎實以享帝養賢彖之所謂元吉亨雖統全卦而言而上九則卦之成也故爻辭之美與彖同夫鼎豈有二鉉哉而金玊異何玊不可以為鉉必金鉉而飾以玊也抑金者剛物玊者堅剛而有潤在五則以已之柔視上之剛曰金鉉在上則取畫剛位柔又變柔為震震亦為玊故曰玊鉉一説離為火而上居之陽剛無應無所回撓如玊不變於火故為玊也亦逈體剛履柔能舉其任應不在一則靡所不舉故大吉無不利上居師保之位以其柔而節君之剛以其剛而節君之柔所謂咸有一德充享天心者也然能用鉉者五故鉉于五言之贊鉉固所以贊五耳象傳曰玉鉉在上剛柔節也剛柔節者言以陽居隂剛而能節之以柔亦如玊之溫潤所以為玉鉉也凡烹飪之事以剛柔得節為功水火冬夏寒暖皆剛柔也周禮食醫曰凡食齊視春時羮齊視夏時醬齊視秋時飲齊視冬時烹人曰掌共鼎鑊以給水火之齊齊即節也易中節字皆謂度數之宜非以裁省為節也馮元成云井之與鼎水火之用也水之貴通也火之貴節也收以上水通之也玊以鎮大節之也此二卦之上所以言元吉言大吉也古周易訂詁卷五
