body:
  text: 古周易訂詁卷二明何楷撰自師至豫為上經之中凡十卦五對共六十畫竒畫三十偶畫三十隂陽平也此上經中一節乾坤交而旁生六子之象消長之幾著焉蓋其初也乾上坤下自泰一交坤來為主於是坎不用事而離用事矣故同人大有接迹于後第四對師雜卦傳曰比樂師憂一陽之卦得位者師比而已自昔先王之制民居則為比閭族黨故比則衆在內一陽在上為之主君象也伍兩卒旅軍師之制則衆在外一陽在下為主將帥象也蘇子瞻云有親則樂動衆則憂閭氏彥升云比順從故樂師行險故憂蕭氏漢中云先需訟後師比者乾為主而光合于坎故坤從乾而亦與坎合也師先於比者坤先合坎而後坎合坤也坤先合坎者坤隂也坎陽也陽用事故坤先來合坎母從子也周氏光德云天一之精變化之始浮載大地善利萬物蓋水土合而用始大武以戡亂則師以之文以綏治則比以之皆用之最大者鄧氏元錫云次需訟以天一生水地從受之邪以水周地下騰上地為雲降為雨而復於水邪其復也歸根其騰也游涯此象之矣六師之命懸于將故師無二將六合之命懸於王故土無二王坎下坤上師貞丈人子夏傳作大人吳幼清云子夏傳雖後人附託之書然此彖作貞大人吉與困卦彖辭同皆以內卦坎中畫九二為大人陽為大二為人位其義為得文字蓋大字之訛又王弼解丈人為嚴莊之稱按論語莊子等書稱丈人者謂老人無力以老而扶杖故曰丈人解為嚴莊固未當今定從大然按太𤣥衆首擬師卦其贊辭曰丈人摧孥蓋用易語此足證古易非大人明矣吉無咎許慎云二千五百人為師從匝從􅎧􅎧四匝衆意也按􅎧都回切俗作堆小阜也匝子答切周也鄭𤣥云多以軍為名次以師為名少以旅為名師者舉中言之為卦下坎上坤所以取名為師者自二卦之義觀之內險外順險道而以順行師之義也故繇辭以貞言自爻觀之師比皆以一陽為衆隂之主有統衆象然比陽在上統衆故象君師陽在下統衆僅象將帥耳又六五以柔居上任之為人君命將出師之象故繇辭以丈人言或謂伍兩卒旅具曰師古者五人為伍五伍為兩五兩為卒五卒為旅皆自五起數師卦一陽統五隂故有此象愚謂此說未然五柔居尊舉衆委二者也師義訓衆乃統全卦以立名非如他卦有坤者專指坤為衆也然則五居君位不混衆中所謂衆乃即指其餘四隂耳不可以象害理貞正也興師動衆以毒天下而不以正民弗從也强驅之耳故師以貞為主李子思云師止言貞而不及元亨利者凡兵出似非一元生育之事故不言元不以亨利誨天下者懼其貪功困生靈也守一貞足矣丈人長老之稱即爻所謂長子蓋以互體震取象長子代父亦家中之長老也按論衡云人以一丈為正故名男子為丈夫尊翁嫗為丈人味彖傳稱以衆正云云是能佐其君服天下成王業者詩曰文武吉甫萬邦為憲方叔元老克壯其猷丈人之謂乎若趙充國曹彬亦庶幾近之矣吉謂成功無咎謂合義雖功成而不免咎者秦漢而下往往而是故二者並舉乃備也若夫以有名之師任無名之將固未必成功即以有名之將興無名之師亦適為黷武能必其吉且無咎哉六爻皆變則為天火同人序卦傳曰訟必有衆起故受之以師師者衆也訟必有親戚鄰里知識徒黨之類輔其氣鬬其捷解其紛釋其難以衆起而就官師求直焉唐虞之時有士師無司馬至于士師不能治而煩司馬矣彖傳曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣師之訓為衆貞之訓為正荀子云仁者愛人故惡人之害之義者循理故惡人之亂之味能以衆正之語非獨謂其出之有名蓋必志于正天下而後可春秋傳云能左右之曰以能左右其衆以正天下者必為天下所歸往故曰可以王也能以衆正言為將者九二是也可以王言命將者六五是也下二句正道其實剛中而應故能以衆正行險而順故可以王剛中指九二應指六五為將不剛則怯過剛則猛九二剛中乃將才之善者五應于上而信任之專則可以展布其才矣呂伯恭云二雖剛中必待五為之應然後能成功苟五不應師變為坎矣將帥臨敵而上無君之應豈非天下之至險乎行險而順發上下二卦之象也坎為險坤為順用師征伐非平夷之事故曰行險非奸險之險也順謂順人心雖行險道而以順動所謂義兵王者之師也用師猶以藥石治病能無勞民傷財乎故曰毒然毒之者乃所以安之故民恱而願從吉可知也要其義于不得不毒故無咎胡仲虎云毒之一字見得王者之師不得已而用之如毒藥之攻病非有沈疴堅癥不輕用也其指深矣楊敬仲云自西自東自南自北無思不服服其正也合乎天下之所同然者故也不得天下之所同然者何以用其衆何以致吉與無咎又吳幼清云毒天下謂內坎民從之謂外坤亦通象傳曰地中有水師君子以容民畜衆無水之處穴地輒可以得水水隨地而有者也故以地中言古者寓兵于農兵農合一無事則為比閭族黨之民有事則為伍兩卒旅之衆若水之隂行于地中而人不知故不患無兵有民則有兵平日容保其民者正所以畜聚其兵也無故而先聚兵以生亂與有故而諉于無兵皆非知兵者也容民屬坤畜衆屬坎世言團結鄉兵之法有司苟能實心舉行立為保長聨以什伍之制訓練以時調發以度不惟可以省費禦暴庶幾寓兵遺意焉初六師出以律否音鄙馬融鄭𤣥王肅皆作方有反非也讀左傳可證臧凶變兌為臨初六出師之初也在一卦之內繇內而外為出律謂號令節制所以統御于衆者大軍初動有九二大將在前乃號令節制之所自出初自下承之有師出以律之象初若專之即為失律舊說泛以步伐止齊言非也否臧謂不善也朝氏云否字先儒多作不是也以律則整股而臧苟失律則無所統一而不臧撓敗之凶可立見矣因初才柔不當位又與三皆陷陽者故有否臧之戒解見左傳宣十二年晉荀林父救鄭先縠佐之及河聞鄭既及楚平林父欲還彘子不可以中軍佐濟知莊子曰此師殆哉周易有之在師之臨曰師出以律否臧凶執事順成為臧逆為否衆散為弱川壅為澤有律以如已也故曰律否臧則律竭也盈而以竭天且不整所以凶也不行之謂臨有帥而不從臨孰甚焉此之謂矣果遇必敗彘子尸之雖免而歸必有大咎杜預注云彘子逆命不順成故應不臧之凶坎為衆變兌兌柔敗則法弱坎變兑兑為澤是以見壅如從也法行則人從法法從人坎為法象今為衆則散為川則壅是失法之用從人之象變坎為兌是法敗水遇天塞不得整流則竭涸也澤不行之物譬彘子違命也按古人之說易如此左氏親受業于孔子必有師授奈何遽崇信王輔嗣任理而遺象哉或謂荀九家逸象坎為律蓋象上下空而陽氣實其中所謂師出以律者如六韜太公言天清淨無隂雲風雨夜半遣輕騎往至敵壘去九百步外遍持律管當耳大呼驚之有聲應管其來甚微可以知三軍之消息勝負之決及周禮春官大師之職執同律以聽軍聲而詔吉凶武王伐紂吹律聽聲推孟春以至于季冬殺氣相并而音尚宮晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競多死聲楚必無功皆其法也坎為耳主聽又坎方黃鐘之本故師初言律理非不可通然與全卦之意不合吾從左象傳曰師出以律失律凶也舍律無臧經曰否臧凶傳曰失律凶指言之也九二在師中吉無咎王三錫鄭𤣥本作賜命變坤為坤互體震變坤九二即彖所稱丈人也卦惟九二一陽為衆隂所歸五以柔居君位是其正應二乃師之主專制其事者也居下而得專制者唯聞外之事為然在師中之中猶春秋傳所謂將中軍者以二居中位故稱中大將象也或以中道解者非是愚聞之師云周書有之天道尚右日月西移地道尚左水道東流人道尚中耳目役心吉禮左還順地以利本武禮右還順天以利兵將居中軍順人以利陳人有中曰參無中曰兩兩爭曰弱三和曰彊易曰在師中吉此之謂也彖言吉無咎惟九二備之者何六四六五非師主但得無咎而已成功之吉必歸九二焉王指五三錫者周禮云一命受職再命受服三命受位自五至二歷三位故稱三錫錫命非褒成蓋隆之寵數以結其心耳互震為雷有命令象坎變坤坤順以承天故其象如此象傳曰在師中吉承天寵也王三錫命懷萬邦也用兵大事也將大權也安有人主不主持于內而大將能成功于外者以剛主應剛臣猶未保其終九二應于六五是以獲成功之吉以其承天之寵任也天謂王也胡仲虎云爻言王命象言天寵亦春秋王必稱天之意楊敬仲云王三錫命懷萬邦也者此亦補爻辭之所未言王者之所以三錫命于將臣者志不在殺也所以懷受萬邦也彼惡大焉或亂倫焉或虐民焉屢諭莫從故命將征之征者正其不正鋤剗亂弱所以安衆也故曰懷萬邦也慮或者不明三錫之義疑其志于殺也故特明之六三師或輿尸凶變㢲為升互體震變兑約象坤變震程傳云師旅之事任當專一二既以剛中之才為上信倚必專其事乃有成功若或更使衆人主之凶之道也輿尸衆主也蓋指三也以三居下之上故發此義軍旅之事任不專一覆敗必矣按三副二裨將象古輿論輿人之誦皆衆辭詩誰其尸之春秋傳彘子尸之皆取主義自三至五成坤坤為衆故以衆主言或謂剝一陽在上而衆隂載之有得輿象六三衆隂在上如積尸而坤為輿坎為車輪有輿尸象此其於取象得矣然細玩爻意實不如此三蓋乘二而陷二者故特著輿尸之戒以伸將權若云師徒撓敗輿尸而歸則已是凶不必贅言凶矣且觀五爻辭曰長子帥師而繼之曰弟子輿尸貞凶以文氣考之二為長子長子帥師正彖所謂丈人吉者不應有輿尸之慘明是取衆主為義言若弟子主之則雖貞亦凶見號令節制當一歸長子也又三變成㢲㢲為不果將不果故裨將得衆主如此楊廷秀云河曲之師趙盾為將而令出趙穿邲之師荀林父為將而令出先縠後世復有中人監軍者師焉往而不敗楊中立云唐九節度之師不立統帥雖李郭之善兵猶不免敗䘐則輿尸之凶可知象傳曰師或輿尸大無功也無功釋凶若如朱子輿尸血刃之說則大有罪奚啻大無功哉或謂大謂陽指九二也九二為主師偏裨不用命則主帥無功矣六四師左次無咎變震為解互體震變離約象坤變坎按兵家尚右右為前左為後故八陳圖天前衝地前衝在右天後衝地後衝在左老子云吉事尚左凶事尚右偏將軍居左上將軍居右言以喪禮處之二在師中為衆隂所歸四聽于二偏將軍象也師再宿曰信三宿曰次次非退之謂謂次止而不輕進也若春秋次滑次召陵是已古者讓而避必于左詩云宛然左辟四得位而無應無應不可以行得位則可以處故左次以聽主帥之令柔不鋭逞正不妄動視三之輿尸逺矣惡乎咎三四皆坤體四能順三不能順者四正體三互體三以陰居剛四以隂居柔故也又焦弱矦云四乘坎之上與兵法右背山陵左前水澤意合故曰左朱氏升云四變則互震為左來矣鮮云乾先坤後乾右坤左故明夷六四隂也曰左腹豐卦九三陽也曰右肱諸象皆可通並存之象傳曰左次無咎未失常也輔將次于左以聽命于主帥乃師之常四之不敢遽前視二為進止去貪功冒進而失其常度者逺矣故無咎六五田有禽徐本作擒利執言郭京舉正云王弼本作言行書向下引腳稍類行書言字轉寫相仍遂成謬誤長知兩切子帥師弟子輿尸貞凶變坎為重坎約象坤變艮程傳云五君位興師之主也故言興師任將之道師之興必以蠻夷猾夏寇賊姦宄為生民之害不可懷來然後奉辭以誅之若禽獸入于田中侵害稼穡於義宜獵取則獵取之如此而動乃得無咎若輕動以毒天下其咎大矣執言奉辭也明其罪而討之也若秦皇漢武皆窮兵以索禽獸者也非田有禽也按六五柔順居中非好大喜功之主唯敵加于已不得已而應之耳故為田有禽利執言之象然以隂柔而為師主又患其弱而多疑也故戒之曰若既使九二之長子帥師矣閫以外將軍制之君命有所不受况可使稚弱小輩衆主而干預之乎故雖有執言討罪之正亦凶此申言九三兩爻之意以見用將不可不慎也程傳云自古任將不專而致禍敗者如晉荀林父邲之戰郭子儀相州之敗是也五居坤土之中故取田象于師言田者古人一嵗三田所以習武事也班孟堅云禽者鳥獸之總名為人所禽制也應坎變亦坎坎為豕豕害稼者也故記云迎虎為其食田豕本爻無執言象唯二三四互體震震為言九二任帥師之責將使之奉辭伐罪故云利執言也若依王弼本執言作執之則本爻約象變艮艮為手乃執象長子指九二九二互卦震之初畫有長子象弟子指六三六三本卦坎之末畫為弟子象震為長男坎為中男也專以輿尸咎六三者以六三居剛而乘九二之上若先縠馬謖違節制以取敗是其事也象傳曰長子帥師以中行也弟子輿尸使不當也二五居卦之中二與五應而膺帥師之任乃以中正之德合于上而受任以行也二力足辦而五復使在旁之隂柔得撓其事則二必難成功是使其所不當使也一使字繫民命之死生國家之安危乃歸咎于五之辭叶韻當字宜作平聲讀上六大君有命開國承家小人勿用變艮為蒙大君指五於上六言之者上處卦末乃師之終功之成論功行賞之時也又吳幼清云上變為剛居一卦之上大君之象而于令升則謂上六為宗廟蓋正開國承家之命于宗廟之爻尤通有命即開國承家之命本爻無命象以二三四互體震震為雷有號令象上六之所命者在九二六四命自上而達于下故稱有命也開國封之為諸侯也指功若九二者承家以為卿大夫也指功若六四者承受也九二以長子帥師戰則必克其功大矣功大則賞亦大六四居偏裨之位不敢自專謹守乎師律而從事焉長子有功則次第而受賞焉宜也坤為地為方國象上變艮艮為門闕家象損艮變為坤故稱無家師坤變為艮故稱承家聖筆之精若此小人指六三也六三以柔居剛與帥相齕處非其位躁進僨事正秦誓所謂仡仡勇夫者是誠小人而已既不使之輿尸已慎之于始矣奈何復用之以亂邦乎上與三敵應又變艮為正故有勿用象舊說謂第頒之以爵賞而不任之以政事則三本無功何有于開國承家之錫也直始終戒其不用而已三人位隂爻為小故稱小人象傳曰大君有命以正功也小人勿用必亂邦也開國功之大者承家功之小者象曰以正功言爵賞之命乃所以正諸將武功之等差也王三錫命錫命于行師之始意惟在于懷邦小人勿用勿用于功成之後意惟恐其亂邦聖人之為邦計深矣楊敬仲云去一害民者又用一害民者以亂易亂必不可後世雜霸之說興逆取順守之說興有曰用得其道則天下狙詐咸作使此非君子之言也用一詐者天下之詐心咸興用一小人天下小人心咸肆行一不義殺一不辜而得天下君子斷不為也用師而用詐取勝於目前貽禍于後日其應如嚮坤下坎上比毗志反卦內並同吉原筮元永貞無咎不寧方來後夫凶許慎云比密也二人為從反從為比蓋以二人反面相從為之比此卦坤下坎上一陽居尊位而五隂從之如五家為比而比長統之故取比為名也上親下則下有歸下親上則上有與有歸則不離有與則不孤自生民以來至於今未之能易故曰吉原筮元永貞無咎主衆隂言原者再也與禮記莫有原之原同本草原𧖟蛾第二𧖟也漢書原廟左氏原田同義下卦名初筮上卦名原筮蒙主爻在下卦九二以初筮而得之故稱初筮比主爻在上卦九五必再筮乃得之故稱原筮元永貞指五也五一陽居中元象永守其元便是貞王度無外莫大乎元元又莫貴乎永貞舊割裂分三德不成文理當比之世必擇所從惟筮得永貞此元德之人而比之則可以免于悔咎也萃比下體同坤但萃四有分權者故元永貞言于五比下無分權者故元永貞言于彖義各有當耳不寧方來主五言不寧者五之不敢康寧也五體坎坎為勞卦為加憂故曰不寧屯彖傳言建侯不寧亦指坎言五唯懷匹夫勝豫之慮兢兢乎不敢以自寧正能永貞其元德者天下感其德方且來歸附而未已也方來輿朱紱方來同解或以坤為方指下體互體皆坤象似鑿來謂下四隂主五而言故稱來亦猶需之上六稱不速之客三人來也後謂上夫謂五凡卦下畫為前上畫為後陽畫象夫隂畫象婦睽卦遇元夫亦謂陽畫也夫唱則婦必隨上六一隂高亢于九五之上負固不服乃自後于夫之象凶不亦宜乎又虞仲翔云坎為後艮為背上位在背後無應乘陽故稱後夫蓋以三四五互艮取象亦通楊廷秀云商以離德亡周以同心昌故曰比吉太公避紂以待文王曰吾聞其善養老馬援舍隴而歸漢曰當今非但君擇臣臣亦擇君故曰原筮元永貞無咎酈生說田橫以天下後服者先亡故曰後夫凶六爻皆變則為火天大有序卦傳曰師者衆也衆必有所比故受之以比比者比也比者比也上比卦名下比即衆必有所比之比相親附之謂也衆必有所親附依歸則聽其約束故卑躬傴僂以事之出賦稅以養之正名分以尊之桞子厚謂生人之初與萬物俱生不能搏噬且無毛羽必將假物以為用假物者必爭爭而不已必就其能斷曲直者而聽命焉以安其衆此屯蒙需訟師比六卦之序之意胡仲虎云易一陽之卦凡六復師謙豫比剝也而最吉莫如比彖傳曰比吉也比輔也下順從也原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也比吉也乃漸卦女歸吉也之例添一也字覺有咏嘆意舊作衍文非也書云惟天生民有欲無主乃亂故一家必有家之主一國必有國之主而况于天下無主則亂有主則治此比之所以吉也比輔也釋卦名比字下順從也釋吉字卦之名比謂如車輔之比近而輔于輻坎坤皆有輿象故稱輔其所以為吉者以下體坤二三四互體亦坤皆以坤順之德而從主爻之五則比道斯成故吉也原筮元永貞之所以無咎者以再筮得上卦九五有剛中之德正所謂元永貞者得此人而比之則比其所當比何咎之有不寧方來上下應者言一陽在上與下之四隂相應下賴上以相統上賴下以相安繇上切于應下不遑寧處而綏之故下亦急于應上方來未己而比之也彖言元永貞又言不寧最為喫緊五惟有此德故可以來下之比亦見君位本為天下之至險有德則人比之無德則人去之此所以不易惟王坎一陽在衆隂之中其體本如是也若夫上六一隂獨不比五則失其親輔之道而自後于陽剛之夫理勢窮蹙凶斯及之矣如萬國朝禹而防風獨否諸侯朝齊而談子不來及隗囂公孫述之徒皆是故曰其道窮也窮以卦終言乾上九稱窮之災坤上六亦稱其道窮象傳曰地上有水比先王以建萬國親諸侯水為土妃物無親于是者子夏傳云地得水而柔水得地而流莊子云水之守地也審正比象也天下可以一人統不可以一人治民方比我而我無以比之則踈必躬比之亦踈于是衆建萬國以屬諸侯而又制朝覲㑹同之禮以親之俾各承流宣化以親其民如是則視天下猶一家視萬民猶一身而天下比于一矣大象例凡立法定制之事則稱先王封建之法始于羲皇成于堯舜而三代因之坤為衆為土萬國象諸侯分布其上地上之水象震為諸侯坎以一君統二民與震同意故亦有侯象元永貞者比之本建國親侯者比之法胡仲虎云師之容民畜衆井田法也可以使民自相合而無間比之建國親侯封建法也可使君與民相合而無間楊敬仲云後世之郡縣亦古之萬國唯不擇賢久任故治苟且民失其安風俗益壞藩籬不固遵易道而行無一夫不被堯舜之澤矣初六有孚比之無咎有孚盈缶終來有他古本亦作它吉變震為屯按爻辭惟五言顯比餘各以比之為文皆指人來比我言或謂比卦專取隂比陽為義非也陽象君隂象民民固不可不比君而君尤不可不比民也必君先以是感而後民以是應故彖辭之所重者在不寧方來一語此意不可不知有孚指五五體坎中實為孚凡易言有孚者二十一皆有坎象有孚比之者言五來比初也五雖非初之應而實卦之主其來比初正初之所當比者夫何咎因非應故慮其有咎今不特無咎而已且有他吉則以五之來比者其有孚盈缶故也缶盎也土煅成器外實中虛以離取象離中畫隂者土也全體離者火也若離之鼓缶坎之用缶乃三畫之離也比初變則成震震為仰盂積至五肖離離象缶而坎水滿于仰盂之上故曰盈缶五以誠心比下不特孚二而已三四皆在缶中五皆孚之而終來孚于初者缶之底也以位處下極五自上而下故曰終來五有元永貞之德初若擇主而事非五焉往即正應之四亦往從之矣故許其有他至之吉以初與五非正應故曰有他如大過九四中孚初九皆曰有他亦皆指非應而言又鄭康成解盈缶云爻辰在未上值東井井水人所汲缶汲器也未詳卦變屯屯固比合合而能固吉孰如之象傳曰比之初六有他吉也以五非正應稱他吉故提出初六以釋之若六二則言內而不言他矣六二比之自內貞吉變坎為習坎互體坤變震此比之亦謂九五來比之也蘇子瞻云以應為比故自內蓋下卦為內上卦為外二五正應故五來比二乃自其內卦所本有之應非假合者倫故曰比之自內陽唱隂隨各當其位守貞不變則能獲吉變則敵應無吉道矣象傳曰比之自內不自失也五乃二所自有因其來比而往比之是不自失其所應之偶故曰不自失也六三比之匪人王肅本有凶字變艮為蹇互體坤變坎約象艮變離匪人指上六凡三畫卦中書為人位六畫卦三四為人位上非人位故曰匪人彖言比吉原謂下四隂皆順從乎五則三亦在比吉之中而此曰比之匪人者非三往比上乃上來比三蓋上以三為應已故也本非三咎故象不言凶有如三因上之比遂舍五而往比焉凶必不免矣變則應上與五相敵失比之義象傳曰比之匪人不亦傷乎慮三之失所比也故警之曰匪人來比不亦傷乎令人猛然覺悟惕然有深省處馬援勸隗囂專意東方而隗囂降蜀至于殺身亡宗為天下笑非大可傷而何六四外比之貞吉變兌為萃互體坤變艮約象艮變㢲外指五以位言之五在四之外也曰外比之者九五來比之也以柔居柔履得其正最近于五有相承之象故吉凡爻以貞言者皆欲其不變此爻變則失正且失所比象傳曰外比於賢以從上也賢與上皆指五五有剛中之德故稱賢位在四上故稱上外比於賢此倒句文法言賢者來比之也若以四往比五為比賢則下句復云從上似復矣從上者謂四順從乎五五以賢居上既以比唱故四不得不以比從也九五顯比王用三驅鄭𤣥本作驅失前禽邑人不誡吉變坤為重坤約象艮變坤五以陽剛當天之中衆所共睹與上冥下幽者不同然此凡卦九五皆然而尤莫盛于比衆隂皆伏九獨居尊上下無陽以分其權聖作物覩之象也故曰顯顯比者顯明其比道以示天下下三句是也王者之于天下以大中至正之德親之如太陽中天而權謀術巧有所不事可以比天下而不可以示天下王者不繇也我順者納之不我順者聽之其象為王者之田用三驅失前禽而邑人不誡者然先王以四時之畋不可廢也故為三驅之禮驅即謂驅逆之車驅出禽獸使就田也三驅者褚氏諸儒皆以為三面著人驅禽必知三面者禽唯有背已向已趣已故左右及于後皆有驅之失前禽者在禮天子不合圍唯禽獸順而來者取之凡從前而逸去者皆免矣五王象上坎為馬為弓為弧為天下坤為輿為衆互艮為黔喙之屬皆驅禽象云三驅者二為五應所不必驅初三四等三爻原非正應皆來比已有三驅象前禽指上六也體坎為豕禽象上爻在五前故爻曰前禽畫卦在五後故彖曰後夫一卦五隂而四隂從陽上獨背之是失前禽也邑人指二坤為邑二人位乃五之應也不誡者朱子云蓋雖私屬亦喻上意不相警僃以求必得也二與羣隂同體無繫援之情故有不誡象王者雖以盡比天下為心而未嘗強人彼豈以失禽為介介者哉我無介邑人亦無介大公無我之心衆見之矣所謂顯比者也故吉葵丘之㑹宰孔遇齊侯曰齊侯不務德而勤逺略故北伐山戎南伐楚西為此㑹也東略之不知西則否矣湯之祝網則不然欲東欲西欲南欲北欲髙欲下靡不任之失前禽邑人不誡此之謂也蘇君禹云曰元永貞曰不寧曰顯比務使君之心無一息不運于天下而又未嘗有意于留天下舉天下之情態若無所有于心而又未始置天下於無所用心如天之元氣見其常運地之元形見其常流而形形色色之往來第普之以無心耳此其為善于比天下者乎坎為坤行險而順故克舍前禽邑人不誡亦順象象傳曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也程子云顯比所以吉者以其所居之位得正中也處正中之地乃繇正中之道也比以不偏為善故云正中逆順以向背言上六一隂以乘隂為逆初六六三六四三隂以承陽為順舍前禽之逆而不取故失之是倒解古文法自不泥郭京舉正作失前禽舍逆取順也似未必然逆者如覆盆不見天日非光景之不明舍者如鳬雁不計去來非鄙夷而不納然前禽可失無必得之心特王心然耳邑人何自知之乃皆不用告誡聽其自失則上之中實使之然也二五居上下卦之中同德相應若或使之九五顯比之道如此上六比之無首凶變巽為觀以六位自下言之初始而上終初本而上末以全體自上觀之上首而初足上角而初尾乾姤艮賁既未濟之象可見云比之者非有所指蓋假設之象言設有人來比上六而彼以隂柔居上其象實不足以為元首乃妄意于比天下而不五從欲何為哉此其凶宜矣乾無首比亦無首何吉凶判與乾剛而能柔第不欲為首而已龍德自若也比則隂柔而不克為首矣是奚敢擬乾胡仲虎云卦辭惡其後爻辭惡其無首蓋其才既不足以髙人又不能自卑以從人其凶同耳兩義亦自相貫變巽巽伏下亦無首象象傳曰比之無首無所終也以上下之象言之則為無首以終始之象言之則為無終隂柔在上其德既不足以為首乃乘卦主之五而不肯下比其能有終乎竇融錢俶能知此義故免于難第五對小畜履雜卦傳曰小畜寡也履不處也此蓋以隂不敵陽而類言之以一隂而畜五陽其勢寡以一隂履五陽之間而可久處乎或謂小畜如文王翼翼小心不顯其德寡之象也履如周公几几至忠不驕不吝不處之象也似之鄧氏元錫云屯蒙而下六卦皆尊陽而主坎此巽兑見經貴隂耶又卦五陽一隂貴一隂耶非以陽不得隂則不生即盛陽唱必隂和而天地始降興耶元春之初時有俊風凍塗液融亦有和澤霡霂醹醳苞體畟畟而匪專陽曦之力也此象之矣上經尊陽畜密雲尚往氣之亨履上天下澤形之成易置之乾貞巽則姤澤上天則夬主尊隂而著之下經焉章本清云師比二卦俱以一陽統五隂小畜履皆以一隂間五陽一隂在上則風行天上故為小畜于此可以觀其文焉一隂在下則上天下澤故為履于此可以觀其禮焉懿文德即陽剛之中而有運旋者存郁郁乎其美自不可掩隂含其美也辨上下以定民志即陽剛之內而有節制者寓秩秩乎其等自不可踰禮繇隂制也剛應柔而其文著柔履剛而其禮嚴陽中有隂剛中有柔博文約禮非強合也胡廷芳云師比後乾方與巽兑㑹成小畜履此長少二女代兄從父始入用惟離中女未用耳乾坤至此十變十成數也隂陽之氣一周矣愚按以互體觀則二卦中亦自有離存焉乾下巽上小畜勑六反古本一作蓄又古歸藏易小畜作􅳧畜亨密雲不雨自我西郊自乾坤而下屯蒙需訟師比皆三男陽卦用事至此方見巽之一隂用事而以小畜名焉尊陽也亦所以美隂德也小隂也按淮南子𤣥田為畜其義未詳鄭夾漈云畜田畜也而為畜聚之畜借音不借義古本一作蓄從來讀易書者亦以蓄音讀依蓄聚解是也本字義又訓止又訓養亦可相通其㫖一耳艮以陽卦畜乾故曰大畜巽以隂卦畜乾故曰小畜小畜則何以亨隂陽氣恆相求陽得隂之畜而後化育成也不止不聚不塞不通小畜之亨陽亨也然隂有力焉密雲不雨自我西郊正小畜之象天降時雨山川必鬱蒸而雲鬱蒸甚雲之積也必厚其不雨畜之也畜極乃降而為雨假使微雲便雨其雨易竟耳自我西郊猶云雲往西郊也觀彖曰尚往可見凡雨無從西來者雲在西當風而散風從東與北來乃雨諺云雲往東一場空雲往北只空黑雲往南水潭潭雲往西馬濺泥是也此明不雨者終于必雨諸家及先儒皆言一隂不能畜三陽乾欲上進一隂止他不得陽氣更散做雨不成如是則小畜終于不雨矣何以上九曰既雨乎六四一隂居上體又在乾上為天中之隂故象雲又坎有雲水二象其氣上升為雲其液下降為雨自二至四互體兑有坎之上半體變坎之下半體上有雲而下無雨也隂氣為陽所蒸將升于天而上重陽壓之故為密雲我謂六四為卦主故稱我互兑屬西方故曰西內卦象卦中四在內卦外故象郊六爻皆變為雷地豫巽下乾上為姤序卦傳曰比必有所畜故受之以小畜物相比輔則為聚畜然兩相比者情也而義不足以畜則情勝義而不可久故比必有所畜所以止之也止斯全其聚矣畜兼止與聚二義彖傳曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也柔得位謂六四也以隂居隂故稱得位成卦之主在此爻也體無二隂以分其應而應之之義亦各不同上應之指五上二陽助其畜者也下應之指內卦三陽受其畜者也卦雖以一隂為主實是巽體三爻同力畜乾細玩卦爻之詞如此舊謂一隂竝畜五陽者非人不健則不能有為不巽則陷難以行以卦德言巽乘乾剛健知始㢲輔以行隱稱用濟也人髙明也而沈潜行方也而節甘將有為有行也而凝涵畜道如此矣剛中指九五志行主六四言六四隂力尚徴藉九五剛而得中以助其畜故六四之志因九五而得行于以贊陽出滯陽之所以致亨者此耳不然是謂見畜于小何亨之有密雲不雨二句彖特寫其興雲作雨之狀如此正言畜也薈蔚者雲迅騰尚往其不雨畜之也爾殆必雨者也謂之施未行但未行耳非不行也觀上九既雨既處則小畜之亨亦可知矣蘇君禹云大畜之卦剛健而有光輝宜于設施故曰不家食吉利涉大川小畜之卦剛健而出以㢲順宜于收斂故曰密雲不雨自我西郊象傳曰風行天上小畜君子以懿文德天無處不在無所謂上下曰上下者姑以人目力所及而分上下耳夫天可謂尊髙矣而風能行其上者風無形而至柔也柔勝剛弱勝強故君子體之以懿美其文德文德即柔德以見諸威儀文辭故曰文懿如仲山甫之懿德柔嘉維則令儀令色小心翼翼也外卦巽順懿象中爻離明文象內卦乾陽德象蘇君禹云大畜小畜皆君子畜德學問大畜有囊括宇宙包羅萬古之心胸故象曰多識畜德小畜有一言必謹細行必矜之學力故象曰懿文德又鄧伯羔云懿讀為抑古字通用國語衛武公懿戒自警韋昭注大雅抑之篇也詩抑抑威儀威儀即文德抑密也遏也攝其威儀不使放逸畜之義也亦通初九復自道何其咎吉變巽為重巽復反也與復卦復字同義天上地下其體也其用則交為泰不交為否地氣降必復升天氣升必復降反復升降未嘗少息故初二竝以復言虞翻云乾稱道愚按道即升降不已之道髙誘吕覽注謂天道轉運為乾初得其位既天行周匝復始故曰復自道是也大抵天地間氣化人事皆有隂畜陽之時陽既為隂所畜便不宜過剛躁動躁則有乖舛謬戾之咎矣初以陽才居陽位潜伏于下不與隂事何咎之有先言何其咎而後言吉者蓋以無咎為吉也初與四應爻變為巽健而能順故安受四之畜若此象傳曰復自道其義吉也迹受制于隂道無損于已故曰義吉九二牽復吉變離為家人互體兑變坎復即初爻之復下卦乾體本皆在上之物今與初相牽連而復居于下蓋當小畜之時陽宜為隂所畜九二陽居隂位養氣以待不與隂爭故吉三陽同體故曰牽故夬卦亦曰牽變卦為離離麗也故麗于初而牽復象傳曰牽復在中亦不自失也中謂中德在中謂在下卦之中二與初相牽而復亦不自失其道者以其處中故雖與初陽同德並進而不至過剛若過剛則必且與隂爭擊而自失矣亦者本初爻復自道而言故其吉同九三輿說吐活反輻古本亦作輹夫妻反目變兑為中孚互體兑變震約象離變艮三重剛不中志欲上進如輿之方行然最近于隂為隂所畜故有脫輻之象輻與輹不同輻車轑所以利輪之轉者輹伏兔所以利軸之轉者輹惟車不欲行則暫說之輻必輪破轂裂而後可說則其車不能行矣乾為車輿變兑為毁折說象又二三四互坎為輿九二竒畫是坎之下畫不存也輿下說去其輻之象約象變艮止象胡仲虎云大畜九二曰日間輿衛則利有攸往小畜則曰輿說輻何也大畜以艮畜乾小畜以巽畜乾大畜九三與艮一陽同德故其輿利往小畜九三近㢲之一隂而為其所制故其輿不可行輿說輻陽畜于隂而不得進也夫妻反目陽不平其畜而與之爭也三陽四隂異體相比有夫妻象然非正應也故至于反目自三至五體離離為目巽為多白眼反目象象傳曰夫妻反目不能正室也非正應而欲為夫妻故曰不能正室猶云非其正室也云爾反目宜矣然亦以三之過剛而亢故與四反目如初與二亦何反目之有六四有孚血朝以道云古文作恤去惕出無咎變乾為純乾互體兑變乾約象離變乾巽卦得坎半體此爻皆以坎取象孚指五坎中實故曰孚後凡言孚者放此有孚者有人來孚信于已言五與四相孚也坎為血卦故曰血為加憂故曰惕本爻坎象半見元非坎體又變為純乾則坎象亡矣所以曰血去惕出也京房云小畜之義在于六四三陽連進于一危也外巽體隂柔道行也夫言血者皆隂之傷也三陽健進四強畜之三雖說輻四能無傷乎曰血曰惕危之也以其柔順得正虛中巽體得五之孚則其力厚矣故非惟陽不能傷而且終能畜陽血去懼除以保無咎不亦宜乎巽為乾巽以行健此志所以行也象傳曰有孚惕出上合志也上指五一隂柔弱不能固陽得五之孚與之合志故危懼可免彖所謂剛中而志行也曰惕出則血去可知省文耳九五有孚攣子夏傳作戀如富以其鄰變艮為大畜約象離變震六四九五坎象半見故五以孚稱取坎中之義也有孚者言有所孚也所孚者誰四也攣者攣綴也綴者緝也緝者續也皆相連之意即九二之牽也正體巽為繩變卦艮為手約象離為麗皆攣象也陽實為富又㢲為近利市三倍富之象也以猶春秋以某師之以言能左右之也其鄰亦指四也或兼上言者非巽體三爻同力畜乾六四為畜之主然隂則虛乏九五陽為富居中處尊勢能有為故能推其富以助六四共止畜之是富以其鄰也然則畜乾之功雖繇六四而成尚賴九五左右之力名以巽止健實以健止健也變艮為大畜進乎小矣象傳曰有孚攣如不獨富也五惟與四相孚纒孿固結而不可解故不獨有其富而必與四共之所謂上合志者也上九既雨既處尚德朝氏云京房虞翻子夏傳皆作得載婦貞厲月幾子夏傳作近孟荀一行本作既望君子征凶變坎為需隂之不能畜陽勢也以一隂而畜三陽其數益不勝也然二之為隂能下能入上有二陽為之助巽德益盛乾勢益孤至于上九畜斯極矣極則必變所以向之不雨者今則既雨向之尚往者今則既處也夫巽風也大風揚散密雲雖盛必不成雨故昔之君子有以旱而訟風伯者今上畫變柔則巽成坎而為雨雨作而風息西郊之雲亦無所往矣故既雨既處也在卦終有止象故云既處尚尊尚也德謂巽卦所有之德乃隂德也載者車中所載之物巽得坎半體坎為輿上九乃坎之上畫而實其中象車上之有所載觀象傳曰德積載言畜道之成實繇尊尚隂德至于滿載而然蓋盛之極也婦貞厲以下皆戒辭也㢲長女婦象此陽也而謂之婦明其實隂也以隂而畜陽以柔而制剛婦若貞固守此危厲之道也變坎為月中爻離為日日月相望之象也易中言月幾望者三皆對陽而言中孚言從乎陽歸妹言應乎陽此則抗乎陽也隂已能畜陽矣而云幾望何也蓋欲乘其未盈而為之戒也既盈則陽消矣雖戒無益矣又吳幼清云幾孟荀一行作既今按幾亦有既音左氏傳庸可幾乎幾既古字蓋通用納甲巽卦象既望之月參同契曰十六轉受統巽辛見平明存之備考君子指上九以陽爻故稱君子征猶往也凡行役在路者皆曰征此蓋文王三分有二之時也隂德之成非隂之福若更有所往則隂疑于陽臣疑于君非以服事殷之心矣故著征凶之戒先正謂文王志在明夷而道在小畜良然巽為進退為不果變坎為陷卦變需險在前故征凶或云君子指下三陽乾夫也今受制于婦失為夫之道矣其能有所行乎亦通象傳曰既雨既處德積載也君子征凶有所疑也積坤文言積善積不善之積疑隂疑于陽必戰之疑柔之制剛弱之制強豈一朝一夕之故哉所積者然也積之既盛且疑于陽此消長進退之關而君子不幸處疑陽之地尚敢以所處者為是遂放意直前而絶不反顧乎竊嘗聞之巽雖無意乎制乾而不得不制乾婦行夫事臣行君事亦可以例文王而見聖人之心使天下諸侯自率其職自復其道聖人甚願之而其去其來其順其逆復何知也惟不能盡如吾意則不得不受彤弓玈矢之賜專征伐于天下然猶小心翼翼徽柔懿恭以臣道終蓋深惟幾望之戒爾嘗以武王之事揆文王之時文王之專征也詎惟飛廉惡來五十國不能服即伯夷叔齊猶不服特諒其非富天下耳而迹固嫌于受命矣王其事而不王其心誰能信之祖伊之告微子之奔月幾望矣君子征凶周公亦追狀其危心乎兑下乾上履虎尾不嘻人亨履足踐地也從舟象履形從彳從夂取行義也尸聲凡彖者言乎一卦之所以為主也成卦之體在六三卦之初二為地位三履地上故曰履也吳幼清云離于飛類象雉于走類象虎外文明而中隂質也六爻全體肖離上乾為虎之首二與初在後虎之尾也故三履初二為履虎之尾卦名連彖辭為象與同人觀艮同例嘻齕也人指三三為人位所履之尾在後而虎首趨前上口不開為不嘻人之象兑以一隂見于二陽之上其德為說以兑承乾能安于三陽之下故不見傷大抵人之涉世多是危幾然有履危而不傷害者則以柔能制剛是亨道也書云心之憂危若蹈虎尾繫辭以易之興為文王與紂之事故其辭危履虎尾危之至矣而紂卒不能傷文王故九卦言處憂患之道以履為首六爻皆變為地山謙兑上乾下為夬序卦傳曰物畜然後有禮故受之以履程子云物之聚則有大小之别高下之等美惡之分是物畜然後有禮項平甫云履不訓禮人之所履未有外于禮者故以履為有禮也晏子云自齊國五尺以上力皆能勝嬰與君所以不敢者畏禮也彖傳曰履柔履剛也說而應乎乾是以履虎尾不嘻人亨剛中正履帝位而不疚光明也柔指三剛指初二柔履剛者此就下體自上履下而言也釋卦名也悅而應乎乾者此就上體自下應上而言也曰應者明其非履也三與五同功故曰應此釋卦辭之所以亨也莊子云虎與人異類而媚養已者順也六三成卦之主為履虎尾之人柔居說體能和悅以馴順乎虎者也故雖履虎尾而不至于見嘻亨矣關子明以此方之周公云蓋周公以叔父之親有大功位冢宰而攝行天子事亦所謂履虎尾者也公遜碩膚赤舄几几萬世頌之不嘻人矣楊敬仲云履之道何道也柔而已和悅柔道也柔勝剛弱勝強天下莫柔弱于水而反堅強者莫之能先又莫柔乎風風無形而發大屋折大木柔之卒勝其剛如此熟觀天下萬事唯柔為勝雖然虎不嘻人雖人之能亦虎之善故下文復以剛中正而不疚為五望焉帝指五九五陽德中而且正則不過于剛故履至尊之位而不疚病斯乃光明之道也過剛則疚夬履是也中爻離光明之象得若君為之主而又以其悅應之夫何傷味斯言也聖人其有明王之思也夫焦弱侯云易以乾居上者不獨一卦于履獨言帝位蓋履辨名分之卦也六三雖以一隂統衆陽其實臣也下也上有九五之君在焉六三其敢僣諸故特稱九五之尊曰帝位其嚴于君臣之際如此象傳曰上天下澤履君子以辨上下定民志水瀦而不流者曰澤其大者海也不曰天下有澤不曰澤在天下必曰上天下澤所以嚴大分也天髙地下天尊地卑澤又下之下卑之卑者履者人之所履法上天下澤之象以辨上下而制其踐履上者如天之不可為澤下者如澤之不可為天上下各得其分則民有定志而無覬覦陵奪之患此所謂禮也故曰履者禮也記云禮禁亂之所繇生猶坊止水之所自出禮者因人之情而為之節文以為民坊者也故制國不過千乘都城不過百雉富家不過百乘貴賤有等衣服有別朝廷有位天無二日土無二王家無二主尊無二上賈子云勢明則民定而出于一道故人爭為宰相而不姦為世子非宰相尊而世子卑也不可以知求不可以力爭也又云尋常之室無奧標之位則父子不相別六尺之輿無左右之義則君臣不明而况其大者乎雖然天澤一定之分三尺孺子亦能知之所謂辨者亦于其細微之際人所易忽者而明別之耳人知天威之不可犯而不知路馬之不可齒知兄臂之不可紾而不知疾行之為不弟君子欲移風易俗齊治均平必從隱微疑似之間區分縷析使民凛然畏懼不敢踰越尺寸乃可定其心志而帖然順治也徒曰天尊地卑君上臣下則古之姦雄僣逆悍然不顧者何接踵比肩哉文言云臣弒其君子弒其父非一朝一夕之故繇辨之不早辨者意蓋如此繫辭下傳曰履德之基也夫聖人三陳九卦以履為始非無謂也先天之卦乾兑同宫皆太陽也履合二體天上澤下自然之禮備矣禮者世所迪行而不可易故以為德之基謂德之積纍實于兹始也人有禮則安無禮則危反身循禮則非僻無自而入非基而何又曰履和而至天澤定位禮之體嚴也柔履于剛禮之用和也禮以行之遜以出之順于道德而平其心氣此心之太和直與乾之太和相應是之謂履和而至也又曰履以和行所行若不繇禮自是乖戾和行謂所行無乖忤也初九素履往無咎變坎為訟絲帛未加采色曰素言不改其舊也兑居西方為白應巽中爻為繩為白初處至下素在下者也九以陽德居之安于在下上無係應不變所守乃素其位而行者也舜之飯糗茹草若將終身顔子之簞瓢陋巷不改其樂其即斯人與往者進也陽主于進故曰往程子云夫人不能自安于貧賤之素則其進也乃貪躁而動求去乎貧賤耳非欲有為也既得其進驕溢必矣故往則有咎賢者則安履其素其處也樂其進也將有為也故得其進則有為而無不善乃守其素履者也又變柔則得應故往無咎象傳曰素履之往獨行願也無應故曰獨素履之往以自已獨行其素為願而不願乎外所謂不變塞也九二履道坦坦幽人貞吉變震為無妄互體離變艮九二以陽剛之才而居說體履道而說如行坦途無所窒礙故有坦坦之象二為地上變震為足又為大塗履道坦坦象也又按坦坦說文云文也廣雅云平也明也蒼頡篇云著也以中爻體離故取坦坦象亦可二剛中在下無應于上故曰幽人二為人位幽對明言中爻離明在上則下爻為幽矣故歸妹中爻離九二亦以幽人言之二臣位而言幽人蓋謂幽靜𤣥淡之人雖處富貴而不以榮名勢位亂其心者豈必深山窮谷之士始為幽人哉初素履宜安于素而反謂之往二坦坦若平行無礙而反謂幽人之貞蓋以爻位之剛柔言之也初九重剛其志在行不能使之不往但能不失其素則無咎矣學者初心皆在行志既仕始失之九二履柔行中無所歆羡峨峨清逺不失其幽故曰幽人之貞貞兼正固二義所以吉也本卦以陽爻處隂位為美二與四同也而二有坦坦之易四有訴訴之懼者二得中而四不得中也二與五各得中位二貞吉而五貞厲者二以剛居柔五以剛居剛也故履卦諸爻唯九二為能盡履道之義愚聞之師云九四以懼免九二以不懼免此為倒用法也諺言虎畏不懼已者坦然不亂虎將畏之無所揚其牙矣變震卦為無妄動而無妄固自履道幽貞象彖所謂虎尾正指初二兩爻然彼取全卦之象言與本爻義無涉象傳曰幽人貞吉中不自亂也言二之中德不以無應而自亂也亂則遷于富貴外物而失其所以為中德矣守正不遷則猶然素履之往耳六三眇能視跛能履履虎尾嘻人凶武人為于大君變乾為重乾互體離變乾約象巽變乾眇說文云一目小也互離為目目眇者所視偏離之中虛中在三不中不正視之偏也視雖偏而離目無所傷目雖眇而猶能視之象跛足偏廢也震為足兑變震之中畫足跛也震下畫之陽猶存足雖跛而猶能履之象胡仲虎云行不中則跛歸妹初九但曰跛不中也視不正則眇歸妹九二但曰眇不正也履六三一爻竝書之者惡三不中且不正也三為人位誰嘻之九五嘻之也互體五四三倒兑以口向內與訟之六三食舊德同義彖通指一卦而言則上九虎之首也虎口實而合有不嘻之象此專據一爻而言虎向前行三履其尾則其口必向後而齧三適當虎口故有嘻象隂質變陽剛為武人重巽初六變亦曰武人為猶虞書宣力四方汝為之為大君指九五陽為大五君位也不曰為而曰為于特謂其以膂力之剛而效使令耳或謂武人志欲自為大君者非凡卦五陽而一隂則一隂為之主三本隂柔而以孤隂無偶衆往歸之猶如眇者之能視跛者之能履然有剛暴之主在上其能安之乎其履虎尾而遭嘻固其宜也而三于此亦憣然而思變矣以為吾之見惡于五者特以吾一隂獨立將與五爭為人主故耳變而為剛與衆剛等列則五得獨有其尊而吾無自異之迹其不吾嫉焉必也故有武人為于大君之象焉是道也于文王見之文王小心服事非不自安于眇與跛也其時王室如燬父母孔邇于是三分天下有其二此非眇能視跛能履乎崇侯虎忌而譛之紂曰西伯隂行善矣紂于是囚之于羑里之庫此非履虎尾嘻人凶乎厥後閎天以文馬美女賂紂求赦西伯罪遂賜鈇鉞弓矢使得專征伐所謂武人為于大君也嗚呼文王親遭此變宜其親切而有餘思焉不然胡為上天下澤之卦而乃以履虎尾名其繇也又胡為乎于爻則言嘻人凶于彖則言不嘻人之亨也致嘻之凶以此爻六三不當位故不嘻之亨以此卦兑柔在內故武人為于大君正所謂說而應乎乾者其終不見嘻也宜矣雜卦傳曰履不處也蓋言一隂將為卦主而不敢處也而關子明亦云履之而不處者其周公乎趙㽔注云周公履天子位而不處者以其時自有主也是故負扆攝流言興乃避位而東征四國焉亦猶文王之道也象傳曰眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為于大君志剛也六三以隂不中正故為眇為跛以一隂將為卦主故能視能履然有虎在前將反嘻之故雖能視不足以有明也雖能履而不足以與行也緣其以隂居陽下履虎尾為五所忌故曰位不當也志剛如咸卦象傳云志末言六三欲為大君效力志在從九五之剛也九四履虎尾訴訴馬融本作􅊒虩終吉變巽為中孚互體離變震約象㢲變艮初與二皆虎之尾四與初敵應下履虎之尾也訴訴畏懼貌王輔嗣云逼近至尊以陽承陽處多懼之地故曰履虎尾訴訴也然以陽居隂以謙為本雖處危懼然獲其志故終吉也互巽變亦巽健而能巽入故訴訴至終時則吉亦以其變而得正象傳曰訴訴終吉志行也九四居上卦之下𫝑迫九五君所猜忌之臣也未有君忌其臣而其志得行者今曰志行豈以剛居柔能訴訴戒懼故耶九五夬履貞厲變離為睽約象巽變坎夬塊也夬與履皆一柔五剛之卦上下二體互易耳夬以五剛塊去上之一柔今履九五正當夬位若以夬之道行之則六三一隂在下必不能免矣夫使人謂已虎可也而自虎不可也六三和悅以應上出力以奉上其志非與五敵者也雖不去之何損今必以夬為履是乃九五欲自為虎耳雖剛中而能無厲乎此與彖傳所謂履帝位而不疚者互相發彼望之也此戒之也以夬為履則嘻人不以夬為履則不嘻人楊敬仲云君體雖剛而有用剛之道乾曰用九言其必有以用夫九不可為九所用用九用剛也徒以居崇髙之位為𫝑位所轉移謂天下莫已若與奪自我威福自我自用自專以夬決為履雖不失正危厲也爻變離卦為睽水火相刑三欲不遭嘻得乎象傳曰夬履貞厲位正當也戒夬履者以其正當尊位也夫惟辟作威作福臣無有作威作福此戒為人臣者之辭非縱人主之辭也而昧者不知輒謂威福惟天子意夫天之立君豈使縱淫于民上哉天下有道禮樂征伐自天子出而自天子出者不必皆有道之天下也秦皇漢武之世其為無道也孰甚據正當之位而蹈夬履之厲蓋傷于所恃故也抑又思之臣之事君命也無所逃于天地之間人臣不幸而事暴主雖有無道之加然上天下澤分已定矣亦付之無可奈何而已退之作文王拘幽操而曰臣罪當誅兮天王聖明蓋深知聖心者亦未嘗以紂居尊位為不當也上九視履考祥舌本一作詳其旋元吉變兑為重兑視四顧之意與三為應中爻離目彼此相見故有視象武王書履之銘云行必慮正視履所以正行也書云若跣弗視地厥足用傷考稽也祥吉也傳云吉事有祥是也旋謂旋反也上九應六三有旋反之象履而至上以位則隆以勳則成以年則髙履道終矣降祥在天不必考之于天惟視吾之所履何如耳其惟反而取三之柔體以自居乾為兑健而能悅高而不危則履道於斯大成何吉如之李宏甫云眇視跛履文王羑里以前事也訴訴終吉文王羑里以後事也其旋元吉又文王為西伯賜斧鉞得專征伐以後事也皆文王之卦也象傳曰元吉在上大有慶也在上二字可釋至于上而猶視履考祥此其所以為元吉也大即元慶即吉不然履道有闕而責天之不我私天亦何為而獨為斯人私哉楊敬仲云舜禹有天下勞勤萬物而曰不與焉者在上而旋也孔子十五志學三十而立四十而不惑五十而知天命而曰吾有知乎哉無知也是在上而旋也第六對泰否雜卦傳曰否泰反其類也否大往小來內隂而外陽內小人而外君子泰小往大來內陽而外隂內君子而外小人故曰反其類孔子曰泰者天地交通隂陽用事長養萬物也否者天地不交通隂陽不用事止萬物之長也上經象陽故以乾為首坤為次先泰而後否鄭𤣥云先尊而後卑先通而後止者所以類陽事也蕭氏漢中云上經乾坤交父母之象也六子不交男女之象也故泰否在上經下經六子交夫婦之象也故咸恆損益既濟未濟在下經鄧氏元錫云易首乾坤象天地位耶中泰否象天地交耶莫尊於乾坤莫重於乾坤之交屯䝉而下卦全于八天五為紀地六為制積之五六合隂陽各三十畫二氣各平以盈而天地交乾下坤上泰小往大來吉亨泰者滑也滑者利也流通無滯之稱說文云從廾從水大聲廾竦手也從廾從水疑是以手掬水灑物故有滑意又借訓過亦過水意也徐鉉云今左氏傳作汏輈非是蓋欲改汏還泰今按左宣四年伯棼射王汏輈注汏過也言箭過車轅上可知泰義又訓過總取其如水無滯故二義兼通說文與冭太字同解云即古文泰似非也愚按古文有大字有冭字無太字大字象人形以天大地大人亦大故象人也太字音同泰史籕復篆作㚐蓋取天地兩大之義渻改從大從二二者古文上字即兩大也凡經史中大讀為泰音者其義訓極禮疏云極大曰大當即古冭字今文訛作太或謂加㸃以别于大或謂冭字再省作太必居一于是焉古書音同者字皆通用故大山亦稱泰山以音讀如泰故也然太自從大泰自從水義不相䝉卦以天地交通取名為泰疏義昭然一字之差不可不辨小指三隂大指三陽凡易中陽為明隂為暗陽為實隂為虛陽為富隂為貧陽為貴隂為賤皆所以尊陽卑隂也在外卦稱往在內卦稱來胡仲虎云三陽來而居內三隂往而居外隂陽之正唯泰卦為然自乾坤至履陽三卜畫隂三十畫隂陽之數適相等然後為三隂三陽之泰泰豈偶然哉三隂三陽往來之卦凡二十而泰否適居其先故卦辭獨以往來言吉者言其道之善亨者言其行之通關子明云坤隂之母無不容在戶為闔乾陽之君無不繇在戶為闢闢往則闔來闔往則闢來以氣言之為啓閉以道言之為離合以內外言之為往來故卦有內外人有出入往來相交內外相取上下相形吉凶相分君子小人相亨相屯闢變而闔闔變而闢往通則來來通則往故一闔一闢謂之變往來不窮謂之通天左旋西視之來東視之往日月右行東視之來西視之往天氣下降地氣上躋上下行來亦若東西之視卦乾來乎內坤往乎外君子闢小人闔故名泰反是名否作易者其闢君子之道而通小人之闔乎故各以君子明其卦吉來則凶往有變則能通故曰小往大來吉亨又唐孔氏云此卦亨通之極而四德不具者物既泰通多失其節所以象云財成輔相故四德不具胡仲虎云按辟卦乾四月卦坤十月卦自乾坤二卦外上經泰否臨觀剝復六卦三十六畫而隂之多于陽者十二下經遁大壯夬姤四卦二十四畫而陽之多于隂者十二又上經自泰正月而臨十二月而復十一月陽月順數已往自否七月而觀八月而剝九月隂月逆推未來下經自遁六月而姤五月隂月順數既往自大壯二月而夬三月陽月逆推方來以上必皆除乾坤然後見其多寡逆順自然之序又按國語秦伯納公子重耳及河董因迎公子公子問焉曰吾其濟乎對曰臣筮之得泰之八曰是謂天地配享小往大來何不濟之有韋昭注云陽下隂升故曰配享小謂子圉大謂文公其後重耳果有晉國所謂得泰之八者即筮法六爻不變則占本卦彖辭是也六爻皆變為天地否序卦傳曰履而泰然後安故受之以泰泰者通也禮非強世從人情出尊者處于上而不為傲卑者承于下而不為詘不強人之所不欲不強人之所不能故曰履而泰然後安明強之不為泰不為安而不為禮也以正君臣以親父子以和長幼故先王制之而小大繇焉此大通之業也楊廷秀云乾坤天地之泰初屯蒙人物之泰初有物斯有養故需以養之養者生之源亦爭之端爭一生焉小者訟大者戰師以除其惡比以附其善畜以生聚履以辨治而後致泰豈一手一足之力哉故曰古之無聖人則人之類滅久矣又云乾坤開闢之世乎屯蒙洪荒之世乎需養結繩之世乎訟師阪泉涿鹿之世乎畜履書契大法之世乎泰通堯舜雍熙之世乎過此而後泰而否否而泰一治一亂治少亂多泰豈可復哉故曰泰其上古之極治與彖傳曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外隂內健而外順內君子而外小人君子道長小人道消也此總就小往大來發吉亨之義交以上下言內外以貞悔言消長以六爻進退之𫝑言天尊地卑之意多則下濟上行之意少天尊地卑之說適於人主而小人常操是以中之故天地交而萬物通上下交而其志同談何容易此唐虞都俞吁咈氣象也上下即謂君臣天地君臣其位已定所交通者其氣與志耳得交之意則得往來之義矣往者外之來者內之也隂陽之名就爻為語健順之稱指卦為言陽為君子在內健於行事隂為小人在外順以聽命則君子小人交矣繇是君子之為君子固未嘗加盈也其道則寢明寢易有以風示小人矣小人之為小人亦未嘗盡斥也其道則盡蠲盡釋挹心以歸君子矣其分則如天地上下之不易其道則如天地上下之不二而其效亦自足佐天地之通而成上下相與之志此其所以為吉且亨與蔡伯靜云太極理也隂陽氣也剛柔質也健順德也乾者大極之動故釋彖不言隂陽剛柔坤主質故以剛柔言泰否交不交氣也各具乾坤之體故皆以隂陽言否不交則質著故兼以剛柔言餘卦各滯乎物故不言隂陽止言剛柔健順朱子云聖人作易以立人極其義以君子為主故為君子謀不為小人謀觀泰否剝復名卦之意可見矣蘇子瞻云泰之世不若大壯與夬之世小人愈衰而君子愈盛也然而聖人獨安夫泰者以為世之小人不可勝盡必欲迫而逐之使之窮而無歸其勢必至于爭爭則勝負之勢未有決焉故獨安夫泰使君子居中常制其命而小人在外不為無措然後君子之患無繇而起此泰之所以為最安也愚謂蘇說本善不善讀之將為後世調停之說矣唯晦翁云論隂陽各有一半聖人於泰否只為陽說道理看來聖人出來做須有一箇道理使得天下皆為君子世間人多言君子小人常相半不可太去治他急迫之却為害不然如舜湯舉臯陶伊尹不仁者逺自是小人皆不敢為非被君子夾持得皆革面做好人了此意極是道長者一步長一步道消者一步消一步即復卦浸字意然謂小人道消非消小人也乃化小人為君子也不然消將妨交矣蓋泰之義曰通通者無所不達之謂非決而去之之謂也決者夬之說而非泰之說也陽在內則隂自從陽君子在內則小人必皆委心而聽命于君子先儒或于六四一爻有貶辭今不取魏文靖事宋穆陵進講泰卦嘗曰內君子外小人固為泰也第在外而心腹是寄不為外在內而情意不親不為內一時聞者無不嘆賞可謂深于內之解者矣象傳曰天地交泰后以財成天地之道輔相天地之宜以左右民泰者流通無滯也天在上而其氣下降以交乎地地在下而其氣上騰以交乎天天地之氣交而上下流通故卦名為泰后君也他象皆稱君子泰獨稱后者幾繫于后也財吉本作裁吳幼清云乾陽不可以無隂坤隂不可以無陽必二氣交通于上下而後為泰人君參贊於其中必有以交通之而後能納民于泰也渾然而全者天地之道則自其全者裁制而成之以品分大德之一本截然而分者天地之宜則因其分者輔助而相之以曲全小德之萬殊全者分之分者全之亦交而通之之意民者坤也左右之者乾也坤上者民之情達于上乾下者左之右之之德至于下也此君民之交通也朱子云裁成是截做段子的天地之化儱侗相續下來聖人便裁作段子如氣化一年一周聖人與他截做春夏秋冬四時初九拔茅茹以其彚郭璞洞林讀至彚字絶句彚音胃古文作􅥖董遇本作夤云出也又傳氏注云彚古偉字美也征吉變㢲為升㢲柔白又為隂木故象茅大過初六藉用白茅是也茹根之相牽連者初最居下又與二三之陽同體故稱茹彚韻㑹注云本作􅡔草木􅡔字之貌或作􅡔今文書作彚按彚蟲似豪豬者即蝟也義與茅茹無涉古文作􅥖字亦從草可知茅根􅡔字乃牽引俱起之象溷而為彚傳寫訛矣古注又以彚作類解于此爻義亦通蓋三陽乃同類者但類之解彚不知何據征進也三陽同德志皆在外初為陽首已舉則從故曰以其彚猶四之言以其鄰也君子道長進皆得志故吉卦變升下者升亦征吉象象傳曰拔茅征吉志在外也外謂外卦李宏甫云致泰之道但小大交相往來則小者吉大者亨可常泰矣故初九身在三陽之下處大之初而即志在外之隂欲以來交于小速拔三陽以其類進故致四等翩翩相信而小大交也愚按卦以泰交為義所謂內君子而外小人者正欲與之相安不與之相激耳相安則小人可化相激則君子亦傷初志在外以陽感隂四為坤首以隂從陽隂陽交和成泰之道實基于此九二包古本一作苞荒說文作水廣也虞翻本同鄭讀為康云虛也用馮音慿河不遐遺朋亡得尚于中行變離為明夷互體兑變坎二以陽剛得中上應于五五以柔順得中下應于二是以剛中之賢為上所信任主治泰者也故治泰之道主二而言凡易中言包者皆謂陽畫又此爻變離離虛而容者也亦有包義荒翟𤣥云虛也二五相應五虛無陽二上包之愚按先儒皆以隂爻雜有荒穢象包之者二但二距上卦尚逺似無包象當從翟也康成解同又說文引荒作注水廣也二變柔有互坎象則從說文亦近之徒涉曰馮九二變柔互坎故象河五居坎外與二隔河二若馮河而往則能就乎五矣乾健利涉馮之象也以二居柔位故教之以勇遐逺遺棄也三隂在外九三一陽隔之有遐逺象朋謂初三也同類為朋九二以乾德居中剛而能柔蓋博大明決至公無我之士也其志在用我之實包五之虛以成上下交之泰徒步涉河無所疑忌將以就五不以隂之我遐而遺之不以陽之我朋而比之渾乎大中而無所倚斯故得尚于六五之中行尚配之在已上者如漢世尚主之尚正與歸妹相應中行中路也五居上卦之中故曰中行二五相易遂成既濟以此處泰何光大如之象傳曰包荒得尚于中行以光大也二唯志在包五之荒故得尚于中行之五乃相首尾之辭所謂上下交而成泰者也以光大者言非見徹而德宏者弗能爾二乾體天象故稱大變離日象故稱光朱子云易上如說以中正也皆是以其中正方能如此此處也只得做以其光大說若不是一箇心胸明濶底如何做得九三無平不陂無往不復艱貞無咎勿恤句其孚于食有福變兑為離互體兑變震約象震變坤此主爻也三居泰之中在諸陽之上泰之盛也物理如循環在下者必升居上者必降故為之戒曰勿謂時平其險將萌勿謂隂往其復反掌臨戒八月豐宜日中九三陽盛極矣君子將陂小人將復能無懼乎陽竒畫橫亘象平變隂偶畫缺陷象陂又虞翻以天地分為平亦通往即彖辭小往之往復者返而之內也陽自上而下曰復隂自上而下亦曰復上下位也往來氣也位無往來氣有上下然則泰兮否所伏甚不可倚以為常也其惟惕然思艱而守以正固則可以無咎必言貞者恐其變而失正又為莫憂恤其艱徒憂無益唯誠信孚感于我所食者則有吉慶其者期之之辭泰之九三六四坎象半見當與小畜六四九五互看坎為加憂以其半見故小畜六四曰惕出泰九三曰勿恤也坎中實為孚泰九三小畜九五即坎中畫故皆稱孚陽實者食人隂虛者食于人二三四互兑為口食象其孚于食者言三往孚四也蓋六四居三隂之下羣隂所從以接陽九三居三陽之上羣陽所依以接隂二爻正相交之地爻中二孚字相應與小畜六四九五同但小畜卦體自上畜下故攣如之孚五下孚四也泰之卦體自下進上故于食之孚三上孚四也三四相孚則內外卦皆舉之而交泰之象遂成此時小人皆化而為君子而天下胥受其福矣然非陽之先孚隂不至此苟九三樂進而領袖衆陽以迫坤則隂不能堪隂不能堪必相率以仇陽而平者將陂往者將復又何福之與有卦變臨臨曰消不久蓋慮變也正與平陂往復義合象傳曰無往不復天地際也曰天地際者謂此爻為天地交際之㑹也提一際字而平陂往復之義艱貞勿恤之㫖具含之矣李宏甫云知致泰之道在于往來之交則知往來之間亦非久長之道故于內卦之三特致意焉至上則居泰極矣雖欲艱貞不得矣吁可不戒之于早也邵國賢云復其見天地之端乎泰其見天地之際乎譬之循環而反及乎其始之所是之謂端而環未嘗缺也譬之引繩而適當乎其中之分是之謂際而繩未嘗絶也知無端者可與言端知無際者可與言際六四翩翩古文作偏偏陸德明本作篇篇不富以其鄰不戒以孚變震為大壯互體兑變乾約象震變兑此正隂陽交泰之爻也翩翩羣飛而下貌吳幼清云小過有飛鳥之象者陽象鳥身隂象鳥翼翼在兩傍而身在中也泰六四變為剛三四五上得小過全體之半陽在下隂在上如鳥身投下翼飛于上而隨身以下也隂虛陽實凡言不富者皆隂爻以其鄰與小畜以其鄰義同鄰指五上四雖不富而能帶挾其並居之鄰相從而下者以三隂皆欲求陽故不待教戒而能以之下孚乎陽也此孚字與三之其孚相應所以專屬三者三四相接三為卦主四為隂首近孚于三則衆陽皆見四先孚三則羣隂畢從交泰窾係實在于此二言朋亡三言其孚至此羣隂相孚而來共為一朋則大道為公之象也此所以為泰與所謂外小人而道消者其義如此坤為震亦動而下順之象象傳曰翩翩不富皆失實也不戒以孚中心願也失實即不富之謂六四同五上兩爻翩翩而下已雖不富而其鄰肯從之者以三爻皆不富而欲資富實于陽故也不待期約而能以其相孚之人同下蓋二隂亦下求陽各出于其中心之所願欲也六五帝乙歸妹以祉元吉變坎為需互體震變離程子云以爻義觀之帝乙制王姬下嫁之禮法者也自古帝女雖皆下嫁至帝乙然後制為禮法使降其尊貴以事其夫也愚按泰之言交含二義焉謂君與臣交可也謂君子與小人交亦可也六五以柔中居尊下應剛中之九二可謂上下交矣若以全卦觀之則上三隂皆小人而下三陽皆君子也亦將以六五為小人否耶偶尋繹之而得其解爻言帝乙又言妹蓋以五居尊取象帝乙以六隂爻取象妹互取之也云帝乙歸妹者蓋言屈隂以從陽也邪媚近幸之小人能抑而下之使從君子則上下志同君子道長而泰道成矣舊說皆以妹象五非是以祉者以此得祉也祉福也元吉福之大也治泰之事皆九二主之六五獨享其成而已故九二爻辭言事而不及福六五爻辭言福而不及事君臣之相與有成如此泰卦三四相易則成歸妹以互體言自二至四為兑自三至五為震亦成歸妹觀泰之傳曰天地交而萬物通歸妹之傳則反言之曰天地不交而萬物不興可知寓歸妹于泰者隂陽之合也六五取歸妹當是以中爻取象帝乙未知誰是按孔子曰美帝乙之嫁妹順天地之道以立嫁娶之義義立則妃匹正妃匹正則王化全又曰泰者正月之卦也陽氣始通隂道執順故因此以見湯之嫁妹能順天地之道立教戒之義也又曰自成湯至帝乙帝乙湯之𤣥孫之孫也此帝乙即湯也殷録質以生日為名順天性也𤣥孫之孫外絶恩矣同以乙日生疏可同名湯以乙生嫁妹本天地正夫婦夫婦正則王教興矣故曰易之帝乙為成湯書之帝乙六世王同名不害以明功京房傳載湯歸妹之辭曰無以天子之尊而乘諸侯無以天子之富而驕諸侯隂之從陽女之順夫天地之道也善事爾夫必以禮義依上所載則帝乙為湯矣左傳哀公九年宋公伐鄭晉趙鞅卜救鄭不吉陽虎以周易筮之遇泰之需曰宋方吉不可與也微子啓帝乙之元子也宋鄭甥舅也祉祿也若帝乙之元子歸妹而有吉祿我安得吉焉乃止證此則帝乙又為紂父與尚書殊合姑兩存之以備參考象義以甲陽乙隂稱帝乙者隂主也此與九家易稱五者帝位震象稱乙及虞仲翔稱震為帝坤為乙何異抑鑿矣又鄭𤣥云五爻辰在卯春為陽中萬物以生生育者嫁娶之貴仲春之月嫁娶男女之禮福祿大吉理屬鄙淺亦于卦義無涉卦變需女需男行歸妹之正也需五亦需賢以濟者象傳曰以祉元吉中以行願也中者中德也二五皆中上下同德其交泰也乃五之所深願故二曰尚五曰歸一往一來之意也傳于四五皆以願言然四曰中心願僅以心相孚契而已五下嫁于陽則見諸行事矣故曰行願唯得其願則泰道成此其所以有元吉之祉乎上六城復于隍子夏本作隍姚信本作湟勿用師自邑告命貞吝變艮為大畜泰極生否聖人于三示其端于上要其極警戒之意亦消長之理城復于隍倒泰為否之象也復與無往不復之復相應坤為積土變艮艮亦土土聚而附地又在上卦城象隍城下溝無水稱隍有水稱池坤土本在下之物在上則有傾頺之理今泰反否乾壞為土復于隍象夫土一也築則為城崩則為隍猶之否泰一道也自否而泰既泰反否亦其人所自為耳當此之時人心已離不可收拾用師無為祇驅民於潰而速之禍耳故曰勿用師坤為衆故稱師變剛則坤體不完衆散邑削又艮為止故稱勿用古書多以已所居邑曰邑如王率割邑商邑翼翼四方之極盤庾不常厥邑周公作新大邑是也坤為邑所以取告命象者乾一隂始生為㢲坤樂下復必自初爻始泰道將變則下卦之乾已伏有㢲體猶六畫乾之變為姤也故有自邑告命之象王介甫云小者擅命故曰自邑告命蘇子瞻云上失其衛則下思擅命至此則衆共為政而上之威令亦有所不行矣世道陵夷一至于此此周室東遷景象貞謂固守此而不思變計也吝羞也九三上六其位皆正故皆得為貞然九三將變而有陽剛之才能艱難以保貞則可以無咎上六已亂而以重隂處之則所謂貞者直固守其柔不敢動作而已其能免于羞乎象傳曰城復于隍其命亂也此命謂上命命不自上出而自下出非亂而何王輔嗣云居泰上極各反所應泰道將滅上下不交卑不上承尊不下施是故城復于隍卑道崩也否道已成命不行也坤下乾上否備鄙反卦內同之匪人不利君子貞大往小來否本音方有反不也從口從不不亦聲以不可之意見于言故從口卦名音備鄙反不通也與病痞之痞同義天氣上而不下地氣下而不上二氣不交而隔塞也否之匪人履虎尾同人于野艮其背皆以卦辭與卦名相連四卦同為一例否之匪人者言否之者非人也匪人指三三為卦主而居人位隂出地上而長至三六陽已消其半卦之所以名否者以此故曰匪人君子指乾三陽而言當此之時宜有轉否之道若乾上坤下貞而不變則終于否而已故曰不利君子貞大往者陽往而消小來者隂來而息也六爻皆變為地天泰序卦傳曰泰者通也物不可以終通故受之以否不可終通者不能終通也理勢之自然也夫五色雖明有時而渝豐交之木有時而落是故物有成衰不得自若胡庭芳云小畜履後乾坤自相遇成泰否然乾坤十變方泰何其難泰一變即否何其易履其交處其㑹者宜知警戒為變化持守之道可也馮竒之云自乾坤之後始涉人道經歷六坎險阻備嘗內有所畜外有所履然後致泰而泰之後否即繼之以此知斯人之生立之難而喪之易國家之興成之難而敗之易天下之治致之難而亂之易此又序易者之深意而亦天地自然之理也彖傳曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內隂而外陽內柔而外剛內小人而外君子小人道長君子道消也否泰反其類故否之辭皆與泰反天地之氣不相交接則萬物之生意不流通也君與臣民之志不互相交接則天下雖有邦如無邦也楊敬仲云人君生長富貴崇髙之中難乎盡知治亂之情狀聖人於是告之曰上下不交即為無邦庶乎因上下之情不交知所警而圖也張子厚云古之人一邦不治别之一邦直至天下無邦可之則止有隱耳蔡伯靜云彖傳言隂陽者唯泰否而已蓋泰否二卦皆具乾坤之體也而泰言健順則乾坤之德否言剛柔則其質也否者氣藏乎質而不交故不可以德言但言其質而已吕伯恭云否上下不交有天地之形而無乾坤之用故不言健順也李子思云夫隂陽二氣對行乎天地間或者謂陽一而隂二故君子少小人多治世少亂世多然自有天地以來隂陽二氣分于四序無一嵗不得其平者而君子小人治亂之運則或不齊豈幽隂之氣獨盛于人間而天運不爾耶是不然天人有相勝之理治亂有可易之運特在人所以制之者如何耳否之世雖則小人道長君子道消而所以消小人長君子亦必有道矣此作易者所以極論其消長而寄之于爻𧰼傳曰天地不交否君子以儉德辟難不可榮以祿邵國賢云否泰者時也時也者上之人之所為也故泰之時言后道在上也否之象言君子道在下也儉不必作斂化書云儉于聽可以養虛儉于視可以養神儉于言可以養氣儉于嬪嬙可以保夀命儉于心可以出生死又泰之時裁成輔相君子與有力焉今也不然亦儉德也慎乃儉德若愚若拙則小人之忌心無自生而後難可避坤為吝嗇儉之象也避難者避小人之禍三陽出居在外避難之象也又坤為平順亦避難𧰼不可榮以祿者言自處嚴密人不得而榮之如不可得而親不可得而疏之謂非戒其不可也夫惟超乎榮祿之外然後能運其斡旋之權以休否非獨與時俱否也此𧰼乾之剛而髙也又或云儉德避難不與害交也不可以祿不與利交也蓋法天地不交之𧰼丘行可云坤六四之括囊無咎即儉德避難也乾初九之遁世無悶即不可榮以祿也初六拔茅茹以其彚貞吉亨變震為無妄三四五互㢲為茅初二柔畫與三相連皆茅之茹也泰三陽否三隂同在下有牽連之𧰼故取象同又變震為蕃亦茅茹𧰼初惡未形不忍遽以小人待之也况體坤有順德故教之以貞貞者正而不變之謂初與四應變則敵陽而不應矣居否之初處順之始為類之首而能安意以從陽是小人而能從君子豈不吉且亨吳幼清云君子之有小人猶夫之有婦陽之有隂豈能絶其類哉唯艱其進遏其盛不使之勝善類而害治道斯可矣小人者治世之能臣亂世之姦雄也自古治世為君子分憂任勞者固亦有亂世之奸雄特世治黨衰則不能為惡耳方否之初隂以類進聖人不遽絶之也初與九四正應奉承君子固可以吉且亨也誘之趨善俾天下無棄人聖人之仁也項平甫云泰之初九君子始以類進君子難進故聖人勉之以征否之初六小人始以類進小人進而為邪故聖人戒之以貞象傳曰拔茅貞吉志在君也君指五初之守貞應四是志在偕四以承君而不自植其私黨者又能鼓同類以從陽何吉如之六二包承小人吉大人否亨變坎為訟互體艮變離二五正應包者五包二也承者二承五也包與包荒之包同義無道之世更張不宜太驟故有包容小人之法小人因此而承順乎上意亦挽亂為治之一機乎在彼固足嘉亦未始非彼之福也故曰吉雖然王莽下士子雲失身蔡京奉法君實受欺當其承時最易眩人故戒之曰大人否亨言其道以否而亨否者閉塞之義即所謂君子難悅是也胡仲虎云初之惡未形故不稱曰小人至六二則直以小人稱矣荀慈明云大人謂五坤乾分體天地否隔故曰大人否也夫否卦之小人固順承之小人也隂雖居內陽猶在上其勢相敵故其惡未形而禍未著是以不言凶吝也至于剝而始敢于蔑貞乃為惡逆之小人矣然惡逆之小人唯順承之小人為之也君子苟樂其順承而不虞其惡逆則未有不為所中而天下之事始不可為矣夫隂之在下志方求用事猶未涉彼且介于邪正之間而未甘為小人也故其始進也亦有拔茅連彚之𧰼於此能貞則可變為君子而君子于此亦未敢必其為小人也至于六二隂已居中而當位矣猶恐君子之不能容也內畜其邪外示其順而吾奈何惑之若包承不戒遂至包羞包羞不戒必至剝膚防之能無豫乎以此知聖人為君子戒甚嚴也變坎為訟天水違行亦有否義𧰼傳曰大人否亨不亂羣也君子以同道為朋但以小人之承順于我遂喪其所守以從之是謂亂羣欲反之正不亦難乎此宋人調停之術所以為疏也六三包羞變艮為遁互體艮變㢲約象㢲變乾六三成卦之主即彖所謂匪人也三上正應上體乾以包涵遍覆為德且合其同類二陽以包三而三甘自以匪人厠于衆君子之下恬然不思變計猶進欲逼陽而未已亦足羞已不言凶咎者凶咎總在羞中也或云聖人不欲棄小人故以恥心動之抑欲因其恥而善收之耳變艮為遁此否卦之所從來者而消陽未如否之甚益以見三之可羞也象傳曰包羞位不當也三近陽故其象如此九四有命無咎疇離祉變㢲為觀互體艮變坤約象㢲變艮命謂天命天下事理過中則變乾四曰乃革泰四曰翩翩否曰有命人處通時未有念命艱難坎坷則念命或以命慰或以命冀而鼓人之氣者亦或以命決若九四之所謂有命聖人因厭亂之人心而鼓君子之氣也無咎與他卦不同勸勉之也疇者同類之三陽也離者麗也離祉者附麗其福祉也坤息至三志欲上進四居上卦之始乾體未壞恃命自將不比匪人何咎之有以其能力持隂陽交戰之衝衆正賴之故其𧰼為疇離祉命祉皆從乾取象胡仲虎云泰九三無平不陂無往不復否九四有命否泰之變皆天也然泰變為否易故於內卦即言之否變為泰難故於外卦始言之泰之三必無咎而後有福否之四必無咎而後疇離祉三四乾坤交接之處隂陽往來之㑹君子當此必自無過而後可為福而後可為疇類之福蔡介夫云九四有命矣然非處之有道而無咎善類亦無由而蒙福石介司馬光尚未能盡是道故復曰動而以順行是以出入無疾朋來無咎也泰之六四辭意若姤否之九四辭意若復蓋在卦為復在爻則為否之四在卦為姤在爻則為泰之四也卦變觀觀四正觀國之光者故能以其疇離祉𧰼傳曰有命無咎志行也否泰反復天運之常故濟否之志於此得行為九四者不可不自勉也九五休否大人吉其亡其亡繫于苞荀爽作包桑變離為晉約𧰼㢲變坎人依木息曰休中爻㢲木五居木之上休之𧰼也九家易云否者消卦隂欲消陽故五處和居正以否絶之乾坤異體升降殊隔卑不犯尊故大人吉也鄧氏元錫云五剛中正時否居休與之遵養與之優游四凶在朝見之弗堲元愷在下見之弗亟夫非帝者之時乎有否焉舉天下而並休息之也抑必有祗祗威威之心焉彼以怠豫無猷為為休益以否爾其與幾同近也其亡其亡近死之嗟也荀慈明云隂欲消陽繇四及五故曰其亡其亡約𧰼㢲為繩繫之𧰼也藂生而槇曰苞柔條細弱羣聚而成藂者也變坎為藂棘下入坤土苞之象也㢲為陰木桑之𧰼桑既非樟楠松柏比矣况又小而柔者乎國家之大不繫于磐石而繫于苞桑危亦甚矣正以寫其憂懼之意陸宣公疏云邦國之杌􅑾若包桑綴旒可證此二句有音韻或古語也蘇子瞻云九五大人之得位宜若甚安且強者也然其實制在于內席其安強之勢以與小人爭而求勝則不可故曰休否大人吉恃其安強之勢而不虞小人之內勝亦不可故曰其亡其亡繫于苞桑休否者所謂大人否也小人之不吾敵也審矣唯乘吾急則有以幸勝之利在于急不在于緩也苟否而不爭以休息之必有不吾敵者見焉故大人吉愚聞之師云泰弗如否曰何謂也曰泰無大人唯否有之是以謂弗如九五之大人以位以時以交無不可以反泰者而否之既久不能以一日傾則第休息之以觀其㑹而喫緊在存戒心焉如光武置二子于度外休否也以十年為逺而惓乎審黃石存包桑之詔戒心也使否泰之循環如易之六隂六陽可以刻期而至則人事可廢而非然也漢四百年而亂唐與宋皆三百年而亂而漢之為唐中幾四百年唐之為宋乃僅五十三年修短之數大殊而不可期則其間人事得失何限故必曰其亡其亡也而後可以興關子明亦云夏以金德垂四百年殷以水德垂六百年周以木德垂八百年得其道也數不能逃後王不能應其數者禮不行于易中者也乾為離健而且明卦變晉明出地上是以能休否也𧰼傳曰大人之吉位正當也乾剛中正而居君位乃克稱大人而休否休否在位而尤在于德稱其位故正當並言然正較當為重或云辭與夬履同者亦恐有所恃故爻辭有其亡其亡之句亦通熊去非云泰不能不否者六五柔懦之君當任其咎否終復泰者九五剛明之君是賴焉然則為君者與其為泰六五之柔寧為否九五之剛繫辭下傳曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑保其存者自謂存可常保有其治者自謂治為我有吳幼清以九五否將休矣而不忘戒懼非也君子安且不忘危况其未安乎下二句放此陸公紀云苞桑否隂滅陽之卦五在否家雖得中正常自懼以危亡之事也上九傾否先否後喜變兊為萃傾者倒也傾否與復隍俱取倒體否極則倒而成泰也與鼎顛趾利出否同意不言否傾而言傾否人力勝也上以剛德居否極佐九五陽剛之君傾否自其能事然實有懼心焉以否為先亟亟乎圗之以喜未暇計安樂焉則何否之不可傾乎先否後喜即先天下而憂後天下而樂之意正與其亡其亡之君心相似不如此看則傾否盡之何必覆說先否馮元成云曰休否曰傾否非大人不能也否不可以急治而休之於先否不可以終長而傾之于後是能濟否者也然非以身先當其否則不能以身後享其成其亡其亡繫于苞桑先否之謂也心存禍患若繫于苞桑無所庇映而不能自安抑何否塞乃爾也而泰運繇之開矣閭丘氏昕云泰之終言城復于隍以戒之否之終言先否後喜以勸之若以否泰相仍為一定之數則易不必作矣變兑為悅後喜象象傳曰否終則傾何可長也則字要歸到人事謂否極則當思所以傾之何可使長否也正責成于人之意程子云反危為安易亂為治必有剛陽之才而後能也故否之上九則能傾否屯之上六則不能變屯或謂否極傾而為泰則泰極亦傾而為否天運循環無往不復故又戒之曰何可長也意思亦好第七對同人有大雜卦傳曰大有衆也同人親也大有同人皆以離之中爻為主在上則人歸于我故謂之衆在下則我同乎人故謂之親衆則於人無不容親則於衆有所擇蕭氏漢中云交泰之前乾南坤北有坎無離交泰之後乾北坤南有離無坎又云上經陽體之中則坎先離後下經隂體之中則離先坎後又云上經離六體二體本卦離二體合乾成同人大有一體合震成噬嗑一體合艮成賁主不合坤客不合㢲兑合陽不合隂也亦所謂隂在陽中皆逆行也其所以不合坎者離之配也胡氏云坎離皆乾坤之用易至此十二卦坎體凡六見離體於此始見焉需訟小畜履四卦互離至同人大有而見離體凡六離之用與坎等矣鄧氏元錫云同人大有乾于離合也其乾主而離用耶天地交而離始見經重離耶離為日為火為時夏其當時用事朱明而繁鮮天地之盛德氣耶人受天地之中以生德明惟明德達天為大明而天地之能成焉是天人之粹精也以是為上經之中同人貞離火在下而精通於天抑猶之地材也心耶大有貞乾火在天上如天有日心天而道大明普照矣故同人文明以健自明而誠也達天德而仁大有剛健文明誠明成性也體天道而化同人得位猶之下位也其中下之中也以同人人不皆同而同不皆正也利君子貞而涉川大有位曰尊位中曰大中上下應之天人集命矣故體仁長人曰同人𢎞天生民曰大有陸庸成云二卦畢竟離不敵乾故同人曰應乾又曰乾行大有曰應乎天又曰順天離下乾上同人于野亨利涉大川利君子貞凡卦五陽而一隂則一隂為之主以三畫卦言之二五皆在人位相應則相同故曰同人以六畫卦言之初二為地位五上為天位人目所望地連天際處為野故曰同人于野文明以健中正而應故亨下卦離離為舟乾健前行而舟隨其後故以涉大川則利卦惟一隂皆五陽所欲同然惟二五中正相應其相同者乃君子之正道若舍其正應而為他爻所誘取非貞矣故曰利君子貞程子云他卦固有一隂者在同人之時而二五相應天火相同故其義大六爻皆變則為地水師序卦傳曰物不可以終否故受之以同人程子云夫天地不交則為否上下相同則為同人與否義相反故相次又世之方否必與人同力乃能濟同人所以次否也彖傳曰同人柔得位得中而應乎乾曰同人同人曰同人于野亨利涉大川乾行也文眀以健中正而應君子正也唯君子為能通天下之志柔謂六二乾謂九五柔得位謂二以隂居隂得其正位也五中正而二以中正應之得中而應乎乾也五剛健中正而二以柔順中正應之各得其正其德同矣且皆人位故曰同人唐孔氏云稱同人曰猶言同人卦曰也乾行指利涉大川一句蓋乾剛健中正且居九五之位有德有位故可以濟險難同人于野雖六二得位得中所能同至于濟險難則非六二隂柔所能也故曰乾行猶言乾之能事也焦弱侯云同人以柔為主然徒柔不能同人也必以天德行之故雖得位得中而必應乎乾乃可以同人至利涉大川又曰乾行也明非柔之所能辦也凡卦以柔為主者皆然履之六三不自亨也必曰應乎乾小畜之六四不自亨也必曰剛中而志行大有之六五不自亨也必曰應乎天而時行此皆柔為卦主而其濟也必稱乾此乾之所以為大歟坤得主而常之義此諸卦足以發之文明以健以上下卦德言中正而應以二五兩爻言內文明則察于理外剛健則勇于義二五以中正之道相應乃君子之正道也非明莫察非健莫決非中正相應則君子小人相雜允迪厥德謨明弼諧何畏乎巧言令色孔壬君子所以通天下之志也以此程子云天下之志萬殊理則一也聖人視億兆之心猶一心者通于理而已愚六爻各以正應即所謂理三四兩爻只為不知此義𧰼傳曰天與火同人君子以類族辨物不云火在天下天下有火而云天與火者天在上火性炎上火與天同故曰與只一與字而同義自見古人祭天取于燔柴者以此然天陽類火隂類終非類也非類而類之必有道矣故帝釐下土方設居方别生分類禹别九州隨山濬川任土作貢男女辨性上下辨禮士辨志官辨事此不妨彼彼不妨此此以成彼彼以成此若晏子和同之論是也然類族辨物不專審異馮去非吳幼清皆謂兼法㺯火意思較完類合也族屬也物人物之通稱法天之大羣族并包以其同者同之肖火之明隨物區别以其異者同之即西銘理一分殊之謂蘇子瞻云水之於地為比火之與天為同人同人與比相近而不同不可不察也比以無所不比為比而同人以有所不同為同初九同人于門無咎變艮為遁同人之初未有私主處得其正上無係應雖其出門而遇六二非素心之所期也以無所偏私故無過咎若三四之於二則羣起而思攘之矣人指二兩戶為門隂畫偶有門之象同人隨之初九節之九二皆前遇偶故謂之門一扇為戶陽畫竒有戶之象節之初九亦前遇竒故謂之戶戶一而門二也變艮亦門闕象𧰼傳曰出門同人又誰咎也鄧氏云門內之治恩掩義以易辟也而多辟也則咎之所生也同人于門何疏戚之有焉其來自來其往自往不逆其來不將其往不距其來不楗其往而我翛然其間交袂而行乎通逵如萍梗然泛相值于江湖孰為親愛孰為賤惡又孰為親愛賤惡而辟耶百爾同人如出于門咎安從生嘻可以識仁矣爻言同人于門傳以出門同人釋之加一出字而意愈明朱子云易中所謂又誰咎也自有三箇而其義則有兩樣如不節之嗟與自我致寇言之則謂咎皆繇已不可咎諸人如出門同人言之則謂人誰有咎之者矣以此見古人立言有用字雖同而其義則不同六二同人于宗吝變乾為重乾互體㢲變乾蘇子瞻云凡言媾者其外應也凡言宗者其同體也九五為媾九三為宗從媾正也從宗不正也六二之所欲從者媾也而宗欲得之正者逺而不相及不正者近而足以相困苟不能自力於難而安於易以同乎不正則吝矣愚按六畫三四為人位故六二同人以同乎三言也初雖與二同宗而非人位若初之同人則指二而言以二為人位故也舊以宗為五則中正而應正同人之所以亨者何言吝鄒氏云爻以離體言離以一隂間二陽故有宗𧰼睽六五亦以四為宗此爻變則通體皆乾不得以宗繫之矣𧰼傳曰同人于宗吝道也謂其為吝之道也吝有靳縮之義恐二分其應五之心比三故戒之九三伏戎于莽升其髙陵三嵗不興變震為無妄互體㢲變艮約𧰼乾變㢲三以陽居剛而不得中是剛暴之人也在同人之時志在於同卦惟一隂諸陽之志皆欲同之三又與之比然二以中正之道與五相應三欲奪而同之而懼五之見攻也故伏戎于莽以伺之時升高陵以窺之終于理曲氣餒勢弗克進至三嵗不敢興嘻亦窮矣不言凶者既不敢發故未至凶也㢲為伏離為戈兵變而震為動為威武戎𧰼變柔互震上畫互㢲下畫為有草茅竹木之處故曰莽㢲為股為高升高象變柔互艮中畫山之半也故為陵義與丘同劉子圭云三居下體之上故謂之陵有慿上之志故謂之升項平甫云伏戎于莽處下卦也升其髙陵望上卦也來矣鮮云對五而言三在四之下故曰伏對二而言三在二之上故曰升三與五隔三爻故曰三嵗不敢興者艮止象𧰼傳曰伏戎于莽敵剛也三嵗不興安行也言敵剛恐人誤以為攻二也爻言升言興皆明敵在上卦安行者安分而行即四反則之意故爻不言凶蓋同人君子能以理通天下之志則三四亦皆安于其所當得而無非分之覬矣一說三伏而不興則二可安行無忌與五相遇亦通九四乘其墉鄭𤣥本作庸弗克攻吉變㢲為家人互體㢲變坎約𧰼乾變離墉城垣也離中虛外周𧰼墉解卦上六變離亦曰墉其指二墉指三九三為六二之墉四在三上乘其墉也六二之欲同乎五也歷三與四而後至故九四亦欲得六二乘二之墉將攻而取之然二之正應五也四之於二非應非比其取之為無名而逆理甚矣二雖弱而直四雖強而不直始有攻之之意終以義之不可故弗克攻而止凡爻言不克者皆陽居隂位若訟之九二九四及此爻是也唯其陽故有訟有攻惟居隂故不克訟弗克攻吳幼清云九三不慮六二之不從已唯念九五之能得二故不急圗二而專以敵五為心晉文公一戰勝楚諸侯之從楚者自不能不從晉九三非能如此也而謬計妄想蓋欲如此九三與九五度德雖殊度力猶頗相等均之為以剛居剛故也若九四之以剛居柔則力非能抗九五者矣故不敢咎五而徑以攻二為事晉悼公與楚爭鄭不伐楚但伐鄭鄭不能支而楚自不能與爭九四非能如此也而輕舉妄動蓋欲如此然三之於五卒不興者以勢之不敵而不敢也故僅可以免凶四之於二卒不攻者以義之不克而不為也故猶可以獲吉爻變㢲健而能㢲其知弗克而反則固其宜矣抑卦唯三四不言同人以其有爭奪之心故不得以同稱𧰼傳曰乘其墉義弗克也其吉則困而反則也恐人以弗克攻為力之弱故釋之曰義弗克也義者理也則者理之不可踰也於義不克為困四之所以終獲吉者以其困于不義而能自反于法則也胡仲虎云春秋文公十四年書晉人納捷菑于邾弗克納有得于周周爻辭弗克攻之㫖矣榖梁傳曰弗克納其義也有得于夫子象傳義弗克之㫖矣九五同人先號平聲咷而後笑大師克相遇變離為純離約𧰼乾變兑五與二應正大傳所稱二人同心者也故稱同人同心之契三四競起而間之故未得而號咷相求慕之切也已遇而笑說之至也曷為而至以大師克三伏莽四乘墉則皆彊弗友之徒非武震不足以決也人君得一德之臣或為媢嫉格必奮勇屏除而後魚水之歡洽故寓象如此舊謂五不能大同而私繫二則親賢者所以親天下曷為私繫聖人誠非之不應以中直言矣下卦離此爻變亦離離爻曰歌曰嗟中孚𧰼離亦曰或泣或歌旅上卦離亦曰先笑後號咷皆取火聲無常若泣若笑又吳幼清云其先六二在離火炎焚之中而號咷其後與九五相遇九五變為柔則成兑口而笑矣亦通陽為大離為戈兵大師𧰼也春秋書鄭伯克段于鄢傳謂如二君故曰克虞翻云同人反師故曰大師二至五體姤遇也故相遇李子思云天下之理萃則必爭卦以相同為義而三則伏戎四則乘墉五則大師克何也二應五而三爻據之所以爭也嗚呼出而與人同至易至簡之事而乃如此故易中必知險簡中必知阻不學易者殆不可以涉世也𧰼傳曰同人之先以中直也大師相遇言相克也直謂理直言二五以中正相應其理直也義理所同物不得而間之爻稱大師相遇祇以言其克之武非必用師也繫辭上傳曰同人先號咷而後笑子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭吳幼清云君子之道不皆同也以身之行則出處或不同以口之言則默語或不同然二人之心既同則言行不必同而無能間其同者故同心者之行譬如至利之器可斷至堅之金無物能梗礙之也同心者之言譬如幽生之蘭自有逺聞之香無物能障隔之也九五六二其心同一中正其先暫為三四所間而號咷其後終得相遇而笑蓋其心之同非三四所能梗礙障隔也程子云中誠所同出處默語無不同天下莫能間也同者一也一不可分分乃二也一可以通金石冒水火無所不能入故云其利斷金其理至微故聖人贊之曰同心之言其臭如蘭謂其言意味深長也蘇子云繇此觀之豈以用師而少五哉夫以三四之強而不能奪始於號咷而卒達於笑至於用師相克矣而不能散其同此所以知二五之誠同也二隂也五陽也隂陽不同而為同人是以知其同之可必也君子出處語默不同而為同人是以知其同之可必也苟可必也則雖有堅強之物莫能間之矣故曰其利斷金蘭之有臭誠有之也二五之同其心誠同也故曰其臭如蘭上九同人于郊無悔變兑為革此爻所稱同人謂九五國外曰郊上在卦外故稱郊獨處無應而比于五故有同人于郊之象乃無心于同而偶同者與三四之爭二自別故爻稱無悔變兑兩澤相麗亦同人𧰼𧰼傳曰同人于郊志未得也五與二為應上雖偶同特以地相鄰比終非正應故曰志未得也蘇子瞻云以其無所茍同則可以無悔以其莫與共立則志猶未得乾下離上大有元亨大者陽也有者盛多之義繫辭傳云富有詩小雅云㫖且有釋者謂有猶多也卦以大名者四大有言大者多有也大畜言大者藏畜也大過言大者太過也大壯言大者盛壯也此卦一隂居尊為主而五陽具備故曰大有元者乾之德也亨者大之用也程子云卦之才可以元亨也繇剛健文明應天時行故能元亨也小畜一隂居四欲止五陽以為用故言亨而有密雲不雨之嫌大有一隂居五能有五陽以得其用故不惟亨而且亨之大六爻皆變則為水地比序卦傳曰與人同者物必歸焉故受之以大有語云獨任之國勞而多禍獨國之君卑而不威眀主不自用其智而任聖人之智不自用其力而任衆人之力以聖人之智慮事者無不知也以衆人之力趨事者無不成也水深淵廣則龍魚生之山林茂盛則禽獸歸之使物有歸則所有大矣彖傳曰大有柔得尊位大中而上下應之曰大有其德剛健而文眀應乎天而時行是以元亨柔謂六五尊位謂五六五居上卦二陽之中陽為大故曰大中上下謂上卦二陽下卦三陽一柔而得五陽之應是陽之多也故曰大有亦有上下應而不得尊位者小畜是也有能致之資居得致之位則乾之德為我所有而作用皆陽剛之妙應矣故曰其德剛健而文眀應乎天而時行剛健居內乾德也文明居外離德也唯一隂居尊位故可以全體歸之司馬君實云夫柔而不眀則前有讒而不見後有賊而不知明而不健則知善而不能舉知惡而不能去二者皆亡亂之端也眀以燭之健以決之居不失中行不失時然後能保有其衆元亨也應天者六五應乎九二也時者當其可之謂天即理也天之道不外時而已應天時行如天命有德則應天而時章之天討有罪則應天而時用之即遏惡揚善順天休命是也乾為天因應乾故發此句時行即應天之實非時行之外别有應天也剛健文明者德之體應天時行者德之用有是德之體用則元與亨合矣乾道主元離德主亨翼于屯臨隨無妄升等卦皆訓大亨不訓元亨此獨訓元亨其别明矣惟鼎傳訓元亨然鼎之彖言元吉亨與此小異或問大有之時何以無豐豫之戒曰大有致有之初豐豫則太平之久其時不同𧰼傳曰火在天上大有君子以遏惡揚善順天休命天上安得有火蓋謂日也日髙在天上照見萬物之衆多故為大有朱子云凡有物須是自家照見得方見得有若不照見則有無不可知何名為有吳幼清云火之所照能分别善惡而天道福善故於善人則必福之以休美之命君子既能如離火之分别善惡矣而惡者則抑遏之善者則舉揚之所以順上天福善之休命也分善惡屬離休命屬乾遏揚又屬乾順又屬離火之别淑慝蓋以順天之所休天之有禍福蓋以遏揚火之所照命言休而不言咎者遏惡亦以揚善也初九無交害匪咎艱則無咎變㢲為家人交如朋友之交無交如文言傳所謂無交而求孟子所謂無上下之交者卦以六五一隂為主柔得尊位而上下應之此大有成卦之義也初去五最逺而其正應之四又以近五而交于五矣所謂厥孚交如是也此初之所以無交也夫以六五大有之世獨初九孑然無交而不思所以自達于五則害于義矣然匪已之過咎以所處之地然耳其惟艱則無咎何言乎其艱也初之上應于五也歷二與三與四而後至雖歷二與三與四而終不敢不應焉此初之所以免咎也變㢲為下伏無交𧰼𧰼傳曰大有初九無交害也楊敬仲云大有之時聖君在上四方咸仰初九雖在下亦當出而交當出而交而不交則害者害道也害吾之德也當入而出為疏動當出而入為固避皆非正道乾初則貴潜需初則貴其不犯難履初則貴其獨行惟大有之初則貴其交也九二大車蜀才本作輿以載有攸往無咎變離為重離互體乾變㢲大車二也載謂載五也胡仲虎云坤為大輿九二體乾而曰大車者輿指軫之方而能載者言車則以其全體而言引之以馬之健行之以輪之圜皆乾𧰼也况九二以剛居柔柔則其虛足以受剛則其健足以行有大車𧰼陽為大故稱大二虛任受九剛任行與大畜九二同又二變離離虛而能容亦車載象二五相應陽志上行故有有攸往之𧰼以是而往何咎之有程子云剛健則才勝居柔則謙順得中則無過其才如此所以能勝大有之任愚按吕伯恭有言大臣之位百責所萃震撼擊撞欲其鎮定辛甘燥濕欲其調劑盤錯棼結欲其解紓黯暗汙濁欲其茹納故為大臣者必如大車以載而後可有攸往者楊敬仲謂言車力之有餘德之大者無所不備無所不濟泛應曲當通行而無礙是也此王佐之才唯伊尹周公當之胡仲虎云不曰吉者大臣任天下之重職當如此也僅得無咎處大有之難如此愚又聞之師云九二大夫也何以知其為大夫也詩曰大車檻檻毳衣如美大車大夫之車也九三公也公用享于天子是也天子三公稱公王者之後稱公九四卿士也何以知其為卿士也王公相去一階爾其為尊卑也微禮王祭不以公為尸以卿為尸不嫌也其為尊卑也晳九四近臣貴而未盛卿士之象故曰匪其彭明辨晳也六五天之子也上九天也六五受天之祜三公九卿二十七大夫皆能有之矣人有十等裁及大夫大之也此蓋以爻位言存之以備參考𧰼傳曰大車以載積中不敗也車大則勝重載故雖多積于車中而行不敗曰積中不敗即釋有攸往無咎意中虛故能積健故不敗九三公用亨香兩反古字亨享通用有亨無享據左氏傳解此爻有戰克王饗之句當作享讀于天子小人弗克變兑為睽互體乾變離約象兑變坎三公位也天子指五三居下體之上乘極剛之勢而承柔順之主勳名一時莫過焉用以受宴饗于天子非德莫之能勝蓋桓文之業也彼惟能輸其忠藎勠力于天子以屏翰大有之治而天子方虛中下賢故有公用享于天子之𧰼後世之假此名以樹權者比比而是聖人防之豫矣故曰小人弗克爻變兑自三至五亦兑兑為口故有宴饗象左傳僖公二十五年春正月丙午秦伯師于河上將納王狐偃言于晉侯曰求諸侯莫如勤王使卜偃卜之曰吉遇黃帝戰于阪泉之兆公曰吾不堪也筮之遇大有之睽曰吉遇公用享于天子之卦戰克而王饗吉孰大焉且是卦也天為澤以當日天子降心以逆公不亦可乎大有去睽而復亦其所也杜預注云乾變兑以當離日之在天垂曜在澤天子在上說心在下是降心逆公之象又去睽卦還論大有亦有天子降心之𧰼𧰼傳曰公用亨于天子小人害也居公位而際大有善用之則以亨于天子否且以自害可不惕夫能與天子為難者莫如諸侯故聖人特為戒如此九四匪其彭子夏本作旁虞翻本作尫無咎變艮為大畜互體乾變兑約𧰼兑變震程子云彭盛多之貌詩行人彭彭行人盛多之狀雅駟騵彭彭言武王戎馬之盛也九四在三陽之上以陽息之卦言之則為四陽之大壯盛之至也卦名大有彭字即大字之義其四自謂也近君者勢不挾而震用事者權不招而集權勢所歸禍敗所隨六五柔中而四以剛首逼之必也引嫌多懼視諸陽之盛皆五之有已不敢僣有其彭而後可以免咎九四以陽居隂變艮明而知止故克匪其彭𧰼傳曰匪其彭無咎眀辨晳也晳明貌九四居四陽之首而率諸陽與之偕進其盛多蓋彭彭矣使明不能燭理智不能慮逺以其盛多者而震之必非柔中之君所能安也下三陽皆健體四乃明之首也以離明辨别事理而能照晰則知彭彭之匪我有而不蹈僣逼之嫌矣所以免于咎者以此六五厥孚交如威如吉變乾為純乾約𧰼兑變乾子瞻解上九有云兩剛不能相用而獨隂不可以用陽故必居至寡之地以隂附陽而後衆豫之斯義也請竊取之以解此爻焉五以柔位居尊何以使諸陽大服而樂為用哉二五正應斯固不必言也三居下卦之首威足震主則聖人已廪廪焉憂其跋扈矣所恃者有四之匪彭在四近臣也而為諸陽之首能率其類以偕進四孚則三陽畢孚矣故六五之厥孚交如者專指四言也凡卦中得坎半體者皆稱孚五孚四四亦孚五交互而不可解所謂厥孚交如也以此率下天下其孰能攖之固有不怒而威者矣故曰威如吉語云山有猛獸藜藿不採六五與九四相交之謂也應乾變亦乾故有威如𧰼左傳成季之將生也桓公使筮之遇大有之乾曰同復于父敬如公所杜預注云乾為君父離變乾見敬與君同𧰼傳曰厥孚交如信以發志也威如之吉易而無備也五四相信則有以感發在下羣陽之志六五柔中唯行簡易無所防備然物自畏之若馬伏波之論光武是也蘇子瞻云六處羣剛之間而獨用柔柔而能威者何也以其無備知其有餘也夫備生于不足不足之形見于外則威削一說威如吉乃戒辭君道貴剛當以威濟太柔則人將易之而無畏備之心亷逺地則堂髙所以預防人臣之不敬也亦通上九自天祐之吉無不利變震為大壯六五者一卦之主也上居卦之終故於卦終言卦主之盛四陽在六五之下者皆應之矣上一陽在上天之位也而亦應五是天之祐五也之指五言吉無不利皆稱五蓋徴諸大傳矣吉以六五之德言履信思順尚賢皆所謂吉者沈括謂非吉而利則非所當祐是也以傳大有上吉之句觀之可見李宏甫云六五一爻備言六五所以大有之德上九一爻備言六五所以大有之福福德兼備六五上九合為一人然則上九其天矣離為震卦變大壯動而明壯而正大亦無不利𧰼𧰼傳曰大有上吉自天祐也大有上爻之吉其必有以得乎天而祐之者自天而下也繫辭上傳曰易曰自天祐之吉無不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利也五以下諸爻下應也斯之謂人助五以上一爻上應也斯之謂天祐所謂順者以六五柔順言也蘇子瞻云信也順也尚賢也此三者皆六五之德也易而無備六五之順也厥孚交如六五之信也羣陽歸之六五之尚賢也曰履信者以五所信之四陽爻位皆在其下故以履言蓋推言六五之德而上九天位則專錫六五以福也第八對謙豫雜卦傳曰謙輕而豫怠也謙輕是自卑小之義豫則有滿盈之志而怠矣謙以自牧則從故爻多功豫以適已則窮故爻多凶馮竒之云一陽五隂之卦其立𧰼也一陽在上下為剝復𧰼陽氣之消長也在中者為師比𧰼衆之所歸也至於三四在二體之際當六畫之中故以其自上而退處于下者為謙自下而奮出乎上者為豫此觀畫立𧰼之本㫖也李子思云設卦命名多以畫之反對取𧰼謙豫二卦反履小畜之對也履謙取畫在三豫小畜取畫在四特隂陽之畫不同耳皆五隂一陽五陽一隂之卦也一隂在下卦三陽之上其位不順故名之小畜一陽在下卦三隂之上其位則順故名之豫一隂在上卦三陽之下其位則宜故名之履一陽在上卦三隂之下其位非宜故名之謙蕭氏漢中云兑㢲艮震下經之主上經之客也在上經之初皆不能自為卦必依於乾坤坎離而後成卦客依主也繇謙而前十五卦上經之上陽中之陽故陽盛而主旺客衰繇豫而後上經之下陽中之隂故陽微而主衰客旺前十五卦乾坤坎離之體多震艮㢲兑之體少主盛客微也後十五卦乾坤坎離之體少震艮㢲兑之體多主漸衰而客漸盛也又云客豈遽侵主哉主交客而致其來也坤交艮而成謙震交坤而成豫謙居十五卦之末豫居十五卦之首繇此而上陽日以長而主盛繇此而下隂日以長而客強蓋隂陽主客盛衰消長之幾㑹也胡庭芳云同人大有後坤又自與艮震相過成謙豫長少二男之從母也至此震艮二男復用事矣愚按以上下卦及互體觀之亦為母統三男之卦艮下坤上謙古歸藏易作兼子憂傳作嗛亨君子有終說苑終下有吉字徐鍇云謙猶嗛也漢萟文志引易之嗛嗛即謙謙也韋昭云嗛猶小小也為卦艮下坤上艮山之髙而在地下是貶抑其尊甘處物下推遜卑者使居已上也合二卦言之內艮為止則退已而不進外坤為順則讓人而不爭所以為謙也剛下乎柔交通之道故亨君子指三三為卦主故爻辭與彖同有終言其久也謙之道衆人不能久而君子能終之也夫少之事長賤之事貴不肖之事賢燭至起食至起射則三揖酒則百拜誰不知之誰不行之一臨利害巧為趨避語曰饑馬在廏漠然無聲投芻其旁爭心乃生繇是言之小人惡能謙哉程子有云君子達理故樂天而不競內克故退讓而不矜得其本矣謙有終則亨亦有終他卦皆有凶悔吝惟謙無之可見謙無不亨也艮終萬物坤安貞為德皆有終象六爻皆變則為天澤履艮上坤下為剝序卦傳曰有大者不可以盈故受之以謙子曰易先同人後大有承之以謙不亦可乎故德行寬容而守之以恭者榮土地廣大而守之以儉者安位尊祿重而守之以卑者貴人衆兵強而守之以畏者勝聰明睿智而守之以愚者哲博聞強記而守之以淺者不隘此六者謙德也易曰謙亨君子有終吉是以衣成必缺袵宫成必缺隅名成必加拙示不成者天道然也故周公戒魯公曰慎勿以國驕人也孔子觀於魯桓公之廟有欹器焉孔子問於宗廟者曰此為何器守廟者曰此蓋為宥坐之器孔子曰吾聞宥坐之器者虛則欹中則正滿則覆弟子挹水而注之中而正滿而覆虛而欹孔子喟然而嘆曰吁惡有滿而不覆者哉彖傳曰謙亨天道下濟而光眀地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也天道下濟二句釋謙卦𧰼諸儒泛論天地之道非以光明上行貼亨義亦非天道指九三艮耳而謂之天道者乾之屬也觀此則凡彖傳所云隂陽往來之說愚皆謂本于乾坤益信天之道降下以濟于隂故曰下濟艮有光眀之𧰼故艮之彖曰其道光眀謂艮陽止乎上隂不得而掩之故光眀也地道指上三爻坤本下今居艮上故曰上行天道消其氣運之已盛者而長其未盛者以消長進退之氣言地道傾壞其髙凸之處而聚歸于凹下之處以髙下凹凸之形言鬼神於盈滿者禍害之於謙損者福祐之以殃慶休咎之應言人情於盈滿者疾惡之於謙㢲者樂與之以從違向背之情言四者非有心于如是其道自然故皆曰道天之所益地之所流人之所好鬼神之所福悉萃於能謙者之身他卦之所贊未有若是其盛者此謙之所以為至德也歐陽永叔云此聖人極論天人之際也春秋雖書日食星變孔子未嘗道其所以然曰天地不可知為其可知者人而已天吾不知吾見其虧盈于物者矣地吾不知吾見其變流于物者矣人之貪滿者多禍守約者多福鬼神吾不知吾見其禍福著矣若人則可知者故直言其好惡參而㑹之無以異也以其不可知故常尊而逺之以其無以異則修吾人事而已未有人心悅而天道怒未有人理逆而天理順者尊者三居下卦之上也光艮體也卑者三居上卦之下也不可踰謂位雖居下而德則莫有過之者蓋以謙居尊而道光以謙居卑而德不可踰此專以九三一爻言一說謙之為道尊大而光顯不與物較何其尊也不為滿纍何其光也故雖卑屈而莫能加尚何可踰之有亦通君子之終也含蓄深長謙為君子之終則其光不可踰亦是君子之終矣王輔嗣云夫吉凶悔吝生乎動者也動之所起興於利者也故飲食必有訟訟必有衆起未有居衆人之所惡而為動者所害處不競之地而為爭者所奪是以六爻雖有失位無應乘剛而皆無凶咎悔吝者以謙為主也謙尊而光卑而不可踰信矣哉楊敬仲云夫謙亨一言足矣而聖人諄諄復復至于此者何其辭費也人生而私其已乳曰己乳少長而食曰已食有奪之則爭愛則喜有怒之則啼又其長也人譽之則喜有言其失則不樂大禹神聖特以不矜不伐稱則人之好矜伐者衆矣聖人深知夫人情難克其己私如此故詳其言指切其驗庶幾其或省也焦弱侯云凡一陽統五隂之卦彖傳皆指出一剛字復曰剛反師曰剛中而應豫曰剛應比曰剛中剝曰柔變剛唯謙不然謙不貴剛也𧰼傳曰地中有山謙君子以裒多益寡稱物平施朱氏升云西北之地凖之髙于東南之山是地中有山地髙而山卑劉景升云地中有山以髙下下故曰謙謙之為道降已升人山本地上今居地中亦降體之義故為謙𧰼也裒爾雅訓聚也又多也於𧰼義不合按鄭荀董蜀本俱作捊云取也字書作掊引易掊多益寡張揖云掊咸也許慎云掊把也宜從捊掊二訓為近夫山之出於地上者末耳其本沒于土何極即巍乎萬仞而其沒於土者何極人見山之髙耳而繇地觀之眇如也君子盛德之至雖有勞而功而自無上人之心責已唯恐其不厚待人惟恐其薄裒取已之多以增益人之寡若此者所以稱量物之不齊而平其施蓋損髙增卑以趣于平視物我若一體而已即如以善同人則賢不肖平矣以財分人則貧富平矣以位下人則貴賤平矣夫然始為有而不居故謂之謙非若世之人心實自多而謬為恭敬之謂謙也蘇子瞻云謙之為名生于過也物過然後知有謙使物不過則謙者乃其中爾過與中相形而謙之名生焉聖人即世之所名而名之而其實則反中而已矣繫辭下傳曰謙德之柄也柄者以此自持如言以謙為欛柄也又曰謙尊而光朱子云謙本以自卑却尊而且光若秦人薄君卑臣則雖尊而不光唯謙則尊而又光又曰謙以制禮讓者禮之實不讓不為禮故謙所以節制乎禮初六謙謙君子用涉大川吉變離為明夷六謙德也初卑位也以謙德而處卑位謙而又謙者也故曰謙謙乾乾夬夬皆九三重剛也坎坎六三居重險之間也蹇蹇六二險居險也皆有所取初六變剛故稱君子用涉與利涉不同利涉者其才其時利于涉耳用涉者用此以涉然後吉也借涉川以眀履危處難之道初六謙而又謙則其氣以不盈而完志以能斂而定以濟險難靡不濟矣初三皆言君子初吉于始者也三吉于終者也二三四互坎在前為川初變剛成離為舟坤順在上前無阻隔故有涉大川之象卦變明夷用晦而明亦謙謙之德也𧰼傳曰謙謙君子卑以自牧也牧者馴獸之名張敬夫謂如牧牛羊然使之馴服方可以言謙是也人之驕心客氣最難降伏須時時如執玉捧盈臨深履薄才能平心和氣而無往不謙若牧人之於獸馴焉擾焉久而與之相忘焉不加箠䇿而自無抵觸之患矣六二鳴謙貞吉變㢲為升互體坎變兑荀九家云隂陽相應故鳴蘇子瞻云雄鳴則雌應故易以陽唱隂和寄之於鳴謙之所以為謙者三也其謙以勞故聞其風被其澤者莫不相從于謙六二其鄰也上六其配也故皆和之而鳴于謙而六二又以隂處內卦之中雖微九三其有不謙乎故曰鳴謙又曰貞吉鳴以言其和於三貞以見其出於性也又來矣鮮云本卦與小過同有飛鳥遺音之𧰼故曰鳴豫卦亦有小過之𧰼故亦曰鳴亦通變成㢲㢲以隂下陽者故能和三以謙𧰼傳曰鳴謙貞吉中心得也言六二與三中心相得非勉強唱和也九三勞謙君子有終吉變坤為純坤互體坎變坤約𧰼震變坤周禮事功曰勞九三一陽為衆隂所歸上下倚賴勞而有功猶安處下體自視欿然故有勞謙之象為國樹勞是為䖍始勞而能謙是謂厚終非大禹之不矜不伐周公之孫碩膚惡足以當之互體坎為勞約𧰼震為動變為坤坤萬物所致役者皆勞𧰼謙以九三一陽爻為成卦之主文王彖辭惟主九三一爻而言不及其他故周公爻辭不復易但推原其勞而要其吉耳艮終萬物三居艮之終故以有終言九三之變剛而能柔故視彖辭又加吉字明其極善胡仲虎云乾之三以君子稱坤之三以有終言謙之三兼乾坤之占辭蓋所謂勞者即乾之終日乾乾者是也而謙則又坤之含章也𧰼傳曰勞謙君子萬民服也功名之所為不及道德者何哉無意於功名即無功名而立功名必自喜其功名故讓必不任任必不讓理勢然也勞而復謙彼何人哉不知其所為謙而謙者之謂道德故能使萬民服萬民服則誠服矣吳幼清云萬民以卦之五隂言隂為民萬者極言其數之多也以一卦則五數為至多以天下則萬數為至多繫辭上傳曰勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也存位正釋吉字解見上傳六四無不利句撝謙變震為小過互體坎變㢲約𧰼震變兑此爻王程之解得之輔嗣注云處三之上而用謙焉則是自上下下之義也承五而用謙順則是上行之道也盡乎奉上下下之道故無不利指撝皆謙不違則也伊川傳云四居上體切近君位六五之君又以謙柔自處九三又有大功德為上所任衆所宗而已居其上當恭畏以奉謙德之君卑㢲以讓勞謙之臣撝施布之𧰼如人手之撝也動息進退必施其謙蓋居多懼之地又在賢臣之上故也按撝通作麾詩麾之以肱書右秉白旄以麾亦通作麾變震互震為動故有撝𧰼惟撝謙而後能無不利此倒用文法卦變小過行過乎恭撝謙其所矣𧰼傳曰無不利撝謙不違則也爻之利有利于承上有利于乘下四近六五居三之右上承謙德之君非謙則傲傲者違承上之則下乘勛勞之臣非謙則忌忌者違乘下之則唯指撝上下無所不謙而後為不違則以四所處之地則然而六具柔順之德實能撝之此其所以無不利也六五不富以其鄰利用侵王􅛫本作寢郭京舉正作征伐無不利變坎為蹇約象震變離上卦三爻隂虛不富象六五上卦之中也四與上皆其鄰也而三以勞謙適居其下則上三爻亦皆化之而為謙故五居尊位而帶挾其左右之鄰相從而下將以委心于卦主耳泰六四不富以其鄰亦同斯義蓋下有不伐之臣斯上有善下之君若舜之於禹成王之于周公是也不富亦有謙虛象謙成卦之主專在九三舊解六五以柔居尊為衆所歸故為不富而能提挈其鄰若然則與九三全無干涉非成卦之㫖矣君臣同德謙虛相應若下有強梗不服者則聲罪致討直固在我而柔能制剛亦自能潜驅默奪之如舜之格苖文之服密是已侵伐且利况其他乎故又曰無不利謙之受益如此侵伐二義諸解不同周禮云賊賢害民則伐之負固不服則侵之左傳云凡師有鐘鼓曰伐無曰侵公羊傳云捔者曰侵精者曰伐坤為衆變剛三四五成離為戈兵以坤衆而用離之戈兵侵伐象坤變坎行險以順固師之所以吉也又自三至五為震三震初畫以勞謙之臣上事六五亦有長子帥師𧰼或問朱子謙不與人爭如何言侵伐朱子云老子言抗兵相加哀者勝矣孫子言始如處女敵人開戶後如脫免敵不及距大抵謙自是用兵之道𧰼傳曰利用侵伐征不服也侵伐非黷武以其不服不得已而征之正以釋征伐用謙之義舜征苖不得已也武征胸奴豈不得已乎又楊敬仲云有君如此天下所咸服而有不服焉天下之所共怒以咸服之人攻所共怒者其利也孰禦若已服徒以私怒貪地而征之則適足致禍上六鳴謙利用行師征邑國古本作征國陸德明云或作征邑國者非爻變艮為純艮三謙之主上與為應故亦為鳴謙之𧰼義與二同可用行師義與五同上六處順之極居謙之終下與九三同德相應謙無以加矣然當時邑國豈無有傲然以我為謙而不彼較也遂敢于不順者乎果爾則利用行師以征之總之不害其為謙矣謙之二三四五上師之初二三四五也故五曰侵伐上曰行師或疑其於謙不類不知以退遜為謙在下位則可治國平天下者不然苟非好大喜功之心即四征九伐無非謙也上於六位為最髙比于九五君位有上公𧰼坤為邑國曰邑國即邑之在國中者古諸侯各自為國其大夫各有采邑采邑不順者伐之如墮費墮郈之類是也上公所征止于邑國毋敢侵伐亦謙之𧰼鄒汝光云舞干苖格六五以之因壘崇降上六以之變艮艮止也止戈為武故利用行師止於征邑國亦艮義馮元成云下三爻體艮者也則皆言吉上三爻體坤者也則皆言利艮靜而坤順也順則多利靜則多吉也𧰼傳曰鳴謙志未得也可用行師征邑國也志未得者上居謙之極方自視欿然而猶以其謙為未足如益贊于禹滿損謙益之意若是而有不服者行師以征之理直氣壯何不利之有故傳許之曰可用行師征邑國也一說鳴謙句斷志未得也帶下讀志未得即邑國未順惟鳴謙如是而志猶未得故可用行師耳亦通坤下震上豫利建侯行師許慎云豫象之大者賈侍中說不害于物愚按豫為獸名性不害物必以寬和安舒為德者今莫得而詳也晉書地理志云河南曰豫州豫者舒也言稟中和之氣性理安舒也意頗相合然則安舒二字是豫本義既其後也分詁為三一曰備豫爾雅解豫為叙郭璞注事豫備者有叙中庸謂凡事豫則立是也故繫辭傳曰重門擊柝以待暴客蓋取諸豫一曰悅豫諸儒皆謂豫者樂也序卦傳言以喜隨人亦取喜樂之義故大象傳曰雷出地奮豫先王以作樂殷薦一曰佚豫蓋孟子一遊一豫之豫書所謂無時豫怠無敢逸豫是也故雜卦傳曰謙輕而豫怠此三說者相為首尾人能悅豫必始于備豫悅豫之極則必至于佚豫皆具安舒之意比卦震上坤下震動坤順順理而動上下皆應當專以悅豫此義觀大𧰼有作樂之文可見矣鄭康成云震為雷諸侯之𧰼坤為衆師役之𧰼故利建侯行師國語秦伯召公子重耳於楚楚子厚幣以送公子于秦公子親筮之曰尚有晉國得貞屯悔豫皆八也司空季子曰吉是在周易皆利建侯我命筮曰尚有晉國告我曰利建侯得國之務也吉孰大焉震車也坎水也坤土也屯厚也豫樂也車班內外順以訓之泉貨以資之土厚而樂其實不有晉國何以當之坤母也震長男也母老子彊故曰豫其繇曰利建侯行師居樂出威之謂也韋昭注云易坤為大車震為動為雷今云車者車亦動聲𧰼雷其為小車乎班遍也遍外內者謂屯之外有震豫之外亦有震坤順也豫內為坤屯二至四為坤資財也屯三至五豫二至四皆有艮𧰼豫三至五有坎𧰼艮山坎水在山下為泉源流而不竭也居樂母在內也出威震在外也居樂故利建侯出威故利行師愚按鄭韋二說以坤震分屬建侯行師其義各異然考屯卦有震無坤則言建侯而不言行師謙卦有坤無震則言行師而不言建侯當從鄭說為正而吳幼清又謂坤為震侯之國震為坤衆之帥則統全卦而言於鄭韋二說俱不相礙矣曰侯曰帥惟九四一爻當之六爻皆變為風天小畜坤上震下為復序卦傳曰有大而能謙必豫故受之以豫承二卦之義而為次也漢文帝謙沖退讓不敢自恃廣大妄意興功故百姓䝉其休息富庶安樂此謙能致豫也管輅規何晏曰昔元愷之弼重華宣慈惠和周公之翼成王坐而待旦故能流光六合萬國咸寧此履道之休應非卜筮之所明也山在地中曰謙雷在天上曰壯謙則裒多益寡壯則非禮弗履未有損已而不光大行非不傷敗鄧揚曰老生之常談也輅曰夫老生者見不生常談者見不談彖傳曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉豫和樂也人心和樂以應其上也剛九四也剛應志行以爻言豫之才也順以動豫以卦言豫之德也剛九四也剛應者一陽而上下衆隂從之言剛得其應也按初雖與四正應而以鳴豫為凶故剛應不指初志行者陽之志得行也內卦坤順外卦震動順理以動所以成豫豫順以動䝉上文也雖天地之大且如之者言天地亦順以動也非求契于天地之謂亦非天地錫福之謂而况建侯所以為民興利行師所以為民除害其有不利者乎建侯行師雖太事以天地觀之則猶其小者自豫順以動以下皆正解利字大凡建萬國聚大衆非順理而動使人心皆和樂而從不可也又按豫坤下震上司空季子以為母老子彊今觀上下五隂惟九四一陽為卦之主逼近六五君不威而臣太重侯伯之卦也動而順則為桓文之翼戴動而逆則為曹馬之姦雄故夫子惓惓于順動致意焉天地以順動者順其自然之氣聖人以順動者順其當然之理日月不過而四時不忒順動之𧰼在天地刑罰清而民服順動之象在聖人日月四時本相承日行北陸而長則為春夏南陸而短則為秋冬不過以晷刻言不忒以氣候言九家易云天地有生殺萬物有始終王者盛衰亦有迭更猶武王承亂而應天地建侯行師奉辭除害民得逸豫君得安樂也朱子云刑罰不清民不服只為舉動不順了致得民不服便是徒配了他亦不服夫日月不過而四時不忒則萬物于是太和矣刑罰清而民服則萬民于是太和矣若使嵗序乖而羣生不遂刑罰濫而民風將哀其能豫乎故順之道大也易有時有用有義時其所遭也用其所致也義其所寓也六十四卦時而已矣事若淺而有深意故曰時義大矣哉欲人思之也非美事而有時或用之故曰時用大矣哉欲人别之也大事大變則曰時大矣哉欲人謹之也孔仲達云此嘆卦也凡言不盡意者不可煩文具說且嘆之以示情使後生思其餘藴得意而忘言也吳幼清云專言時者重在時字時義重在義字時用重在用字或乃以時義為時與義時用為時與用失之矣𧰼傳曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考雷陽氣也方冬潜萌地中及出地奮發而成聲陽氣暢嫗萬物莫不悅豫故曰雷出地奮豫不曰雷出地上而曰雷出地奮只一奮字便含樂𧰼作樂指始造樂者言豫喜意也作樂所以飾喜也天下之聲莫髙于雷霆樂則何以以之以其和而奮也不以其聲雷以鼓萬物之化而宣天地之和樂以贊神人之化而宣人心之和一而已矣崇德即崇祖考之德有是德而無是樂祖考雖聖其何辭以配乎思文之詩所以配后稷於天也我將之詩所以配文王于帝也殷作樂之盛稱用此殷盛之樂薦祭上帝象雷出地而向天也冬至祀天於南郊以祖配季秋祀上帝於明堂以考配公羊傳云王者何為必以其主配自內出者無匹不行自外至者無主不止按祭于南郊曰天祭于明堂曰帝郊者古禮明堂周制也為壇而祭謂之天祭于屋下謂之帝朱子云天即帝也天以形體言帝以主宰言以配即配以倒字成文耳朝覲聘享祭祀莫不用樂然惟郊祀上帝乃大合古今衆樂而奏之大司樂圜丘之奏樂極九變是也必如是始足以擬雷出地奮之𧰼象義云震善鳴為樂又來矣鮮云中爻坎為樂律樂之象五隂而崇一陽德崇德之象帝出乎震上帝之象中爻艮為門闕坎為隱伏宗廟祖宗之𧰼朱氏升云祖考人也而配上帝之天皆地中之雷奮出地上之𧰼吳幼清云樂指九四一陽而言五上皆天也上者郊外所祀之天五者廟中所祀之天三祖也二考也初者武王之德也初與四為正應初六之德章于九四之樂聲則卑者升而崇二三與五上為敵應二三之祖考以薦九四之樂而升配五上之天也皆通陸氏樹聲云上天下澤履大易以言禮也兑以一隂處乾之下而說以應有順之義禮主順故曰禮繇隂來雷出地奮豫大易以言樂也震以一陽處坤之上而動以出有散之義樂主散故曰樂繇陽作鄧氏元錫云雷天氣聖人作樂以應天澤地形聖人制禮以配地出奮者性故樂繇中出以彌性上下者形故禮自外作以制形樂繇陽來雷地天地之交也故調和諧合而樂興禮自隂作天澤天地之判也故髙下散殊而禮制繫辭下傳曰重門擊柝以待暴客蓋取諸豫解見本傳此豫備之豫也初六鳴豫凶變震為重震所以為豫者四也而初和之故曰鳴與鳴謙同朱子云隂柔小人上有強援得時主事故不勝其豫而以自鳴凶之道也應震變亦震震為決躁為善鳴故其象如此𧰼傳曰初六鳴豫志窮凶也窮謂滿極方豫之初自恃有應在上而遽志意窮極不勝其豫至於鳴也必驕肆而致凶矣鳴謙則吉鳴豫則凶鳴謙曰心得鳴豫曰志窮心志之間其幾嚴夫六二介古文作砎鄭𤣥云謂磨砎也馬融本作扴云觸小石聲于石不終日貞吉變坎為解互體艮變離介說文云分疆也凡物兩間為介介所以分也介于石謂如石之開截然分斷明決之至也六二以隂居隂而處二隂之間栖乎至靜與四無應以晦觀明以靜觀動下不為初之鳴豫上不為三之旴豫中心無為以守至正自然明無不照當其動之微而吉凶禍福判若黑白矣故曰介于石即大傳所謂知幾也變離故有知幾之哲見幾而作可進始進必不可進則退可行始行必不可行則止劃然立決寧少需乎故曰不終日正莫固于二矣夫曰介于石則有兢業自持之操曰不終日則無耽戀自溺之心蓋不以豫處豫者也是以吉坤土也變而為坎土中有剛故稱石又互艮亦石象二變中爻離日居下卦之上不終日之𧰼也又吳幼清云三為人位下履乎坎離日在三日將至地之時也故三為終日不終日不至于三也九四豫之主人皆趨附獨六二不與之比應退而以中正自守不待至三而能早疏逺之蓋至三則已與之比矣此與乾九三終日象同亦通𧰼傳曰不終日貞吉以中正也以有中正之德故其守堅而能辨之早去之速也豫諸爻以無所係應者為吉豫初應四而三五比四皆有係者也是以為凶為悔為疾獨六二隂靜而中正與四無係特立於衆隂之中而無遲遲耽戀之意吉可知矣蓋衆人之慮淺故成而有渝其悟也在事後君子之識微故不遑逸豫其覺也在幾先夫惟有介于石之明而後有不終日之決象傳雖以不終日為中正而大傳必盛贊君子之見幾者以此繫辭下傳曰子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望解見本傳上謂上卦二與四無應上交不諂也下謂下卦初應四三比四而二不與同下交不瀆也是非得失存乎介而剖斷之如石之中分可謂知微知彰矣六隂德二隂位以隂居隂而有不終日之勇可謂知柔知剛矣萬夫亦取坤衆𧰼六三盱子夏傳作紆京房本作汙姚信本作旰云日始出引詩旰日始旦豫悔遲有悔變艮為小過互體艮變㢲約𧰼坎變兊盱上視也變剛互㢲為多白眼上視者視四也隂柔不中正而近于四見四為羣隂所歸心竊羡之而以趨時附勢為豫然非正應又四震體震起也無下係之𧰼故不為四所取求豫而辱是以有悔也幸其互艮為止使勇于自艾而銷其盱志則善矣乃隂體遲疑牽於欲而不能早決則悔之來將何時而已乎悔而變剛則正而得應𧰼傳曰盱豫有悔位不當也盱豫與介石相反遲與不終日相反中正與不中正故也三四上下之交故兩爻有遲疑之戒九四由馬融本作猶云猶豫疑也豫大有得勿疑朋盍簮古文作貸京房本作撍蜀才云速也馬融本作臧荀爽本作宗虞翻本作戠云叢合也陸希聲本作捷變坤為純坤互體艮變坤約𧰼坎變坤豫之所以為豫者繇九四也獨體陽爻為動之主衆隂偕從莫不繇之以得其豫故曰由豫由如路之可繇震為大塗互艮為徑路皆繇𧰼也大剛也即指四也四一剛而得五柔故曰大有得互坎為狐疑故告之以勿疑中爻艮止止而不疑𧰼也又震動之初行無不決亦勿疑象以陽剛之臣居柔主之側本危疑易生之地又下無同德之助能無疑乎其惟勿疑家視王室身視羣工慶與衆同憂與衆浣蓋將使天下由之以豫也精白一心天下共見朋其來乎如簮斯盍矣朋謂下三隂盍合也簮聚也簮之名簮取聚髮也或謂古冠服無簮按鹽鐵論神禹治水遺簮不顧非簮而何即辨服之笄是也相從之朋合聚如衆髮貫于一簮三隂象髮一陽橫于三隂之首象簮爻本豫主而乘應皆邪二獨貞貞者難致邪者易眤眤者聚而難去致者望而不至夫惟開誠布公者不以樂已而附不以守貞而違權在已應在人而無己私之與焉則吾朋其有不同者乎沙隨程氏云重耳筮得晉國遇豫豫九四為衆隂所宗無有分其隂者震為諸侯坤為國土重耳得國之𧰼利行師一戰而霸之𧰼九四總衆隂以安上如簮之總髮以莊首重耳率諸侯以尊周室之象焦弱侯云初應四三五比四為凶為悔為疾獨六二不繫于四而以中正自守得為貞吉則九四之不得為賢臣可知已看來四外陽內隂才足有為而誠不至者也當豫之時君弱而大權歸已衆皆附之足以成功故曰大有得唯其不誠故戒以勿疑如齊桓一匡天下使其誠心尊周周室豈復弱乎故五之貞疾四實為之也夫子于四取其志大行于五傷其乘剛功罪定矣變柔卦為坤動而能順行萬物繇以致養亦由豫𧰼𧰼傳曰由豫大有得志大行也以一剛得五柔而無他爻以分其權故曰志大行即彖傳所謂剛應而志行是也六五貞疾恆不死變兑為萃約象坎變㢲古者有疾謂之不豫疾者豫之反也六五以柔居尊當豫之時易于沈溺况天下事權皆已入九四之手衆心不附主勢孤立亦危矣哉必戰兢畏惕以正自守常如疾病在身乃得恆而不死所謂生于憂患者也孟子謂人之有德慧術智者恆存乎疢疾其比爻之謂乎程子云在四不言失正而於五乃見其強逼者五柔弱居尊不能自立威權去已之義若五不失君道而四主于豫乃是任得其人安享其功如太甲成王也愚謂六五之不死若劉後主之初年似之然後主雖知倚任忠武侯而所少者貞疾之一念亦終于死而已非必忠武侯之自取之也又况人臣如忠武侯者有幾苟所乘者王莽之剛曹操司馬懿之剛則欲其恆不死亦不可得然則九四一爻阿衡忠武二人蓋倣佛近之互坎為心病受震東方生氣故不死爻既言貞則不當變變則為兑悅於逸豫者也雖惡死亡真能免乎𧰼傳曰六五貞疾乘剛也恆不死中未亡也乘剛而有衰弱之疾自度無以御其下是故其操心也危其慮患也深貞疾之謂也處上卦之中則位與號猶未嘗亡故恆至于不死君子是以知貞之可恃也二五皆貞二去四逺故吉五與四近故疾然曰恆不死亦非其甚劣者聖人之意祗不欲人之狃于豫而已矣上六冥豫成有渝無咎變離為晉上居天上杳冥之間以隂柔居豫極為昏冥于豫之𧰼成猶定也如春秋求成之成渝者變也如渝盟之渝記云一成而不可變楚辭云初既與豫成言兮後悔遁而有他成渝對舉之謂也上六雖昏冥之𧰼已成然以其動體若能有渝變則可以無咎所謂震無咎者善補過也凡易中言渝者皆當以變卦觀之變剛成離卦為晉明出地上向之冥冥者今反為昭昭矣又變則有應𧰼傳曰冥豫在上何可長也程子云昏冥于豫至于終極災咎行及矣其可長然乎當速渝也丘行可云豫以四之一陽為主初以應四而豫故曰鳴豫凶三以比四而豫故曰盱豫悔五以乘四而不知所豫故有貞疾恆不死之證上去四雖逺而與震同體則亦冥然為豫而已皆有涉乎四者也唯六二柔順中正與四無係獨能介于石不終日焉蓋見幾者也故爻以貞吉歸之豫之不可溺也蓋如此蘇君禹云當豫之時宰相以剛而任事上下以順而承休太平之風充滿宇內其樂極矣然時處其樂則柔曼稚化之欲每易以波蕩其心而快志娛意之觀亦恆情之所甚便者故無論庸君具臣沈酣於佚樂而莫之省憂即元元之衆未有不以樂極而悲滿極而損也聖人有憂之是故於初戒其窮也於三悔其盱也於五防其疾也於上危其不可長也惟二之介石能熟察乎憂樂治亂之機則為之深致意焉聖人之憂治世何切也蓋嘗讀史至於貫朽而不可挍粟紅而不可食未嘗不想其豫樂之盛而土木甲兵征輸望幸紛然交作至於江淮煩費海內騷動然後知聖人之慮深哉雖然猶未也聖人於三之悔則欲其速圖於始於上之渝則幸其改正於終其欲人之寡過蓋惓惓也是故輪臺之詔君子猶有取焉耳古周易訂詁卷二
