body:
  text: 解經處答客問聖皇御極五祀余蒞吳關畏此簡書夜寐夙興罔敢怠遑一二從事及庶人在官者咸滌濯屏營慎乃憲余臨流覃思維古之人觀河拜雒水哉水哉惄然懼學之不殖乃署燕思堂左廂為解經處退食居之先是三年余嘗學易獨寐寤言維無象之象厥祖繄畫厥鵠繄翼乃攝爻歸彖攝彖歸畫余未能忘言庸申諸鉛槧以俟來者客詔小子爾維算舟緡思不出位入而宴息背可艮乎異哉官有渝拜曰俞師汝昌言昔吾有先正謂終日言不離乎是吾亦行不離也可得聞與曰可夫易開物成務冒天下之道者也理財聚人非瑣也乾為金與玊坤為布為吝嗇兌剛出金鹵出鹽離以佃以漁巽為近利市三倍震為大塗艮為徑路以利攸往坎為大川利涉財求是阜民用和同先王惟至日閉關商旅不行過此可知己若夫禁民為非存乎正辭余乃鉤考簿書凡貨之良楛若舟大小必謹登之毋或遺佚謂爾商人我無爾詐幅紙中分俾執其契取諸夬也視事無恆皿蟲是藂乃鑱時圭以測日景辰出升堂未復踵之毋或失時俾民有信蓋取乾之履其繇曰君子終日乾乾夕惕若布指知寸舒肘知尺昭代有制涉吳之舟計尺而稅起自五尺終丈有四播之話言工維信度蓋取小畜之巽其繇曰復自道何其咎吉造舟為梁旁甃石矼其廣容刀五尺而下如蟻往來津人不訶罔記何年樹之柴柵亟循其舊毋滋怨黷更有漁利寸寸而量知其非義斯速已矣蓋取節之臨其繇曰甘節吉行有尚是嵗不雨七八月之間吳穀以翔中丞莊公憂形於色謂子大夫司關稍輕厥征以來估客余謝不敏損什之一為君市義蓋取屯之復其繇曰屯其膏小貞吉大貞凶陽羡之區爰有百瀆百瀆渙衍皆入太湖爰有烏溪為之綰轂官樹厲禁毋許闌出以窒湖宄以裕關賦城社之魁毁禁無忌前使苦之因勢約束令月輸緡如履康莊余曰不然是妨正課下車罷之移告當塗蓋取井之蹇其繇曰井谷射鮒甕敝漏海虞之區港有福山輕舠假道毋庸度關昔董以吏今董以官資其埃涓用佐額逋一切瑣費咸取給焉關籍之外不另獻數余心疑之不獻似簡獻之則清清簡孰多從其清者蓋取姤之遁其繇曰包有魚不利賔氓之蚩蚩惟金是營如蛾赴燈雖焦不顧為商鵂鶹為關蟊賊大渲之竿若強若宣福山之竿若錢若高楓橋之竿若崔若殷余悉按之小懲大誡旅人咸喜蓋取蒙之損其繇曰發蒙利用刑人用説桎梏以往吝吳地卑窪萬流輻輳枝津閏渠不可枚舉逋逃既多如巵無當或遣急足四出以譏𨽻也無狀網雉及鴻余易以官嵗僅再遣斆之法意略示隄楗匪覬厥資蓋取無妄之同人其繇曰無妄之災或繫之牛行人之得邑人之災懸賞以購能釐一蠧賞不踰時罔則有罪雖未出戶離坎無壅蓋取鼎之旅其繇曰鼎有實我仇有疾不我能即堂左有庫擊柝宿護不時出閲抶其占役蓋取夬之革其繇曰惕號莫夜有戎勿恤維兹擊柝𨽻于司閽或倣軍制五人為伍五伍各長晨趨廰事櫜鞬魚魚宛若軍容實同蝨官余恐不類謝而去之其他稗役毋滋處此蓋取解之困其繇曰君子維有解吉有孚于小人亦越兩季小舟呶呶誦言不均小綦網密胡巨網疏余乃諦觀踰丈四尺或至八尺厥課正等是誠不均言于畢公差等其課計埤嵗入可六千緡豈繄損下永杜中飽前修之志持重未發公報楷曰爾其試哉蓋取損之中孚其繇曰或益之十朋之龜弗克違元吉王人戾止有司致餼兹署之餼供自蘇郵嵗二百緡復有若干繕治舟船徴之旁邑非曰養優實以養亷義舉蠲之僅有戚君間嵗不徴欲去餼羊此羊一去飲水而已余憫嵗歉徴之不忍去之不安復恐胥史牟為姦利關白其事繄我願蠲毋槩後人蓋取頥之益其繇曰拂經居貞吉不可涉大川前賢代興踵事增華間訪往牒頗軼不具或云史胥惡其害己亦維征夫傳舍之故徴文考獻永垂厥緒蓋取革之咸其繇曰鞏用黃牛之革聖主宵衣計臣廢食按部就班爬梳如櫛余遭魃虐日課不前法當居殿室人愁苦余乃怡神暇則解易錙銖之緡悉入公家此心不怍幸而及格以聽天命蓋取需之泰其繇曰需于酒食貞吉夫君子所居而安者易之序也所樂而玩者爻之辭也占在大有之大壯其繇曰自天佑之吉無不利客囅然曰有是哉盍識其言于石俾後之君子亹亹焉崇禎癸酉春正月吉虎疁使者閩漳何楷玄子氏識於署中之解經處
