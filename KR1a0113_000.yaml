body:
  text: 古周易訂詁易類提要臣等謹案古周易訂詁十六卷明何楷撰楷字元子漳州人天啓乙丑進士官至吏科給事中唐王聿鍵稱號於閩以為禮部尚書旋為鄭芝龍所軋憤恚而卒是書成於崇禎癸酉蓋其管榷吳中時所作卷末附以答客問一篇借詁經以言時事也觀其自序論分經合傳之非古然又引魏淳于俊對髙貴鄉公語則又未始不以分附為便故其前分上下經為六卷而彖象繫辭諸傳之文仍隨卦分列猶祖費直之意而七卷以後則仍列十翼原文以還田何之舊蓋分經分傳以存古本而經下所列十翼之文則引以互證故皆低一格書之以别於後之正文其仍以古周易標目蓋以是也惟於上下經內又别立初中終諸名則自我作古耳楷之學雖博而不精然取材宏富漢晉以來之舊說雜采並陳不株守一家言又詞必有據亦不為懸空臆斷穿鑿附㑹之談每可以見先儒之餘緒明人經解空疏者多棄短取長楷書猶足備采擇者正不可以駁雜廢矣乾隆四十五年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀古周易訂詁序古易分上下二篇所謂二篇之策也孔子作傳釋經亦隨經而分謂之十翼上彖傳一下彖傳二上象傳三下象傳四上繫辭傳五下繫辭傳六文言傳七說卦傳八序卦傳九雜卦傳十自魯商瞿子木受易孔子以授魯橋庇子庸子庸授江東馯臂子弓子弓授燕周魏子家子家授闕句獨以彖象傳及繫辭等十篇解說上下經凡以彖象文言雜八卦中者自費氏始田何之學施讐孟喜梁丘賀之徒最盛後別有焦延夀易託之孟氏傳京房其說長於災變不顧聖人之經費氏初微但傳民間至後漢時陳元鄭衆之徒皆學費氏費氏興而田何遂息古十二篇之易遂亡其本世所傳鄭𤣥舊本以彖傳連經文然猶若今乾卦次序至王弼乃自坤卦而始每卦以彖傳移綴彖辭之後而以彖曰兩字冠之又以為象本釋經宜相附近其義易了故分爻之象辭各附當爻之下猶如杜預注左傳分經之年與傳相附其意欲便學者誦習如許俊對髙貴鄉公之說也按古者經傳各為一書如春秋三傳不與經連故石經公羊傳皆無經文藝文志所載毛詩故訓傳亦與經別及馬融為周禮注乃云欲省學者兩讀故具載本文而就經為注鄭𤣥與馬融同時𤣥以易傳合經蓋倣融例而弼又援𤣥例也魏晋而下去古日逺學者不見古文唐太宗詔名儒定九經正義孔穎達奉詔與諸儒參議於易獨取王弼不本正義者以為異說於是後學惟弼是從莫敢移動吕汲公王原叔朝以道李巽巖吕伯恭朱元晦皆以分經合傳為非古吳仁傑稅與權編周易古經亦皆極論王弼之失愚故别異經傳以還田何之舊竊謂夫子之注易備矣學者因而求之則思過半仍取彖象二傳附於經文之下以為之注易以彖傳象傳等字其文言顓釋乾坤及上下繫說序雜等傳凡有關於彖象者亦各隨卦而附列焉以祖費直之意輒不自量網羅舊聞裁以管見為之小注要求靡盩於夫子而已爰題其名曰古周易訂詁云崇禎六年嵗在癸酉閩漳何楷序
