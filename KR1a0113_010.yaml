front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1a0113_WYG_010-1a, image: WYG0036/WYG0036-0295a.png}
body:
  text: 古周易訂詁卷十明何楷撰象傳下此第四翼也山上有澤咸君子以虛受人咸其拇志在外也雖㓙居吉順不害也咸其股亦不處也志在隨人所執下也貞吉悔亡未感害也憧憧徃來未光大也咸其脢志末也咸其輔頰舌滕九家作乘虞翻本作媵鄭𤣥云送也口說也雷風恒君子以立不易方浚恒之㐫始求深也九二悔亡能久中也不恒其德无所容也久非其位安得禽也婦人貞吉從一而終也夫子制義從婦㐫也振恒在上大无功也天下有山遯君子以逺于願切小人不惡而嚴遯尾之厲不徃何災也執用黄牛固志也繫遯之厲有疾憊也畜臣妾吉不可大事也君子好如字遯小人否備鄙反也嘉遯貞吉以正志也肥遯无不利无所疑也升三同雷在天上大壯君子以非禮弗履壯于趾其孚窮也九二貞吉以中也小人用壯君子罔也藩決不羸尚徃也喪息浪反羊郭京舉正作牛于易位不當也六居五曰位不當惟此爻不能退不能遂不詳鄭𤣥王肅本作祥云善也也艱則吉咎不長也明出地上晉說文作㬜君子以自昭明徳晉如摧如獨行正也裕无咎未受命也受兹介福以中正也衆允之志上行也鼫䑕貞厲位不當也位不當以九四言晉夬萃豐小過凡五失得勿恤徃有慶也維用伐邑道未光也明入地中明夷彖傳同君子以涖衆用晦而明君子于行義不食也六二之吉順以則也南狩之志乃大得也入于左腹獲心意也箕子之貞明不可息也初登于天照四國也後入于地失則也風自火出家人君子以言有物而行下孟反有恒閑有家志未變也中孚初同六二之吉順以巽也家人嗃嗃未失也婦子嘻嘻失家節也富家大吉順在位也王假更白反有家交相愛也威如之吉反身之謂也上火下澤睽君子以同而異見惡人以辟音避咎也遇主于巷未失道也見輿曳位不當也无初有終遇剛也交孚无咎志行也厥宗噬膚徃有慶也遇雨之吉羣疑亡也山上有水蹇君子以反舉正據王弼本作正身修德徃蹇來譽宜待張楫本作時鄭𤣥本待下有時字也王臣蹇蹇終无尤也徃蹇來反舉正作正内喜之也徃蹇來連當位實也大蹇朋來以中去聲節也徃蹇來碩志在内也利見大人以從貴也鼎初同雷雨作解君子以赦過宥京房本作尤罪剛柔之際義无咎也九二貞吉得中道也負且乘亦可醜也自我致戎古本一作寇又誰咎也解而拇未當位也君子有解小人退也公用射食亦反隼以解悖也山下有澤損君子以懲古本作徵陸徳明云止也鄭𤣥劉瓛云清也蜀才本作撜忿窒鄭劉本俱作懫云止也孟喜本作恎陸績本作瘠欲孟作浴已李鼎祚本作祀事遄往尚合志也九二利貞中以為志也一人行三則疑也損其疾亦可喜也六五元吉自上祐古本亦作佑也弗損益之大得志也益五升五同風雷益君子以見善則遷有過則改元吉无咎下不厚事也或益之自外來也本卦上九同益用㐫事固有之也告公從以益志也有孚惠心勿問之矣惠我德大得志也莫益之偏孟喜本作徧辭也或擊之自外來也澤上于天夬君子以施禄及下居德則王弼注作明忌不勝而徃咎也有戎勿恤得中道也君子夬夬終无咎也其行次七私反且七餘反位不當也聞言不信聰不明也中行无咎中未光也无號戶羔反之㐫終不可長也天下有風姤后以施命誥鄭𤣥本作詰四方繫于金柅柔道牽也包有魚義不及賔也其行次七私反且七餘反行未牽也无魚之㓙逺民也九五含章中正也井五同有隕自天志不舍音捨命也姤其角上窮吝也澤上於地萃君子以除古本一作錯又作治荀爽本作慮戎器戒不虞乃亂乃萃其志亂也引吉无咎中未變也徃无咎上巽也大吉无咎位不當也萃有位志陸德明本无志字未光也齎咨李鼎祚本作資涕洟未安上也地中生木升君子以順王肅本作慎徳姚信本作得積小以古一本以下有成字高大允升大吉上合志也九二之孚有喜也升虛邑无所疑也王用亨許兩反于岐山順事也貞吉升階大得志也㝠升在上消不富也澤无水困君子以致命遂志入于幽谷幽舉正无幽字不明也困于酒食中有慶也據于蒺藜乘剛也入于其宮不見其妻不祥也來徐徐志在下也雖不當位有與也劓刖志未得也乃徐有說音恱以中直也利用祭祀受福也困于葛藟未當也動悔有悔吉行也木上有水井君子以勞力報反民勸相息亮反井泥不食下也舊井无禽時舍音捨也井谷射鮒无與陸徳明本有之字也古本一作則莫之與也井渫不食行惻也求王明受福也井甃无咎修井也寒泉之食中正也元吉在上大成也澤中有火革君子以治歴虞翻李鼎祚本作厯明時鞏用黄牛不可以有為也已日革之行有嘉也革言三就又何之矣改命之吉信志也大人虎變其文炳也君子豹變其文蔚説文作斐也小人革面順以從君也木上有火鼎君子以正位凝翟𤣥本作擬命鼎顛趾未悖也利出否悲已反以從貴也鼎有實慎所之也我仇有疾終无尤也鼎耳革失其義也覆公餗信如何也鼎黄耳中以為實也玉鉉在上剛柔節也洊雷震君子以恐懼修省震來虩虩恐致福也笑言啞啞後有則也震來厲乘剛也震蘇蘇位不當也震遂泥未光也震徃來厲危行也其事在中大无喪息浪反叶如字也震索索中未得也雖㐫无咎畏鄰戒也兼山艮君子以思不出其位艮其趾未失正也不李鼎祚本不字上有其心不快四字拯其隨未退虞翻李鼎祚本作為聽也艮其限危薰虞翻作閽心也艮其身止諸躬也艮其輔以中正朱子云正字羨文姚小彭云當作以正中於韻為協也敦艮之吉以厚終也山上有水漸君子以居賢徳善王肅郭京本善下有風字俗小子之厲義无咎也飲食衎衎不素飽也夫征不復離羣醜也婦孕不育失其道也利用禦寇順相保也或得其桷順以巽也終莫之勝平聲吉得所願也其羽可用為儀吉不可亂也澤上有雷歸妹君子以永終知敝陸德明本作弊歸妹以娣以恒也跛能履吉相承也利幽人之貞未變常也歸妹以須未當也愆期之志有待古本一作時而行也帝乙歸妹不如其娣之袂良也郭京本无也字其位在中以貴行也上六无實承虛筐也雷電皆至豐君子以折獄致刑雖旬无咎過旬災也有孚𤼵若信以𤼵志也豐其沛不可大事也折其右肱終不可用也豐其蔀位不當也日中見斗幽不明也遇其夷主吉郭京本吉下有志字行也六五之吉有慶也豐其屋天際翔鄭𤣥王肅孟喜李鼎祚本俱作祥孟云天䧏下惡祥也也闚其戸闃其无人自藏王肅鄭𤣥諸家俱作戕也山上有火旅君子以明慎用刑而不留獄旅瑣瑣志窮災也得童虞翻李鼎祚本作僮僕貞終无尤也旅焚其次亦以傷矣以旅與下其義喪息浪反叶如字也旅于處未得位也得其資斧心未快也終以譽命上逮也以旅在上其義古一本其義作宜其焚也喪息浪反牛于易陸徳明本于易作之㐫終莫之聞也隨風巽君子以申命行事進退志疑也利武人之貞志治也紛若之吉得中也頻巽之吝志窮也田獲三品有功也九五之吉位正中也巽在牀下上窮也喪息浪反其資斧正乎㐫也麗鄭𤣥本作離云猶得也澤兌君子以朋友講習和兌之吉行未疑也孚兌之吉信志也來兌之㐫位不當也九四之喜有慶也孚于剝位正當也上六引兌未光也風行水上渙先王以享于帝立廟初六之吉順也渙奔其机李鼎祚本作杌得願也渙其躬志在外也渙其羣元吉光大也王居无咎正位也渙其血逺袁萬反害也澤上古本或作中有水節君子以制數度議徳行下孟反不出戸庭知通塞也不出門庭㐫失時極也不節之嗟又誰咎也安節之亨承上道也甘節之吉居位中也苦節貞㐫其道窮也澤上有風中孚君子以議獄緩死初九虞吉志未變也其子和胡臥反之中心願也或鼓或罷位不當也馬匹亡絶類上也有孚攣如位正當也翰音登于天何可長也山上有雷小過君子以行下孟反過乎恭喪過乎哀用過乎儉飛鳥以㐫不可如何也不及其君臣不可過也從或戕之㐫如何也弗過遇之位不當也徃厲不戒終不可長也密雲不雨已上鄭𤣥本作尚郭京據王本作止然不叶韻也弗遇過之已亢也水在火上既濟君子以思患而豫防之曳其輪義无咎也七日得以中道也三年克之憊陸績本作備云當為憊也終日戒有所疑也東鄰殺牛不如西鄰之時也實受其福吉大來也濡其首厲何可久也火在水上未濟君子以慎辯物居方濡其尾亦不知極也九二貞吉中以行正也未濟征㐫位不當也貞吉悔亡志行也君子之光其暉吉也飲酒濡首亦不知節也古周易訂詁卷十
