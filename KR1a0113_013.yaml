body:
  text: 古周易訂詁卷十三明何楷撰文言傳此夫子第七翼也梁武帝云文言是文王所制今按文言當即是乾坤二彖乃文王之言而孔子特為之作傳若以文言傳作文言稱則非也文言傳故自為一編王輔嗣移附乾坤後稱文言以别之而去傳字後人襲訛而不之考亦猶繫辭傳只稱繫辭也雙湖胡氏云朱子謂孔子十翼專用義理發揮經言竊謂彖象繫辭説卦雜卦專言象數乃用易之括例唯乾坤文言純以義理發之其次則序卦只用卦名發其次序之義而不及象數也元者善之長張文反下長人同朱子云春秋傳記穆薑所誦之語謂元者體之長覺得體字較好是一體之長也吳幼清云彼釋人首之元此則假借元字以名天德又子服惠伯解黃裳元吉亦曰元者善之長也也亨者嘉之會也利者義之和也貞者事之幹也君子春秋傳無君子字體仁京房荀爽董遇本作體信足以長人嘉會春秋傳作嘉德足以合禮利物孟喜京荀陸績本作利之足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞初九曰潛龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遁世無悶不見是而無悶樂音洛則行之憂則違之確乎其不可拔潛龍也九二曰見賢遍反下見龍皆同龍在田利見如字下利見皆同大人何謂也子曰龍德而正中者也庸言之信庸行之謹間邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也九三曰君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾既依反也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離力智反羣也君子進德修業欲及時也故無咎九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作馬融作起而萬物覩本乎天者親上本乎地者親下則各從其類也上九曰亢龍有悔何謂也子曰貴而無位高而無民賢人在下位而無輔是以動而有悔也繫辭傳重出自元者至此彖象之義備矣潛龍勿用下也見龍在田時舍上聲從井卦下也時舍也例讀也終日乾乾行事也或躍在淵自試也飛龍在天上治依本義作平聲讀叶災韻下天下治也同也亢龍有悔窮之災也乾元用九天下治也何妥云此第二章以人事明之潛龍勿用陽氣潛藏見龍在田天下文明終日乾乾與時偕行或躍在淵乾道乃革飛龍在天乃位乎天德亢龍有悔與時偕極乾元用九乃見天則唐孔氏云此一章全説天氣以明之也乾元者始而亨者也利貞者性情鄭玄作情性也乾始能以美利句利天下不言所利句大矣哉大哉乾乎剛健中正純粹精也六爻發揮古文一作輝義取光輝旁通情也時乘六龍以御天也雲行雨施天下平也此下又反覆詳説以盡其義但首節解彖意重君子體乾者此則正贊乾德耳君子以成德為行如字下同日可見之行也潛之為言也隱而未見賢遍反行而未成是以君子弗用也君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田利見大人君德也前釋初九九二皆曰龍德再釋皆曰君子朱氏升謂通學知利行者而言理或然也九三重直龍反下節同剛而不中七字為句上不在天下不在田故乾乾因其時而惕雖危無咎矣九四重剛而不中七字為句上不在天下不在田中不在人故或之或之者疑之也故無咎此二節蓋再釋三四所以憂疑之故夫音符發端之字皆放此大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先悉薦反天而天弗違後胡豆反天而奉天時天且弗違而况於人乎况於鬼神乎前節釋利見此節正釋大人亢之為言也知進而不知退知存而不知亡知得而不知喪息浪反其唯聖人王肅本作愚人後結始作聖人乎知進退存亡而不失其正者其唯聖人乎有悔之為龍人知之亢之所以為龍人未必知也合亢與悔而龍德始備上段其唯聖人乎釋亢下段其唯聖人乎釋悔前節以位言此以德言按此章釋彖凡兩節釋爻凡四節各不相襲讀者辨之坤至柔而動也剛至靜而德方後得主程傳謂主字下脫利字不必從而有常含萬物而化光坤道其順乎承天而時行積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨周易音義載或作變之不早辨也易曰履霜堅冰至蓋言順如字本義云當作慎非也直其正深衣作政鄒志完謂當作敬非也也方其義也君子敬以直內義以方外敬義立而德不孤張倫本此下有易曰二字衆家皆無直方大不習無不利則不疑其所行也隂雖有美句含之以從王事句弗敢成也地道也妻道也臣道也地道無成而代有終也天地變化草木蕃天地閉賢人隱易曰括囊無咎無譽蓋言謹也君子黃中通理正位居體美在其中而暢於四支發於事業美之至也隂疑荀虞姚信蜀才本作凝於陽必戰為于偽反其嫌荀虞陸董本作嗛鄭康成本作謙云讀如羣公慊之慊古書篆作立心與水相近讀者失之故作溓溓雜也於無陽也故稱龍焉猶未離力智反其類也故稱血焉夫玄黃者天地之雜也天玄而地黃沙隨程氏云漢儒引易曰君子正其始萬事理差之毫釐繆以千里此緯書通卦驗之文也亦猶先儒引左氏傳為春秋也近世儒者舉此十六字附于坤卦文言之中曹建大不謂然而黃魯直為大易傳不知何所本也古周易訂詁卷十三
