body:
  text: 古周易訂詁卷十五明何楷撰序卦傳此夫子第九翼也吳幼清云羲皇六十四卦之序始乾終坤蓋竒畫偶畫之上每加一竒一偶二而四四而八八而十六十六而三十二以極於六十四乃其生卦自然之序非人所安排也後之易各因羲皇之卦而其序不同如連山之首艮歸藏之首坤不復可知其六十四卦之序何如矣始乾坤終既濟未濟者周文王六十四卦之序也蓋文王既立卦名之後而次其先後之序如此來矣鮮云序卦傳者孔子因文王之序卦就此一端之理以序之也一端之理在所略孔子分明恐後儒雜亂文王之序卦故借此一端之理以序之其實本意專恐為雜亂其卦也如大卦以下使非孔子序卦可證則後儒又聚訟矣蔡氏改正丘氏猶以為不當僭改經文豈不聚訟所以序卦有功于易韓康伯謂序卦之所明非易之藴孔仲達謂今驗六十四卦二二相耦非覆即變覆者表裏視之遂成兩卦屯蒙需訟師比之類是也變者反覆唯成一卦則變以對之乾坤坎離大過頤中孚小過之類是也且聖人本定先後若元用孔子序卦之意則不應非覆即變朱新仲謂序卦非聖人書程可久疑其出于經師朱子云謂之非聖人之精則可謂非易之藴則不可周子分精與藴字甚分明序卦却正是易之藴事事夾雜都在裏面問如何謂易之精曰如易有太極是生兩儀兩儀生四象四象生八卦這是易之精問如序卦中亦見消長進退之義喚作不是精不得曰此正是事事夾雜有在裏面正是藴須是自一箇生出以至于無窮便是精文中子讚易至序卦曰大哉時之相生也達者可與幾矣正義述周氏就序卦以六門往攝第一天道門第二人事門第三相因門第四相反門第五相須門第六相病門如乾之次坤泰之次否等第是天道運數門也如訟必有師師必有比等是人事門如因小畜生履因履故通等是相因門也如遁極反壯動竟歸止等是相反門也如大有須謙蒙稚待養等是相須門也如賁盡致剝進極致傷等是相病門也愚謂六門之説無乃太支且于血脈未為流暢就中櫽括則相因相反二者足以盡之蔡介夫謂相反者極而變者也相因者其未至於極者也亦老變而少不變之義其本文義已析附于逐卦彖辭之後今不復贅有天地然後萬物生焉焦弱侯云不言乾坤而言天地天地即乾坤也凡陽畫皆乾隂畫皆坤而三百八十四爻無非乾坤也諸卦言受而乾坤不言受乾坤衆卦之父母也于令升云物有先天地而生者矣今正取始于天地天地之先聖人弗之論也故其所法象必自天地而還盈天地之間者惟萬物故受之以屯屯者盈也屯者物之始生也崔憬云此仲尼序文王次卦之意不序乾坤之次者以一生二二生三三生萬物則天地次序可知而萬物之先後宜序也物郭京本作始生必蒙故受之以蒙胡庭芳云乾坤後次屯蒙者震坎艮以三男代父母用事雖無乾坤正體然三男實坤三索於乾而得有互體之坤亦是坤與三男會也蒙者蒙郭京本蒙下有昧字也上蒙字卦名下蒙字物之象也物之稚古本或作稚也物稚不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟僧一行易纂引孟喜序卦曰隂陽養萬物必訟而成之君臣養萬民亦訟而成之其立義又異訟必有衆起故受之以師師者衆也衆必有所比毗志反下同故受之以比胡庭芳云需訟之後坤遇坎而為師比自屯至比三男卦震艮各一用坎獨六用者亦見天地間水為最多猶人一身無非血脈之流轉也比者郭京本者下有親字比也上比卦名下比相親附之謂也比必有所畜古本亦作畜下同故受之以小畜物畜然後有禮故受之以履吳幼清云舊本無履者禮也四字韓注有之今按王弼略例引此四字蓋是後人誤以正文書作注字胡庭芳云師比後乾方與巽兑會成小畜履此長少二女代兄從父始入用惟離中女未用耳乾坤至此十變十成數也隂陽之氣一周矣履而泰本義引朝氏云鄭無而泰二字然後安故受之以泰泰者通也物不可以終通故受之以否備鄙反下同胡庭芳云小畜履後乾坤自相遇成泰否然乾坤十變方泰何其難泰一變即否何其易履其交處其會者宜知警戒為變化持守之道可也鄧汝極云屯蒙而下卦全于八天五為紀地六為制積之五六合隂陽各三十畫二氣各平以盈而天地交物不可以終否故受之以同人與人同者物必歸焉故受之以大有胡庭芳云泰否而後乾坤異處乾自與離相遇為同人大有至此則離始入用而三女之卦全用矣有大者不可以盈故受之以謙子曰易先同人後大有承之以謙不亦可乎又説苑引勞而不怨有功而不德厚之至也有一道大足以守天下中足以守國家小足以守其身謙之謂也夫天道毁滿而益謙不損而益之故損自損而終故益今彖傳繫辭文與此全不同附録于此有大而能謙必豫程子云承二卦之義而為次也故受之以豫胡庭芳云同人大有後坤又自與艮震相遇成謙豫亦為長少二男之從母也至此震艮二男復用事矣豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨臨者大也項平甫云臨不訓大臨者以大臨小凡稱臨者皆大者之事故以大稱之若豐者大也則真訓大也物大然後可觀説文引地可觀者莫可觀於水今易所無故受之以觀可觀而後有所合故受之以噬嗑嗑李鼎祚本嗑上有噬字者合也物不可以苟合而已故受之以賁賁者飾也致飾然李鼎祚本作而後亨則盡矣故受之以剝剝者剝也物不可以終盡剝窮上反下故受之以復淮南子引云剝之不可遂盡也故受之以復復則不妄矣故受之以無妄不妄與無妄當辨繇不妄然後能無妄也余德新云自有事而大大而可觀可觀而合合而飾所謂忠信之薄而偽之始也故一變而為剝剝而復則真實獨存而不妄矣有無妄然後可畜故受之以大畜物畜然後可養故受之以頥頥者養也呂圭叔云萬物盛多而後養道備也需之養養之小頥之養養之大不養則不可李鼎祚本有以字動故受之以大過物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也焦弱侯云隂陽之氣專則生化之理滅故至陽之中必有隂而至隂之中必有陽至其極則相生離為火而中畫隂也坎為水而中畫陽也肅肅出乎赫赫發乎此天地之至理也來以鮮云物不可以終通終否終盡終過以理之自然言也造化乃如此也有大者不可以盈不養則不可動以理之當然言也人事乃如此也周省貞云陷必有所麗與物不可終窮同意雜卦不以他卦而以夬終亦物不可終窮意也王昭素本於離者麗也下增麗必有所感故受之以咸二句真蛇足矣有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯不言咸者何夫婦之道即咸也猶上經言天地而乾坤具也夫婦之道不可以不久也故受之以恆咸恆為下經之主自既未濟及晉明夷外諸卦皆艮兑巽震之會遇于令升云上經始于乾坤有生之本也下經始於咸恆人道之首也易之興也當殷之末世有妲已之禍當周之盛德有三母之功以言天不地不生夫不婦不成相須之至王教之端故詩以關雎為國風之始而易於咸恆備論禮義所繇生也恆者久也物不可以久居其所故受之以遁遁者退也物不可以終遁故受之以大壯物不可以終壯故受之以晉晉者進也進必有所傷故受之以明夷夷者傷也傷於外者必反其家故受之以家人家道窮必乖故受之以睽睽者乖也乖必有難乃旦反下同故受之以蹇蹇者難也蔡介夫云屯蹇皆為難義但屯者始生之難蹇者所遇之難物不可以終難故受之以解解者緩也緩必有所失故受之以損損而不已必益故受之以益胡庭芳云咸十卦變之盡為損而艮上兑下恆十卦變之盡為益而巽上震下亦猶上經乾坤十變而有否泰也按爻隂陽亦各三十畫泰否天道之大運所以體其全損益人道之大權所以用其中益而不已必決故受之以夬夬者決也決必有所李鼎祚本無所字遇故受之以姤乾體止此自乾至姤凡四十四卦姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升坤體止此升而不已必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革革物者莫若鼎故受之以鼎主器者莫若長丁丈反子故受之以震馮氏云自乾坤四十有九卦而革去故五十卦而鼎取新震乃長男代父易之序也震者動也物不可以終動李鼎祚本動下有動必二字止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也焦弱侯云晉者明出地上進而明也徒進不足以盡之漸者山上有木以漸而進者也漸音進之方而漸非進也凡若此類皆取其大意以明卦之序非以卦義為盡于此也進必有所歸故受之以歸妹閻彥升云晉所謂進者有進而已此進必有傷也漸之所謂進者漸進而已烏有不得所歸者乎得其所歸者必大故受之以豐朱子發云前曰與人同者物必歸焉故受之以大有此曰得其所歸者必大大有次同人者處大之道也豐次歸妹者致大之道也豐者大也窮大者必失其居故受之以旅旅而無所容故受之以巽巽者入也入而後説音悅下同之故受之以兑兑者説也説而後散之故受之以渙渙者離也物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過胡庭芳云咸恆一變損益再變漸歸妹三變中孚小過隂陽各從其類焉有過物者必濟故受之以既濟物不可窮也故受之以未濟終焉程子云易者變易而不窮也既濟之後受以未濟則未窮也朝氏云未濟之終復始于乾坤玄以將凖未濟曰隂氣濟物乎上陽信將復始乎下明此理也周氏云按序例有數欵曰然後曰而後曰不可曰不可以曰不可不曰必曰必有曰必有所曰莫若各有取義約之不外一中不問天道人事高者抑之下者舉之得中者順之隨時從道以趨中而已其他奧義諸賢多搜索于位置時數之間可喜可愕不可枚舉然而夫子當時曽不瑣及惟隨時用中之道為不易矣呂氏要指云易變易也天下有可變之理聖人有能變之道反需為訟泰為否隨為蠱晉為明夷家人為暌此不善變者也反剝為復遁為壯蹇為解損為益困為井此善變者也文王示人以可變之機則危可安亂可治特在一轉移間耳後天之學其以人事贊天地之妙歟韓康伯云先儒以乾至離為上經天道也咸至未濟為下經人事也夫易六畫成卦三才必備錯綜天人以效變化豈有天道人事偏于上下哉斯蓋守文而不求義失之逺矣蘇子瞻云以雜卦觀之六十四卦皆兩兩相從非覆則變也變者八乾坤也頥大過也坎離也中孚小過也覆變具者八泰否也隨蠱也漸歸妹也既濟未濟也其餘四十八皆覆也卦本以覆相從不得已而從變也何為其不得已也變者八皆不可覆者也雜卦皆相反序卦皆相因此理也而有二變者八覆變具者八覆者四十八此數也而有三然則六十四卦之敘果何義也曰理二曰數三五者無不可此其所以為易也步厯而厯協吹律而律應考之人事而人事契循乎天理而行無往而不相值也且非獨此五者而已將世之所有莫不咸在是故從孔子之言則既有二説矣曰物不可終過故受之以坎坎者陷也陷必有所麗故受之以離又曰有男女然後有夫婦方其為男女則所謂陷與麗者不取也自是以往吾豈敢一之哉古周易訂詁卷十五
