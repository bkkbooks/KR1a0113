body:
  text: 古周易訂詁卷六明何楷撰自震至未濟為下經之終震艮長男少男分漸歸妹巽艮震兊交豐旅震艮包離互體兊巽三女全巽兊長女少女分渙節巽兊包坎互體艮震三男全中孚小過巽兊震艮别既濟未濟中男中女合凡十四卦乾坤不復見經故此一節為隂中之陰震艮巽兊四主卦具焉其不居下經之前乃在下經之後者何也蓋下經之初陰中之陽動也用也下經之末陰中之陰靜也體也先其用而後其體也此四卦中震艮居前而巽兊居後何也震艮陽也陽繇此而出布于上也巽兊陰也陰繇此而入伏于下也其以既濟未濟終之何也坎離之合也乾坤立而六子生坎離二卦既列之上經矣姑取莫交者以殿其後而後六子始全也今按圖而區分之則六子之遙相望也若鼎峙然自震艮起隔四卦而為巽兊又自巽兊起隔四卦而為既濟未濟也然而巽兊實居中矣其義何也下經雖以巽兊震艮為主而巽兊最貴蓋下經陰巽兌亦陰宜其居中也繇是而在巽兊之左右者為豐旅為渙節一則以震艮包離而兑巽具焉三女全矣一則以巽兊包坎兩艮震具焉三男全矣是四主卦之互體也繇是而在豐旅之左者為漸歸妹在渙節之右者為中孚小過一則巽艮震兊交一則巽兊震艮别其態備矣是四主卦之錯體也若夫乾坤體全而用也中坎離體中而用也全前篇已備言之故乾坤為六十四卦之始坎離既未濟為上下經之終此又序卦始終之關鍵也第十一對震艮雜卦傳曰震起也艮止也震陽起于下艮陽止于上或云震起也帝出乎震也艮止也萬物之所成終而成始也亦通鄧汝極云震艮下經主卦也震陽自下起易而觀為艮陽極上而止天之道情性之理動靜靜動一體之相首尾也煥如矣天用莫威于雷地形莫高于山雷天之陽必反本于下山地之剛故成位于上蓋震艮主陽也人心危不恆動耶能有止耶動而之欲莫知所止其動也妄矣即止非其理惡動喜靜以心操心妄揠強制猶之欲也列夤薰心詎有止哉惟剛反以動兢兢于戒懼以敬德而嚴天德之本也剛極而止安安于靜正以敬止而事天德之成也戒愼震也于其所不覩而艮視于無形恐懼震也于其所不聞而艮聽于無聲動無動止非止敬德以為經學達天之省括也道之所由凝也夫震下震上震歸藏作釐亨震來虩虩荀爽本作訴訴笑言古本亦作語啞啞震驚百里不喪息浪反卦內同匕鬯震説文云劈歷振物者從雨辰聲雷也震原三畫卦名一陽生于二陰之下乾坤之交一索而成震生物之長也故為長男即初畫是也其象則為雷上二爻陰氣凝聚陽氣在內藴結而不得出于是奮擊而為雷二震相重則其象為二雷相踵而動故仍名為震震九四無長子義但以雷言耳震者陽德之先陽氣從下以達上則陰氣開而萬物為之發生故亨人因雷震而恐懼修省一歸于理亦有震亨之義震來虩虩笑言啞啞以初爻言震來者外卦之震自四而來初二雷相遇也易爻凡自下而上稱往自上而下稱來虩説文無訓但引易云履虎尾虩虩恐懼今履卦無虩虩恐懼之文據馬季長解虩虩云恐懼貌當為近之一云虩蠅虎也然則虩虩二字乃連呼蠅虎之名于文理未順震為善鳴有笑言象啞啞不欲肆聲狀時然後言樂然後笑也非暢適之謂震驚百里以九四言坤下畫變乾為震乾為君坤為土分乾之一以主坤土諸侯象諸侯地方百里雷發聲聞于百里今震在四又諸侯位也不喪匕鬯以六五言即初九之先為長于而後主器者當其為長子時已聞洊雷而恐懼修省有虩虩啞啞之德矣故逮其承祧雖值震驚之臨卒持以鎮定而能不失其所主之器若舜之烈風雷雨弗迷者其大過人逺矣匕者撓鼎之器以棘木為之長三尺刋柄與末祭祀之禮先烹牢于鑊既納諸鼎而加幂焉將薦乃舉幂以匕出之升于俎匕用棘者取其赤心之義詩云有救棘匕是也本卦三四五體坎為棘故有匕象鬯者香酒説文云以秬醲鬱草芬芳攸服以降神也説苑云鬯者百草之本也上暢于天下暢于地無所不暢故天子以鬯為贄震為蕃鮮中爻坎為酒醴故有鬯象二三四互艮艮手執之為不喪象祭禮薦陳甚多而經獨言不喪匕鬯者上牲體薦鬯酒人君所自親也六爻皆變為隨風巽序卦傳曰主器者莫若長子故受之以震鼎所以烹飪享于上帝薦于宗廟主此器者必長子傳國家繼位號者也震為長子故以震繼鼎彖傳曰震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也不釋震亨者朱子謂震有亨道不待言也恐致福者恐懼以致福也後有則者繇能恐懼而後自處有法則也福繇恐致然福非外至也不過意思安間而已啞啞又非侈然自放也不過循其法則不失常度而已聖人之所謂福者如此笑言啞啞即震來虩虩之福不喪匕鬯即笑言啞啞之則也驚者卒然遇之而動乎外懼者惕然畏之而變其中逺謂卦之外體邇謂卦之內體內外皆震有逺邇驚懼之象出者長子出而繼世也如帝出乎震之出可以者許之之辭也曰主者猶詩云百神爾主矣洊雷之震逺邇驚懼當此之時乃能處之從容不喪匕鬯繇其中心有主是以萬物不移豈不可以負荷天下之重器乎故以守宗廟能為宗廟之祭主以守社稷能為社稷之祭主矣象傳曰洊雷震君子以恐懼修省洊重襲也上下皆震故為洊雷雷重仍則威益盛能無震乎恐懼作于心修省見于事修克治之功省審察之力徒恐懼而不修省猶無懼耳恐懼者憂其變之來初震象修省者思其變之弭洊震象説卦傳曰帝出乎震又曰萬物出乎震震東方也又曰震動也又曰震為龍又曰震為足又曰震一索而得男故謂之長男又曰震為雷為龍為玄黃為敷為大塗為長子為決躁為蒼筤竹為萑葦其於馬也為善鳴為馵足為作足為的顙其於稼也為反生其究為健為蕃鮮解見本傳初九震來虩虩後笑言啞啞吉變坤為豫解見彖下初下震之主四上震之主雷震之威此二陽所為初既震矣四之震復自外而來蓋震之盛也虩虩啞啞以處震之人言即長子也此爻既為雷又為長子辭於彖同文增後字表初義耳曰吉則奚止無喪失哉震初猶屯初皆主卦之爻故以卦辭繫之卦變豫唐房喬云震之初九謹始恐懼所以致福豫之初六唱始逸豫所以貽凶象傳曰震來虩虩恐致福也笑言啞啞後有則也以三畫言為成震之主以六畫言為處震之初成震之主能懼也處震之初懼之早也故與彖辭傳辭俱同明為初九而發六二震來厲億古本又作噫喪貝躋古本又作隮于九陵勿逐七日得變兊為歸妹互體艮變離初四兩陽皆震者也曰震來者與初九同乃九四之震自外而來至二也二居初上以柔乘剛既非善地而九四之震復自外而來則二無所于避之危亦甚矣危之甚則不能自顧其所有故至于億喪貝億者大也十萬曰億盛大之通稱也觀六五小象曰大無喪可知矣貝者水中介蟲古者以為貨漢志大貝二枚直錢二百一十六牲貝二枚直錢五十么貝二枚直錢三十小貝二枚直錢十文互體變離為龜蛘貝象也既喪貝矣而又升高以避之體震為足故稱躋互體為艮故稱陵曰九陵即九四也躋于九陵者二欲避四而就其應爻之五五在四上故超出山頂以求之蓋二以柔居柔乃人之懦怯無守者驟為雷所怖故至于喪資而辟易如此也是其視不喪匕鬯者有間矣然恐懼自守處震之大方也雖棄去若遺而行與禍逺既有隳甑弗顧之達則當有去珠復還之喜故告之曰勿用追逐但至七日而所喪之貝可得夫雷霆無竟日之怒卦位有六七乃更始事既終時既易矣故云七日得亦二居中得正之效耳七日得之文震與既濟皆于六二見之蓋自二而上又自上而二其數七也互變離故稱日震為兊亦先驚後喜之象象傳曰震來厲乘剛也二乘初之剛已處位不當矣外卦之震復來至二以犯初之威兩剛相持其厲更甚即謂九四乘初九之剛亦可然則二亦奚以堪之哉六三震蘇蘇震行無眚變離為豐互體艮變巽約象坎變兊蘇復生也下初之震動將盡上四之震動復生震而又震有蘇蘇之象當此震懼之時唯行而去之則幾可免于眚行者行至上也上居卦外為三之應逺于威震三行而達于上則震不能及李子思云陽爻震物陰爻被震陰被震而不敢輕犯其鋒必須逃避而後獲免故二則欲其躋于高陵三則欲其行無眚愚按曰躋曰行亦教以遷善改過之意中爻互坎為眚三變行正故象不見故無眚爻變離為明故能明于避如此章本清云徂行皆震動之義三在內卦之終故曰行無眚上在外卦之終故曰征凶象傳曰震蘇蘇位不當也以介上下震之交所居之位不當故宜行而去之九四震遂荀爽本作隊泥變坤為復互體艮變坤約象坎變坤初與四皆震之所以為震者然初始震也剛得位而能上達四洊震也剛失位而陷于羣陰之間乃雷聲沈抑陷下而不能奮揚而上者故震之亨在初而不在四曰遂泥者猶言竟陷于泥也坤土得雨為泥此爻約象坎三變皆坤故稱泥互體艮下牽二柔止而不進則亦失其所以為震矣象傳曰震遂泥未光也陽者剛物震者動義以剛處動本有光亨之道乃失其剛正而遂陷于泥豈能光也在坎陰中與屯五同義一説云震雷開而為電則有光陷泥則未有離電之光詩所謂曀曀其陰虺虺其雷是也六五震往來厲億無喪有事變兊為隨約象坎變巽震往來厲者言四之震既往而復來也蓋四既遂泥故其聲不能逺達于上僅震于其鄰而止耳五當其往來之衝危道也然而能億無喪者此爻與二若相似而實相反遂泥之威已不若初震之迅急而二居柔則志氣餒五居剛則持守堅故大無喪與大喪貝異彖所謂不喪匕鬯即此爻也有事者有事乎恐懼修省之功與孟子之必有事焉同心有主故威不能懾此其所以能大無喪者與六五初九本一人初則潛邸之時五則正位之日也要其虩虩啞啞之德蓋終身以之矣變兊利祭祀故可以執匕鬯為祭宗廟社稷主象傳曰震往來厲危行也其事在中大無喪也乘剛故危其所行所謂震來虩虩也其有所事在固守其中以柔居剛為中所謂恐懼致福笑言有則者故能億無喪也上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言變離為噬嗑初四皆震者卦惟二三兩爻麗初四之中其危懼特甚四震遂泥其威不能上達所來往之地僅及于五其實無能為也若上六則更逺處震外矣象為雷之震索索然竭盡四之雷聲至上而竭也此以四言又為目之視矍矍然驚駭不定雷聲無所聞矣但驚駭之餘目視猶不定耳上變離目故有視象此以上言然居卦之終前無所之下行則趨而近威震故征行則凶震不于其躬于其鄰者謀之之辭也躬謂本爻鄰指五也四震之來勢緩未能及上但于及五之時能先事而為之戒自可免咎無庸征也婚媾謂應爻三必待行方無眚上則居可免咎然上與三無應又以柔居柔僅足自守雖獨逺震不相顧恤三又望援之切故不免有言耳三變則三四五成兊兊為口有言象象傳曰震索索中未得也雖凶無咎畏鄰戒也五為上卦之中四之震往來其間尚未能得志也若上則去四益逺矣雖處卦極行無所往易于致凶然能畏禍之及于鄰而先自備戒則亦可無咎戒如豫有戒心之戒月令有不戒其容止之戒古人制治于未亂保邦于未危皆畏鄰戒也言外須見得必畏鄰戒方得無咎若不戒咎其能免哉震以恐懼修省為義初之虩虩五之有事尚矣若二之躋九陵三之行無眚上之畏鄰戒亦皆能恐懼修省者故爻無凶辭焉艮下艮上艮其背不獲其身行其庭不見其人無咎艮原三畫卦之名説文艮作狠也從目從匕匕目者猶目相匕不相下也為卦一陽居二陰之上乾坤之交三索而成艮陽動而上進之物既至于上則止矣陰者靜也上止而下靜故為艮也又加一艮于上兩止相重仍名為艮王輔嗣云凡物對面而不相通否之道也艮者止而不相交通之卦也卦名連彖辭為象六畫以三上兩爻為主然三不如上上九敦艮厚終乃聖學之成九三上連四五互震有動體故須攝之而後止艮其背者主靜之功學者之事也所謂背九四是也四乃心位背者心之後郛也艮為多節在人身亦背脊象程子云人之所以不能安其止者動于欲也欲牽于前而求其止不可得也故艮之道當艮其背所見者在前而背乃背之是所不見也止于所不見則無欲以亂其心而止乃安愚按老子云不見可欲使心不亂即此意夫背者無見之物也無見則自然靜止如是則外物安得入而與身為媾故曰不獲其身不然物交物則引之而已矣所謂身亦即指四觀周公爻辭可見四本心位既象背又象身者經云人之五臟皆係于背是背乃身心總會處且身者心之區宇艮背則無心矣故但以心言之行其庭不見其人者以自三至上之象言也其庭即艮背者之庭其人即艮背之人不見者謂人不之見非謂艮背者出于己庭而不見天下之人也四既艮背而外至之物不能獲其身而與之接矣故即有人焉行其庭而終不能見其人三四五互震為行人艮為門闕今純艮重其門闕兩門之間庭中象也中爻互坎為隱伏四五皆人位故曰行其庭不見其人此其攝心不動而人我不相交涉乃止之止非不止之止也聖人以無所止為止學者則必從有所止而入此其所以僅無咎與先儒看彖辭太好又以不獲其身為無我不見其人為無人細繹彖象中俱無此意六爻皆變為重兌序卦傳曰震者動也物不可以終動止之故受之以艮艮者止也止乃艮成卦之義彖傳曰艮止也時止則止時行則行動靜不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也艮為止艮之義則止也時止則止四語正聖人發明艮止之義蓋恐人以沈空守寂為止故為説破夫所謂止者非與行對言之止知止而不知行者實不知止知行而不知止者實不知行知行止之非二則時靜而靜時動而動而無容私焉思亡智現定亂總無如谷響然有應物之音而無可尋之迹是之謂止程子所謂靜亦定動亦定也文中子云昔吾求止焉而不可得也今吾得之止乎謂止非止也明為光體光為明用艮體篤實有光明之義故大畜于艮亦以輝光言之朱子云凡人胸次煩擾則愈見昏昧中有定止則自然光明莊子所謂泰宇定而天光發是也胡庭芳云艮一陽見于二陰之上陽明著見陰莫得而掩蔽之故艮獨稱光明是道也惟敦艮之上九足以當之若彖辭所稱艮其背者則是以止為止也不曰艮其背而曰艮其止者熊過以古文背字為北或訛為止王輔嗣云易背為止以明背即止也人精神盡在乎面不在乎背故聖人于未能止者教之以艮其背此求止法也使其面之所向一如其背則應用交錯擾擾萬緒未始不寂然矣面如背前如後動如靜視聽言動心思曲折如天地之變化矣然而其初猶未能也必自艮背而入故曰艮其止言一切耳目思慮盡止于其所止之地則背是也背非見也止于無知背無欲也止于無為夫道無方所者也以背為止明于有方所矣彼其心一于背即視身與背若不相涉視人與已滋若不相涉則上下敵應之象也上謂外卦下謂內卦六爻皆相敵而不相應內敵應而不與外未嘗引外物而入也外敵應而不與內莫能誘吾心而出也是以不獲其身即與人相近而不相見故行彼之庭而不得見其人雖尚未忘乎有所乃其喫力處然操存之熟則可以馴至于無所終必有得力處故曰無咎也舊以艮背為止之極則不宜僅曰無咎蓋為初學言也陽明先生謂惡動之心非靜也求靜之心即動也休心息見智故不作不為動動不為靜靜其惟上九乎象傳曰兼山艮君子以思不出其位此而并彼為兼謂重復也兩雷兩風兩火兩水兩澤皆有相往來之理惟兩山並立不相往來此止之象也易重時位即時位即道也彖言動靜不失其時則知止無定時時一止也學之為時中矣象言君子思不出位則知止無定位位一止也學之為素位矣不出位者有是位方有是思過位則思移離位則思滅無思而無不思而卒亦思而無思耽空礙有者未能得其髣佛也不出位者以身言身之止也思不出位者以心言心之止也身心皆止取兼山象王汝中云心之官則思以思為職位所居之位不出位之思謂之正思如水鑑之應物而常止也如日月之貞明變化云為萬物畢照而未嘗動也思者心之用思不根于心謂之志謂之憧憧便是廢天職洪範五事貌言視聽皆本于思思曰睿睿作聖故曰思者聖功之本思不可以有無言著于無思即為沈空著于有思即為逐物無思而無不通千聖之絶學也先儒謂萬事各有其所得其所則止而安不出應如素冨貴行乎冨貴素貧賤行乎貧賤之類專以應迹而言未明思之本旨然不出位之思即不願乎外之意心與迹非判為兩事也又云和應俗學也絶應禪學也不隨二見應而不留聖人之學也視思明聽思聰是為不出位之思非深于易者其孰能知之説卦傳曰艮以止之又曰艮東北之卦也萬物之所成終而所成始也故曰成言乎艮又曰終萬物始萬物者莫盛乎艮又曰艮止也又曰艮為狗又曰艮為手又曰艮三索而得男故謂之少男又曰艮為山為徑路為小石為門闕為果窳為閽寺為指為狗為鼠為黔喙之屬其於木也為堅多節解見本傳初六艮其趾荀爽本作止無咎利永貞變離為賁艮趾者繩趨尺步之學也居卦之初在腓之下又偶畫有趾象趾動之先也六陰畫能靜止于下而不行故曰艮其趾夫人吉凶悔吝皆生于動愼初而止不動何咎知壯趾之征凶則知艮趾之無咎矣然初六陰柔懼其始于止而終于不能止也故戒以利永貞初與四變皆離故皆知止艮止之道時行則行而初獨戒其永貞者蓋亦為下學言耳象傳曰艮其趾未失正也能止于下則位雖不當猶未至于失正夫止亦人所難初能艮趾或因此而遂能得所止亦未可知世固未有好動不止者而能止其所止也此爻象之所以互相發也六二艮其腓古本一作肥義同不拯陸德明本作承其隨其心不快變巽為蠱互體坎變兊艮腓者欲其止而恨其不能止之學也二居趾上偶而立腓象變巽為股腓在股下二為巽中畫故稱腓其隨指三也腓隨股以動行止之權在股而不在腓中爻三四五互震三為震初畫乃好動者二本不欲動而三挾之俱動二不能以柔中而拯救彼過剛之失此其心之所以時時不快也其心指四四為心位惟四有不快之心故聖人教之以艮背焉或問艮卦以一身上下取象其心不快即能止矣何至隨股而動乎曰此所謂氣一則動志者故姦聲亂色不欲留于聰明淫樂慝禮不欲接于左右正謂此也互坎為加憂為心病不快之象變巽故善隨象傳曰不拯其隨未退聽也自下而上曰進自上而下曰退退聽下從也二之所以不能拯救其所隨者以三操行止之權不肯退而聽乎二也互坎為耳故稱聽張幼于云不拯其隨本是六二柔弱象唐馬璘為邠寧節度使段秀實為其都虞候璘處事或不中理秀實常力爭之璘每聽之繇是在邠寧聲稱殊美六二固乏秀實之剛毅九三亦無馬璘之退聽也九三艮其限列其夤鄭玄本作􅘡説文引作胂荀爽本作腎云互體有坎坎為腎厲韓詩外傳作危薰荀爽本作動云互體有震震為動虞翻本作閽云閽守門人坎盜當門故厲閽心心變坤為剝互體坎變坤約象震變坤限即門限之限艮為門闕九三一陽橫亘于二陰之上有限象舊解以腰胯釋限似無據九三與上九皆艮之主也然九三連上二陰成震象則失其所以為艮矣震性好動而欲制之使不動故施門限以闌之此蓋告子強制之學也夤夾脊肉即背膂也人心處中背處陰夤在背與心密相向皆指四位而言但以前後異名耳互坎為脊故稱夤列者脊肉中有所裹之骨左右分列也三體震為行陽畫在下向上而行面向上故其背在下今既限之使不得行遙見其夾脊之肉分列可數蓋止息之象也然其好動之性終在妄想坐馳紆軫內熱若將熏灼其心然者直無奈為限所束故窘如囚拘耳其危厲亦甚矣薰與詩雲漢憂心如熏之熏同火煙上也通作薰漢馬廖傳聲薰天地唐書薰為太平韓退之文薰其德而善良並與熏同三至上肖離火有薰象心指四互坎為心病所以六二不快九三薰心變坤成剝亦非佳爻韓詩外傳引孔子曰口欲味心欲佚教之以仁心欲兵身惡勞教之以恭好辨論而畏懼教之以勇目好色耳好聲教之以義易曰艮其限列其夤危薰心象傳曰艮其限危薰心也以強制故危薰心艮限者強制之謂也六四艮其身無咎變離為旅互體坎變巽約象震變兊此爻即彖所謂艮其背不獲其身者也四正當心位不言心而言身者蓋心不可見而身者心之區宇也觀其身之止則知其心之止矣惟其心如死灰是以形如稿木故曰艮其身也無咎者即彖辭之無咎楊敬仲云身氣血耳氣血何所思氣血之中亦何所有聖人于是不言心而言身于以見心乃虛名本無所有苟言心則人以心為實有立我立私禍本益固故聖人于此不言心于咸之四亦不言心又吳幼清云身謂股以上膈以下前臍腹後腰膂腎所在處乃生身之所繇始故以此為身呼吸之根氣所從生也止其身則氣住而神亦住四以柔居柔蓋専氣致柔者故以艮其身屬之此養生家言似非經旨象傳曰艮其身止諸躬也諸之於也止諸躬即艮其背也王伯厚云偃身為躬見躬而不見面楊氏云身者伸也躬者屈也象傳恐人誤以爻言身為正面故以止諸躬釋之古文躬從身從吕吕背膂也象形正與艮背之解相合六五艮其輔言有序虞翻李鼎祚本作孚悔亡變巽為漸約象震變離五在上而偶輔象輔頰之兩旁骨背後可得而見者咸言其面故并見頰舌艮取背象故但言輔人言出則輔動自背視之但見其兩輔之不動則知其口之不言矣兊為口舌艮者兊之反也故有艮輔象言有序者時然後言之謂非其時則不輕言也此非于言上用功夫功夫在心上以陰居陽疑于有悔然以體柔能愼其言故悔可亡李子思云人所見于外者不過言行二者在下有腓趾以象其行在上有輔頰以象其言所以明艮之義則一也變巽巽以出言故有序象傳曰艮其輔以中正也以適居上卦之中也程子云言以得中為正止之於輔使不失中乃得正也又本義以正字為羡文觀叶韻若可信上九敦艮吉變坤為謙敦厚也爾雅丘再成為敦兼山之象也變坤加土山上亦敦象臨上亦以坤極稱敦夫大止者止于無所止有所止則著矣九以剛實居上而又成艮之主在艮之終安于止者也安止之止止無其止非有所而欲無之也非本不止而強止之也夫然者不屬動不屬靜不屬行不屬止然行者行此止者止此動者動此靜者靜此大學謂之止于至善易謂之敦艮其理一也六爻自初至五皆有所止之可言上九以無思而通天下之思者也故不言艮其焉是爻也即彖傳所謂動靜不失其時其道光明者吉孰如之凡上爻除井鼎外鮮吉惟艮在上體者八皆吉艮主上猶震主初可統全卦故獨以艮歸之四亦震主以內荏而泥三亦艮主以強陽而厲可念也夫象傳曰敦艮之吉以厚終也言以敦厚居卦之終也剛上止止會歸于極定靜安慮所造者天展也大終行止惟時厚之至也定性之極也第十二對漸妹歸雜卦傳曰漸女歸待男行也又曰歸妹女之終也女未嫁之稱始歸待男而行既歸從夫而終矣鄧氏云漸艮合巽也易而觀歸妹為兊合震非亦猶二長二少下經四主卦之合耶而男女之合有正焉時焉雖適人合其實也天當年德之謂也其時其正則咸恆首經矣損益權于經矣而氣化錯揉不正不時者何多耶漸歸妹年不當時陰陽不皆偶不當德矣然漸男下女少男下長女男丁時而德止女需時而行漸猶之順也歸妹柔乘剛少女説長陽男時過以動而女與之奔奔疆疆也旡已逆乎漸貞艮情止于性也止而巽以不窮歸妹貞兊情惑于欲也説以動而征凶漸二五中正三四得正家其和夫進以正而正邦歸妹二四三五皆失正人無則焉凶無利矣程子云卦有男女配合之義者四咸恆漸歸妹也咸與歸妹男女之情也咸止而説歸妹動于説皆以説也恆與漸夫婦之義也恆巽而動漸止而巽皆以巽順也男女之道夫婦之義備于是矣章氏云止而巽動不窮也巽而止則蠱矣説以動所歸妹也動以説則隨矣反覆毫釐之際辨之不可不審艮下巽上漸女歸吉利貞漸據説文原水名出丹陽黟南蠻中東解入海地理志漸江今浙江也借為漸次當是取水流漸進之義凡物有變移徐而不速謂之漸也天下之事進必以漸者莫如女歸女謂嫁曰歸自納采問名納吉納徴請期親迎六禮備而後成婚歸不以漸則奔也今漸之為卦以艮男下巽女巽女在外將入而未歸艮男在內方止而未進有女歸以漸之義然女歸固以漸為吉而其利尤在于得正也漸之所以成卦者在三四兩爻三為艮主四為巽主雖皆當位然以相比而歸非正應也惟二五相應為正故曰利貞合六爻而觀初四三上俱無應初守正以待時上孤貞以著節若二與五則女歸之經也三與四乃其權也權非所以立教故彖但言女歸不言取女既不得與咸例論而復以利貞申言其謹始之意已可見于言外矣胡仲虎云咸取女吉取者之占也漸女歸吉嫁者之占也然皆以貞艮為主艮止也止而説則其感也以正是為取女之吉止而巽則其進也以正是為女歸之吉六爻皆變為雷澤歸妹艮上巽下為蠱序卦傳曰艮者止也物不可以終止故受之以漸程子云止必有進屈伸消息之理也止之所生亦進也所反亦進也漸所以次艮也蘇君禹云惟艮故漸蓋無欲而靜故進必以正彼馳于紛華盛麗未有不競于富貴功名也學問不以漸則凌躐之弊生事功不以漸則馳騖之心熾故逺邇卑高不可踰也本末始終不可紊也循序而俟時斯其進也善矣彖傳曰漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也之進者王注云之于進也之往也之有退有進漸之所之進也與晉進也不同卦之名漸為不遽進之義但往而徐進耳如女之待六禮備而後歸則得漸之義而吉也專以女歸言者蓋禮義亷恥之重天下國家之本無若女之歸也進得位指九三也言陽進而居三以陽居陽為得其位往有功者往而與四相比則有配合之功蓋三四雖非偶然艮男止于內有浩浩乎水之歌巽女長于外有其實七兮之嘆若拘常守故則將廢人之大倫故因其相比而相合若舜之有鰥在下竟不告而娶然者孟子曰舜不告而娶為無後也君子以為猶告也此女歸之權故曰往有功也自非男止若艮女長若巽則亦未可以此藉口也然非正應而合終不若得其正應之為當故繼之曰進以正可以正邦也進以正指九五也言自三而進之最得位者莫如九五下有柔中之六二與之相應則夫夫婦婦而家道正正家而天下定故曰可以正邦也夫子又恐人不知其所言進以正者之指五故復實之曰其位剛得中也九五以剛畫居上卦之中則不惟得正而又得中况下有中正之二與之應乎卦取巽女歸艮男故曰女歸九五巽體不得稱夫六二艮體不得稱婦夫子特因三四兩主爻相合之非正故借二五以明利貞之義若曰苟如九五六二之相應則可謂之貞矣蓋但取畫之陰陽不拘論卦之男女也此學者所當知止而巽動不窮者合兩體言蓋進之心愈急則進之途益阻今卦德內而艮止則未進之先亷靜無求外而巽順則將進之間相時而動此其所以動往而不窮也之于進而有漸若此故吉也象傳曰山上有木漸君子以居賢德善俗地中生木其名為升地卑而木易高也若木生于山山本高矣木何能遽見其高必積之歲計漸長則漸高耳君子欲挽風俗而之善詎可旦夕就哉必先居身于賢德感格而薰陶之夫且不言而浸化若木之在山不見其長有時而高則善世之妙道也若汲汲焉令驅而法繩之則格矣居賢德艮象善俗巽象楊敬仲云不曰聖德者聖德之所化為速孔子為三月而俗已化故止曰賢德然商之頑習固難化者又不可一槩論初六鴻漸于干小子厲有言無咎變離為家人鴻鴈之大者水鳥而乘風以飛下卦艮為黔喙鳥也中爻互坎水也上卦巽風也故六爻皆取鴻象或云自子午以東為陽子午以西為陰繇艮達巽子午以東陽氣之地也立春以後鴻鴈來故六爻皆係以鴻者隨陽之鳥也亦通若以鴻之德言木落南翔冰泮北徂往來有時先後有序干漸之義為切也昏禮用鴈取不再偶又于女歸之義為切也干水湄也中爻小水流于山故初有干象初以陰柔位于窮下未得所安而上復無應姑佇立以待時故象鴻漸于干蓋艮之德也小子指初六也艮為少男爻處卦初故又稱小子二三四五坎在前故稱厲有言者四有言也初不肯輕進以應四故四有譏誚之言外卦倒兊應爻口舌向內有言之象然守正俟時于義則無咎在女則亦待年而未歸者變剛為離宜其明于義也吳幼清云元積幼時亦不肯苟合特以不能堪困躓之厄受衆多之言遂改途而妄進故以此戒之象傳曰小子之厲義無咎也項平甫云小子居之危厲不安但于義無咎固大丈夫之所安也六二鴻漸于磐史漢武紀引作般裴龍駒注云水涯堆也楊用修云水涯堆之訓為是鴻固不棲石也因磐字從石而誤其説耳經書所以貴古文也飲食衎衎吉變巽為重巽互體坎變兊磐石之安平者江河之濱所有象進之安也艮為石故有磐象自干之磐又漸進也坎為飲二變剛成互兊為食衎衎和樂也鴻食則呼衆衎衎和鳴變互成兊有説象凡禽鳥之食也俯而啄仰而四顧一或驚心則飛而去之今鴻漸而進繇干而進于磐之上飲食衎衎何其適也二與五中正相應然猶不急于進自養以待時故其象如此艮為巽正傳所謂止而巽其道不窮者耳象傳曰飲食衎衎不素飽也素猶空也與詩素餐之素同觀五之三嵗不孕則二猶為未遇者如需之飲食安樂以待時耳象恐人不達故以不素飽明之言其從容涵養待可進而進非徒飽于飲食以自養而已九三鴻漸于陸夫征不復婦孕荀爽本作乘不育凶利禦寇變坤為觀互體坎變坤約象離變艮地之高平曰陸三艮山之上畫象高變柔成坤為平地象平故曰陸鴻水宿之鳥止于平陸非所安也詩言鴻飛遵陸毛傳亦謂陸非鴻所宜是也三本無應難與為偶如鴻漸于陸不安甚矣然幸而與四相比有夫婦之遇焉夫指三艮為少男又陽爻故謂之夫婦指四巽為長女又陰爻故謂之婦三四兩爻巽艮之主也彖稱女歸正謂以巽女歸艮男雖非正應然以各得其位兩無應與近而相求遂成夫婦故聖人亦許其歸焉夫征不復婦孕不育二句反言之也以兩爻互相往來取義上卦巽從乾變下卦艮從坤變若九三離內卦而往居于四則六四亦將避本位而來居于三矣九居于四是征行上進而不反也六來于三則有應于上非九四之偶也始雖孕後其敢育哉孕者四之位為腹互坎中滿孕之象也變三成坤則並腹與坎之象皆不見矣故不育此其凶無疑故又決之曰毋以非應相合而懷嫌為也怨女曠夫不為夫婦無以相保將誰為禦寇者乎言無與同患難共甘苦也互坎為寇盜互離為戈兵故有禦寇象鴈羣不亂飛則列陳相保亦能禦寇者合三四兩爻得夫婦之權道孟子所謂取色之重者與禮之輕者而比之奚翅色重正此意也象傳曰夫征不復離羣醜也婦孕不育失其道也利用禦寇順相保也醜類也三本是艮體與初二相同一家若上征而不反復則是棄其羣類也婦雖孕而不敢育者以六四下為六三則上九乃其正應若與九四公然舉子是為失夫婦之正道也利用禦寇者若九三六四不變則相依為夫婦乃一時之權正以兩無應與近而相得思為保聚計故曰順相保也六四鴻漸于木或得其桷無咎變乾為遁互體坎變巽約象離變乾巽為木四方入于巽故曰鴻漸于木鴻不木棲漸于木者謂飛過其上四在上體之下飛而未高猶在木杪如所謂烏鵲南飛逺樹三匝者桷者椽也淮南子云曲木不可以為桷二三四互坎為宫三以一陽畫橫亘于中有桷之象鴻趾連而且長不能握枝故不棲木若得桷而棲之亦可以少安矣或得者偶然之辭以三本非正應故也李宏甫云獨女無依四亦心不自安若漸在木豈鴻所棲哉所謂順以巽者正以無應無依不得已耳漸木而或得其桷亦可無咎此之謂三四相比而成夫婦女歸之權也變乾為遁上實下虛有屋桷相比之象象傳曰或得其桷順以巽也順即順相保之順四雖乘三而非正應然所以能與三為夫婦而順相保者以四體巽德而附下故終得其安棲也九五鴻漸于陵婦三嵗不孕終莫之勝平聲吉變艮為重艮約象離變震陵為高阜九五居尊象也又變柔成艮在艮山之半故曰陵鴻飛過高陵之上猶詩所詠鴥彼飛隼率彼中陵者漸陸者尚失其所居况漸陵乎婦指二卦以巽為女艮為男而爻以五為夫二為婦者蓋以爻畫陰陽相應而言象欲發明象辭利貞之義故借以見例二三四互坎中滿為孕二欲漸進乎五為三四所阻歷三位而後至故曰三歲經三歲之久尚未諧夫婦之好故不孕吳幼清云勝堪也任也莫之勝謂莫之能任也中正相應惟二五相堪終無有能如之者舊讀作勝負之勝非也然則三四隔二五之交者何也曰二五中正而應天作之合也然五近于四四亦欲以為夫二近于三三亦欲以為婦故五不得以速聘二二不得以早許五也久而他議寢然後正配諧所謂終莫之勝也以五夫夫之正率二婦婦之正以五二夫婦之正率人夫婦之正傳所謂進以正可以正邦其位剛得中者正此爻也故吉李宏甫云六二中正自守衎衎然飲食自若獨立無營是女之孟光也此其志豈徒告飽已哉五之漸于陵也非不安也不肯苟而安也三嵗不孕非不育也不肯苟配而育也然而終莫之勝者一擇時不嫁一簡斥數婦到晚始愜所願梁鴻是也此之謂女歸之經二五當之矣變艮為止漸于陵以待正應有艮止象象傳曰終莫之勝吉得所願也中正相應乃二五本願終必諧其所願欲特徐之耳上九鴻漸于陸其羽可用為儀吉變坎為蹇上九進之極也進而不已必亢且更無地可進矣上九知進而又知退故降而從陸陸即三爻之陸三爻水在山上故自干而陸此爻變坎又水在山上故亦有陸象巽性伏入又為進退為不果非一于進者也三上敵應然高潔若上九非繫應者也故其退而棲息之地與三同焉四非三應也獨以其近而慕之上九則不然夫無纍于物則其進退之際雍容而可觀矣吉以操守之節言此女子之貞不字有漢廣江永之風者楊敬仲云人心為進退得失所亂則貪進不克退巽能退者必其心不為進退得失所亂者也儀者儀則也曰其羽者就鴻而言之詩曰鴻鴈于飛肅肅其羽言其羽翮整肅羣飛有序可為儀法也或有釋儀為執鴻羽以舞者非是此言飛鴻之羽豈謂死鴻之羽哉漸上之羽可儀與蠱上之志可則同蓋百世之師也鷹揚之烈不偉于二餓夫徂擊之工不加于四老人麟閣之勳不宏于一客星象傳曰其羽可用為儀吉不可亂也鴻飛列陳有序不可亂之象也上九懷挺特之性峨峨清逺苟非其偶孰得而亂之以其進退有序容止可觀故曰可用為儀以其恬于處貞絶無外慕之惑故曰不可亂兊下震上歸妹征凶無攸利歸妹者女之歸也婦人謂嫁曰歸説文云妹女之少者從女未聲趙凡夫云女之少故稱未聲兼意也為卦震上兊下長男動于上而少女從之婦人內夫家少女處內為入于夫家之象故名歸妹妹即少女之義先儒謂以少承長非是匹敵乃妹之從姊而嫁如象所稱娣云者則帝乙歸妹豈妾人者哉彖特以少女説長男為戒故特著其征凶無攸利耳按彖辭唯臨與井言凶否與剝言不利言凶者未嘗言不利言不利者未嘗言凶而歸妹兼之何也其義則彖傳備矣男女之相從正則吉卦取三四相交有夫婦之義然婦居陽位夫居陰位非所謂正如是而有行非禮法之所容也故征凶婦道以順為利三為兊主下二爻皆剛畫三以柔畫居剛上乃不肯以柔道自安者非所謂順如是而有為非室家之所宜也故無攸利此二象皆主六三一爻言六十四卦中其不吉未有若是之甚者故聖人特著之以為世戒也蠱隨漸歸妹四卦男女長少非其配偶與咸恆二長二少相配者不同皆夫婦之變而隨漸優于蠱歸妹者長女惑少男為蠱少女説長男為歸妹女下于男女為主故凶也長男先少女為隨長女適少男為漸男下于女男為主故吉也六爻皆變為風山漸兊上震下為隨序卦傳曰漸者進也進必有所歸故受之以歸妹漸進者無如女歸故漸彖曰女歸吉而翼傳曰進必有所歸閻彥升云晉所謂進者有進而已此進必有傷也漸之所謂進者漸進而已烏有不得所歸者乎彖傳曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也説以動所歸妹也征凶位不當也無攸利柔乘剛也一陰一陽之為道物無獨生獨成之理故男有室女有家本天地之常經是乃其大義也震長男為天交于地之始兊少女為地交于天之終其在六爻坤乾交于上下坎離交于南北震兑交于東西象天地之交出震見離説兊勞坎象萬物之興天地不交而萬物不興故歸妹為天地之大義也以人道言若使男女不交則人道之絶久矣凡女必歸于男為婦歸妹者為人女之終為人婦之始相生相續莫不繇兹其義亦與天地同大哀公問于孔子曰冕而親迎不已重乎孔子對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂已重乎天地不合萬物不生大昏萬世之嗣也冕而親迎親之也夫喜少者人之情也故下説而上動正以其所歸者妹也蘇子瞻云天地之所以降必天降也男女之所以合必男下也若女長而男少則大過之所謂老婦士夫烏肯下之夫苟不下則天地不交男女不合矣故歸妹者女少而男長女用事而男下之之謂也楊敬仲云以少女而説之衆人之情也非正大之情也而亦未至為邪也愚按古禮男三十而娶女二十而嫁皆以長男娶少女也是則歸妹之卦其于事理亦自無害獨以其兊説在下乃女悅男非男下女也是故在隨曰動而悅在歸妹曰悅以動上下懸殊而歸妹于是乎始病矣位不當者三為兊主以陰居陽性極媚而成躁四為震主以陽居陰情因動而易溺三四本非應徒以近而相得故三上行以求四而四遂為三所惑彖故戒之以征行則凶而象于六三訓其須于九四勉其遲則亦戒征之謂也柔乘剛者以下卦言初二皆剛而三踞其上則三之為婦可知已况執其悅以動陽勢必至男牽欲而失其剛女狎寵而忘其順尊卑之序自此乖唱隨之禮自此廢矣其何利之有曰凶曰無攸利皆即六三一爻以致教戒之辭敬仲云歸妹之義大而卦象則凶不可執一論也象傳曰澤上有雷歸妹君子以永終知敝此專以女説男取象震動而澤搖漾似女可挑始于一時之苟且終將不勝其敝者如詩氓之蚩蚩篇是也君子知夫婦不可不久婚姻當正其初欲永其終則當預杜其敝以六禮先將之知此敝不可長也天下微君子則人道幾漸滅矣王汝中云男女之合莫正于禮莫不正于情以禮而合者咸恆與漸也以情而合者歸妹也歸妹人之終始也故以永終知敝言之君子視其始合之不正知其終之有敝也豈惟是哉士進不正敝必諂友交不正敝必損君子惟謹其微而已錢國端云長女從長男為恆之久何不終之有少男下少女為咸之吉何敝之有惟以下女歸上男以説女歸動男上有易動之失下有易悅之失其終易隙君子是以圖永其終其敝易乘君子是以當知其敝終且敝兊澤毁折之象永且知震雷恐懼之象初九歸妹以娣跛能履征吉變坎為解娣之為言第也言以次第御于君也古天子一娶九女諸侯一娶三女同姓媵之榖梁傳云一人有子三人緩帶是也又曲禮世婦姪娣蓋以妻之妹從妻來者為娣也聖人制禮必以姪娣充媵者所以廣國嗣使所自出者一同而無他異也初位下而無正應故象娣歸妹以娣者言嫁妹而以娣從之也所以為妹者兊所以為兊者三妹指三也初居位下最卑而有陽剛之性其才足任使令故為跛能履之象初非跛也自嫌與嫡並故能履而託之于跛也已實有才而能斂之以承嫡賢亦至矣征者進供職役承嫡以事夫也夫位卑則得其常職承嫡則可以展舒故彖云征凶而此獨云征吉也初在下履象兊毁折之故稱跛變坎為曳亦跛象兊為妾初二兩爻皆取妾象若小星之夫人能謹進御仲氏之淑慎能朂莊薑是初二兩爻之德也象傳曰歸妹以娣以恆也跛能履吉相承也姪娣之從古今常禮故曰以恆言以常禮而行也跛者不能自行依人乃可如娣妾承正室以行則吉以其得承嫡之義也九二眇能視利幽人之貞變震為重震互體離變艮九二亦娣也其不言娣何也因初九之辭也何以知之婦道行不踰閾窺不出戶二之眇能視與初之跛能履皆同德也二具陽剛之體亦娣姪之有才智而能承望顔色以事人者本非眇也能視而託之乎眇亦避嫡也此非幽靜之女其孰能之幽則貞矣而又曰利幽人之貞者卦惟二五有應嫌其敵君而並后也變震為動故以利貞戒焉互離視象兊毁折之故稱眇二變則離體壞亦眇象二為人位幽人猶云靜女亦詩之稱女士也象傳曰利幽人之貞未變常也有才而無德以將之鮮有不為權寵所移而變其常者故以幽貞為利詩云婦無公事休其蠶織正此意也六三歸妹以須吳澄云荀爽陸績作嬬子夏孟京作音義並同反歸以娣變乾為大壯互體離變乾約象坎變兊歸妹之所歸者三也初與二則其娣也三陰柔而不中正為説之主上無正應特以鄰比九四遂委身焉下悅上動少女長男相得甚歡聖人慮其溺而無所底也於是引禮以節之所謂歸妹以須反歸以娣者即貫魚以宫人寵之禮也按禮注天子御妻八十一人九人旅進當九夕世婦二十七人亦九人旅進當三夕嬪婦九人當一夕三夫人尊當一夕王后又尊專一夕凡十五日而遍詩疏云諸侯九女望前先卑望後先尊姪姊六人兩兩而御當三夕兩媵當一夕夫人當一夕五日而遍須待也言妹雖已歸而非其當夕必循禮以待反而歸其所居之室使其娣之當行者進御于君所也娣即初二是也先王制禮所以必傋姪娣如彼之多者非徒廣繼嗣亦以均恩寵消嫉妬使六三而知此義必無悅動之愆九四而知此義亦不至受乘剛之禍矣兊變乾女而操夫柄恐不止柔乘剛而已象傳曰歸妹以須未當也當平讀言尚未當君御也九四歸妹愆期遲歸有時變坤為臨互體離變震約象坎變坤四居上體為成卦之主長男受少女之歸者也雖是陽剛震體而居于陰位欲根未淨不能不為兊三所悅而動故以愆期勉之過時未歸故云愆期遲待也九四正為妹所歸者也而至于愆期者剛履柔而能從容俟時以全其妹之正者也詩曰士如歸妻逮氷未泮故家語云霜降多婚冰泮殺止震則冰泮矣而猶曰遲歸有時非愆期乎因四無正應以陽應陽則純陽矣故愆期三四雖非應然近而相得震男兊女終必相合故曰遲歸有時本卦震兊互爻離坎震春兊秋坎冬離夏四時象也震東兊西相隔甚逺有愆期象四時循環則相遇矣震為坤必動以順亦待時象象傳曰愆期之志有待而行也六禮不備不可以成婚九四愆期之志正欲待其時之可歸而後行親迎之禮非徒狃于近比以相悅而已勉九四當如是也六五帝乙歸妹其君之袂不如其娣之袂良月幾荀爽本作既望吉變兊為重兊約象坎變巽此震爻也諸家皆以妹解殊為失之蓋為帝乙言也帝乙以柔中而居尊位故取六五以象其德王姬下嫁自古而然至帝乙而後正婚姻之禮如京房傳載帝乙歸妹之辭則帝乙之為帝乙可知也而其為妹者亦可知也稱帝乙歸妹所以告三使知取法也三即妹所居之位也其君謂妹也禮夫人稱小君堯降二女于溈汭而後世一稱湘君一稱湘夫人嫡例為君而餘皆媵也其娣即初二也袂衣袖也所舉斂以為禮容良美好也帝乙為其妹製袂尚德而不尚飾故其袂不及其娣之袂良也衣之袖口袂所取飾也乾為上衣兊為口乾三畫皆奇變其外一奇為偶者袂之象下卦六三娣之袂也六五變為奇則上六為女君之袂然必六五變奇而後成如裁改而成之袂不如下卦六三之袂固有而自成者之為善也夫婦人之性未有不妬者帝乙之妹歸而容其娣之飾袂勝于已蓋不自擅寵而欲其娣幸能逮下者也象于六三針之曰歸妹以須反歸以娣意實如此此其德盛矣月者大陰之精后妃象也后妃不妬忌有關雎樛木之德則有螽斯麟趾之應王姬下嫁為侯夫人而能象之其德近于后妃矣故曰月幾望詩召南之鵲巢小星是也三而能此吉孰加焉或云月者羣陰之主即女君象也幾望言女君之謙盛而未盈也望則盈矣故宜家而吉亦通中爻離坎坎映東離映西日月相望之象以皆非正體故但稱幾望云月幾望在小畜中孚以位言陰盛而與陽亢也在歸妹以德言陰盛而可與陽對也卦惟二五有應然命卦大旨只以三之歸四言故于二五不取應義變兊為悅亦悅以使娣象象傳曰帝乙歸妹不如其娣之袂良也其位在中以貴行也直曰帝乙歸妹不如其娣之袂良以明其妹之袂乃帝乙所製也帝乙體柔德而居中位以其所貴尚者行之所貴尚在德無事乎區區之飾以炫美也其德維何如敬不匆于君子孝不衰于宗廟慈不略于妾媵恩不靳于姻族皆是上兩句舉爻辭下兩句釋其義如需上六象傳例上六女承筐鄭玄本作匡云宗廟之禮主婦奉匡米無實士刲羊無血無攸利變離為睽女指六三之兊女士指上六之震男二爻皆陰不能相合為夫婦故止以士女稱之上六陰虛約婚而無納幣之實故三承其虛筐三亦陰虛徒承上之虛約而不能具酒食召鄰里盡附逺厚别之義故士刲其死羊婚姻之不成可知矣筐乃竹所成上卦震為竹又仰盂虛筐象也上爻變離亦中虛無實之象也三自下承上故曰承下卦兊為羊上爻變離為戈兵刲之象也三約象坎雖為血卦互體離乃為乾卦無血之象也無攸利者人倫以廢後嗣以絶何所往而利哉彖所言無攸利者指六三不指上六然三亦以與上無應故退而從四所云説以動皆上六貽之上六不得不任受咎也左僖公十五年初晉獻公筮嫁伯姬于秦遇歸妹之睽史蘇占之曰不吉其繇曰士刲羊亦無􅎺也女承筐亦無貺也西鄰責言不可償也歸妹之睽猶無相也震之離亦離之震為雷為火為嬴敗姬車脫其輹火焚其旗不利行師敗于宗丘歸妹睽孤寇張之弧姪其從姑六年其逋逃歸其國而棄其家明年其死于高梁之墟其後獻公卒秦穆公納公子夷吾為晉侯既入而背其賂秦伯伐晉以晉侯歸乃使太子圉為質于秦夷吾反國子圉自秦逃歸未幾夷吾卒子圉立秦穆公納公子重耳為晉侯重耳入晉子圉奔高梁重耳使殺子圉于高梁愚按􅎺血也貺賜也兊在西秦為西方震為言上六變則言渝故曰西鄰責言不可償也歸妹于秦欲得其助變而為睽兩情相違故曰歸妹之睽猶無相也自三至五體坎為車雷電交作車不能行故為脫其輹象變離為火爻之下體有坎為曳象旗離火在上燒之故為焚旗象三上敵應上體震為木三體兊為金木與金遇必為金所勝兊居西方故為嬴敗姬象震為兄兌為妹震木變離火火從木生以震為父則以兌金為姑矣木既為金所克則姪無所依故為姪從姑象其與敗于韓質子圉事一一吻合春秋筮法之神如此至曰敗宗丘死高梁殆不可曉杜氏注云凡筮者用周易則其象可推非此而往則臨時占者或取于象或取于氣或取于時日王相以成其占傳會以爻象則搆虛而不經此語良是象傳曰上六無實承虛筐也上六陰虛無實則六三之所承者乃虛筐耳此婚之所以不成也第十三對豐旅雜卦傳曰豐多故也親寡旅也豐有冨盛之象旅有窮困之象豐以盛大而多憂旅以漂泊而寡親然豐固不可自恃而旅亦不必自阻也惟運離明之德以行之則豐可常豐而旅不終旅矣易置之上經為噬嗑賁噬嗑明罰賁無敢折獄盡明慎之慮于先豐折獄旅不留獄極明慎之用于後易凡言刑獄之事未有不取諸離者斷獄以明為主舜戒臯陶曰惟明克允是其義也一説離中虛囹圄之象又麗義也離下震上豐亨王假庚白反之勿憂宜日中豐説文云豆之豐滿者從豆象形陸德明云豐是腆厚光大之義為卦震上離下王者其明如日其威如雷光天之下靡不輝煌振動此固豐之象也故名豐豐為盛大其義自亨非豐後方亨也假至也王假之言王者至此時云爾天地既平其勢必至于極盛不憂其不至而憂其已至也豐有憂道焉而云勿憂蓋有知者皆能憂而空憂不如勿憂也當思其作為何如憂而或為勢格或為人掣雖起而救之濡緩不力或詆曰為大或詆曰妖言始于憂而終于不憂者皆是曰勿乃深切之辭非謂可無憂也蓋于此有道焉可不必憂也其道安在亦曰致豐之本即保豐之道何以致豐離明主之而震動將之也宜常如日之方中使其明無所不及則幽隱畢照魑魅潛消斯可永保夫豐亨矣六五以柔居尊位而屬震體有震動憂驚之象自二至上肖坎亦加憂象六爻初二為地下三四為人間三爻初為地下二為人間本卦自初至四肖離乃日照人間而將至于地下之象故謂之日中不久則昃矣日中指二三四爻言觀爻辭可見况震雷在上陰雲晦雨將不時至豈但日中不見日而已乎如六五上六者以陰柔居上曽不知保豐為何事勢必至壞其日中之業而後已是則豐卦之所大憂者也六爻皆變為風水渙離上震下為噬嗑序卦傳曰得其所歸者必大故受之以豐豐者大也物所歸聚必成其大然得其所歸必有所以受之者而始稱得無所以受未可謂得所歸也鄧禹師行有紀百姓攜負迎降日以千數所至輒停車駐節勞來之然自馮愔叛後威名稍損附者日益離散劉先主東下荆州之人歸者十餘萬或勸速行以據江陵先主曰舉大事以人為主今人歸吾吾何故棄去卒為曹操所襲及于當陽之坂棄妻子走徐偃王以行仁義走死蓋亦此類荀文若謂袁紹布衣之雄耳能聚人而不能用晉史謂劉琨長于招懷而短于撫御一日之中歸者數千而去者相繼何去非亦謂孔明有合衆之仁無用衆之智得其所歸其難有如此者朱子發云前曰與人同者物必歸焉故受之以大有此曰得其所歸者必大大有次同人者處大之道也豐次歸妹者致大之道也吳幼清云臨之大以其所臨之二陽為大豐之大以其卦名為盛大之義彖傳曰豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虛與時消息而况於人乎况於鬼神乎孔仲達云凡物之大其有二種一者自然之大一者繇人之闡𢎞使大豐之稱大乃闡大之大非自然之大也楊敬仲云離明震動以明而動故豐故亨以昏而動則反是矣尚之言猶也尚大者非以大為尚言王者至此時尚猶為盛大也當豐之時大而未遇故曰尚大也勿憂宜日中者宜操持其盛大使常如日中之時而其明普照于天下也錢國端云日之為言照也日中之為言常照也故曰方進于中斯謂之宜若已進于中便不謂之宜日既中矣勢必至于昃猶之月既盈矣勢必至于食食虧缺也下卦離日中爻兊為西昃象也自二至上大象坎月中爻兊為毁食象也推而天地之大其盈虛無不與時消息盈虛謂盛衰消息謂進退而况于人豈可獨昧此與時消息之理乎况于鬼神又豈不日著此與時消息之理乎于今日之方中乘其未消未虛而圖之猶可為也必曰吾如氣化焉何哉則其始而明動以致豐也孰勸之其既而不明不動以致昃也孰禁之氣化邪人事邪無貴于王者矣蘇子瞻云既盈而虧天地鬼神之所不免也而聖人何以處此曰豐者至足之辭也足則餘餘則溢聖人處之以不足而安所求餘故聖人無豐豐非聖人之事也胡仲虎云盈虛消息惟剝與豐言之剝則君子之道已消而虛故有息之機豐則天下之勢已息而盈故有消之幾天地鬼神乾卦後唯謙與豐言之謙則有虛可以持盈豐則自盈必至于虛此固天地鬼神之常理也象傳曰雷電皆至豐君子以折獄致刑雷電同時而至威焰盛大故卦名為豐傳云為刑罰威獄以類天之震曜故易至于雷電相遇則必及刑獄取其明以動也噬嗑動先于明猶慮未當故曰明罰勑法豐明而後動刑可施矣故曰折獄致刑又蔡介夫云明罰勑法以立法者言故曰先王折獄致刑以用法者言故曰君子當此豐亨世界如何有事于刑獄蓋世道大亨之時正百弊叢生之會即如有虞府修事治而士師之命象刑之明獨惓惓焉孟子謂國家間暇及是時明刑正謂此也獄者刑之未定刑者獄之已成折謂折衷其至當之理象電之照致謂自此而致之于彼象雷之威威照並行象雷電皆至若夫離與艮相遇則曰無折獄無留獄者蓋取其明以止也初九遇其配鄭玄本作妃主雖旬荀爽本作均劉􅷶本作釣無咎往有尚變艮為小過配主謂九四也程傳有雷電皆至成豐之象明動相資致豐之道非明無以照非動無以行相須猶形影相資猶表裏初九明之初九四動之初宜相須以成其用雖敵應而有相配之義故曰配與他處之以應為配者不同主卦主也外卦震四為震主故以主稱云配主者言初之所配乃外卦之主也十日為旬雖旬無咎者以納甲言離納已震納庚自已逆數至庚為旬日當豐之時人心懈弛上下玩愒必明動相資則往而有功有可嘉尚雖遇之稍遲至于旬日猶可以無咎若更遲而不遇則不可也吳幼清云凡卜筮吉凶以一旬之內為斷過旬則再卜再筮矣故亦以一旬為限節也自二至四肖坎坎行有尚者也故初六往有尚變艮為止故以往䇿之象傳曰雖旬無咎過旬災也旬而遇四天下事尚可為也過庚而自已入戊則坎納之此時乃陰雨之時雖綢繆亦無及矣故為災六二豐其蔀鄭玄薛仁貴本作菩云小席日中見斗孟喜本作主往得疑疾有孚發若吉變乾為大壯互體巽變乾蔀説文草覆曖也互體巽草之象也故大過下巽曰白茅泰卦下變巽曰拔茅二四之豐蔀三之豐沛皆草木蒙翳蔽塞之象當豐之時正值夏長萬卉交作草木雜陳故其象為豐其蔀五為天位二為地位三四為人位日麗中天而光照地上故二三四皆象日中星不晝見避日光也日虧則星見人蔽日而窺則星亦見茂林之下可以見星也斗星尤大而易見者二四之見斗皆指五言斗為帝車運乎中天故為五象體震仰盂亦斗象二陰屬魁一陽柄也又震數七北斗七星亦震數夏日至北近極而斗見夏小正五月斗柄正在上是也五以柔暗居尊位謂之斗則可謂之日則不可二仰承之故為日中見斗之象言草蕃盛障日不見其日而惟見其斗也明者無疑暗則多疑五既陰暗二以陰柔往遇之必致五之猜疑曰疑疾者如樂廣之容見杯中蛇影遂致疾蓋因疑而得疾也凡言往者多自下而進上初之往上而從四也初以陽居陽而四又陽故往有尚二之往上而從五也二以陰居陰而五又陰故往得疑疾互坎為心病疑疾象也有孚指四四與五比得坎半體故稱孚二雖離主而才柔不能有所開發惟四居近君之位具剛陽之德若能盡其孚信以撤五之蔀則五必知二之賢明可任而與之勠力以共襄日中之治不難矣發如發蒙之發若助語辭五得四之發則始雖暗而終不暗故吉變剛為夬乃能決陰象傳曰有孚發若信以發志也有孚發若指四言信以發志者盡一己之誠信以感發其君之心志也能發其志則必與賢明之二相合亦不至往而貽其疑疾矣曰發志自與人適政間者異九三豐其沛古本或作斾子夏傳作芾云小也鄭玄于寶同云祭祀之蔽膝日中見沫漢書及字林子夏傳鄭玄馬融本俱作昧字林云斗杓後星子夏傳云星之小者薛云輔星也服虔云日中而昏也折其右肱姚信本作股無咎變震為重震互體巽變良約象兊變坎公羊傳云草棘曰沛應劭云沛者草木之蔽茂禽獸之所蔽匿齊侯田于沛是也或云草生水中曰沛則沛亦蔀之義也二三四互巽取象同又約象坎亦有草生水之象沫九家易以為斗杓後小星薛氏謂斗之輔星是也指上爻言上居五旁五為斗則上為沫矣日中見斗已非所宜至上六則暗愈甚雖至小而難見之星亦見此蓋權臣之在君側而煬竈蔽明者折其右肱謂九三也變柔互艮為肱約象兊為右為毁折一説陽爻為右陰爻為左故師之左次明夷之左股左腹皆陰爻也此陽爻故以右言之亦通右肱乃人之所用而最便者賢智之才遇明君則能有為于天下今九三既為上六所掩抑則不能有為如人之折其右肱也他卦應爻皆貴陰陽相應獨豐九三上六不然則以柔掩剛故易不可為典要此類是也然此所遇非其人非九三之失也故揆之以義無咎變震為重震雖動而明體失矣安能濟大事哉象傳曰豐其沛不可大事也折其右肱終不可用也邪人當途曀曀其陰故不可成大事也右肱折矣焉能有為故終不可用也不可大事非謂可小事謂難與有為如大事去矣之類九四豐其蔀日中見斗遇其夷主吉變坤為明夷互體巽變坎約象兊變震二之豐蔀見斗者應乎其昏暗也四之豐蔀見斗者比乎其昏暗也皆指五言四體震震為蕃鮮故亦曰豐其蔀又二居申爻巽木之下四居中爻巽木之上仍蔀象也夷主指二舊指初非也夷即明夷之夷此爻變卦亦為明夷日中見斗下卦離明之體已受掩于五而傷矣二為離主乃其所傷之主爻故以夷主稱亦猶初九之稱此爻為配主也若初爻則無主義二雖陰柔然所以為離者二乃明之體也四與之遇而引以同升明動相資于以戮力佐君而日中之盛可保不亦吉乎二之望四也曰有孚發若四之契二也曰遇其夷主其互相倚重之意可見已凡説卦先論主爻不明主爻未有能得卦旨者也學者識之變坤為順故能下賢象傳曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也五為暗主四之豐其蔀以所處者近君之位也日中見斗以五之幽不明故至于見斗也卦中二爻四爻五爻皆稱吉四遇二而引之協力以事五乃以吉道而行也體震為行故曰行六五來章有慶譽吉變兊為革約象兊變乾凡卦自上而下者謂之來此來字非各卦之來乃召來之來也謂虛已下賢以召來之也物相雜成文下四爻剛柔交錯所謂章也五本柔暗在上不足致慶譽然下有初二三四皆賢臣也五能招來而使之各效其用羣賢彚征豐亨可保慶集厥躬聲聞天下豈幸致哉下四爻二應五四比五初則應四以從五者惟三為上所排擠無繇自通于五今五既來章則上六之媒孽有所不行且將收之于廢棄之餘而資其一臂之用所不齒者唯上耳衆賢之進如茅斯拔大姦之去如距斯脫吉孰如之變兊為口有譽象且下與離主相應象傳曰六五之吉有慶也人君以天下常豐為慶慶以天下故吉未有無福慶而有譽者言慶則譽在其中矣上六豐説文作豐云大屋也其屋蔀其家窺説文作窺其戶闃從門內狊狊犬視貌或作具作貝皆非姚信本作鬩孟喜本作窒其無人三歲不覿凶變離為重離此陰柔小人專天寵以自豐潤其身者夫人當豐盛之時必守之以謙節之以約吐哺握髮以延天下之士夫然後高而不危滿而不溢上六處豐之極亢然自高方豐大其居以明得意家之幽深草且生而覆曖故曰豐其屋蔀其家變離為震震之蕃鮮巽之草木內外障蔽之皆蔀家之人也方且深居簡出距人于千里之外人之謁之因鬼見帝有三歲而不得一覿者蓋自尊大之甚也豈知凶將及矣能無懼乎變離為目故稱窺又稱闃又稱覿窺與窺通徐鍇説文注云案易窺其戶闃其無人窺小視也狊大張目也言始小視之雖大張目亦不見人也義當只用狊字艮為門變離則艮之下體偶變為奇故象戶三人位本與上應而上已折其肱故三逺避而內無人自三至上歷三位故曰三歲不覿總之上六惟知有已耳寧識爵祿為世間公器可容久據之物哉揚子雲云炎炎者滅隆隆者絶觀雷觀火為盈為實天收其聲地藏其熱高明之家鬼瞰其室正凶意左宣公六年鄭公子曼滿與主子伯廖語欲為卿伯廖告人曰無德而貪其在周易豐之離弗過之矣間一嵗鄭人殺之象傳曰豐其屋天際翔也窺其戶闃其無人自藏也六居上之位有小過飛鳥之象言上六之大其屋其高如鳥之翔于天際也窺其戶闃其無人者言上六豐大之極藏匿之深自視太尊人莫敢近豈人之絶彼哉彼自絶乎人耳此一爻形容人處豐時最為親切令人可畏噫豈特處富貴豐大之極者有此凶哉人以學識自高而大其障蔽者其初之自視亦足翺翔天表藏身富美之室其終至于人莫敢親而猶自以為人莫及者何以異此艮下離上旅小亨旅貞吉旅原軍旅之旅軍之五百人為旅從於從從從俱也故從從衆出為旅寓故又謂在外為旅也唐孔氏云旅者客寄之名失其本居而寄他方謂之旅為卦離上艮下山止而不遷猶舍館也火行而不居猶行人也小亨以小而亨猶暌言小事吉非謂所亨者小也處旅之道過剛則窒惟有文明柔順之德則可以致亨六五是也陰爻為小故曰小亨顧旅必擇主旅非其地且得危故旅必于貞乃吉所當主者六二是也卦惟二三兩爻得其正位然三剛而不中惟二五兩柔相應有主賓同德之象舍二無可主者矣故以貞歸之乾鑿度載仲尼魯人生不知易本偶占其命得旅請益于商瞿氏曰子有聖知而無位孔子泣而曰天也命也鳳鳥不來河無圖至嗚呼天之命也嘆訖而後息至停讀五十究作十翼殊鄙淺不足信六爻皆變為水澤節艮上離下為賁序卦傳曰豐者大也窮大者必失其居故受之以旅豐盛至于窮極則必失其所安旅所以次豐也太康尸位以逸豫滅厥德黎民咸二乃盤遊無度畋于有洛之表十旬弗反有窮后羿因民弗忍距于河此窮大而失其居也齊湣王伐功矜能謀不逮下廢黜賢良信任讒諛政令戾虐百姓怨懟樂毅攻之出走衛衛君辟宫舍之稱臣共具而王不遜衛人攻之去奔鄒魯又有驕色鄒魯不納遂走莒楚將淖齒執而數之擢其筋懸之廟中宿昔而死此窮大而失其居也唐玄宗寵楊貴妃封其姨韓秦虢三國夫人凡充錦繡官及冶琢金玉者大抵千人奉須索奇服祕玩變化若神四方爭為怪珍入貢每十月帝幸華清宫五宅車騎皆從家别為隊隊一色俄五家隊合爛若萬花川谷成錦繡楊國忠導以劔南旗節遺鈿墮舄瑟瑟璣琲狼籍于道香聞數十里祿山反帝逃諸蜀至馬嵬賜貴妃死裹以紫裀瘞道側此窮大而失其居也宋徽宗性機巧多技藝不修國政大興土木窮極淫樂令朱勔採花石于蘇杭舳艫相銜發民屋廬而搜之起艮嶽六年而成極土木之妖都下每秋風靜夜禽獸之聲四徹若山林陂澤之間信用姦邪與金人共滅遼尋為金人所欺北殂于五國城此亦窮大而失其居也彖傳曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉柔得中乎外而順乎剛此以六五釋旅小亨之義離從乾變坤之一柔得上卦之中而順乎乾之二剛蓋良賈深藏若虛君子盛德容貌若愚色斯舉矣翔而後集處旅之道也六五具之矣止而麗乎明者此以重卦釋旅貞吉之義內卦艮止外卦離明五之自外而至止也皆本于其知止之明來相附麗非苟止也夫柔中如五已有亨道而復得其所止不吉焉往故總結之曰是以小亨旅貞吉也旅之為道宜若小然然必柔中順剛止而麗明方得亨吉則難處者旅之時難盡者旅之義人豈可以其小而忽之哉重耳在外十九年卒成霸業其大者孔子以東西南北之人為萬世師顧用旅何如耳象傳曰山上有火旅君子以明愼用刑而不留獄火在山上逐草而行勢不久留故為旅象獄之于民猶火也此豈可淹留者哉明其刑以罪之輕重言象火之照無濫及也愼其刑以罪之出入言象山之鎮無偏聽也既斷斯獄當罪者即罪之當宥者即宥之不復淹留如山不留火焉留獄猶言懸案非留于獄中也賁旅皆離艮成體刑獄以離明為主而曰無敢曰不留其有取于艮止之意亦深矣初六旅瑣瑣斯舉正作廝云王弼注原解為廝賤之役其所取災風俗通怪神篇云凡變怪皆婦女下賤何者小人愚而善畏欲信其説類復裨增文人亦不證察與俱悼懾邪氣乘虛故速咎證易曰其亡斯自取災今文無此語未知即引此否變離為重離瑣瑣小也艮為小故曰瑣瑣旅瑣瑣者羇旅之間計財利得失之毫末所見者小也丈夫生而有四方之志處旅之初而即為封植之謀其細已甚志不及逺矣斯者此也放利而行多怨之道此其所以致災慶封奔吳致富君子知其及于殃斯之謂歟一説斯分析也即詩斧以斯之之斯變離為分析又離為戈兵故有斧象中爻九四得其資斧是也初六卑鄙瑣瑣然分析其所取是以困窮而遇災亦通旅內卦艮故下三爻皆有艮正象初四相應初以瑣瑣召災而四乃以得資斧為不快者初柔而四剛初止而四動其志其德不同故也變離為火上下皆火有火災象多藏厚亡戒在糜竺矣象傳曰旅瑣瑣志窮災也志窮謂心志窮促淺狹也夫人必有所不屑也而後可以大受初六志窮此所以瑣瑣取災與六二旅即次懷其資古一本有斧字得童九家易李鼎祚本作僮僕貞變巽為鼎互體巽變乾內卦為主外卦為客六爻惟二居中得正乃主之賢者而與六五同德相應彖所謂旅貞吉即此爻也即就也野宿為次五擇主而棲得二與之同德以為可依遂暫止焉二亦相得甚歡以資財與童僕卑之此五所以在旅次之中既有財用可以懷藏又有人力足供使令也艮為門二居艮止之中即次得安之象資齎也聘禮問幾月之齎旅中所用也互巽變亦巽巽為近利市三倍資之象也巽為伏又自二至五肖坎中滿中藏有實懷資象也少曰童艮為小子故稱童長曰僕艮為閽寺故稱僕皆指二言也與五相應為五所有得童僕象也晉文公之奔也至楚楚享至齊秦齊秦妻之資之以適他國所謂旅即次懷其資也腹心有子犯子餘股肱有魏犨賈他矣又得秦之三千人實紀綱之僕所謂得童僕也貞即旅貞之貞同德相與如孔子于衛主顔讎繇于陳主司城貞子非泛泛萍水然者故曰貞言貞則吉可知要之懷資則不患出疆之無贄得童僕則不患先申之無人五將乘此以覽德輝而下之亦不久戀即次之安矣象傳曰得童僕貞終無尤也五之得童僕也實以貞道而得之故終無過尤也如使疽環彌子輩假孔子以童僕即為過尤矣此樂克之徒餔啜所以見麾于孟氏也不并言懷其資者省文耳九三旅焚其次喪息浪反其童僕貞厲變坤為晉互體巽變艮約象兊變坎旅之為義原可一宿而不可久處者潘安仁賦所謂兹地雖信美而非吾土是也三為艮主乃一于止而不知變者逼于離火災將及矣猶且狃野宿以為安如處堂燕雀然此火之所以焚其次而至于喪其童僕也二即次而三被焚者何二去離火逺而三近也艮為童僕三被焚則變而成坤非艮象矣故喪其童僕也九三未嘗不當位故貞與二同但剛而不中止而不動無避禍全身之哲所以不能免厲此足為懷居者之戒之爻也孔子之削迹伐木似之然能見幾而作避繒繳于未至之先是則聖人所以藏身之固也象傳曰旅焚其次亦以傷矣以旅與下其義喪也人之芒也禍重于地莫之知避如九三者以漂泊羇旅之人而自招焚次之厄庇身無術亦可傷矣人久客則思家苟視客如家則其童僕之隨從者亦必潰散而後已故其義喪也義猶言理言其理當喪也雜卦傳云親寡旅也唐人詩云漸興骨肉逺轉于童僕親在旅之時所親者童僕耳然久而不歸則解體若此旅豈久安之地哉九四旅于處得其資斧子夏傳及衆家並作齊斧張軌云齊斧蓋黃鉞斧也張晏云整齊也應邵云齊利也虞喜志林云齊當作齋齋戒入廟而受斧巽卦同我心不快變艮為重艮互體巽變坎約象兊變震詩公劉于時處處于時廬旅則處與旅不同對出言之為處止息間居之謂也下卦艮艮土性止上卦離離火性動四體離而變艮故有旅于處之象彼其抱剛明之德離下而上士之載質而出疆者也方思一得當以行其道乃不遇同德之君授之位以康濟生民徒旅于處而已雖得資斧奚快哉資所以為用斧所以為防皆旅中所必需者互巽利倍得資象離為戈兵又互體兊巽巽為木兊為金木貫于金為斧得斧象二之懷資勸駕也四之得資斧虛拘也季孟之待孔子以行國中授室孟子以去何快之有我九四自謂也四當心位故稱心變柔互體成坎亦不快之象一説王輔嗣云九四失位而居艮上艮為山山非平坦之地也斧所以砍除荆棘以安其舍者客子所處不得其次而得其資斧之地故其心不快亦通象傳曰旅于處未得位也得其資斧心未快也惟不得位而旅處故雖得資斧未快也夫得資斧而心猶未快况甫出門而即瑣瑣乎然則初四度量之相越豈不逺哉六五射食亦反雉一矢亡終以譽命變乾為遁約象兊變乾離為雉又為矢矢所以射者皆離象所有亡即出亡之亡離火炎上故有出亡象雉者文明之物射者君子之事射雉者謂取則于文明之道如以雉為質的然離從乾變六五舍乾之剛健而得柔之文明處得中道以順乎剛彖所謂小亨即此爻也以斯德在羇旅之中終必有譽命逮之雖挾一矢而出亡旅不久矣譽謂聲譽命謂眷命互兊恱體又為口譽象變乾命象王者無旅旅則失位天王出居春秋傷之故此爻不取君位象然少康逃虞思之國宣王匿召公之家是亦旅也謙柔自牧文明在中可以挽人心回天命者其旅之六五乎象傳曰終以譽命上逮也逮及也以臣言則譽命者君所豫以君言則譽命者天所豫皆從上而及者也上九鳥焚其巢旅人先笑後號戶羔反咷喪息浪反牛于易凶變震為小過上九與九三為應其實一人也在九三為艮之極則止而不知動在上九為離之極則動而不知止故皆足以取災艮為黔喙之屬上變柔成小過亦有飛鳥象三四為鳥身所謂鳥蓋自九三言也離為科上稿故象巢鳥旅物巢旅所上九自九三來託于卦末有飛鳥營巢之象離為火中爻巽為風風熾火烈有焚巢象三之焚次以與離近則為他人所焚也上之焚巢以處離極則自焚也上之好進不休猶鳥之高飛不息必自焚其巢而後快旅人指上九上非人位而稱人者以自三來上故曰旅人旅人先以逺行為喜後以途窮為悲秉剛而不知變正與夫子所言順剛麗明者相反宜其號咷也離火聲無常若笑若號故為笑號咷相繼象禖卦傳曰同人親也故先號咷後笑親寡旅也故先笑後號咷向不過喪其童僕今則并其駕車之牛而喪之自初至五肖坎復體為車象離為牛駕車在前上變則失離體易即埸上在卦盡處疆埸地也與大壯喪羊于易同夫既窮大而失居以為旅矣又謔浪笑傲驕倨輕脫為窮大以益之我以意氣凌人人亦以意氣加我至于巢焚牛喪欲次則無其所欲行則無其資凶其所自取耳莊子云行盡如馳而莫知其所止可不謂大哀乎尼父周遊列國晚賦歸與孟子所如不合退而著書蓋皆有見于此矣變震為威武旅以柔和為道者也以威武行之不凶何待又漢成帝報許皇后詔云乃昔之月鼠巢于樹野鶴變色五月庚子鳥焚其巢太山之域易曰鳥焚其巢旅人先笑後號咷喪牛于易凶言王者處民上如鳥之處巢也不顧恤百姓百姓畔而去之若鳥之自焚也雖先快意悅笑其後必號而無及也百姓喪其君若牛亡其毛也故稱凶其解又異象傳曰以旅在上其義焚也喪牛于易終莫之聞也已處卦終行更何往然炎上之性不能自制勢必自焚其巢而後已故曰以旅在上其義焚也喪牛于易杳無建豎蓬轉之人浪迹天涯安能有聞于世故曰終莫之聞也凡剛必濟柔乃善易中所載皆柔道如知趨知避知進知止是也若任其偏性一往不返則過剛之失也故九三之與上九趣操各異而受病則均舊解以謙和為柔亢厲為剛特剛柔之迹耳蘇君禹云古者丈夫桑弧蓬矢射天地四方而童觀窺觀且以小人女貞視之故在鄉井之日常少而在逆旅之日常多以孔之聖焉而轍環以顔閔之賢焉而從遊以孟之賢焉而歷聘何之而非旅也極而言之百年須臾吾生亦旅也天地者萬物之逆旅天地亦旅也然所以處旅者固有道矣易過之光陰如浮雲飄忽吾不得而留之也有限之精神正是安身立命境界吾不得而分之也孔子言恭敬忠而雖之夷狄不可棄中庸言素位而行乎患難行乎夷狄兹其為處旅之善道哉自素位之學或闕而剛柔之稟各殊一于柔者方且以旦夕之寓為百年不逝之光景而徘徊瞻戀瑣瑣不休一于剛者方且以英氣加人以獨斷任事至焚次而不安得資斧而不快焚巢而終于號咷也非善處旅者也傳曰柔得中乎外而順乎剛止而麗乎明豈直行旅而已即終身可矣第十四對巽兊雜卦傳曰兊見而巽伏也兊陰外見巽陰內伏巽兊乃下經主卦下經最後始重體而見經初與四為巽之主巽本以陰在下為能巽也彖傳乃謂剛巽乎中正而志行柔皆順乎剛三與上為兊之主兊本以陰在乎上為能説也彖傳則謂剛中而柔外説以利貞蓋終主陽也云爾巽下巽上巽説文作顨石經作巽小亨利有攸往利見大人巽説文云具也下從丌上從二卩徐鉉云庶物皆具丌以薦之包氏云從二卩者損之又損順義也易卦古文作顨音義正同顨從丌從士戀切徐鉉云之義亦選具也愚按選具而進恭敬特甚則是順之義也故爻辭中有用史巫紛若之語云為卦一陰居于二陽之下故象其德為入又為伏總之巽順意也二巽相重內外皆順故仍名為巽卦之名巽本取柔之卑伏然一陰生下二陽遜位而居之亦有巽義故當巽之時陽亦用巽道以懷服乎下凡巽之所以致亨皆陽之為也所謂申命乃陽事也有陽以巽之于上故陰爻之小者能致亨以初四兩爻言陰為卦主故曰小亨思致亨之繇則初四之所宜往宜見者可知自下之上稱往初往二四往五也自二至上大象肖離為見二五以陽剛居人位皆曰大人初為小民之位則利見九二親民之大人四為近君之位則利見九五居尊之大人也卦有四陽惟二五下比二陰居中得正據用事之地故初四利見焉若三與上則逺矣胡仲虎云上經自乾坤後震坎艮三男皆用事至小畜履巽兊方用事小畜者小巽之一陰也下經震艮既重之後至此方見巽兊之重巽之繇曰小亨亦小巽之一陰也一陰之萌聖人每抑之如此八卦之重上經乾先而坤次之坎先而離次之下經震艮先而巽兊次之皆崇陽也巽次往旅旅曰小亨離之一陰也此小亨巽之一陰也利有攸利見大人二陰上從二五之陽也從陽為陰之利不從陽不利矣六爻皆變為震附載程沙隨占法云迥初寓餘姚僧舍筮之遇巽占曰有風火之恐而不及害水幾舍北火發焚十餘室至寓舍止縣取綱維與遺火僧杖之其占曰巽為風互體離為火兊為毁折變震為驚懼初六為內卦之主不與離應故曰不及害巽為寡髮重巽二僧之象反對重兊兊為決二僧受杖之象其奇驗如此序卦傳曰旅而無所容故受之以巽巽者入也旅者親寡之時非巽順何所容苟能巽順雖旅困之中何往而不能入唐玄宗不困于蜀道之行而能以天下授靈武之子乎唐德宗不困于奉天之行而能下罪已之詔乎彖傳曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人重為重復之義重巽者上下卦皆巽也巽順而入必究乎下命令之象卦體陰陽雖不交而陰皆承陽有命令下入之象君子體重巽之義以申復其命令申重復也丁寧反覆之意非是兩命剛謂三五柔謂初四二五雖據用事之地而成卦之主在初與四陰始生而陽巽之二五其最近者也故雖剛而有巽義巽乎中者九二也巽乎中而且正者九五也或以剛巽乎中正為九二巽乎九五于本句文理似順而實非卦意惟二五剛而巽乎中正則不暴急以忤物故命不下格而志可行不然下雖欲巽上而上以恣睢暴戾臨之下亦何樂于往而利見哉柔皆順乎剛者剛雖巽為中正柔若不順乎剛何所申其命乎故又就初四各處卦下柔皆順剛無有違逆所以教命得申成小亨以下之義也是則柔順乎剛與剛順乎中正合此兩者所以為巽之體若徒以一陰潛伏謂之為巽而不究乎陰畫在二陽之下有順乎陽剛之象陽畫在二五之位有順乎中正之德則巽之所以致亨者不可得而見矣象傳曰隨風巽君子以申命行事巽之象為風亦以其委曲而入于物無所不順也風者天之號令其吹物也物莫不鼓動風詔令之入人亦如風之動物也隨相繼之義天下有姤后所以施命若風相隨而至則是申命不一之象古之出命者必反覆申戒之然後其事可行于天下所以優柔漸漬以攻民之心商之盤庚三篇周之多方多士是也命風象申命者申前之命隨風象行事謂行其命中之事也繫辭下傳曰巽德之制也吳幼清云巽者柔順卑下以入則無處而不可入如利刀之裁制布帛隨其長短而裁之無不如意也又曰巽稱而隱巽則能順其理因時以稱其宜然其性入而伏則又形迹之不露又曰巽以行權行謂不定在一處權者稱錘前却無定以等物之輕重而取衡之平時中是也故彖傳曰剛巽乎中正而志行此為行權之本先儒有云自漢以來無人識權字説卦傳曰齊乎巽巽東南也齊也者言萬物之潔齊也又曰巽入也又曰巽為雞又曰巽為股又曰巽一索而得女故謂之長女又曰巽為木為風為長女為繩直為工為白為長為髙為進退為不果為臭其於人也為寡髮為廣顙為多白眼為近利市三倍其究為躁卦解見本傳初六進退利武人之貞變乾為小畜巽為進退故疑其究為躁卦故武初六內卦主爻也上無應與欲進而從陽又欲退而安于下懷疑不能自決有進退象夫民可與樂成難與慮始處令之初未能服令故在上者利用武人之貞以整之謂之武則非聽其柔懦也謂之貞則非一于嚴酷也軍中之法三令五申亦巽申象也鼓之進則進鼓之退則退故怯可使勇弱可使強人盡雄武矣變乾為武人履六三變乾亦曰武人象傳曰進退志疑也利武人之貞志治也志疑志治俱以初六之志言疑亂也不疑即治治則果于從陽而無進退之惑故利在飭初六以武人之貞所以使其志常治而不亂也九二巽在牀下用史巫紛若吉無咎變艮為漸互體兊變坎初隂在下二陽在上牀之象故剝以牀言下牀之足也指之初言巽在牀下者言二卑巽于在牀下之初也足為牀本足牢固則牀安民為國之本民柔順則國安初民象乃國所賴以安者九二以陽居陰中承五之令以致之民有愷悌之意焉所謂剛巽乎中也吳幼清云巽之時陽亦當卑巽故陽爻亦以巽為善蓋陽為陰所順從亦必以卑巽待之若剛強自處非所以懷柔順服之人也史謂祭祀時作策書以告神者巫謂袚禳時為歌舞以事神者互兊為巫故有史巫象紛若雜出之貌猶言多方也互兊為口舌故有紛若象二雖巽以下初猶恐初之未喻也而丁寧煩悉其辭以道達其誠意而祈其我諒孔子曰使民如承大祭九二之謂也雖其紛若似煩擾然終必志行吉又何咎矣變艮為止牀所以養安也巽在牀下亦安止象象傳曰紛若之吉得中也得中者剛巽乎中之謂夫恭近於禮逺恥辱也巽在牀下視民如神獨不以恥辱為嫌乎而非然也民不可無下也孝子不諛其親忠臣不諛其君諛則人以為罪而終身與民同是非同好惡人弗謂之諛不以為罪此之謂民之父母也故申命行事紛若而得中也九三頻巽吝變坎為渙互體兊變震約象離變艮巽卦陽爻之能巽者惟二與五而三上皆不能也三之頻巽者何也夫所以為巽者初與四也三居上下卦之交以下卦言已實處上而欲其巽于初以上卦言已實體剛而不免巽于所乘下之則心不服制之則力不能故頻蹙以待之頻水涯涉水者頻蹙不前而止本爻變坎為水又為憂故有頻象與復六三頻復同或作頻數解亦通九三以陽處剛而勉為卑巽非其心之所樂也夫恭曰允恭讓曰克讓恭讓豈可以聲音笑貌為哉故吝象傳曰頻巽之吝志窮也志意窮屈其巽也迫于不得已是以頻蹙而不樂也六四悔亡田獲三品變乾為姤互體兊變乾約象離變乾陰柔無援而承乘皆剛宜有悔也而四以陰居陰得巽之正為巽之主在上體之下居上而能下也居巽之下巽于五也以巽臨下巽于三也若初與四兩柔相應則同德者也善巽如此故得悔亡象為田獵獲三品以能得承乘應三爻之歡心故也四上卦之地位為田互離為網罟為戈兵搜狩象也巽利倍故多獲三品一為乾豆二為賓客三為充君之庖乾豆謂臘之以為祭祀豆實也三以剛居剛且與上宗廟應乾豆象初與我應賓客象五為君位承五而獻之有充君之庖象變則失其所處之正象傳曰田獲三品有功也五多功所獲雖有三品之異而皆以獻之于君故曰有功九五貞吉悔亡無不利無初有終先庚三日後庚三日吉變艮為蠱約象離變震五居尊位命令之所出也處得中正則盡巽之善而無勿巽亦無過巽貞而已矣彖傳所謂剛而巽乎中正是也悔對貞言貞者不變也悔者變也貞而得吉故悔可亡巽多疑故以無不利決之無初有終正所謂無不利者也無初以內卦言先庚三日也有終以外卦言後庚三日也夫以正齊物不可卒也民迷固久驟用告誡物情難堪故初皆不説也申而命之使其自化初雖未利而終歸于利轉移密運于其中而入人甚深取效甚逺殷盤周誥是已所以取先庚後庚者以象言則當從納甲之説楊用修云納甲之説京房易傳有之魏伯陽參同契曰三日出為爽震受庚西方八日兊受丁上弦平如繩十五乾體就盛滿甲方東十六轉受統巽辛見平明艮直于丙南下弦二十三坤乙三十日東方喪其明節盡相禪與繼體復生龍壬癸配甲乙乾坤括始終其疏云震象三日月出于庚兊象上弦月見于丁乾象望日月滿于甲巽象十六日月虧于辛艮象下弦月消于丙坤象晦日月沒于乙此指二八月晝夜均平之時若以厯法言則晝夜有長短若晝短日沒于申則月合于申望於寅矣若晝長日沒于戌則月合于戌望于辰矣十二月之中三日之月未必盡見庚十五日之月未必盡見甲合朔有先後則上下弦未必盡在八日二十三日望晦未必盡在十五三十日也又虞翻易傳曰日月懸天成八卦象三日暮震象月出庚八日兊象月見丁十五日乾象月盈甲壬十六日旦巽象月退辛二十三日艮象月消丙三十日坤象月滅乙癸晦夕朔旦則坎象水流戊日中則離象火就已成戊巳土位而象見于中納甲之説虞氏比參同契為備而坎離戊巳始有歸著故詳記之辨在蠱彖下震巽相薄震究為蕃鮮震變巽也巽究為躁卦巽變震也當巽之時惰窳積而亂基伏矣故須用震德以治之震納庚內卦巽伏震先庚也九五變則三至五又互震後庚也曰三日者三爻之象以理言則當從變更之説十干戊巳為中甲庚為午衝甲仁也庚義也陰陽四時之大紀也蠱言先後甲甲者十干之首事之端也故謂之終則有始巽言先後庚庚者十干之過中事之當更者也故謂之無初有終况巽九五乃蠱六五之變蠱者事之壞也以造事言之故取諸甲巽者事之權也以更事言之故取諸庚卦有六爻故以六日為限蓋取徹始徹終之意其有言七日者則以循環而復本位故稱七日也餘説紛紛穿鑿今皆不取夫先庚三日已家諭之矣而復加之以後庚三日其不憚諄諄也如是是則九五之所以為剛巽也上吉以德言下吉以化言巽五一變則成蠱又以知巽之不至為蠱者九五之力也象傳曰九五之吉位正中也五居中而九得正剛巽乎中正此其所以行志也上九巽在牀下喪息浪反其資斧漢書王莽遣王尋屯洛陽將發亡其黃鉞其士房楊曰此經所謂喪其齊斧者也應邵云齊利也讀如齊衰之齊資齊音同誤作資未知孰是貞凶變坎為井五奇四偶牀象上之巽在牀下與二不同二巽初者也上巽三者也三在四下故亦稱牀下蓋牀足之下也卦以初四為巽主上九以剛爻處絶逺之地不能與下相巽入貴而無位高而無民初與四莫之與也不得已而下求三以為應故有卑巽于牀下之象然上九業已喪失其資斧矣雖巽三何益巽利三倍故為資巽為木二三四互兑為金以金貫木為斧三四互離為戈兵亦象斧要皆不為上九所有則喪失之象也夫資所以施德斧所以操權兼德與權而後可以入人上九之喪其資斧若此德不足以懷衆權不足以行令縱下求三三又非應誰其與之守此為正而不知變凶可知已變坎為井則有上出之功象傳曰巽在牀下上窮也喪其資斧正乎凶也處卦之上窮于無與故巽在牀下蓋欲以求三也資斧者所以巽入乎人之具而上九已喪失之雖下求三自以為得其正應乎吾則但見其不相入而凶耳蓋言無之而可也按正乎凶也釋爻貞凶二字義作兩句讀三上皆逺陰三吝而上凶故知巽之為巽不專為陰爻言也兌下兌上兌亨利貞兌許慎云説也從兒公聲兒古文奇字人也象形孔子曰在人下故詰屈徐鈜云公古文兗字非聲當從口從八象氣之分散故易曰兌為巫為口也愚按徐氏以兌從口則兌之訓説本是辭説之説卦解轉為喜説之説蓋以三畫卦一陰進乎二陽之上氣之舒散乎外有悅意也故卦名為兌而取義為悅二兌相麗內外皆悅故仍名為兌天地悅則萬物生人心悅則萬事通故兌有亨道然用悅必利于貞正若悅不以道則為妄悅尤不可以不戒也故六爻皆分言利貞之事焉卦辭與咸同咸以艮陽下兌陰則相感感則亨矣而相感易失于不正兌以二陽下一陰則相悅悅則亨矣而相悅亦易流于不正利貞者戒辭也巽兌成卦皆主于柔然巽內柔外剛其質柔也故止小亨兌內剛外柔其用柔也故亨曰利貞者猶以內之剛為主耳焦弱侯云人有思慮必斂而內向蓋陽之有謀假陰之潛隱以為用思慮非出于陰也人有喜悅必見而在外蓋陽之收散假陰之和柔以為用喜悅非繇于陰也故二陰一陽則陽為之主二陽一陰則陰非為主但為陽之用耳丘行可云嘗考三女之卦聖人多以貞戒之離曰利亨貞巽曰利貞兌曰亨利貞皆以正言也三男之卦則不言貞震曰亨坎曰心亨艮曰艮其背而已蓋陰柔之質多病于不正而陽剛之體為能有立也六爻皆變為艮序卦傳曰巽者入也入而後説之故受之以兌兌者説也人之處事接物苟以心深入于其中則可悅之理自出故曰入而後説之惟學亦然先儒云時復思繹浹洽于中則説也入于耳出于口口耳之間不過三寸安能入深其為人多苦心非有甚苦者迫之則其于學不久所喜悅者不在是有喜悅于是者竊其身而逃之矣彖傳曰兌説也剛中而柔外説以利貞是以順乎天而應乎人説以先民民忘其勞説以犯難民忘其死説之大民勸矣哉兌説也是不言之説人心義理之説不在言語口舌故説去言為兑而兌所以為説也與感去心而為咸同意不言亨者但言説而亨在其中矣剛中指二五柔外指三上外雖柔説中實剛介是之謂説以利貞若柔見外而內不剛則邪佞之説矣夫易有天道焉上之為天位上兊之説必其順乎天者也有人道焉三之為人位下兌之説必其應乎人者也揆之天理而順是之謂順天即之人心而安是之謂應人順天應人一正焉盡之矣此所以可説也且非獨一人之説已也今夫率先民而使民至于勞犯大難而使民至于死此非求為説者也然而民有時而忘其勞與死者則説之至也不勞無以逸不死無以生是以勸而趨于勞且死也夫勸民之與民勸相去逺矣唯無心求説者乃能使民胥悅其皥皥之世乎是以聖人大之而曰説道之大其在使民自相勸矣哉錢國端云兌為毁折為附決説以行之以三言民毁折于中忘勞之象以上言民附決于外忘死之象周省貞云兊何以言忘勞忘死兌正秋也陽內陰外生氣在內殺氣在外生氣惡殺然惟肅殺乃能固濟生氣而內和故曰利者義之和也天道好生而秋殺則所以濟春生之窮王道主仁而義正則所以濟仁育之窮此和之謂也兌説正取此義象傳曰麗澤兌君子以朋友講習麗謂附麗猶言連也兩澤相麗交相浸潤互有滋益故君子觀其象而以朋友講習同門曰朋同志曰友講謂講明義理兌兩口相對講之象也講而又講之謂習從容討論以求義理悅心非徒聚首為歡而已父師誨而不親兄弟親而不誨人之羣居以相説者莫如朋友然必從事于講習則有直諒多聞之益而無便辟善柔之邪樂而不流亦澤象也説卦傳曰兌以説之又曰兌正秋也萬物之所説也故曰説言乎兌又曰兌説也又曰兌為羊又曰兌為口又曰兌三索而得女故謂之少女又曰兌為澤為少女為巫為口舌為毁折為附決其於地也為剛鹵為妾為羊解見本傳初九和兌吉變坎為困卦之名兌本取三上二柔之説然當説之時陽亦取説義夫人所以與天下並生者惟是兊而所以自娛養者亦惟是兌舍是無樂乎其為人矣莊子所謂使之和豫通而不失乎兌是也然兌天地之柔氣也故象戒以貞而爻每善夫剛六畫惟初不比陰柔無應于四無欲于三無繫于二初心未渝廓然大公和而不同説之正也故吉和者天下之達道也何施不行象傳贊之曰行未疑變坎則為狐疑矣象傳曰和兌之吉行未疑也本卦説體不當陰陽相比二比三三比四五比六皆陰陽相比則不能無疑獨初爻無比無比則無所疑矣故曰行未疑也如初九者可謂任天而行者也九二孚兌吉悔亡變震為隨互體離變艮二三得比坎半體故二稱孚程子云二承陰柔陰柔小人也説之則當有悔二剛中之德孚信內充雖比小人自守不失説而不失剛中故吉而悔亡蘇子瞻云和而不同謂之和兊信于其類謂之孚兌六三小人而初九九二君子也君子之説于小人將以有所濟非以為利也初九以逺之而無嫌至九二則初九疑之矣故必有以自信于初九者而後悔亡文豫而實不豫所以信于初九也變震為隨亦有係小子失丈夫之戒象傳曰孚兌之吉信志也吉一也為初易為二難心之所存為志初去三逺不特志可信而行亦未涉于可疑二去三近行雖不免于可疑而志則可信六三來兌凶變乾為夬互體離變乾約象巽變乾六三下兌之主爻也春秋書鄭詹來曰佞人來矣來兌之謂也處不中正立上下卦之交以求人之説然同體之初與二弗許也即上比之四亦弗許也蓋初二四具剛中之德乃君子也説之不以道豈能説哉求親而反疏矣如𢎞霸嘗元忠之糞彭孫濯李憲之足丁謂拂萊公之鬚皆為人賤而至今猶有遺羞焉豈不凶兌從乾變柔畫自外而來也舊説謂之內為來上下俱陽而獨之內者以同體而陰性下也果爾則九四亦無所用商兌矣變乾為夬然後能偕同類以決陰象傳曰來兌之凶位不當也陰柔不中正所以致凶九四商兌未寧介疾有喜變坎為節互體離變震約象巽變艮鄭康成云商隱度也與周書商賚九章商工商除之商同四承九五中正為德亦比六三柔和為惑説德説也惑德亦説也所説者商度未定以其爻剛位柔半動半靜故其象如此約象巽為不果有商象變坎為加憂有未寧象兩間謂之介分限也故人有節守謂之介與豫六二介于石之介同但三居下體四居上體各居上下非若豫六二與初六六三同體也故馬季長解云介隔也夫美疢不如惡石三之説我美疢也苟非介而隔之使不得近其不為疾者鮮矣故曰介疾有喜言疾去而後有喜也疾與喜相反無妄之疾損其疾皆以有喜言變坎為心病疾象本卦兌為説有喜象徐子與云以陽剛之才處近君之位詔王以八柄馭臣者也所以奔走服役于其下而求説于我者無所不至况又與之親比者乎商兌未寧正公私界限聖人以介疾有喜言之所以開示正道隄防邪心其意切矣一説章本清云九四重兌時值正秋商音用事化機開藏故為商兌之象八音律中夷則曰商商傷也此心殊未寧也然商本金氣堅介徑疾無所沾滯萬寶告成何喜如之即説卦傳所謂兌正秋也萬物之所説也故曰説言乎兌是也四陰故商兌而未寧九陽故介疾而有喜喜而繇于介疾乃兌悅之正也此説太巧且甚費解象傳曰九四之喜有慶也言九四居此位乃能截斷六三不使為害甚可慶也故有喜楊廷秀云六三者君心之膏肓也九四者膏肓之針艾也故九四者六三之所甚不喜也六三不喜則九四有喜矣非九四之私喜也天下國家之大慶也九五孚于剝有厲變震為歸妹約象巽變坎五上相比得坎半體故五稱孚剝指上六兌秋之終九月為剝故稱剝剝以五陰消一陽上六一陰亦謂之剝者君為陽剛之主君心一搖則衆正皆敗故也夫君子有并包兼容之量而以至誠待人故雖剝陽之隂亦孚而信之然善柔便佞最易悅人若不虞其害已而信之深則剝之勢成矣不有危厲之道乎戒之也變震為恐懼有厲象程子云九五得尊位而處中正盡説道之善矣而聖人復設有厲之戒蓋堯舜之盛永嘗無戒也雖聖賢在上天下未嘗無小人然不敢肆其惡也聖人亦説其能勉而革面也彼小人者未嘗不知聖賢之可説也如四凶處堯朝隱惡而順命是也聖人非不知其終惡也取其畏罪而強仁耳五若誠心者信小人之假善為實善而不知其包藏則危道也小人備之不至則害于善聖人為戒之意深矣象傳曰孚于剝位正當也傳意與履九五同九五陽剛中正位正當矣正則才足以勝小人之姦當則勢足以制小人之命兩有所恃不覺其孚于剝也堯非不正當也而吁咈于四凶舜非不正當也而畏巧言令色孔壬若明皇于李林甫孚其剝唐者高宗于秦檜孚其剝宋者皆傷于所恃者也楊敬仲云位正當也者聖人推原所以孚于剝之繇繇乎以位為己之位正當其位以位為樂故人歡熾而邪媚得志也此如水有源則必有流如木有根則必有枝葉實以己處富貴崇高之位未必不親信小人致危亂也黃屋非堯心舜視天下如敝屣禹有天下而不與故君子道用小人退逺上六引兌變乾為履引即引繩之引上六外卦之主也下應六三同類相召互相牽引以為悅者也自三至五體巽為繩居上六之下故上六引之皆所以剝陽也五言有厲上不言凶可知矣六三上六皆以陰為質以説為事者然三以柔居剛動而求説其情狀易知又去五逺其為害尚淺上以柔居柔靜而致説其機謀難測又去五近其為害獨深三必藉上之引而後達上亦必引三以為助也蘇子瞻謂上六超然于外不纍于物此小人之托于無求以為兌者蓋以刺王介甫耳然大姦之狀千古一轍變乾則不至以柔乘剛或曰兌為口舌悅在心而發于言言所以宣悅也六爻之辭簡不欲尚口也所以止説也亦猶之壅澤不使其流也此聖人之深意也象傳曰上六引兌未光也上六以陰柔居説極象言未光謂其詐忠譎智善于取容巧于比周如共工歡兜之流心術曖昧不可測而可畏者也第十五對渙節雜卦傳曰渙離也節止也坎水在巽風之下為風所離散坎水在兌澤之上為澤所節止渙之使離氣有所宣以無底滯節之使止氣有所聚以不散越道各有當也又項平甫云渙節與井困相反井以木出水故居塞而能通渙則以木浮水故通之極而至于散也節以澤上之水故居通而能塞困為澤下之水故塞之極而至于困也坎下巽上渙亨王假庚白反有廟利涉大川利貞渙説文云流散也從水奐聲為卦巽上坎下風行水上水遇風則渙散所以為渙孔仲達云散難釋險故謂之為渙能釋險難所以為亨故曰渙亨斯時也九五之王者惟精白一心以假乎有廟下用六四之佐而自可以利涉乎大川也卦之所重在二四兩爻所以為坎者二所以為巽者四二在坎險凝滯之中四以巽風吹散之則險化為夷五恭已在中惟假廟致享而已猶左傳所謂祭則寡人者則以四為成渙之主故也所以取假廟象者三四五互艮為門闕一陽在上為屋二陰在下為闕高巍之象艮又為宗廟上卦巽為隱為伏下卦坎亦為隱伏五當艮上畫王祭祀而在廟中之象也或云古立廟必于國之東南祭享必以血故言廟祭取巽坎者以巽居東南而坎為血卦也亦通與革之王假有廟各自取象所以取利涉大川象者坎為大川巽為木為風巽在坎上水乘舟也乘舟而遇風則大川可涉胡仲虎云彖言假廟夫子于大象曰立廟彖言涉川夫子于十三卦舟楫之象取此蓋以本卦自有廟與涉川之象也利貞亦主四五兩爻言假廟巽德上入風運于無形涉川巽木下行險散于有象皆亨之道而匪貞不固故曰利貞六爻皆變為雷火豐坎上巽下為井序卦傳曰兌者説也説而後散之故受之以渙程子云人之氣憂則結聚説則舒散故説有散義渙所以繼兌也彖傳曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乘木有功也錢國端云渙亨在二四同功二來險中不出則窮以同功風散主爻遂有震起而無坎陷曰不窮四柔得位乎外惟剛中之五是同而非險陷兩柔之與同五有二四同功之用何險不為流散渙所以亨馮竒之云剛來而不窮即需剛健不陷義不困窮之意程子云柔之往則得正位于外而上同于五之中巽順于五乃上同也四五君臣之位當渙而比其義相通愚按卦中初三皆以陰居陽二上皆以陽居陰惟六四得陰柔之正上比九五得陽剛之正所謂上同者以此繇六四之柔得位乎外卦而上同此九二之剛所以雖來居坎中而不窮渙卦得力只在六四也王乃在中者非在廟中之謂王者之心渾然在中則不薦之孚無言之奏直有出于儀文之外者宜其精神之與祖考相為感格也即五爻象王居正位之意若止云王在廟中似無味且亦無當于渙矣夫曰王乃在中則是若北辰之居其所矣而號令四出民皆順之則以涉大川而作舟楫者有四故也往有功者有利涉之功也風行水上順水行舟何不利之有易以巽言利涉大川者三皆以木言益曰木道乃行中孚曰乘木舟虛渙亦曰乘木有功吳幼清云利貞不待釋象傳曰風行水上渙先王以享于帝立廟胡庭芳云渙有二義卦有因民渙散而萃之意假廟是也又有渙天下患難之意涉川是也蘇子瞻云犯難而爭民者民之所疾也處危而不偷者衆之所恃也先王居渙散之中安然不爭而自為長久之計宗廟既立享帝之位定而天下之心始有所繫矣王汝中云夫萬物本乎天人本乎祖知天則人思尊尊不敢以下而犯上知祖則人思親親不忍倍死而忘生聖人神道設教之大端治渙之道也故舜受終于文祖即類上帝而禋六宗武王大告武成即舉柴望而祀清廟惟禮可以一天下之心心一而後天下之事可從而理也丘行可云鬼神之道幽深渺邈不可度思唯至誠貫徹濳孚冥感如水之遇風渙然相受則陰陽交通有合無間郊焉而天神格廟焉而人鬼享矣項平甫云享帝于郊象巽之高立廟于宫象坎之隱吳幼清云天之神升上如在天之風故享帝取上卦巽風之象二三四互震為春時生萬物之帝則象祭者降在天之神于地上也人之魄降下如在地之水故立廟取下卦坎水之象三四五互艮為廟則象祭者升在地之魄于廟中也李子思云萃因民之聚立廟以堅其歸向之心所以為懷保之道渙憂民之散立廟以收拾其蕩析之心所以為招攜之術皆所以統攝民心而堅凝之也繫辭下傳曰刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下蓋取諸渙此所謂利涉大川者也解見本傳初六用拯子夏傳作拯云取也馬壯吉變兌為中孚拯救也馬壯謂二也二在坎中畫為美脊亟心之馬互震初畫為作足馵足之馬壯象也此言用拯馬壯吉與明夷六二不同明夷六二之上文曰夷于左股見二已受傷故所用以拯之者必得馬之壯如九三者乃吉此初六乃陷九二者故告之曰當兹險難之時必轉其陷陽之念用以拯救乎馬之壯者則吉義各有取蓋初四本應爻四欲渙小人以出君子于險故初諭乎四之志而動也能拯二于險中則二之出險可望二之吉即初之吉耳他爻皆言渙初不言者以初比二而拯二兩情相合故不言渙變兌為中孚悅以孚于九二所為能用以拯與象傳曰初六之吉順也謂順理也初若陷陽則咈理矣九二渙奔其機悔亡變坤為觀互體震變坤渙謂渙散險難也九二陽居陰位陷于險中茫無變計如人據機而坐自以為安悔其免乎兹欲渙散險難必自其機奔出而亟去之然後悔可亡非如舊解以奔機為奔就其機之謂也九二為坎體互震有動機所以貴奔者欲其為震而不為坎也動而出險則不至于窮彖傳所謂剛來而不窮者以此或謂體坎為亟心之馬故有奔象亦通但欲其不安于坎陷耳機非木名之機即几也几説文云踞几也象形周禮五几玉几雕几彤几髹几素几戴侗云古人坐于地几坐所憑也通作機左傳設機而不倚是也通本作機或從之原無此字殊謬坎為堅多心之木為矯輮互震為足輮木有足乃機之象初為地下二在地上古人席地機在地上約象有艮艮肱據之憑機之象變坤則夷險為順然爻曰悔亡云者蓋二能體震而奔則陽動可以濟渙固無所事變也是爻也晉公子重耳之去齊以之重耳出亡適齊齊侯妻之甚善焉有馬二十乘將死于齊而已及桓公卒諸侯畔齊子犯知齊之不可以動而知文公之安齊而有終焉之志也欲行而患之與從者謀于桑下蠶妾在焉莫知其在也妾告薑氏薑氏殺之而言于公子曰周詩曰莘莘征夫每懷靡及夙夜征行不遑啓處猶懼無及况其順身縱欲懷安將何及矣人不求及其能及乎日月不處人誰懷安西方之書有之曰懷與安實疚大事鄭詩云仲可懷也人之多言亦可畏也昔管敬仲有言曰畏威如疾民之上也從懷如流民之下也見懷思威民之中也齊國之政敗矣晉之無道久矣從者之謀忠矣時日及矣公子幾矣君國可以濟百姓而釋之者非人也敗不可處時不可失忠不可棄懷不可從子必速行乃行厥後重耳入晉遂霸晉國皆子犯與薑氏之力所謂渙奔其機而悔亡者也象傳曰渙奔其機得願也奔機則得其濟渙之願六三渙其躬無悔變巽為重巽互體震變兌約象艮變離荀慈明云體中曰躬二居下卦之中躬之象也愚按渙其躬之躬與艮傳止諸躬之躬同義皆主背言六三本下陷九二者今有六四在上為巽風之主以渙之二既方有所奔四更不以為羣三何所容其身哉羣四不可乘二不可則唯有背二而上行以就其正應之上九而上九固去而逖出者彼所謂避世之士也三與之同遁以避賢者路不敢怙終以陷陽故可以無悔坎二陰本為險陷三居坎上近接乎巽坎水得風而散巽木得水而通三欲不自渙其躬不可得矣變巽為風將自渙也何行如之象傳曰渙其躬志在外也志在外卦之上九六四渙其羣元吉渙有丘姚信本作近匪夷荀爽本作弟所思變乾為訟互體震變離約象艮變巽其羣謂初六六三也以皆陰畫故稱羣渙其羣者謂渙散其同類之私黨四居正位心無私繫既不應初又不比三故以渙其羣屬之即雜卦傳所謂渙離也蘇明允云夫羣者聖人之所欲渙以混一天下者也天下之患莫大于朋黨四之所處乃近君之位以為天下方羣而吾大臣亦為羣烏乎可吾渙吾羣而絶朋黨之纍天下當服吾之公而歸吾之心此所謂大善而吉也元者陽德也四惟渙羣所以上同同乎五則與陽同德矣故曰元吉三四五體艮為丘渙有丘者言其當渙散小羣之時有丘山靜鎮之體即彖傳所謂柔得位乎外而上同者也六爻惟四五得其正位而皆無應夫五君也四相也君相同德無黨無偏將如山之不可撼矣非有丘之象而何夷等也指下二陰而言二陰以四為同類方且以私心窺四謂四必俯而與我相繫援也今乃望之峩峩若高山此豈其夷輩思慮之所及哉巽風為散險之主六四為巽卦之主卦之所以成渙者在此一爻朱子謂六四一爻未見有大好處今其辭恁地浩大皆不可曉蓋繇其不詳于卦主之義故也變乾體具陽剛之德故能光明正大若此象傳曰渙其羣元吉光大也就私羣則為暗為小光大暗小之反也約象艮為光明九五陽為大四本柔體能去柔羣而承剛君是其光明之同乎陽德者耳九五渙汗其大號戶羔反渙王居無咎變艮為蒙約象艮變坤上卦風以散之下卦坎水汗之象也巽為命令故稱號五為君又陽爻故稱大夫君者出令臣者行君之令而教之民者也是以五取大號象散人之疾而使之愈者汗也解天下之難而使之安者號令也曰渙汗其大號者王者以天下為一身欲渙周身之汗其必有大號以與天下更始而後可凡大命令之下大政事之布大財用之發以散則為和風以潤則為甘雨如人之汗從心而液遍一身之皮毛爪甲無不霑透若武王克商武成諸篇及唐德宗罪已之詔皆是也夫如是則羣邪之鬱積盡渙而天下之險難亦庶乎可解矣然所渙者尤必自王之所居者而渙之王居九五中心無為以守至正必使其誠意浹洽于四方俾萬姓咸曰大哉王言又曰一哉王心而後令出惟行無反汗之咎也蘇君禹云王居非居積之謂也時人以居積為居而王者以道德為居是居也人人之所固有者也然人皆有之而未必皆能居之也王者渙汗其大號民未遷善喻之遷善民未去惡喻之去惡是散王者之居與天下共居之也約象艮變爻亦艮艮止不動有北辰居所之象與彖傳王乃在中正相發象傳曰王居無咎正位也號令之出一本于九五王居之正位則體元居正民莫敢不信從也故無咎上九渙其血句去逖出無咎變坎為重坎下卦坎初與三皆陷陽者然初與四敵應而三與上和應故初猶知畏四之渙以拯乎九二而三踞乘剛之位恃其有應將為隱伏為險盜無所不至尤四之所急欲渙者也上若下從于三則四必將起而并驅除之上其殆矣是必渙其血且去逖出然後可應爻為血卦渙其血者言渙離其血不使霑灑也逖逺也去逖出者言去之而逺出乎卦外也巽之極而禍患自逺謂非蒸民之明哲與故無咎三欲其應上而上不欲其應三惟上不應三而有逺害之休故欲三應上而使其無陷陽之失也變坎為隱伏亦逺方竄伏之象象傳曰渙其血逺害也巽順以逺乎坎血之害即所謂去逖出也逖即逺也細玩渙乃去小人之卦天下之亂皆起于小人之有黨小人之黨散而天下之亂亦自平矣兌下坎上節亨苦節不可貞節説文云竹約也從竹即聲愚按節即竹節之節竹之所以名筠者以其節至均勻有分限而不可踰越也厯家氣候亦曰節樂拍以止樂亦曰節皆取有限而止之意為卦下兌上坎澤節水也水之流也無窮而澤之流也有限以有限畜無窮故曰節節有亨道謂夫抑其過而歸之中也節則適中固可通行于天下出乎性之自然而非矯也適乎情之同然而非厲也節以天而不自知其節節乎天下而天下亦忘其為節故中節謂之和是以亨也九五之甘節是也若夫行已有節則德隆出言有節則尤寡用財有節則國裕皆亨之事也夫節猶澤之瀦水水未潰而隄之則易為力待其泛濫奔放而後收之未有能循其幅者也作法于涼其敝猶奢作法于奢後將若之何故伊尹曰愼乃儉德節之于不知節之後其道苦矣周末文勝而史革薄用忠之論所以不可格于世也夫以節為苦者則必以不節為甘故其為道也不可貞上六是也然則將遂無砥乎曰物老則衰致至而反人之欲無窮也窮而無所復入試以節之所以亨者告之彼反而得其性情之所安未有不廢然思止者也上六之所以悔亡其道亦或繇此也與先儒不知爻義而以苦節為鮑焦陳仲子之流愚無取焉六爻皆變為火山旅兊上坎下為困序卦傳曰渙者離也物不可以終離故受之以節渙者離披解散之意終離則散漫逺去而不止矣故必立制度以整飭之節所以次渙也彖傳曰節亨剛柔分而剛得中苦節不可貞其道窮也説以行險當位以節中正以通天地節而四時成節以制度不傷財不害民夫乾純剛也坤純柔也純則無節今分坤五之柔而來三以節乾分乾三之剛而往五以節坤分則有節矣剛得中者以九五言九往居五得上卦之中也向也坤以柔居中柔安能節今以剛而得中則大君有甘節之吉而可以通行于天下此節之所以亨也亨通也若苦節之人既以節為苦則不知節之甘故其道窮塞而不可通也説以行險以二體言下兌上坎也云行險者人情易流立法以限之法險道矣坎以險為用與王公設險同意楊敬仲云制節非人之所樂也聖人以為行險人心易縱既縱則難于節節之是拂其所欲拂人之所欲大難故必和説以行之程子云人于所説則不知已遇艱險則思止方説而止為節之義二説皆可互觀當位以節中正以通申言九五所居之善也陽剛得位為節之主以行節之道履中體正具節之德以妙節之用彖之所謂節亨者此也上卦坎為通故以通言天地節而四時成推言節之道甚大天地亦以有節故能成四時也天地之數六十此卦適當六十卦三百六十爻與一歲三百六十餘日相當天以五運地以六制五日為候三候一氣氣六節而時成節二十有四而四時成冬後有春剛節柔也夏後有秋柔節剛也不然則大冬大夏而已安能成四時乎聖人觀節道以制為長短大小之度品式傋具一範于禮不傷財量入為出也不害民時使薄斂也皆節道之有關于天下而大禮與天地同節者也文質奢儉之衡酌之審矣鄭康成云空府藏則傷財力役繁則害民二者奢泰之所致象傳曰澤上有水節君子以制數度議德行水之在澤盈則溢平則鍾此節之象也君子觀節之象以制立數度數者十百一千萬也度者分寸尺文引也凡物之大小輕重高下文質皆有數度使賤不踰貴下不侵上所以為節也猶未也存諸中為德發于外為行議之者量度其無過不及而求歸于中如直溫寬粟之類是也夫約民以制以制為制也故以制數度為未足必反而議吾身之德行焉嗚呼周矣坎為矯輮制之象兌為口舌議之象初九不出戶庭無咎變坎為重坎程子云戶庭戶外之庭門庭門內之庭古居室堂內為室室西南隅為奧室東南啓一扉以出曰戶戶外曰堂堂下階前曰庭直庭外闔雙扉為門初前過九二九陽奇有戶象二前遇六三六陰耦有門象並互艮臨其前故皆有不出象節所為異習坎者則初以一奇塞兌底故能節坎之流耳此爻本有宜塞不宜通象上雖與四應往則入于坎窞二以奇畫當其前又若有以塞之故曰不出戶庭無咎鄒汝光云夫當隱而隱當默而默當辭而辭當險而險皆所謂當其位以節者也初陽剛得正知節之早故介然能守如此苟執禹稷之任而咎顔子之隱則膠矣操之奇之諌而咎百里之默則固矣變柔為習坎重險也故唯不出可免咎象傳曰不出戶庭知通塞也塞者九二以剛塞乎初之前也初惟知其塞故不出焉通則出矣不出戶庭陋巷之顔以之繫辭上傳曰不出戶庭無咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子愼密而不出也邵國賢云節之貞為兌兌澤象也澤漏則枮故聖人于初繫漏言之戒兌為口言象也觀于物漏而節宣之道可知已三之道節二之道宣節節也宣亦節也周省貞云依繫辭解作密幾看義取坎幽伏不輕發以露藏不嘗試以取敗初德剛明知明守固歸重知塞邊不塞不通知塞乃所以知通也九二不出門庭凶變震為屯互體兌變震胡仲虎云初九為兌始兌于時為酉闔戶之象九二互體震震于時為卯闢戶之象九二無凶象曰不出門庭凶者反言之也言二宜出乎門庭也夫天下有同事而異情者則惟時為之節矣戶在內門在外如初即不出戶猶無咎也二乃不出門而凶此其節可喻矣故節非有前期之可言也初知塞亦必知通二失其所為通亦必失其所為塞故發而中節天下之達道也蘇子瞻云節者事之會也君子見吉凶之幾發而中其會謂之節詩東方未明刺無節也其詩曰不能晨夜不夙則莫言無節者不識事之會或失則早或失則莫也澤上有水節以澤節水者也虛則納之滿則流之其權在澤初九九二六三澤也節人者也六四九五上六水也節于人者也節之于初九則太早節之于六三則太莫故九二者施節之時當發之會也水之始至澤當塞而不當通既至當通而不當塞故初九以不出戶庭為無咎言當塞也九二以不出門庭為凶言當通也至是而不通則失時而至于極六三是也是禍福之交成敗之決也鄒汝光云君子之學固將有所用之也初之不出戶庭彼有所不得已耳二亦有不得已乎哉履大臣之位非無柄也遇同德之君非無主也三以耦畫當其前又非有所塞之也然且不出戶庭何與躬補輟奏牘之任而託括囊以固位佞也據開閣延賢之地而託寡交以逃訾陋也操決疑定難之權而託遜讓以避怨姦也以此為節蓋捐其君與天下于一擲而博之者也不亦凶乎卦變屯世方屯不出而為經綸亦失時義象傳曰不出門庭凶失時極也極至也言失時之至惜之也過二則為三應爻在上坎水已溢不能受矣非失時之至而何或云極中也失時極猶言失時之中云耳亦通初與二小象皆一意惟觀時之通塞而已初時之塞矣故不出戶庭無咎二時之通矣當輔九五同德之君與之共成節亨之功可也而不出門庭其所節者不已狹乎故凶此可仕則仕可止則止孔子所以為聖之時而賢禹稷又賢顔子正此意也六三不節若則嗟若無咎變乾為需互體震變兌約象艮變離節坎者兌也所以為兌者三也節之成卦正在六三一爻今自三爻觀之坎水自溢出于兌澤之上似非三之所能節者但見其兌口之開而已故有不節而嗟之象若助語辭嗟與戚嗟若之嗟同夫見不節而嗟嘆本成美之説意形痛惜之悼聲此其鋭于節者也故無咎蘇子瞻云咨嗟而節之以為不可不節也九二之節節于未滿節之者樂見節者甘焉六三之節節于既溢節之者嗟見節者苦焉苦節者人之所不能堪而人終莫之咎者知六三之不得已也嗟者不得已之見于外者也變乾節儉變為廣大亦有不節象象傳曰不節之嗟又誰咎也嗟則能節矣又誰得而咎之與出門同人之象同程可久王介甫皆如此説觀爻傳皆無貶辭知解者多誤諸卦爻辭言無咎者九十有九多補過之辭解三爻傳又誰咎語與此同然爻辭未嘗有無咎字六四安節亨變兌為重兌互體震變離約象艮變巽四最先受節者下兌澤上坎水六四水澤之交水于此自然受節安者順而無所勉強之謂程子云以陰居陰安于正也下應于初四坎體水也水上溢為無節就下有節也如四之義非強節之安于節者也故能致亨應兌故安互艮故止卦變兌節而悅亦安節象象傳曰安節之亨承上道也安節之所以亨者以其得承五之道也下流有歸則上流能受就下乃所以承上也九五甘節吉往有尚變坤為臨約象艮變坤他爻之節節其在我者九五中正居尊以節節天下者也節天下而使天下甘之樂易而無難苦傳所謂當位以節中正以通者正此爻也所以取甘象者書曰土爰稼穡稼穡作甘五居中位變坤為土互艮亦土故稱甘節節而曰甘上順天明下順地義中順物情以立經紀禮儀樂律度量淳制罄無不宜四時以行萬物以昌喜怒得類好惡有當以為下則順以居上則明洋洋美德乎立隆以為極而莫之損益也吉可知已率此道也以往其無上六不可貞之失矣故曰往有尚坎水流而不盈行有尚者也上六唯不知此道也故滿而至溢以至于凶惜無以甘節之義告之者甘臨者在下用甘佞而進也故天攸利甘節者在上用甘民説隨也故往有尚又按孫氏聞雲長敗使虞翻筮之遇節之臨曰不出二日殞亡以水澤為節客受主制變在外不利于客五為主將為頭項喪亡之象不出二日觀象察應之説也古人占法如此象傳曰甘節之吉居位中也甘者味之中五者位之中居位之中則道亦中矣所以吉也上六苦節貞凶悔亡變巽為中孚上居坎極兩柔相應坎水已溢澤幾不能鍾矣于此而節之流漫之性未有所歸可不謂之苦乎如人放肆之後驟繩束以規矩未有不手足拘攣欲決去其藩而後快者也故曰苦節所以取苦象者火曰炎上炎上作苦自二至五肖離上居卦極離火蒸蒸故味苦變剛則六畫又成復體之離以彼無節之性而猝加之以節亦猶火之沃水也故其象為苦夫節之苦者不可以久恐其終于無節也若長如此苦而不知變則凶然以其猶知有苦故悔可亡蓋甘亦從苦而入也如并其苦而無之豈但有悔而已哉聖人慮人之不節不慮人之過節或以苦節為刺夫行磏者也與其不孫也寧固何以稱焉象傳曰苦節貞凶其道窮也以苦節為貞則是其節其之功或作或輟吾不知苦何時而已也入聞聖道而樂出見紛華靡麗而悅此戰之所以不勝而臞也浸尋以往度不勝欲禮不勝縱其道窮矣有不凶乎第十六對中孚小過雜卦傳曰小過過也中孚信也大之過小常也小者過斯乃謂過外之相孚貌也中心孚斯乃謂信蘇子瞻云陰在外據用事之地故為小過陰在內不據用事之地故為中孚周省貞云小過中孚其道相反而皆有鳥象中孚象鳥未離殼天真未散者小過反之則孚亡矣中孚誠而天也常也小過妄而人也變也又云震艮皆大卦合而為小過則不可大事巽兌為小卦合而為中孚則其德應天又可見卦有小大道無小大也鄧汝極云中孚小過經主卦兌巽艮震合也易置之為順大過非以二男二女皆復于不交皆反觀不變皆相敵不相偶括二經耶頥震而艮大過巽而兌非以二陽二陰自下序升順而興又先陽卦主陽上經末終陽𨽻之耶中孚兌而巽小過艮而震非以二長二少長上少下以辨分又先陰卦主陰下經末終陰𨽻之耶吁亦微矣愚按上經終之以坎離坎離之上頥與大過頥有離象大過有坎象方繼之以坎離下經終之以既濟未濟既濟未濟之上中孚與小過中孚有離象小過有坎象方繼之以既濟未濟文王序卦之精如此至若坎離既未濟得乾坤之中畫皆有中義而坎離之上則先之以大過既未濟之上則先之以小過蓋欲人損過以就中此又聖人之微意也是以孔子究心于易韋編三絶作而歎曰假我數年五十以學易可以無大過矣云可以無大過即未敢自居于無小過也終日乾乾夕惕若一部易書精藴在是深夫深夫兌下巽上中孚豚黃作遁魚吉利涉大川利貞中孚成卦之義只在二五兩爻中謂二五居上下卦之中也孚信也説文云卵孚也從爪從子徐鍇云鳥之孚卵皆如其期不失信也鳥褒恆以爪反覆其卵也八卦惟坎稱孚諸卦爻凡陰陽相比得坎半體者亦稱孚則以坎中實故鳥之抱子誠中凝而雛自化也此卦名中孚亦以二五皆陽實得坎半體故統名中孚為卦巽上兊下先儒謂二陰在內四陽在外而二五之陽皆得其中以一卦言之為中虛以二體言之為中實中虛信之本中實信之質若然則二五稱中三四亦可稱中二五稱孚三四亦可稱孚于義混矣或云卦合巽兊風體虛澤體亦虛也所謂中實者安在曰風虛而無形然所以為風者實澤虛而能受然所以為澤者實莊子云大塊噫氣其名為風是惟無作作則萬竅怒號是所以為風者實也水中實不入風惟川浴者知之故大過象澤滅木不曰澤中有風以風不入澤爾是所以為澤者實也且夫虛則無矣安能相感相受惟風澤皆實故澤上有風風感而澤受之卦所以取象為中孚也以六爻觀之三四為兌巽之主爻二陰居中雖相比而無相與之情惟二爻剛中同德可以相應故二孚其同體之三而上應乎五五孚其同體之四而下應乎二二五既相孚則三四皆在其包裹之中矣初上處本末之地去兩陰既逺故雖有應而不以孚言亦卦之變例魚水族之總名豚魚其一也以似豚得名俗謂江豚澤將有風則浮出水面有南風則口向南有北風則口向北舟人稱為風信唐人詩云江豚吹浪夜還風是也兌為澤巽為風亦為魚故取豚魚象夫豚魚澤處而知風不爽其信全乎天者也可以人而不如乎果能孚積于中始乎天之不容偽而終乎天之不少爽若豚魚者焉則誠精之體有完而無虧天下之吉人也吉可知已即以化難化之人平難平之難至誠可格若大川之可涉然者而居常處順又無論矣巽木在兑澤之上又卦體外實內虛舟楫象也故利涉然人心之誠即天命之正也有如曲情要結幸利飾名非正即非誠不誠未有能動者何利之有故申戒之曰利貞言二五利在各正守其剛實在中之德而不變也豚魚吉天命之性利貞率性之道卦主爻在二陰而顧不取為卦主者亦聖人抑陰之意又鄭康成解豚魚云三辰在亥亥為豕爻失正故變而從小名言豚耳四辰在丑丑為鱉蟹鱉蟹魚之微者爻得正故變而從大名言魚耳三體兌兌為澤四上值天淵二五皆坎爻坎為水二灌澤則豚利五六以水灌淵則魚利豚魚以喻小民也而為明君賢臣恩意所供養故吉其取象皆不可曉六爻皆變為雷山小過兌上巽下為大過序卦傳曰節而信之故受之以中孚節者為之制節使不得過越也度數既立可以與民共信守之矣然是治之流也非治之源也官人守數君子養源苟無中孚以立其先而欲民之信吾節不可得矣繼節以中孚所以明中孚為節之本也周省貞云天地之道誠而已矣文王序卦二十有五至無妄以應河圖之天數三十有三至恆以居六十四卦之中半六十至中孚以居干支會合之全數物與無妄天命也恆久于其道人心也中孚豚魚物理也此立言之序天地人物合一誠也易至終篇説歸性命而寄之中孚豚魚與鳶飛魚躍一般意思彖傳曰中孚柔在內而剛得中説而巽孚乃化邦也豚魚吉信及豚魚也利涉大川乘木舟虛也中孚以利貞乃應乎天也三四在六畫之間柔在內也三五居上下卦之中剛得中也蘇子瞻云中孚信也而謂之中孚者如羽蟲之孚有諸中而後能化也羽蟲之孚也必柔內而剛外然則頥曷為不中孚也曰內無陽不生故必柔內而剛外且剛得中然後為中孚也剛得中則正而一柔在內則靜而久此羽蟲之所以孚天之道也張子云中孚上巽施之下説承之其中必有感化而出焉者蓋孚者覆乳之象有必生之理吳幼清云二五中實能孚于三四而三能説四能巽以孚于二五是二五之孚能化一國之民而使之孚也邦指三四二民而言此以卦德釋孚字愚按凡物兩兩相遇者必剛其外而柔其內然後相合若外體虧盈或中心抵牾必不能合中孚卦形正如此陰陽通和兩兩如符契也故曰孚五孚于上二孚于下用志不分天者遇之眸子不運而風化中孚二五之謂矣信及豚魚者猶言信如豚魚非謂信暨及乎豚魚也物有至信于天况于人乎周省貞云豚魚象頗難認乃信于己非信于人如君期仁臣期敬父期慈子期孝天性中自有定則當求及于此若豚魚與風期而有不容爽且不自知者也此意甚好乘木舟虛者乘巽木之空以行于兌澤之上無心之謂也河上丈人謂措吾身于波流而吾不敢私宋人謂平生仗忠信今日任風波是也中孚以利貞乃應乎天也乃字當玩誠者天之道也中孚一出于正則天機之動一皆自然而然者如豚魚虛舟之于風澤而無一毫勉強滯泥之私矣噫中孚利貞應乎天夫焉有所倚巽兌皆從乾變故有天象他卦二五必取剛柔相應獨中孚不然以剛應剛無所繫援誠之至也誠故能孚臣楷嘗恭繹我高皇帝之論誠也曰體之而無上守之而無為斯果實之謂歟虛之謂歟嗚呼清風擔水蟾影沈淵是又體之而非體相之而非相孰能識其所以然耶夫文王取風澤之象而名中孚而我高皇帝論誠即有清風擔水之譬先聖後聖若合符節味乎此者中孚上下卦相與之義益了然矣象傳曰澤上有風中孚君子以議獄緩死風之感澤善入而且固心之愛民繇衷者象之君子誠精無象而能周民情之幽苦于獄將決而議之務求其入中之出既決則寬緩之且求其死中之生王制云刑者侀也侀者成也一成而不變故君子盡心焉此心非中孚其何以盡之哉周禮王聽之司寇聽之三公聽之議獄也旬而職聽二旬而職聽三月而上之緩死也兌為口舌議之象巽為不果緩之象故周書曰獄成而孚輸而孚若子羔之于刖者庶幾乎風澤之感矣或云獄與死象兌秋之肅殺議與緩象巽風之長養亦通徐子與云象言刑獄者五噬嗑賁豐旅中孚也離為戈兵有刑獄象又取離明照知情實則刑不濫也噬嗑豐兼取震賁旅兼取艮者明以察其情動以致其決噬嗑去間豐則多故非震以動之無以威重也賁過于文旅不留獄非艮以止之或輕于用刑也蓋獄乃人命所繫一成不可變明貴無時不然威則有時當止至于中孚則全體似離互體有震艮而又兌以議之巽以緩之聖人即象垂教其忠厚惻怛之意見于謹刑如此何其仁哉五卦中文王唯于噬嗑取象夫子即噬嗑賁豐旅中孚以盡其義初九虞吉有他陸德明蘇軾本俱作它不燕變坎為渙掌山澤之官曰虞謂主商度山川之事屯即鹿無虞山虞也此虞澤虞也初以剛正居內卦之內以主守不易為信者也故有虞人時常在澤之象初心未渝故吉有他指六四言六四初九之應也而近于五為五所攣故稱他若比初六之有他亦以非應言也燕與宴通安也夫四之所以不應初而從五者以五為近比實有以孚之故耳若初之去四則逺矣初見四之有遐心而自咎己之孚不及五也用是大不安于其心若曰我實誠之未至無以動物云耳蓋尤人之念賖反身之意切矣若初九者可謂天資朴實人也孟子曰愛人不親反其仁治人不治反其智禮人不答反其敬初九之不燕以之卦變渙慮且渙也故為有他象爻變坎坎為憂疑故為不燕象象傳曰初九虞吉志未變也初居澤之內如澤之虞人專守其職無外慕之心純白未漓偽妄未興故曰志未變也九二鳴鶴在陰其子和胡卧反之我有好爵吾與爾靡古本一作縻埤蒼同云散也陸績本作縻京房本作劘又楊用修云靡音磨叶其子和之相觀而善謂之摩鶴鳴以相和成音好爵以相摩成德子夏之易説也之變震為益互體震變坤二五皆以剛得中而臨在內之柔孚信厚積合體無間故聖人于此發中孚感通之妙鳴鶴在陰指九二也其子和之指三四也互震變震為鶴禽經鶴為露禽八月白露降鶴即鳴而相警兌乃正秋故以鶴言之鶴又知時之鳥以夜半鳴其行則依洲嶼不集林木二為陰位在兌澤之中艮山之下幽隱之處故鳴在陰二變則為坤有母象陽大為鶴三四陰小為其子卦象中二陰如鳥卵二上孚之如鳥之抱卵然亦其子象也兌為口舌互震變震為鳴故有鳴和象又鶴之聲長而逺聞繇其發之中者大故孚之也逺小雅所謂鶴鳴于九臯聲聞于天是也或以二為鶴五為子或以五為鶴二為子皆非以繫辭證之孔子曰居其室出其言善則千里之外應之况其邇者乎其子乃指其邇者而言以此知三四為其子也我吾二自謂也好爵指五本卦復體離離為爵爵者雀也其鳴節節足足故象其形為酌器大夫以上與燕享然後賜爵因謂命秩為爵五君位又有剛中之德乃體備天爵而據人爵之尊者故謂之好爵吳幼清云天下有達尊三爵一齒一德一德之尊者稱其人為懿德詩言好是懿德是也爵之尊者稱其人為好爵此言我有好爵是也猶詩言我有嘉賓也爾指三四也錢國端云靡如從風而靡之靡五入人如風故稱靡鶴子鳴和爾我隨風一體上巽相隨順入于五中説之至更入之深吾與爾靡之之象若依古本縻則為縻繫之義與五攣如相應巽繩象也此爻之意總謂二積其誠信孚卦中之三四以上應乎五而與之相繾綣卦變益或益之十朋之龜和且靡可知也象傳曰其子和之中心願也中謂二也其子和之則可相將以應五是二之心之所願也繫辭上傳曰鳴鶴在陰其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不愼乎按夫子所論應違則鳴和二字之義蓋信敬感通莫大于言行至誠而不動者未之有也其曰動天地則二之所以應五而靡好爵者也楊敬仲云慎者慎其中孚之主不可動乎意而失之也何思何慮自誠自一六三得敵或鼓或罷楊用修云罷音碆叶歌易林蹇裳涉水深漬請罷賴幸舟者濟脫無他或泣或歌變乾為小畜互體震變兌約象艮變離敵謂與已同等相敵者三為內卦主四為外卦主同為陰柔而其志相反敵也王輔嗣云三四俱陰金木異性敵之謂也以陰居陽自疆而進進而擬敵故或鼓也四履正位非三所尅故或罷也不勝而退懼見侵陵故或泣也四履謙巽不報敵讐故或歌也不量其力進退無恆憊可知也水之在澤也風動若鼓風息若罷風狂若呼風徐若歌三澤面而與風交故其象如此又互體震動鼓象約象艮止罷象震為恐懼三變約象離離為目泣象離火聲沸本卦兌為口歌象兌又為巫或鼓或罷或泣或歌亦巫象倐忽之間變態如此己且不能自信何以孚之人哉蘇君禹云六三陰柔不中正非能孚者人而孚則千里之外孰非吾與人而不孚則一室之近孰非吾敵至于敵之者多則吾之身不能以自安而吾之性情不能以自主作止哀樂皆失常度誠所謂人而無信不知其可也卦變小畜亦有畜止不進之象象傳曰或鼓或罷位不當也三居比四之位四孚于五三欲四之孚已四嫌其無實不來孚也故三之情狀無常如此六四月幾京房本作近荀爽本作既望馬匹亡無咎變乾為履互體震變離約象艮變巽巽為月既望之象四乃巽初畫上承九五故不敢居于既望而曰幾望又大明生于東月生于西兌西震東下卦兌中爻震亦日月相望象也互體震為馬曰匹者指三也古者駕車用四馬不能備純色則兩服兩驂各一色又小大必相稱故兩馬為匹震又為奔走此爻變互體為離牛不成震馬矣故曰馬匹亡四為巽主下離同類之三而孚于五雖非正應然當位而孚于中實之君故無咎卦變履四以履三而訴訴亦匹亡之義也象傳曰馬匹亡絶類上也離去同類上孚于五也觀絶類上也句則卦體卦義瞭然九五有孚攣如無咎變艮為損約象艮變坤有孚攣如合二五三四取象九五九二同德相應包裹二陰以成中孚上維下繫若固結之而不可解體巽為繩約象艮為手攣如象也此卦中虛而二五中實五又為之主則使一卦六爻如一氣然而靡不為之用者唯九五也雖下與九二敵應相與若不能無咎然中孚之道不主于情而主于理不孚于外而孚于中五與二均有剛中之德一理中孚志同道合若虞廷君臣之賡歌有商君臣之一德孚乃化邦將在兹矣何咎之有卦變損五亦益之十朋之龜孚攣可知也象傳曰有孚攣如位正當也與履兑不同彖傳曰剛中象傳曰位正當蓋九居五位中而且正者也若九二第可謂之中而已上九翰音登于天貞凶變坎為節禮記雞曰翰音翰羽也雞鳴則振拍其羽古詩謂腷腷膞膞雞初鳴是也巽為雞故曰翰音雞知旦亦信物也巽為高有登象上居天位有天象卦二陰在四陽之中與比近者相得初上則逺矣故四不應初三不應上初得位而處卦內赤子之心猶在故不以有他咎四且恐懼不敢燕安以求益致其孚初之得也上失位而處卦外風體飛揚無中孚之意但執其一節之小信嘵嘵然自鳴于人其心惟恐三之不我應則上之失也侯果所謂中實內喪虛華外揚譬羽翰之音微而短安足以登于天哉其視鶴鳴子和清響九霄者大相懸絶矣貞此不變終無所孚故凶變坎為節庶斂其飛揚之思而自返乎象傳曰翰音登于天何可長也誠于中者可久飾于外者不可繼其志惟欲求人之知而邀人之應高自標榜終與空俱銷欲以孚天下難矣艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉小謂陰為卦震上艮下四陰在外據用事之地而囚二陽于內陰過而陽不及故名為小過此小人衆君子寡之時也聖人作易專以扶陽抑陰為主大過則欲君子善用乎陽剛小過則戒君子善遇乎陰柔謂當小過之時在陽剛君子亦自有亨通但利于貞耳貞對悔言宜貞之止忌悔之動也小事謂小小禮遇之事大事謂得位而大有為之事小過之時陰柔雖盤據要津然君子之德望自為若輩所仰如際可公養餽金傳食之類孔孟時時有之但欲其行道濟世則不能耳飛鳥遺之音者謂飛鳥報之以音聲如賈誼鵩賦所謂鵩飛入室主人以為不祥者音耗如此道之不行可知矣全卦有飛鳥象中二陽象鳥身上下四陰象鳥翼周省貞云嘗觀中孚之象柔在內而剛得中象之最美者也大過之象四剛盛而本末弱象不美而分猶存也若小過則中外輕重倒置象鳥之飛其權盡歸于翼矣上卦震為鳴約象兌為口下卦艮為止橫飛之鳥其勢迅疾身雖飛過而其音聲止于所鳴之處尚遺留于人耳陶詩所云來鴈有遺聲是也因飛鳥遺音而悟知難而退之理不宜上宜下者取上下卦之義言上卦震動下卦艮止動則為陰邪所忌而取禍止則可以泯默而全身大者陽也陽道不為陰所厄故吉此君子不得志之時轉凶為吉之道舊説以亨貞大吉俱指陰柔説者非蓋易不為小人謀也六爻皆變為風澤中孚艮上震下為頤胡仲虎云易貴陽賤陰故二陽函四陰為頤四陽函二陰為中孚皆美名也二陰函四陽為大過四陰函二陽為小過皆非美名也又程沙隨外編云或人占婚姻筮之遇小過不知其占再筮之亦得小過為占之曰內卦兼互體為漸漸女歸吉外卦互體為歸妹説以動所歸妹也此以初至四互一卦再以三至上又互一卦為占亦筮法之變例序卦傳曰有其信者必行之故受之以小過信者心與理相信之謂孚信在中則可以行之而無疑如過恭過哀過儉之類蓋將以矯世厲俗則不得不以過為功以過為功君子之不得已也彖傳曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也陽大陰小此卦陰多陽寡故曰小過夫小者既過矣而君子處此有亨道者何也利貞則亨嚴于自衛酌于機宜與時偕行而已柔得中以二五言二五以柔道居中乃陷陽而未甚者故時以禮遇加君子此特小者之事耳是以小事吉也剛謂三四几天下之大事必剛健中正之君子方可為之陰道方盛豈肯用陽失位不中則陽剛不得志矣是以不可大事也卦體內實外虛有飛鳥之象焉雖孔子釋彖然亦是歎息時事壞亂政柄倒持非止訓詁語也因飛鳥遺音而悟相時之理如邵康節聞洛陽杜鵑鳴而知天下之將亂不宜上宜下大吉者上動則逆時下止則順時止而不動與時偕行故陽剛能獲吉也象傳曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉侯果云山大而雷小山上有雷小過于大故曰小過小過之時人習憦易奢侈君子矯之以行過乎恭喪過乎哀用過乎儉是非君子之得已也蓋順時而自貶焉耳世之治也反一無迹則以道為功世之否也因二以濟則以過為功其過也乃其所以為不及也與曰行曰喪曰用皆見于動以象震曰恭曰哀曰儉皆止于節以象艮記曰恭近禮儉近仁信近情敬讓以行此雖有過其不甚矣夫恭寡過情可信儉易容也以此失之者不亦鮮乎關子明云小過一時之用也大過一世之用也初六飛鳥以凶變離為豐小過之取象與中孚同以全卦之象立義無相應之説小過有飛鳥之象四陰據用事之地其翼也二陽囚于內其腹背也翼欲往腹背不能止翼欲止腹背不能作也故飛鳥之制在翼初二五上皆翼也獨初上言之何也鳥飛不在翼而在翰翰者翼之鋭也初上則其翰也又初上變則兩體皆成離離為飛鳥故獨于兩爻稱飛鳥初下地也亦小物也在艮之下當止而反飛以下而犯上以小而凌大必無幸矣春秋傳云凡師能左右之曰以鳥之飛見以乎翼然直以之而致凶也使鳥能安處于初六之地未有失也直為翼所以而致凶亦何樂此飛為哉飛于初已凶飛于上更可知已聖人戒辭與坤姤同又郭璞洞林云占得此者或致羽蠱之孽象傳曰飛鳥以凶不可如何也以凶者自納于凶也高飛必返墜孽繇已作可如何哉莫救之辭六二過其祖遇其妣不及其君遇其臣無咎變巽為恆互體巽變乾小過陰過陽也故于兩剛稱弗過而二與上稱過陽之在上者父之象尊于父者祖之象三陽為父四陽為祖五陰而尊妣之象妣在祖上則尊于祖者如周人祖后稷而以其母薑嫄為妣故斯干云似續妣祖春秋傳我所欲曰及不期而會曰遇二五雖非正應而同類相求越三而四以應于五是過其祖而遇妣也然五雖德為妣而位則君也三四居近君之位則皆臣也二未應五而先與近比之三四遇故又有不及其君遇其臣之象卦二陽陷四陰之中初上陷陽之甚者二五其未甚者也故彖傳贊之曰柔得中二與陽遇雖未能用陽然猶知敬陽而身為之下若上六則弗肯與二陽遇而直過之矣惟二有柔伏承陽之美而無強悍害陽之心故無咎變巽故能順以遇賢象傳曰不及其君臣不可過也三四皆臣之賢者奈何遇之蓋勸二之辭使二能引三四而與之共事則福且及其君矣惜乎其僅一遇而已也若季桓之于夫子是也九三弗過句防之句從或戕之凶作一句變坤為豫互體巽變艮約象兌變坎弗過者陽不能過乎陰也本卦陰過乎陽故二陽皆稱弗過勢既弗過又以剛正為羣陰所嫉可無防與防之如何不墮其術中不陷其虎尾耳若不逆其詐而順從之則必貽纍于後日桞子厚是也或不容其惡而戕害之則必反噬于目前陳蕃竇武是也二者皆致凶之道三為卦主乃以止為德者位內卦之上以一奇橫亘于二陰之前有隄防象互巽為入又有從象互兌為毁折又有戕象剛失位而不中是以不可大事若從與戕皆不能止者故凶艮為坤止而順小過之貞也象傳曰從或戕之凶如何也失守而從陰不量力而戕陰皆自貽伊感凶當如何也謂凶不可測九四無咎弗過句遇之句往句厲句必戒句勿用永貞變坤為謙互體巽變坎約象兌變震九四弗過與三同獨得無咎者三以剛居剛而四以剛居柔也以剛居柔張而未嘗不弛闢而未嘗不翕故無咎然四為震主陽性上行又震體動故往而與陰遇遇有禮遇之意中爻巽順兌悅二體皆禮遇象四自知勢之不敵見陰而善遇之然我既有往則彼必有來使彼與我相往來危道也可無戒與夫天下豈容有常厲常戒之事哉故告之曰勿用以往遇之道為可永貞也若永固守此而不知變恐不得以無咎終矣彖言不宜上宜下謂此爻也孔子讀詩至正月之六章戄然曰不逢時之君子豈不殆哉從上依世則廢道違上離俗則危身世不與善而已獨行之故曰非其時恐不得終焉此小過三四凶危之説也變坤為謙亦有弗過而能遇之象象傳曰弗過遇之位不當也往厲必戒終不可長也處位近陰而在已無以制故不得不暫遇之也往厲必戒不可玩厲戒以為常何如止而不往之可免厲哉正釋勿用永貞義六五密雲不雨自我西郊公弋取彼在穴變兌為咸約象兌變乾坎為雲雨上畫為雲下畫為雨三四五體兌得坎之上體為滃密之雲然坎之下畫窒塞不通象雲雖密而雨不降也雨之所以不降者以雲來自我西方之郊凡雲自東北起者有雨雲自西南起者無雨解見小畜彖約象兌為西方以在內卦之外故稱郊五陰在三四二陽之上亦欲畜三四而成雨然五雖有唱三四終不為和陰氣凝而上結可以為雲陽氣不散而下流不可以為雨密雲不雨之象公指五卦名小過不可以小斥君故隱而稱公以絲繫矢而射曰弋大象坎為弓本爻震竹為矢約象兌金為簇下互巽繩為絲皆弋象彼指三四陷在坎中坎為窞為隱伏故稱在穴雷動龍興方能致雨三為乾之少男四為乾之長男皆有龍德而負作霖之望者以與五非正應故公用弋以召致之公之弋特以近比而相浮慕亦如世俗求蜥蜴之類非真能用三四者也時當勿用三四且安于潛伏恐亦莫之肯顧矣故彖曰可小事不可大事或指弋彼為弋二亦通愚所疑者小過之時陰道方升而可謂之在穴乎若以二為晝伏夜動之小人則取在穴象似無害但與上文密雲不雨無相屬耳變兌亦西郊不雨之象或云小畜與此爻皆文王之象故西郊稱我隱辭也穴指羑里公指散宜生之屬詳之象傳曰密雲不雨已上也上謂上六小畜之所以既雨者以有二陽畜之于上故畜極而成雨今六五之上又有上六陰大盛而陽不交則其氣散矣豈復能成雨乎爻曰不雨者此時不雨也傳曰不雨者終不雨也上六陷陽之甚者所以歸咎于上六也上六弗遇句過之飛鳥離之凶是謂災眚變離為旅四陰皆過乎陽獨上曰過之者過者勢也過之者其心也上六以陰柔之資體震動之性位于卦末豈惟不與相遇而已直超而過之出其上極其高如飛鳥焉亢滿如此彼方侈然自以為得志誰知飛而不已將有網罟以麗之也不亦凶乎離麗也言凶矣復申之曰是謂災眚者禍自外至曰災過繇已作曰眚上六之災則自作之眚也將以誰怨然則陰之過豈陰之福哉變離為飛鳥為網罟為災大象坎為眚象傳曰弗遇過之已亢也窮高曰亢居卦之終過之亢極者也初之飛鳥已凶上之凶更可知矣第十七對既濟濟未雜卦傳曰既濟定也又曰未濟男之窮也既濟六位皆當故定未濟三陽失位故窮伊川講易成都有桶匠過之指未濟卦曰三陽皆失位朱子云此語火珠林上已有雜卦所云未濟男之窮者正此意乾鑿度云既濟未濟者所以明戒慎而全王道也李子思云陰陽之氣往來乎天地之間或不能無過差故聖人作易于頥大過之後繼之以坎離蓋以陰陽之中而救大過之弊也于中孚小過之後繼之以既濟未濟亦以陰陽之交而中者而救小過之弊也章本清云乾坤之後屯始以坎此亦終之以坎卦名既濟未濟亦因坎取義蓋天地間險難最多非剛中未易以濟殆有深意存也豈獨世道為然哉反之一念理欲相為勝負惟狂罔念作聖惟聖罔念作狂既濟未濟判于幾微之際李季辨云上篇首乾坤終坎離下篇首咸恆終既濟未濟亦坎離也天地之道不過于陰陽五行之用莫先于水火上篇首天地陰陽之正也故以水火之正終焉下篇首夫婦陰陽之交也故以水火之交終焉鄧汝極云人受天地之中以生神明內藏精魄載營神精交而形全誠立明通明至誠從誠明合而天全水易流而難固火好炎而難靜兩且交勝亦以交病持危守中知終惟終為性命宗不其深夫故易之終既未濟也終坎離而已矣廬陵蕭氏云合中孚小過既濟未濟而論六子之卦全也上經頥大過坎離亦然又以見乾坤居六十四卦之首六子居六十四卦之終也分而論之則乾坤為上經之首咸恆為下經之首坎離不交之體為上經之尾然總上下兩篇言之實乾坤之體為六十四卦之首坎離之用為六十四卦之終此序卦始終之關鍵也離下坎上既濟亨小利貞初吉終亂濟爾雅云渡也通也方言云過渡謂之涉濟繫辭傳謂舟楫之利以濟不通即此濟也其有以二物相資相成為濟者如左傳寬以濟猛猛以濟寬亦取濟不通之意蓋窮則變變則通物無終窮之理所以有貴于相濟也既濟者已濟也為卦坎上離下以兩體言取水火相濟之義水性下以金盛水于上則水不滅火火性上以木傳火于下則火能熱水火不炎而水得溫各成其用故曰既濟大象謂水在火上為既濟是也養生家以心屬火腎屬水必滋養腎水以降伏心火亦取水在火上之義未濟反此以爻象言既未濟皆有重坎但未濟險在上九一陽之內有渡水未竟之象既濟險在初九一陽之外有渡水已竟之象兩卦初上爻辭皆稱濡以皆取象于濟水故也夫既濟則治定功成而亨矣其獨曰小利貞者何也陽為大陰為小既濟之所以致亨者原以六爻兩兩相應而居位各正初三五陽位皆以九居之二四六陰位皆以六居之若泰六爻雖相應而二五尚處非其位六十四卦中唯既濟最正既濟之德為優于泰也然尚有小者存焉以為是不可忘戒也使陰三爻中有一之不貞且失位失應而濟不終成其為濟矣初吉終亂承上文指陰爻言在初者則吉六二是也在終者則亂上六是也二之所以吉者自二至四互體坎二為涉險之始兢惕之意多故吉若上則處坎之終狃其既濟因循偷安亂自此芽矣既濟之反為未濟既濟之尾乃未濟之首是以聖人深致意焉自王輔嗣不達彖傳小者亨也之説遂以亨小二字相連為讀諸儒從之絶無義理序卦傳曰有過物者必濟故受之以既濟行過乎恭喪過乎哀用過乎儉可以矯世厲俗有所濟也聖人雖在下其濟猶大使其得位濟當何如彖傳曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也既濟之亨合大小而言雖小者亦亨也何者皆當位故也然獨以利貞責小者何也本卦剛柔正而位當若小者不貞則柔必至與剛相易剛柔不正而位不當也初吉柔得中也指六二也終止則亂其道窮也指上六也自一卦觀之剛中端拱于上柔中靖共于下有百為就敘之象然亨于始不亨于終可見成九五既濟之治功者固賴六二之柔順啓九五既濟之宴安者實繇上六之陰柔彖但曰終亂而夫子曰終止則亂者味止之一字即雜卦傳既濟定也之義蓋既濟之陰陽各歸其家易于伏而不動履其運者若一切狃為可安而不時加整刷則陰邪將伺其懈而中之而既濟之道于是窮矣能慎終如始無怠無荒常如欲濟之時則何繇而亂也彖以初吉歸六二彼正所謂欲濟之時也象傳曰水在火上既濟君子以思患而豫防之楊廷秀云泰天地之明交也既濟水火之明交而天地之互交也故泰者既濟之純既濟者泰之雜自泰之外孰有如既濟之吉亨者火炎上也降而居下水潤下也騰而居上此水火之明交也初與三五皆乾也分而下于三陰二四與上皆坤也分而上于三陽此天地之互交也天地通氣水火濟飪此其為既濟歟錢國端六火之上非水之所可在水在火上水不滅火火不涸水以氣交相為濟既濟之象君子以思患而豫防之方得其相濟之用即思其相射之患思患思水上火下火有熾而涸水之患水有決而滅火之患豫防之如豫以水防火又豫防水之滅火思患坎難象豫防離明象思以心言豫以事言思患者慮乎其後豫防者圗之于先古者天子即位上卿進曰如之何憂之長也能除患則為福不能除患則為賊授天子一策中卿進曰配天而有下土者先事慮事先患慮患先事慮事謂之接接則事優成先患慮患謂之豫豫則禍不生事至而後慮者謂之後後則事不舉患至而後慮者謂之困困則禍不可禦授天子二策下卿進曰敬戒無怠慶者在堂吊者在閭禍與福鄰莫知其門豫哉豫哉萬民望之授天子三策正此意也初九曳其輪濡其尾無咎變艮為蹇二三四互坎在前為輪為曳初在車後尾象在水之下濡象初九以剛居剛又火體炎上其進之志鋭也見二在前曳其車輪以應五奮身從之雖掇足沾泥而不恤勢必至濡其尾縱未得利涉之用然于人臣盡瘁之義何咎焉卦變蹇欲濟而蹇故有濡尾之象象傳曰曳其輪義無咎也按初九無曳輪象云曳其輪義無咎者蓋初九與六二比近相得同心共濟二既曳其輪矣初何惜濡其尾以從之其于義也無所咎也不言濡其尾者省文耳六二婦喪息浪反其茀子夏傳作佛荀爽作紱董遇作并勿逐七日得變乾為需互體坎變兌離為中女應爻中男婦之象也婦人出門乘車必以茀詩稱翟茀以朝是也離為雉故有翟象爾雅輿革前謂之鞎後謂之茀竹前謂之禦後謂之敵互坎為車在前二互坎下畫也有車後之茀象二之象茀與初之象尾皆就本爻取象二欲乘車適五而六四當其車前四互體坎正體亦坎坎為盜竊茀者也故婦喪其茀婦而無茀則不可乘車而之夫矣此蓋良臣為讒間而不得通于君之象然濟世之具在我五方需賢弼以出險舍我其誰吾唯靜以俟之不久當自合故詔之曰勿逐七日得彖所謂初吉正此爻也楊廷秀云管蔡之謗周公公不辨而王自悟燕王上官之譖霍光光不言而帝自察得爻義矣曰七日者自二反數之歷初數而還值二也卦變需亦勿逐象蘇子瞻云安樂之世人不思亂而小人開之開之有端必始于爭爭則動動則無所不至君子居之以至靜受之以廣大雖有好亂樂禍之人欲開其端而人莫之豫蓋未嘗不旋踵而敗也既濟爻皆有應六二六四居二陽之間在可疑之地冦之所謀而六二居中九五之配也或者欲間之故竊其茀其夫必怒而求之求未必得而婦先見疑近其婦者先見詰怨怒並生而憂患之至不可勝防矣故凡竊吾茀者利在于吾之逐之也吾恬而不逐上下晏然非盜者各得其位而盜者敗矣故曰勿逐七日得象傳曰七日得以中道也二為離主居下卦之中此六二之德也以中感中得其正應故終必相孚也九三高宗伐鬼方三年克之小人勿用變震為屯互體坎變坤約象離變艮九三以剛陽處欲變之位剛陽則近于有為欲變則動而之外內治既修則思勤兵于逺應爻最居卦外九五所不臣乃蠻夷之負固不服者故取高宗伐鬼方故事以為象然必曰三年克之者見盛世用兵之難也蓋當恬熙之後其將士既已不習于干戈民且憾于饋餉之煩故雖以高宗之賢猶待三年而後克可弗慎與求功于外孰與弭隙于內故既濟之所急者非邊功也所最急者則小人耳使小人得操政柄其禍且深于鬼方從來小人夷狄同為陰類而夷狄之禍較逺小人之禍較近故作易者于用兵之後必以小人勿用戒之師之上六猶此志也離為戈兵所謂兵猶火也變爻為震戈兵震動伐國之象鬼方者北方國也夏曰獯鬻商曰鬼方周曰獫狁漢曰丐奴魏曰突厥匡衡疏云成湯化異俗而懷鬼方豈湯時鬼方內屬于式圍之中而復叛于中衰之日故高宗伐之以中興殷道也與西羌傳云殷室中衰諸侯皆叛至高宗征西戎鬼方三年乃克詩云自彼氐羌莫敢不來王是其證也上與九三為應坎居北故曰鬼方又坎為隱伏鬼之象也繇三爻至上三年之象密比四隂隂為小四為人位三變互艮為小人勿用之象焦弱侯云既濟上三爻猶泰上三爻有向衰之漸故髙宗不屬五而屬三于令升云在既濟之家而述先代之功以明周因於殷有所弗革也卦變屯動乎險中有克而難意象傳曰三年克之憊也既濟之世大業已就其有幽逺之國猶未從則益修文德以來之可也今乃伐之雖以既濟之勢高宗之賢猶必待三年而後克師老財匱則亦憊矣于以見克敵之難而用兵非美事也又按乾鑿度云九三得正下陰能終其道濟成萬物猶殷道中衰王道陵遲至高宗內理其國以得民心扶救衰微伐征逺方三年而醜惡消王道成殷人高而宗之文王挺以較易勸德也此與傳意大異不必從六四繻釋文作襦子夏王廙本作説文作需有衣袽説文作絮云緼也京房本作袽子夏傳作茹終日戒變兑為革互體坎變巽約象離變乾繻説文云繒采也漢制裂帛邊繻頭以為關門符信離文明繒采象袽通作帤塞漏孔之敝帛即敝衣之帛也四變互體為乾衣之象也變兌為毁折衣敝象也黃庭經云世事紛紛如臭帤即此治平之世而小人竄伏于其間如盛服之中敗絮藏焉坎為隱伏繻有衣袽象終日者盡日也離已盡而坎月方升之時也坎為盜四在兩坎間其為盜多矣安得不終日戒以防之曰戒者為九五言也九五既濟之主也卦變革懼治之革而亂也故戒象傳曰終日戒有所疑也疑陰之伺陽也然則當既濟之世誰謂小者既皆得位而可不以利貞為戒哉坎為疑故曰有所疑然疑四者九五也九五東鄰殺牛不如西鄰之禴漢書作瀹祭實受其福變坤為明夷約象離變震此爻以坎離相對取象不以二五相應取象亦變例也後天卦位乾坎艮震陽與陽為鄰坎居北乃東之鄰也巽離坤兌陰與陰為鄰離居南乃西之鄰也曰東鄰殺牛不如西鄰之禴祭實受其福者蓋以既濟未濟之上體對言既濟上體坎坎為刑變坤為牛殺牛象也未濟上體離離屬夏夏祭曰禴禴祭象也既濟之九五安于承平久矣聲容儀度非不爛然可觀然無柢畏天命之實徒綢繆其章采而已欲以迓休不亦難乎曾不如新造之國其具未備其心則誠為彼蒼之所降鑒福履之綏政未艾也聖人懼人君當既濟之世侈志誇張而忘中惕故設之警如此四時之祭春祠夏禴秋嘗冬蒸禴用聲而已蒸則百物皆備殺牛冬祭喻時衰而且過用也禴夏祭喻時盛而且不過用也舊説以為指紂與文王之事謂紂為東鄰文王為西鄰則岐周侯國而乃與商天子稱鄰乎恐文王周公無此語矣坊記子云敬則用祭器故君子不以菲廢禮不以美殁禮故食禮主人親饋則客祭主人不親饋則客不祭故君子苟無禮雖美不食焉易曰東鄰殺牛不如西鄰之禴祭實受其福應劭云禘郊宗祖報五者國之典禮加之以社稷山川之神有功烈于民者也前哲令德之人所以為質者也天之三辰所照仰也地之五行所生殖也九州名山川澤所出財用也非是族也不在祀典淫祀無福是以泰山不享季氏之祭而易美西鄰之禴云象傳曰東鄰殺牛不如西鄰之時也實受其福吉大來也時者當其可之謂事惟其可不求過也大謂既濟九五之陽使既濟九五能如未濟之六五則吉且來集于九五之身矣何者天之所福不于其物于其誠故也上六濡其首厲變巽為家人上六以陰柔處坎險之極既濟之終自恃無復有險難矣然忽心一生則險難立至如人之濟水將及岸而濡其首甚危之之辭坎為濡上為首與大過上六滅頂同王輔嗣云既濟道窮則之于未濟之于未濟則首先犯焉將沒不久危莫先焉坎變巽亦入險象象傳曰濡其首厲何可久也世無長治久安之理人心之神與造化之氣共往來者也心止則治亦止濡首之危即在目前樂不久矣彖所謂終亂者此也既濟六爻皆陰陽相應聖人以陰陽立義不以相應立義如徒取相應也全卦無貶辭矣坎下離上未濟亨小狐汔濟濡其尾史記引作狐涉水濡其尾無攸利未濟之卦離上坎下以兩體言火在水上不相為用不能成烹飪之功上以爻象言內體坎三四五約象亦坎上九一陽橫亘于不能成出險之功故卦名為未濟未濟有終濟之理特需時耳故亨既濟已然之亨也未濟方來之亨也楊廷秀云處既濟者在于有持守克終之心處未濟者在于有進為克終之才心不克終故既濟為未濟才能克終故未濟為既濟濟斯亨矣故曰未濟亨非未濟之亨也未濟而能濟之亨也小狐指六五自三至五約象坎坎為水為穴為隱伏穴居隱伏往來水間者狐也故九家易云坎為狐所以稱小者五柔畫也又內卦正體坎為狐五乃互卦之坎當為小狐所以别于內卦也狐何以比君位狐有中和之德君象也左傳秦伯伐晉筮得蠱亦以雄狐為君象又狐色黃亦離五象也汔幾也與井卦汔至同當五之位已涉二坎矣故曰幾濟然猶未克濟而沾濡其尾者以上九障其前無繇出險故也狐尾甚長故古語云狐欲渡河無如尾何以約象卦畫推之尾當在六三爻位以居前水後水連接之間故有濡象與初六之方濟而即濡尾者不同史記春申君説秦昭王引易狐涉水濡其尾言始之易終之難也韓詩外傳云官怠于宦成病加于小愈禍生于懈惰孝衰于妻子察此四者慎終如始易曰小狐汔濟濡其尾詩曰靡不有初鮮克有終正此兩句義疏將濟未濟故無攸利然豈終不濟哉亦求其所以濟者而可矣胡仲虎云易不終既濟而終未濟易不可窮故也未濟之時其花未開之春月未圓之夜乎天地不交為否否不曰亨否不通也水火不交為未濟非不濟也未焉爾故曰未濟亨無他未濟水火之不交而坎男居離女下又男女之交也况既濟下離互坎上坎互離既濟之中互未濟未濟下坎互離上離互坎未濟之中互既濟非惟見時變之相為反覆而水火互藏其宅復于易中見之序卦傳曰物不可窮也故受之以未濟終焉終止則亂故其道窮既濟之心常如未濟則不窮矣學易者常持不可窮之心則幾道矣抑嘗聞之易之道陰陽兩端也而始于乾終于未濟則有太極無極之意存維天之道于穆不已太極也諸卦皆有著惟未濟無窮無窮之謂無極乎語道必至于無窮無極而後盡道宇之上下宙之前後亘古今一大疑事雖聖人不知也陰陽不測之謂神神無方易無體安可以一察盡哉項平甫云坎離之交謂之既濟此生生不窮之所從出也而聖人猶以為有窮也又分之以為未濟此即咸感之後繼之以常久之義也蓋情之交者不可以久而無弊故必分之正者終之人之心腎其氣何嘗不交而心必在上腎必在下不可易也觀此可以知既濟未濟之象矣彖傳曰未濟亨柔得中也小狐汔濟未出中也濡其尾無攸利不續終也雖不當位剛柔應也未濟之所以能亨者六五以陰居陽位柔而得上卦之中也柔則不愎以憤事柔而中則不懦以失幾此能濟之才也故致亨未出中者中即柔得中之中蓋以六五爻位言緣有上九以障之故雖幾濟而未能出于六五之前也濟而得濟謂之終今既未出中則始雖連續以涉習坎而終未出乎坎外是不能與前相繼續而成其終矣然豈終于不濟哉蓋六爻雖失位故為未濟然剛柔皆相應應則陰得陽以為助而未濟者終于必濟此其所以亨也未濟六爻不當位而皆相應聖人于爻辭中只以相應取義不以當位取義如必拘當位也六爻無善辭矣象傳曰火在水上未濟君子以愼辨物居方火炎上水潤下物不同也火居南水居北方不同也水火異處雖無濟于用而亦可以無相害有可法者愼辨物者物以羣分也愼居方者方以類聚也辨物象火照于上居方象水流于下同人之辨物别其所同也未濟之辨物致其所異也又蔡子木云方者物理之所止也未濟而首辨乎此可濟之道也既濟而常辨乎此可久之道也故辨物居方者所以成始成終者也而易象終焉項平哺云必加愼字者以其未濟也在濟之時且當思患豫防况未濟乎水火交則有難未交則未有難然難將生矣辨之不早居之不得其所皆難之所繇生也可不慎乎易終于未濟而始于屯其意深矣初六濡其尾吝變兌為睽此甫問津而即濡尾者與彖辭之濡尾不同蓋謂之曰初則非汔濟之時可知初以陰柔在下處險而應四處險則不安其居有應則志行于上然已既陰柔又當未濟之始未可以進初不量力而冒前其不濡尾而淪沒者鮮矣初在卦下故稱尾凡獸尾之大者必揭其尾而後能濟亦必獸之大而有力者方能揭其尾焉初之才力何如也既濟初九濡尾曰無咎此曰吝何彼時當濟又以陽居陽才足以濟之故無咎未濟之初六則事事與之相反矣若而人者固求濟之君臣所不許也故吝變坎為兌有陷于大澤之中已爾象傳曰濡其尾亦不知極也不知極猶言不知紀極言其好進無休已也方在坎底宜安以需冒深為淺尾能無濡乎則不知極之故耳九二曳其輪貞吉變坤為晉互體離變艮曵其輪有輪不前而強力以曳之之象孔仲達云言其勞也二與五應為佐濟之臣互體離性炎上盡心竭力即艱險不避但身在坎中水方湯湯漸車惟裳二才雖剛健可欲速哉必舒徐固慮自守陰位有待而進乃吉亦戒辭也曰吉則終必濟矣不然其能免于濡首之吝乎變晉六二晉如愁如亦不輕進象象傳曰九二貞吉中以行正也以九居二中也非正也然守中則能行其正九二之所以貞者以居中位故也六三未濟征凶利涉大川變巽為鼎互體離變乾約象坎變兑六三將出險矣然猶未出也以前有互坎在也故他爻不曰未濟獨此爻曰未濟征者進而有為之意以陰居陽不度力而鋭進者也彼其身之未出乎險遽欲進而有為于天下譬如涉者未登岸而征行必且溺矣無亦先計所以出險者身在險外而後可徐有為也故曰征凶利涉大川大川指互坎言進一坎又有一坎非大川而何變則成巽木道乃行故利涉象傳曰未濟征凶位不當也位在習坎之間也九四貞吉悔亡震用伐鬼方三年有賞于大國變艮為蒙互體離變震約象坎變坤九四以剛居陽宜有悔矣然處未濟之時不可純用乎剛惟能剛柔相濟貞守陰位而不輕用其剛則獲吉而悔可亡斯道也古人蓋嘗震懼不寧用以征伐鬼方遲之三年始奏功而膺裂土之賞夫伐逺宜于速攻而不憚夫三年之久老成持重此豈剛暴者可能哉震伐何其剛也三年何其柔也所謂貞吉者此也九四之貞與九二同變艮亦安貞象胡仲虎云既濟九三以剛居剛故直曰高宗伐鬼方未濟九四以剛居柔故曰震用伐鬼方震懼也臨事而懼未濟者必濟矣四變互體震故有震象本卦離為戈兵有伐象鬼方指初初體坎坎居北故曰鬼方取象與既濟同初陰柔好進而濡其尾故借為鬼方之昏迷不恭逆我顔行之象繇四至初歷三爻亦曰三年四陽為大四變約象坤為國互體震為諸侯故為論功而封大國之象焦弱侯云未濟之為卦以水火未交也是以居中者其責重三出坎而承離故以涉川為利四居離而履坎故以伐國為功楊廷秀云未濟之九四聖人喜其伐鬼方之賞既濟之九三聖人憂其伐鬼方之憊何也既濟之世利用靜未濟之世利用動也程可久云未濟之九四應于初六患在內也既濟之九三應上六患在外也患在內者如薄伐獫狁至于太原患在外者如抵掌于伊吾之北者矣象傳曰貞吉悔亡志行也剛柔相濟不輕用其剛故功成而志得行六五貞吉無悔君子之光有孚吉變乾為訟約象坎變巽曰貞者守其柔中之謂也與九四九二意同然貞非戒辭乃六五之所固有故曰無悔言自無悔也與有悔而亡者不同君子以位言離為光九五為離明之主故曰君子之光光出于形之表而不以力用君子之廣大者也有孚指二二坎體故稱孚二五正應五虛中晉接光被于二故二亦輸誠贊襄孚徹于五剛柔相應終有協力出險之功未濟者行獲濟矣故吉貞吉之吉以德言有孚吉之吉以功言王輔嗣云夫以柔順文明之質居于尊位付與于能而不自役使武以文御剛以柔斯誠君子之光也付物以能而不疑也物則竭力功斯克矣楊廷秀云未濟之六五其體離在天為日在地為火日與火雖柔猶剛雖弱猶強故日之在夏曀之益熱火之在夜宿之彌壯六五文明之至盛而養之以晦剛烈之至猛而掩之以柔方且虛其中以臨照百官正其身以正天下堅其誠以信任羣才故初六之在下而弱才乃最先濡其尾以為之用九二剛健之中臣則又自曳其輪以為之用九四剛明之近臣則又奮伐逺夷以為之用安得不一掃大難為無難之世一變未濟為既濟之時乎愚按未濟漸濟故雖六五之陰而亦有暉光既濟漸不濟故雖九五之陽而不能如西鄰之禴祭離為乾亦天與日光孚之象象傳曰君子之光其暉吉也君子之光其光之體吉也管輅云日中為光朝日為暉項平甫云暉者光中之氣吳幼清云詩曰庭燎有暉周禮眂祲以十暈為十輝按暉及物為光斂光在體為暉故日中之日夜間之燎其暉散則為光朝日之日向晨之燎其光斂則為暉暈者亦光斂于體內暉光相為體用愚按此爻光及九二而暉則在六五也上九有孚于飲酒無咎濡其首有孚失是變震為解卦之所以為未濟者在此爻也不然濟矣有孚指三三坎體也故稱孚與五爻之有孚指二同坎為酒有孚于飲酒者三載酒適上以表其孚也當未濟之世陰所倚賴者陽也上九以剛明之才處未濟之極三知其才可有為將資之以共事故載酒而孚之此非欲為酩酊而已其所望于上者甚不小也上如飲食自養以待事幾之會則其義猶為無咎乃麯蘖是耽絶不以亨屯拯溺為念如劉伶阮籍之徒直以身與世相為陸沈而已則失三之心而三向之有孚于上者究亦將掉臂去之矣人之溺于酒也猶溺于川三坎體為水上在人之體為首上九下就六三飲酒而忘反如以上體之首下入坎水之內故六三之水得以濡上九之首也是指上九失是者猶云棄是言三將棄上也既濟之終有亂之理故上六以濡首表人事之危未濟之終有濟之理故上九以濡首咎人事之失變震卦為解唯恐懼不遑則能動而出乎險象傳曰飲酒濡首亦不知節也節者事之會也至上九之時而不濟則終不濟也用兵者言始如處女敵人開戶後如脫兔忽不及距此之為節間不容髮時乎時乎其再來乎飲酒濡首失其會矣易者時也不可失時而有為不可後時而不為周公繫易于既未濟之終而皆以濡首為失時之咎其與民同患之意益深切矣李宏甫云聖人之處世也無一日而非既濟之時則無一日而非未濟之心無一時而非未濟之日則無一日而非欲濟之念憂方來而喜或乘之喜甫至而憂復生焉憂喜相仍此聖人所以發憤而不知老之將至也是故既濟未濟合為一卦而易道終矣乾之自強不息終日乾乾而夕猶惕若有以也夫焦弱侯云易之終始皆陽也始于乾之初九終于未濟之上九愚按周易始于乾而上經以離終下經未濟之上卦亦終離何也離者文明之卦翼傳稱包犧氏始作八卦以通神明之德以類萬物之情又作結繩而為網罟蓋取諸離氣化自此開矣聖人南面而聽天下嚮明而治亦取諸此况周家乃以火德王者此其所以殿之上下經之終而與乾相為首尾也歟古周易訂詁卷六
