body:
  text: 古周易訂詁卷九明何楷撰象傳上繫辭下傳曰象也者像此者也韓子云象南方之大獸中國人不識但見其畫故言圖寫似之為象又按象性久識體具十二少肉惟鼻是其本肉膽不附肝隨月轉在諸肉假令正月建寅卽膽在其虎肉或曰膽隨四時在四足春前左夏前右秋後左冬後右如龜无定體也易隨時變易故有取於象與名彖同意趙凡夫云象言其形彖言其意以性解卦曰彖以相解卦曰象象氣下垂彖氣上出象推自然以合之人彖取人事以合之天故曰象曰彖玩二文以知物觀二獸以知道是也夫子六十四卦大象自釋伏羲一卦兩體之象象皆夫子所自取文王周公所未甞有故與卦爻之辭絶不相關其釋六爻之象辭者謂之小象上下篇依經此第三翼也天行健健晁氏作乾趙氏輯聞云集韻乾或作􅹧當是􅹧訛為健君子以自彊不息此大象也後放此六十四卦皆著一以字以者所以體易而用之也即一以字示萬世學者用易之方不可不察也潛龍勿用陽在下音戸與詩在南山之下同也此以下皆小象也後放此王輔嗣取以分附于當爻之下唯乾卦依舊小象與大象相連今俱從古見賢遍反龍在田德施普也終日乾乾反復芳服反古本亦作覆道也或躍在淵進无咎音咎繇之咎讀為上聲也飛龍在天大人造徂早反為也王肅音七到反就也至也唐孔氏云姚信陸績之屬皆以造為造至之造今按象辭皆上下為韻則姚信之義其讀非也又劉歆父子作聚也亢龍有悔盈不可久也用九天德不可為首也其象傳之解已逐註于經文後今不重註後倣此地勢坤君子以厚德載物履霜堅冰魏志大史許芝引此句履霜上有初六字下无堅冰字易舉正只存履霜二字陰始凝按說文仌冰凝二字今皆溷用不可不辯仌凍也象水凝之形文理如此也傍省作冫筆陵切冰水堅也从冫从水㑹意冫亦聲魚陵切俗作疑或謂从疑者水冰則疑不敢渡如履薄冰狐聽冰葢㑹意也然古文无凝字今文冫字罕用而以冰為冫讀如冫又剙一凝字讀如冰皆譌也若凖依古文則此象傳當寫云履霜堅冫陰始冰也馴致其道至堅冫也方為得之卽如莊子肌膚若冰雪冰即俗所謂凝也若讀作冫筆陵切文便不佳可知今文冰字當還為冫凝字當還為冰矣又有省冰作氷以為冫字者世俗通行絶不成字也馴致其道至堅冰也六二之動直以方也不習无不利地道光也含章可貞以時𤼵也或從王事知音智光大也括囊无咎慎不害也黄裳元吉文在中也龍戰于野其道窮也用六永貞以大終也雲雷屯君子以經綸古本作論鄭康成謂論撰書禮樂施政事或亦作倫中庸云經綸天下之大經當以綸字為正雖磐桓志行正也以貴下賤大得民也六二之難如字乘剛也豫五噬㗐二困三震二同十年乃字反常也卽鹿无虞易舉正據王輔嗣韓康伯本此下有何字以從禽也君子舍音捨之往吝窮也求而徃明也屯其膏施未光也泣血漣說文作㦁如何可長如字叶韻也山下出泉蒙君子以果行育德利用刑人以正法也子克家剛柔接也勿用取女行不順如字本義云當作慎非也困蒙之吝獨逺于萬反實本義云叶韻去聲當作時刃切也童蒙之吉順以巽卦名也凡爻變巽者象傳多以巽解鄭康成謂當作遜者非也蒙五漸四家人二同利用禦寇上下順也雲上時掌反於天王肅本作雲在天上需君子以飲食宴樂需于郊不犯難乃旦反行也利用恒无咎陸德明本无无咎字未失常也師四同需于沙衍在中也雖小有言以吉終也需于泥災在外也自我致寇敬慎不敗也需于血順以聽也酒食貞吉以中正也訟五同不速之客來敬之終吉雖不當都浪反或有作平聲讀者不必從解見本卦位未大失也天與水違行訟君子以作事謀始不永所事訟不可長也雖小有言其辯明也不克訟歸逋句竄也自下訟上患至掇鄭𤣥本作惙也食舊德從上吉也復卽命渝安貞不失也訟元吉以中正也以訟受服亦不足敬也地中有水師君子以容民畜訓聚勑六反訓養許六反今詳義應訓聚與大畜小畜讀同通作蓄衆師出以律失律㓙也在師中吉承天寵王肅本作龍云寵也也王三錫鄭𤣥本作賜命懐萬邦也師或輿尸大无功也左次无咎未失常也長知兩切子帥師以中行也弟子輿尸使不當平聲讀叶韻也大君有命以正功也小人勿用必亂邦也地上有水比毗志反下同先王以建萬國親諸侯比之初六有他吉也比之自内不自失也比之匪人不亦傷乎外比於賢以從上也顯比之吉位正中也隨五巽五同舍音捨逆取順失前禽也郭京舉正據王弼本作失前禽舍逆取順也恐古文未必拘拘乃爾邑人不誡上使中也比之无首无所終也風行天上小畜君子以懿文德復自道其義吉也牽復在中亦不自失也夫妻反目不能正室也有孚惕出上合志也有孚攣如不獨富也既雨既處德積載也君子征㐫有所疑張鼎思云疑舊作礙礙與載韻叶但不知張何所本也上天下澤履君子以辯上下定民志素履之往獨行願也幽人貞吉中不自亂也眇能視不足以有明也跛能履不足以與行也咥人之㐫位不當如字也位不當以六居三者履否豫臨噬㗐睽震兌中孚未濟凡十武人為于大君志剛也愬愬終吉志行也否睽未濟之四同夬履貞厲位正當毛晃云易當位不當位皆作平聲讀俗作去聲讀誤楊用修云按小象如位正當也叶大有慶也位不當也叶陽不長也毛晃之言良信也否兌中孚之五同元吉在上大有慶也天地交泰后以財荀爽本作裁成天地之道輔相息亮反天地之宜以左右錢一本云左右即右佐佑字皆去聲民拔茅征吉志在外也咸初渙三同包荒得尚于中行以光大也无往不復宋衷本作无平不陂无往不復陸德明據古本作无平不陂天地際也翩翩不富皆失周易舉正作反實也不戒以孚中心願也以祉元吉中以行願也城復于隍其命亂也天地不交否備鄙反下同君子以儉德辟音避難乃旦反不可榮以禄拔茅貞吉志在君也大人否亨不亂羣也包羞位不當也有命无咎志行也大人之吉位正當也否終則傾何可長也天與火同人君子以類族辯物出門同人又誰咎也節三解三同同人于宗吝道也伏戎于莽敵剛也三歲不興安行也乘其墉義弗克也其吉則困而反則也同人之先以中直也困五同大師相遇言相克也同人于郊志未得也謙上困五同火在天上大有君子以遏惡揚善順天休命大有初九无交害也大車以載積中不敗也公用亨于天子小人害也匪其彭无咎明辯晳王廙本作晰徐李本又作哲鄭𤣥本作遰云讀如明星哲晳陸績本作逝虞翻本作折也厥孚交如信以發志也豐六二同威如之吉易以豉反而无僃也大有上吉自天祐也地中有山謙君子以裒鄭荀董蜀本俱作捊字書作掊多益寡稱尺證反物平施謙謙君子卑以自牧也鳴謙貞吉中心得也勞謙君子萬民服也无不利撝謙不違則也利用侵郭京據王弼本云經象征字並誤作侵字伐征不服也鳴謙志未得也可用行師征邑國也雷出地奮豫先王以作樂崇德殷京房本作隱薦古本又作􅶓之上帝以配祖考初六鳴豫志窮㐫也不終日貞吉以中正也晉二同俞氏謂中正當作正中乃叶㓙韻盱豫有悔位不當也由豫大有得志大行也六五貞疾乘剛也恒不死中未亡也㝠豫在上何可長也澤中有雷隨君子以嚮王肅本作鄉音同晦入宴息官有渝從正吉也出門交有功不失也係小子弗兼與也係丈夫志舍音捨下也隨有獲其義㐫也有孚在道明功也孚于嘉吉位正中古一本作中正非也拘係之上窮也姤上巽上同山下有風蠱君子以振民育德幹父之蠱意承考也幹母之蠱得中道也幹父之蠱終无咎也裕父之蠱徃未得也幹父用譽承以德也不事王侯志可則也澤上有地臨君子以教思无窮容保民无疆咸臨貞吉志行正也咸臨吉无不利未順命也甘臨位不當也既憂之咎不長也至臨无咎位當也陸德明云或作當位實非大君之宜行中之謂也敦臨之吉志在内也風行地上觀先王以省方觀民設教初六童觀小人道也闚觀古一本有利字女貞亦可醜也觀我生進退未失道也觀國之光尚賔也觀我生觀民也觀其生志未平也雷電蔡邕石經及李鼎祚本皆作電雷噬㗐先王以明罰勑按勑字本音賚相承作勅字陸德明云此俗字也字林作敕法屨校滅趾古一本有止字不行也噬膚滅鼻乘剛也遇毒位不當也利艱貞吉未光陸德明本有大字非也貞厲无咎得當也何校滅耳聰不明也夬四同山下有火賁君子以明蜀才本作命庻政无敢折獄舍音捨車而徒義弗乘也賁其須與上興也永貞之吉終莫之陵也六四當位疑也匪寇婚媾終无尤也剝五蹇二鼎二旅二同六五之吉有喜古音許意反大畜卦倣此也大畜四升二同白賁无咎上得志也山附于地剝上象稱上惟剝以厚下安宅剝牀以足以滅下也剝牀以辨未有與也剝之无咎失上下也剝牀以膚切近災也以宫人寵終无尤也君子得輿民所載也小人剝廬終不可用也豐九三同雷在地中復先王以至日閉關商旅不行后不省方不逺之復以修身也休復之吉以下仁也頻復之厲義无咎也解漸既濟初同中行獨復以從道也敦復无悔中以自考也迷復之㐫反君道也天下雷行物與句張清子胡旦王畿焦竑錢一本皆如此讀无妄先王以茂對時育萬舉正无萬字云今本見王弼註中萬字誤増物无妄之往得志也不耕舉正有而字穫未舉正作求富也行人得牛邑人災也可貞无咎固有之也益六三同无妄之藥不可試也无妄之行窮之災也天在山中大畜君子以多識如字劉瓛本作志前言徃行下孟反以畜其徳有厲利己不犯災也輿説吐活反輹中无尤也利有攸徃上合志也六四元吉有喜也六五之吉有慶也豐五兊四同何天之衢舉正有亨字道大行也山下有雷頥君子以慎言語節飲食觀我朶頥亦不足貴也六二征㐫行失類也十年勿用道大李鼎祚本作德悖也顚頥之吉上施光也居貞之吉順以從上也由頥厲吉大有慶也澤滅木大過君子以獨立不懼遯世无悶藉用白茅柔在下也老夫女妻過以相與也棟橈之㐫不可以有輔也棟隆之吉不橈乎下也枯楊生華何可久也老婦士舉正作少夫亦可醜也解三同過涉之㐫不可咎也水洊京房本作臻于寳本作薦至習坎君子以常德行下孟反習教事習坎入坎失道㐫也求小得未出中也來之坎坎終无功也樽酒簋貳陸德明本无貳字剛柔際也坎不盈中未大也上六失道㓙三歲也明兩作句離大人以舉正按王弼本有明照二字繼明照于四方履錯之敬以辟古避字咎也黄離元吉得中道也解夬二同日昃之離何可久也突如其來如无所容也恒三同六五之吉離鄭𤣥本作麗王公也王用出征以正邦也王肅本此下更有獲匪其醜大有功也八字古周易訂詁卷九
