body:
  text: 古周易訂詁卷三明何楷撰自隨至離為上經之終隨蠱四偏卦兌與震合艮與㢲合兌㢲震艮臨觀坤統長少二女坤前縱横捭闔噬嗑賁離合長少二男坤為主離用事為主包括于外剝復坤合長少二男合二男以居中乾後參錯于内无妄大畜乾統長少二男為從將以客而頤大過四偏卦艮與震合兌與㢲合囊括主也坎離坎離天地之大用也故居終焉凡十四卦為上經之終其君卦則坤為主乾從坤其臣卦則離用事坎不得用事陽中之隂故也蕭氏漢中云兌㢲艮震下經之主上經之客也在上經之初皆不能自為卦必依於乾坤坎離而後成卦客依主也至此而隨蠱頤大過四卦客自為卦不得不察由謙而前十五卦上經之上陽中之陽故陽盛而主旺客衰由豫而後上經之下陽中之隂故陽微而主衰客旺前十五卦乾坤坎離之體多震艮㢲兌之體少主盛客微也乾坤坎離諸體之中乾復多於坤坎復多於離均之為主而陽又勝於隂也後十五卦乾坤坎離之體少震艮㢲兌之體多主漸衰而客漸盛也於震艮㢲兌諸體之中震多於㢲艮多於兌葢上經之末雖陽中之隂而本實陽客雖侵主而猶未遽以隂勝陽也乾坤坎離諸體之中坤多於乾離多於坎則主既向衰而隂反先勝於陽失其所以為主之道矣故震艮㢲兌不依於乾坤故離而自為卦始於隨蠱終於頤大過皆客自為卦也此四卦者客之營壘機穽也又云上經諸卦惟臨觀一卦純隂无陽體之雜以坤倡離和故賁噬嗑一對所以相承也剝復繼噬嗑賁之後无妄大畜繼剝復之後者見坤為主離用事而乾從坤也隂長陽消主衰客盛矣雖然客豈遽侵主哉主交客而致其来也坤交艮而成謙震交坤而成豫謙居十五卦之末豫居十五卦之首由此而上陽日以長而主盛由此而下隂日以長而客强葢隂陽主客盛衰消長之㡬㑹也㡬一失而謙豫主交客而致其來矣然主雖交客而客猶依主也再失而為隨蠱則客不復依主而能自立矣方其一失也坤交艮震而成謙豫其卦居隨蠱之先則主之交客猶在吾疆畛而未入於吾之窟穴也及其再失也坤交兌㢲而成臨觀其卦居隨蠱之後則入客之窟穴之内與客之貴者交矣自是而後皆震艮之體噬嗑賁一對與之交者離也剝復一對與之交者坤也其極至於无妄大畜一對則與之交者乾也无妄以乾合震乾猶居震之上大畜以艮止乾乾反居艮之下回視上經之初首出庶物㡬於冠履倒置故受之以頤大過艮㢲震兌而終焉於是上降為下客反為主此豈偶然之故觀象者可不極深而研㡬於此哉又云坎離之體雖不得乾坤之全而得乾坤之中惟其中也不偏於上不偏於下故為上經之尾又為下經之尾而用其全也夫乾之中畫交於坤畫之中而成坎是坎之本體得乾之中畫不得乾之丄下畫也非全也及用以交離則得乾之上下畫而乾之三畫全矣不特乾之三畫全其本體有坤之上下畫今交離之中畫則坤之三畫亦全矣夫坤之中畫交於乾畫之中而成離是離之本體得坤之中畫不得坤之上下畫也非全也及用以交坎則得坤之上下畫而坤之三畫全矣不特坤之三畫全其本體有乾之上下畫今交坎之中畫而乾之三畫亦全矣是坎離體得乾坤之中用得乾坤之全不謂之全不可也所不同者乾坤以體言坎離以用言其所以全則有間矣乾坤之全自其始而本體已全坎離之全要其終待合而後全此乾坤之體所以總六十四卦之全而為之始坎離之用所以總六十四卦之全而為之終也又嘗反覆諸卦象以考乾坤坎離之體用葢乾坤體全而用也中坎離體中而用也全斯義也亦不可不論乾坤之體居上經之始而其用居上經中一節之正中泰否是也坎離之體居上經之終而其用居下經之終既未是也乾坤之體全坎離之用全上文已論至於乾坤之用不居上經之前一節不居下經之後一節必居中一節之正中者豈非以其中哉若夫坎離之體所以居上經之終者又豈非總六十四卦之全而居其中哉故曰乾坤體全而用也中坎離體中而用也全以卦之所居察之信其然也第九對隨蠱襍卦傳曰隨无故也蠱則飭也隨前无故妄作必㐫蠱後當飭不振必壞元亨利貞以隨時而天之道盡于隨先甲後甲以有事而天之行見于蠱震下兌上隨元亨利貞无咎隨從也如人前行而自後從之六爻初九隨六二六三隨九四九五隨上六皆非正應而各以一隂一陽相比故其象為隨焦弱侯謂履以履其後為義隨以下隨上為義是也卦震下兌上以震為主上隨乎兌程子所謂男下女非女勝男者葢長陽非少隂可敵以長男下少女故為下之是也元亨以上下兩體言利貞以初上兩爻言震動在下兌悦在上本大亨通然陽動隂悦易至詭隨故必利于貞方得无咎若初為震主上為兌主兩爻俱无係應則其動也无心其悦也无情而得貞之道矣按卦有震者皆主動唯隨卦之震専取不動為義震居兌下動不遽動也唯不遽動乃所以善其動此動之所以召悦也故曰利貞无咎初九曰貞吉六三曰利居貞葢防震之動而繫辭亦曰隨无故也大象亦曰君子以嚮晦入宴息皆取不動之義左傳襄公九年穆姜薨于東宫始往而筮之遇艮之八史曰是謂艮之隨隨其出也君必速出姜曰亡是於周易曰隨元亨利貞无咎元體之長也亨嘉之㑹也利義之和也貞事之幹也體仁足以長人嘉德足以合禮利物足以和義貞固足以幹事然故不可誣也是以雖隨无咎今我婦人而與于亂固在下位而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利棄位而姣不可謂貞有四徳者隨而无咎我皆无之豈隨也哉我則取惡能无咎乎必死於此弗得出矣鄧汝極云隨時之義大也微仁以體之禮以節之義以宜之智以别之宜不能及此愚按乾屯隨臨无妄五卦體備四徳當自冇其義穆姜之解隨即文言傳之贊乾也豈隨與乾合徳乎偶思之自震一索得男至兌三索得女震者陽之始兌者隂之終也内震而外兌六子之緼括于其中矣此其所以上配乾徳也歟然此皆非繇辭正義觀彖傳則利貞宜連下无咎讀六爻皆變為山風蠱震上兌下為歸妹序卦傳曰豫必有隨故受之以隨豫悦之道物之所隨彖傳曰隨剛來而下柔動而説隨大亨貞无咎而天下隨時隨時之義大矣哉乾之上九來居坤之下所謂剛來而下柔也此疑耑指下卦言然以兩體觀之震為剛卦兌為柔卦震下兌上震之一陽在隂柔之下亦可言下柔也卦以震隨兌為義故云然剛來下柔隨之象也然必動而可為人悦則隨之善者也隨之元亨其以下動而上悦與變元稱大者主震陽言此宜斷句舊以大亨貞一氣讀非是動悦之道隨時而已彖辭重在貞傳辭重在時時之所在即貞也動不遽動相時而動所謂貞也貞无咎而天下隨時者葢天下之所隨者時而已動不違時則有以悦天下人之心何咎之有以湯武言之革命應人剛來而下柔也天下信其志在救民動而悦也然二聖之舉動不敢違時以元聖而五就十三載而觀政時可動則動也故南巢放而太白懸而民无越志隨時也時一而已天下之所隨者此時聖人之所隨者亦此時必先有聖人之隨而後有天下之隨故贊之曰隨時之義大矣哉時无窮隨亦无窮從宜適變不可為典要非造道之深知㡬能權者不能與于此欲人知其義之大玩而識之也蘇子瞻云時者上所制也不從已而從時其為隨也大矣程子云此贊隨時之義大與豫等諸卦不同諸卦時與義是兩事朱子從王肅本隨時作隨之隨時之義作隨之時義皆非象傳曰澤中有雷隨君子以嚮晦入宴息雷春夏用事月令仲秋雷始收聲兌為正秋又為澤震伏兌下故曰澤中有雷吳㓜清求其實象而不得則云雷者陽氣所為龍乃陽氣之聚龍之所在即雷之所在也雷之與龍一也故震為雷亦為龍今神龍所居之靈湫其水清澈不容穢濁每喧汙輒興雲雨所謂澤中有雷者此也雖説象近是然㡬于鑿矣嚮與向同如夜嚮晨之嚮震日出之時為嚮明兑日入之時為嚮晦禮君子晝不居内夜不居外入宴息者入居于内而宴安休息所謂日入而息也夫隨在于動欲其持以静也雷藏于澤動者之能静也君子之應事也衆寡小大隨時隨理以處之而此心寂然有嚮晦入宴息之象焉是故動亦定静亦定則无不貞无不時而天下隨之矣自震趨兑嚮晦象互㢲為入互艮為止皆入宴息象丘行可云君子體天行事故動與雷俱出而静與雷俱入如雷出地奮豫以之作樂崇徳雷在天上大壯以之非禮弗履天下雷行无妄以之對時育物皆法雷之動也如雷在地中復以之閉關息旅后不省方澤中有雷隨以之嚮晦宴息皆法雷之静也繫辭下傳曰服牛乘馬引重致逺以利天下葢取諸隨下動上悦逺近隨人行止隨時皆隨象也與本卦義无涉解見本傳初九官蜀才本作館有渝貞吉出門交有功變坤為萃官統治人者初成卦之主以震之一君統二民故有官象渝變也震性變動渝象訟卦四變中爻為震亦曰渝此言有渝者變而隨乎二也二本非初應特以隂爻近比而初隨之是官有渝矣初之應四正也其隨二非正也故戒之曰惟守正則吉當隨之時以有比為私以敵應為公出門戒其比二也交有功勉其趨四也前二偶畫門象又二三四互艮為門闕初不比於私係之二動而出門以往交于四貞孰如之得應于四同徳相合陽剛有助能有成功吉孰如之此爻動静咸宜守貞有功變則得應卦變萃亦出門交象又鄭康成云震為大塗又為日門當春分隂陽之所交也是臣出君門與四方賢人交有成功之象其義未詳象傳曰官有渝從正吉也出門交有功不失也上二句蒙爻辭之文也官有渝非吉道矣惟從其正應則吉此爻所以言貞吉也初出門而交四則能有功以不矣其所當應故也若渝而與二為隨失之矣六二係小子失丈夫變兑為重兑互體艮變離程子云二應五而比初隨先於近柔不能固守故為之戒云若係小子則失丈夫也初陽在下小子也五正應在上丈夫也二若志係于初則失九五之正應是失丈夫也係小子而失丈夫捨正應而從不正其咎大矣二有中正之徳非必至如是也在隨之時當為之戒也朱子云其象如此㐫咎可知不假言矣愚按王弼孔頴逹皆以初九為小子然震為長男何得稱小子與漸初六以艮少男稱小子不同至若九五乃兑體兑本隂卦而云丈夫者葢第就陽畫取象耳然終有未􅃀然者曾聞之師云隨上兑下震兑正秋也於十二子為酉酉者物之老也故稱丈夫震東方也於十二子為夘夘之言茂也故稱小子以兑乘震如少長之相隨故謂之隨此説殊可信爻變兑卦亦變兑動而過於悦故有係小子之戒又程沙隨古占法云穆姜比於叔孫僑如欲廢成公僑如敗遷穆姜於東宫筮之遇艮之八史曰是謂艮之隨其辭曰艮其腓不拯其隨其心不快腓附下體六二隨九三當艮止之時上下不相與不見拯者也艮之隨亦隨之艮其辭曰係小子失丈夫應九五順也宜應而失乘初九逆也宜失而係且諸爻皆動以明八二之不動不可出矣此劉夢得所謂變者五定者一宜從少占是也象傳曰係小子弗兼與也二之中正非必果背五嚮初也但以其近比易于牽係故為之戒曰爾若係此則必失彼矣豈能兼與乎人之所隨得正則逺邪從非則失是无兩從之理所以戒人從正當専一也六三係丈夫失小子隨有求得利居貞變離為革互體艮變㢲約象㢲變乾丈夫謂九四陽之在己上者也小子亦謂初九陽之居己下者也二之以五為丈夫者正其夫也三之以四為丈夫者非其夫也三无應无夫之婦也四亦无應无婦之夫也无夫之婦近于无婦之夫而隨之遂以為夫此三之係四所以謂之係丈夫也三雖與初同體而切近于四上係於四故下失于初隨有求得者三欲往隨于四四亦更无他應其與之情専故三之有求于四者无不得也得謂隂虚得陽實又互㢲為近利市三倍亦得象三之於四雖有求必得然非正應故有不正而為邪媚之嫌于是戒之以利居貞謂不可動于私係而貪其得也互艮故能居貞三上雖敵應然三本長男震體上為少女兑爻第守貞則必得其所配變離中女則无應義故爻以居貞致戒云象傳曰係丈夫志舍下也下指初九三之係四其志僅在舍初而已孰知四之亦當舍而不當係乎此言外意葢初與四俱非三之正應故也九四隨有𫉬貞㐫有孚在道以明何咎變坎為屯互體艮變坤約象㢲變艮隨有𫉬指六三三來隨四四不之距則為三所得所謂隨有求得也然三四非應若四竟守此不變則其義為㐫初九貞吉以舍私係之隂故九四貞㐫以昵私係之隂故若變則以隂爻居隂位既不為三所係而初亦得其應矣有孚在道者言有人與己相孚信在道塗之間指初九也初九九四皆得坎半體故有孚信象此爻變亦坎震為大塗四履震塗之上而與其主爻相應有在道象初四正應四知初之可從而從之能全其明哲而不惑于偏邪何過咎之有兑為見故曰明互體艮亦光明象吳㓜清云四居隂故或與六三九體陽故能交初九象傳曰隨有𫉬其義㐫也有孚在道明功也四與三非應故曰義㐫未有毁義以相詭隨而𫉬吉者也有孚在道則得其所應故无咎葢四明哲之功也九五孚于嘉吉變震為重震約象㢲變坎吳㓜清云有孚者彼孚于此單言孚者此孚于彼五上得坎半體五為坎中畫故亦曰孚又約象變則成坎嘉美也謂六二蘇子瞻云傳曰嘉耦曰配而昏禮為嘉故易凡言嘉者其配也隨以從人為義從人故多舍其正應而近是依初九從六二六三從九四其於比周均也九五陽剛居尊且得六二正應所孚一于中正蕩蕩平平畧無所係天下成不言而信之化矣此非隨之至善者乎吉孰如之變則失位又失應象傳曰孚于嘉吉位正中也隨之世皆急于求合故各爻皆有繫有求有𫉬五與二應位皆得正而居上下卦之中配合孔嘉其吉為何如上六拘係之乃從維之王用亨許兩反于西山變乾為无妄上居卦終无可隨者下應六三雖曰敵應然上己身許之亦安之矣拘係之者指六三也二三四體艮艮為手故有拘象隂爻稱係與係小子係丈夫之係同三慮上之他屬故至于用拘以係之乃從維之者指九五也三四五體㢲㢲為繩故有維象五以近比于上而欲得之故不顧三之拘繫乃從而縶維之然上實守貞者也其志其分已定屬之三矣不可以强而致必欲致之或積至誠以感動之而後可故教之曰當如王之祭亨于西山誠意顓篤雖鬼神可格而況于人乎王謂九五古文亨即享字項平甫云大有九三公用亨于天子隨上六王用亨于西山益六二王用亨于帝升六四王用亨于岐山四爻句法皆同今獨益作享讀者俗師不識古字獨于享帝不敢作亨帝也若天子則或以為无享理不知賔禮自有亨王此爻與升四則吉禮山川之祭也西山岍隴諸山其尊者吳嶽在正西兑方又地祇隂神也故兑之隂畫為西山又兑為巫凡卦有兑者多取祭祀象萃之王假有廟損初九之祀事遄往困九五之利用祭祀升互兑之王用享于岐山皆是也所以知爻辭為周公作者以繫爻之時文王已追王矣若文王所作不應自稱王且享于西山享于岐山亦是追裘先徳以明其不僣之意諸侯祭境内山川分也若魯侯僣禘祭秦伯西峙鄜峙則僣王矣此爻只言上六有守貞之徳所謂乃從維之王用享于西山者皆是虚象乃假此以明上六之不肯舍正應而從近比耳上為兑主爻故其徳如此晉文公圍陽樊倉葛呼曰陽樊懷我王徳是以未從于晉謂君其何徳之布以懷柔之使无有逺志今將大泯其宗祊而蔑殺其民人宜吾不敢服也正此爻義變乾卦為无妄而上九有行有𤯝之戒者正以其係應故耳又按乾鑿度孔子曰隨上六拘繫之乃從維之王用亨于西山隨者二月之卦隨徳施行藩決難解萬物隨陽而出故上六欲待九五拘繫之維持之明被陽化而隂欲隨之也譬猶文王之崇至徳顯中和之美拘民以禮係民以義當此之時仁恩所加靡不隨從咸悦其徳此下俱闕文然其理殊不可曉象傳曰拘係之上窮也隨以自後隨前為義上居卦極无可隨者雖與三敵應而為所拘繫亦安之而已㢲下艮上蠱元亨利涉大川先甲三日後甲三日左傳晉侯求醫于秦秦伯使醫龢視之曰疾不可為也是謂近女室疾如蠱非鬼非食惑以喪志趙孟曰何謂蠱對曰淫溺惑亂之所生也於文皿蟲為蠱榖之飛亦為蠱在周易女惑男風落山謂之蠱皆同物也按文字也皿器也杜元凱以器受蟲害者為蠱蘇子瞻以器久不用而蠱生之謂之蠱此皿蟲也潜虚云百毒之聚勝者為主惟物之蠱朱子云器中盛那蟲敎他自相併此亦皿蟲也所謂皿蟲為蠱也杜元凱又謂榖久積則變為飛蟲名曰蠱國語載醫龢謂蠱之慝榖之飛實生之物莫伏于蠱莫嘉於榖榖興蠱伏而章明者也故食榖者晝選男徳以象榖明宵静女徳以伏蠱慝所謂榖之飛亦為蠱也在卦㢲為長女艮為少男少男而説長女非匹蠱惑之象㢲為風艮為山山本為風所落蠱壞之象所謂女惑男風落山謂之蠱也以卦義言之艮剛居上㢲柔居下上下不交下卑㢲而上苟止故為蠱所以言元亨者葢極敝則將復興故言元亨也然豈静以俟其治哉必厯選艱難險阻以撥亂反正知其先之三爻乃㢲之柔懦所以成其蠱也則因其柔懦而矯之以剛果知其後之二爻乃艮之止息所以成其蠱也則因其止息而矯之以奮發能如是斯可以元亨矣六爻唯二五有應二以陽徳居隂位故能以中道幹母五以隂徳居陽位故能以用譽幹父所云利涉大川當即指二五言自二至四為兑兑為澤大川象自三至五為震震本在兑澤上利涉象蠱先甲後甲㢲先庚後庚其説不一子夏云先甲三日者辛壬癸也後甲三日者乙丙丁也鄭𤣥云甲者造作新令之日甲前三日取改過自新故用辛也甲後三日取丁寧之義故用丁也在㢲九五先庚三日亦為丁而後庚三日則為癸朱子云丁所以丁寧於其變之前癸所以揆度於其變之後據此則但以字訓都與蠱㢲卦義无涉游氏謂辛丁二義若隱語然豈所以為易乎是也此其説之可疑者也王輔嗣則云甲者創制之令也創制不可責之以舊故先之三日後之三日使令治而後乃誅也又云申命令謂之庚先申三日令著之後復申三日甲庚皆申命之謂也據兩卦皆有㢲似取申命象然令甲之名起于漢以令有甲乙之㳄故名而非即釋令為甲也至以申命令解庚字絶无稽據此其説之可疑者也焦弱侯則云周禮治象浹日而歛之鄭司農以為從甲至癸謂之浹日是以易稱先甲三日先庚三日皆為申命令之義獨取甲庚者以甲木主仁示其寛令也庚金主義示其嚴令也果如所言則申令唯取庚甲不應復云先庚後庚先甲後甲也此其説之可疑者也馬季長云甲在東方艮在東北故云先甲㢲在東南故云後甲所以十日之中唯稱甲者甲為十日之首蠱是造事之端故舉初而明事始也來矣鮮亦云先甲後甲者本卦艮上㢲下文王圓圖艮㢲夾震木于東之中故曰先甲後甲言㢲先于甲艮後于甲也㢲卦言先庚後庚者伏羲圓圖艮㢲夾坎方于西之中故曰先庚後庚言㢲先于庚艮後于庚也十千獨言甲庚者乾坤乃六十四卦之祖甲居于寅坤在上乾在下為泰庚居于申乾在上坤在下為否大往小來小往大來天地之道不過如此物不可以終通物不可以終否易之為道亦不過如此所以獨言甲庚也而胡仲虎則云先天甲在東之離繇甲逆數離震坤三位得艮先甲三日也自甲順數離兊乾三位得㢲後甲三日也然則上艮止下卑㢲所以為蠱於艮得先甲三日之辛於㢲得後甲三日之丁又所以治蠱也又云文王發先天于彖故取先天艮㢲前後三卦其方為甲周公發後天于爻故取後天艮㢲前後三卦其方為庚㢲體本无艮九五變則為㢲下艮上之蠱故特於此爻發之後庚後庚申命以防蠱也與先甲後甲又自相貫按二説俱本圖位為言但先天圓圖乃邵子所意造原无師承愚所不取以文王八卦方位㳄序觀之甲木屬震艮㢲夾震木于東之中曰先三後三者六爻也其為説似矣然庚金屬兑㢲之先庚三日後庚三日將何所取之以下卦㢲自㢲而離而坤至兑凡三卦為先庚以㢲九五爻變則為艮自兑而乾而坎至艮凡三卦為後庚則同一先後也不應在蠱只隔一卦在㢲乃隔三卦同一三日也不應在蠱但以爻言在㢲乃以位言此其説之可疑者也蘇子瞻則云蠱之與㢲一也上下相順與下順而上止其為媮一也而㢲之所以不為蠱者以有九五以幹之而蠱无是也故蠱之彖曰先甲三日後甲三日終則有始而㢲之九五曰无初有終先庚三日後庚三日吉陽生于子盡于巳隂生于午盡于亥陽為君子君子為治隂為小人小人為亂夫一月十二干相值支五干六而後復世未有不知者也先甲三日後甲三日則世所謂六甲也先庚三日後庚三日則世所謂六庚也甲庚之先後隂陽相反故易取此以寄治亂之𫝑也先甲三日子戌申也申盡于己而陽盈矣盈將生隂治將生亂故受之以後甲後甲三日午辰寅也寅盡于亥然後隂極而陽生蠱无九五以幹之則其治亂皆極其自然之𫝑𫝑窮而後變故曰終則有始天行也夫㢲則不然初雖失之後必有以起之譬之于庚先庚三日午辰寅也後庚三日子戌申也庚之所後甲之所先也故先庚三日盡於亥後庚三日盡于巳先隂而後陽先亂而後治故曰无初有終又特曰吉不言之於其彖而言之於九五者明此九五之功非㢲之功也按此所謂六甲六庚其説不可易矣惟以干支先後為蠱㢲相反之理似非深義且先甲後甲正治蠱所有事元亨之道實在於此何得云第極其治亂自然之𫝑乎此其説之可疑者也吳㓜清則謂此筮日之占漢書武紀元鼎五年詔曰先甲三日後甲三日丁酉拜況於郊註云先甲三日辛也後甲三日丁也曲禮云内事用柔日辛丁皆柔日也然朱子嘗疑㢲卦先庚三日亦是丁後庚三日是癸據丁與辛皆是古人祭祀之日但癸不見用處按似此更與卦義无涉而鄒汝光又謂易固不専占要以占示先甲後甲猶今占某某日吉之辭抑膚淺甚矣唯熊明來納甲之説於蠱㢲二卦之説皆通宜若可信按日有十而卦有八以八納十故乾坤二卦始終包羅之而納甲乙壬癸之四日甲壬陽日乾納之乙癸隂日坤納之也其間六日三男納其陽三女納其隂六子之卦各得乾坤之一畫者也艮納丙兑納丁者氣之方行者也少男女納之猶日之未午嵗之方夏時也震納庚㢲納辛者質之已凝者也長男女納之猶日之過午嵗之既秋時也坎離中男女納戊己於正中有不待言者矣㕘同納甲意本如此其見於經若蠱之先甲後甲㢲之先庚後庚革之已日乃孚皆是也朋來之説云蠱隨相伏蠱之三隂隨之三陽伏焉蠱初爻變大畜則内卦為乾先甲也至四五爻變无妄則外卦為乾後甲也蠱之彖傳言先甲後甲曰天行也所以言甲者乾甲也㢲震二卦亦相伏所以言庚者震庚也或問乾甲震庚於納甲通矣蠱之先甲後甲於卦辭言之㢲之先庚後庚於九五爻辭言之何也蠱隨反對以卦之全體得乾故言先甲後甲於卦辭也重㢲伏震先庚也九五變則三至五又互震後庚也周公因蠱之乾甲記㢲之震庚㢲九五變為㢲之蠱蠱六五變為蠱之㢲庚甲相直㢲蠱相入特於五爻言之宜也按虞仲翔亦如此説云乾三爻在前故先甲三日乾三爻在後故後甲三日所以寓意於甲者沙隨程氏云事物之始必飭其終必蠱先後甲者屢提其始而飭蠱也如商人毎稱成湯周人毎稱文武皆此義也先庚三日後庚三日者於事物過中則屢施之號令所以防蠱也焦弱侯云㢲九五變為蠱事變至蠱則當復始故曰甲甲者日之首事之始也蠱六五復變為㢲蠱既始事㢲又申之申者非更則續故曰庚庚更也續也蠱以全卦言故於卦辭言甲㢲至上卦而後為重故於九五言庚愚按隂陽古言甲當晴庚當雨甲庚反對而皆有變義六甲始於甲子終於甲寅自北而西自南而東始於義終於仁也六庚始於庚午終於庚申自南而東自北而西始於仁終於義也甲為陽更庚為隂更甲居於端庚居於中陽更與干端則為開創迅烈之意多故始義而終仁隂更與干中則為修補調和之意多故始仁而終義蠱壞之極非盡革而從新不可㢲則不然修廢舉墜因舊為新可已故蠱曰終則有始取甲之始也㢲曰无初有終取庚之中也所以然者蠱下㢲而上止㢲猶有入義也止則无所入矣左傳秦伯伐晉卜徒父筮之吉其卦遇蠱曰千乘三去三去之餘𫉬其雄狐夫狐蠱必其君也蠱之貞風也其悔山也嵗云秋矣我落其實而取其材所以克也實落材亡不敗何待三敗及韓壬戌戰于韓原秦伯𫉬晉侯以歸六爻皆變為澤雷隨程氏古占法載完顔亮入寇會稽士夫筮之遇蠱迥為占之曰内卦㢲初六㢲于二剛唯柔㢲者能發為剛故初六利武人之貞至四則田有𫉬矣田有𫉬者用武而有功也外卦艮上下不相與以剛上窮其變隨隨内震為動為威怒外斷為毁折隨自否卦中來斷乾之首墜于地下當殺亮後果驗㢲上艮下為漸序卦傳曰以喜隨人者必有事故受之以蠱蠱者事也蘇子瞻云以喜隨人者溺於宴安者也故至于蠱蠱則有事矣又云夫蠱非事也以天下為无事而不事事則後將不勝事矣此蠱之所以為事也而昧者乃以事為蠱則失之矣彖傳曰蠱剛上而柔下㢲而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也剛上者艮之上九也柔下者㢲之初六也唯柔在下者既㢲而不能為剛在上者又止而不肯為此所以成蠱也蘇子瞻云器欲常用體欲常勞天下欲常事事故曰㢲而止蠱蠱元亨而天下治者言已蠱矣而能元亨則是天下已亂而復治也然彖所云蠱元亨非蠱有元亨之義正謂治蠱而得元亨若下文所言是也有涉大川之利則天下盡易而為治有先後三日之甲則天下盡易而為治如之何其不亨往有事者言蠱之時當勇往有所事以濟險難若㢲懦而止則終于蠱而已夫惟變其㢲艮之體而以乾徳自勵大凡蠱壞之終則飭治之始貞下元起實天行不已之運所貴行健如乾常提醒其終而復始之機則能亨蠱非徒委循環於命也天行當主乾徳言象傳曰山下有風蠱君子以振民育徳山下有風非如風在天上地上水上皆行而无阻乃旋轉山下為山所阻鬱而不暢之風蟲者風之族也蟲以風化故風字從蟲風鬱則山木多滯淫而蟲生蠱象小雅有云習習谷風維山崔嵬无草不死无木不萎觀此而蠱之義明矣又吳㓜清云地之理山為牡川為牝牝者水之所歸牡者氣之所行氣之行在山腹之内故曰山下然有養物之氣有賊物之氣養物之氣溫煖和緩烘烘如蒸者謂之火賊物之氣冷清勁急拂拂如吹者謂之風山下有風者謂山腹之内有此賊物之風也内氣冷清則外壤枯朽其山崩圮童秃草木之生不遂故卦名為蠱理亦良是夫蠱之象非美也君子以之則取其美振民者鼓舞興起之意育徳言于振民之後乃是育民之徳譬良醫之治病振者驅其外邪育者善其元氣也葢從民心之善根提撕而煦養之以啟其自新之機則所以振之者不徒條教之設號令之申矣民不振則風俗啙窳而有蠱振民者取風在下而振動山木之象徳无育則人心惑亂而有蠱育徳者取山在上而涵育風氣之象夫蠱之時百廢未舉而獨先民徳聖人施為氣象可見矣若漢武遣繡衣直指之使惟誅擊之而已可勝嘆哉初六幹父之蠱有子考无咎厲終吉變乾為大畜幹如木之幹枝葉之所附而立者也中爻震木下體㢲木幹之象也木有幹方能附其繁茂之枝葉人有才能方能振作其既墜之家聲故曰幹蠱朱子云蠱者前人已壞之緒故諸爻皆有父母之象蘇子瞻云蠱之災非一日之故也必世而後見故爻皆以父子言之明父養其疾至子而發也按六爻中四爻言父一爻言母在爻无此象或指上爻為父亦非也乾為父坤為母坤來乾初成㢲則乾體壞乾往坤上成艮則坤體壞合兩體成蠱有父母亡少男尚幼而長女當家之象禮父殁稱考家之蠱豈㢲女之柔弱所能辦必有陽剛之子然後得以補敝救敗而考得无咎也厲指初言弟㓜未能任事𫝑不得不暫攝以柔弱處艱難葢亦危矣然姑盡其力以俟艮弟之成人而能當家則終于吉當此時也誰謂初之幹蠱可少哉變乾㢲以行健何蠱不幹象傳曰幹父之蠱意承考也隂柔之才又女子冇行將外父母家豈能幹父之蠱哉然因弟之㓜而以承當父事為心葢遭家之難權時之宜其意亦可嘉矣九二幹母之蠱不可貞變艮為重艮互體兑變坎六爻惟二五相應男正位乎外女正位乎内艮男不能幹父蠱而使㢲女代之為失其職矣故艮五居上卦之中當幹父之蠱而㢲二居下卦之中只幹母之蠱内外各得而家道正蘇子瞻云隂之為性安无事而惡有為是以為蠱之深而幹為尤難者寄之母也正之則傷愛不正則傷義以是為至難也此意良是夫自父貽者雖不振不无陽徳存焉女性隂柔易至偏拗然豈人子所忍言乎子之事母當和柔㢲順不可任其剛正矯拂以傷恩也孟子曰不可磯不孝也如吕武之變若非平勃狄梁公諸人沉其㡬因其𫝑而幹旋之其何能濟如巫蠱之禍激之反生變矣故曰不可貞貞者事之幹如何可廢但時有不可貞則以不可貞為中故曰㢲以行權九二以剛居柔雖无過剛之慮然猶恐不善用其剛故戒之變為艮順而止也亦幹蠱不可貞之義嘗試論之幹蠱與鼎新異鼎新者唯吾所為可一舉而大定顯行无諱而直順天下之心幹蠱者必就吾前人之壞緒而整齊之俾如初匪易也病有四難曰癱曰癆曰蠱曰膈以其蝕多而補緝難𫝑重而亟反難治大病必有餘病即㡬成而可敗難乃若蠱在其親尤難之難者矜之甚重毋壞其體膚傷其元氣而以必療為期非精心妙手絶技良方緩急唯時後先適所不可而又當有養性頤情調和喜怒慎攝興居密移㡬導委曲持䕶之術㢲稱而隱以行其權安得徑行直道而已也且夫過與天下更不可諱也而人子之道三年无改推无改之心終身當諱推不可无改之心一日不可諱父母之名尚毋出口子為父隱直在其中第隱而已蠱何治乎故舜有號泣于田耳不敢于家于旻天耳不敢于人號泣之于外而祗載䕫䕫之于内若是其艱也子不如舜疾不可得而治矣易之於人孰不要之於貞而曰不可貞非謂可不貞也可舉其凡不可悉其目難與世之徇形迹好功名者譚也象傳曰幹母之蠱得中道也得中道者謂不從令亦不傷恩此非九二有剛之實而无用剛之迹其孰能任之九三幹父之蠱小有悔无大咎變坎為蒙互體兑變震約象震變坤九三與上九為應此時艮男已長可出而整頓家事无所煩㢲女為矣然上且以不事事之徳艮止于上故使九三不得不仍任幹蠱之責是三之幹蠱上實委之也小以隂言大以陽言雖其以剛徳居剛位然本隂體且上无其應故小者不免于有悔要之三實女子而丈夫者若艮男既不任事則舍此女安賴故不以過剛為嫌咎云變坎則入于險且失其剛徳何以幹蠱象傳曰幹父之蠱終无咎也幹蠱之責雖在艮而不在㢲然以長女代少男之事猶愈于置父蠱而不幹者故終无咎六四裕父之蠱往見吝變離為鼎互體兑變乾約象震變兑六四艮少男之下畫也年㓜穉不任家事以柔居柔豈能于父蠱有所拯救但益其疾而已裕饒益也借曰㓜穉猶可自解若因循以往而无變計則必見其貽厥考羞而不可謂有子矣吝莫大焉變離為鼎鼎取新也何蠱不幹象傳曰裕父之蠱往未得也四之裕蠱徒以穉弱故耳豈得遂執此道以往哉六五幹父之蠱用譽變㢲為重㢲約象震變離張子云雖天子必有父也故亦云幹父之蠱六五以隂居陽才雖弱而志稍强葢艮男漸長已勝於六四之時矣故亦能有為而用其幹然五之所以幹蠱者有玅術焉惟其徳協剛柔故能論親于道承顔順志蒸蒸乂不格姦父卒為之底豫而有无窮之聞所謂善則歸親能用譽以承親者也夫六五以用譽幹其父九二以不可貞幹其母則父母之蠱治矣此義至深誰則知之葢君父之際所貴情意相通上下歡悦譽則通則悦貞則不通不悦五居陽位而秉柔徳二以剛徳而居柔位皆善用其幹者吁其又誰知之卦變㢲亦取順義象傳曰幹父用譽承以徳也有柔剛適中之徳故能幹父而用譽葢不承以才而承以徳也一徳相承子為孝子父為慈父故有幹功无蠱名昔賢謂新法之行吾黨有過紹聖之禍吾黨尤過不承之以徳而欲稱善幹蠱難矣吳㓜清云初六六五皆才不足故初六之意承考其承之也有其意而已非有其才也六五之承以徳其承之也以其徳而已非以其才也上九不事王侯髙尚其事變坤為升蠱六爻下㢲上止皆非有治蠱之才者以卦體言其大病在艮子不事事而諉其事于弱女夫女為母𩔖而豈幹父之人哉僅二五相應以得中承徳稱然㢲而止自是二卦本色故上九為艮主爻遂有不事王侯之象焉夫蠱者必有事也仕于君者事其事賢人止而不仕則天子不得臣諸侯不得友而不事王侯之事矣王五也侯三也上九居與五比而不相係位與三應而不相應故曰不事王侯尚上通在一卦至髙至上之位故曰髙尚云其事者言不以王侯之事為事而但以髙蹈逺引為其事也士固有厭煩熇游清浄本非濟世之具亦无為人之心若此者多此爻是矣范希文以比嚴子陵子陵非薄光武不事者謂非吾事耳曰若斯人者亦能蠱天下與曰老釋非恒有人也然起而寄之治得无蠱而蘇子瞻又謂君子見蠱之漸則涉川以救之及其成則不事王侯以逺之蠱之成也良醫不治君子不事事嗟乎天下无不可為之時而身无可廢之倫也不能則止不合則去皆有所不得已焉坐視斯世之亂而莫之省憂以此竊髙尚之名誰能許之爻不言吉譏誚可知而或者猶以志可則之賛為疑則吾嘗徴表記之引此爻矣記載子曰事君軍旅不避難朝廷不辭賤處其位而不履其事則亂也故君使其臣得志則慎慮而從之否則孰慮而從之從事而退臣之厚也易曰不事王侯髙尚其事誰謂聖人而滿志于斯人乎雖其志可則而事不可則也卦變為升㝠升正其髙尚之事又鄭康成云上九艮爻艮為山辰在戌得乾氣父老之象是臣之致事也未詳象傳曰不事王侯志可則也若時事之難為乃始逃之物外以自潔聊為邦无道而富且貴者戒曰斯人之志可則也然世亦何賴有若人哉漢史名嚴光等為獨行知其詭于中庸矣第十對臨觀襍卦傳曰臨觀之義或與或求以我臨物曰與物來觀我曰求二卦中隂陽皆有相與相求之義或云十二卦中惟臨觀二卦評君子小人消長語更深厚臨乃君子與小人之時觀乃小人求君子之時盈縮之權皆在我不在彼而臨正可為觀尚可為此聖人屬望之意也愚按臨進則泰故與其吉觀進則剥僅止无咎兌下坤上臨元亨利貞至于八月有㓙許慎云臨監臨也从卧品聲徐鍇云與監同意愚按卦之名臨有二義襍卦謂臨觀之義或與或求徐氏以上下相與為臨是也爻辭初二咸臨剛進而臨柔也本義依如臨深淵之臨謂二陽浸長以逼于隂故為臨也不見夫牧乎監者在後臨之象也三甘臨四至臨五知臨上敦臨柔俯而臨剛也臨本居上莅下之稱二陽浸長于後而四隂在上臨之以俟其進亦稱臨也上下相臨所為與也其賛元亨利貞與乾同何也天下之𫝑莫盛于方興浸而成乾之𫝑也故遂以賛乾者賛之然連下文氣觀則利貞乃戒辭陽浸而長雖有大通之𫝑要之消長代來時不甚久至于八月有㓙反掌間耳是安可不以陽徳自持利在固守其正乎此専以初二兩爻言而所重尤在九二以二為卦主故也胡庭芳云一陽復唯曰亨三陽泰唯曰吉亨四陽壯唯有利貞五陽夬元亨利貞皆不言何獨臨與乾似也豈非元則一陽初動自二陽以往皆陽徳亨通皆利在貞正乎又唐孔氏云復卦一陽始復剛性尚微又不得其中故未有元亨利貞泰卦三陽之時三陽在下而成乾體乾下坤上象天降下地升上上下通泰物通則失正故不具四徳惟此卦二陽浸長陽浸壯大特得稱臨所以四徳具也八月之解不一先儒皆謂臨與遯反自天正建子之月一陽始生為復二陽臨三陽泰四陽大壯五陽夬六陽乾至五月一隂始生為姤至六月建未則二隂長而為遯自復至遯凡八月二陽消矣觀臨之傳曰剛浸而長遯傳亦曰小利貞浸而長也臨遯反對似得之然卦主臨言自臨距遯僅七月其八月有㐫應于復卦言之若以周正推遯為八月則復當為正月文王未受命何為遽改從周正􅁘此其可疑者也又謂夏正八月於卦為觀自一陽復十一月至臨十二月二陽浸長逼四隂當此之時陽𫝑方盛至于八月建酉卦為觀四隂浸長逼二陽則臨之二陽至觀危矣故曰至于八月有㐫觀卦序相承臨觀反對似若可信然文王彖易而從夏正即朱子亦心疑之矣或曰豳風亦用夏正終未免附會唯鄭𤣥云臨卦斗建丑而用事殷之正月也蜀才亦云自建丑之月至建申之月凡厯八月則成否否則天地不交萬物不通是至于八月有㐫斯之謂也唐孔氏亦從此説愚初未以為然已誦本傳曰剛浸而長又曰消不久也乃始輾然曰否泰傳皆有道長道消之文於此卦互見之矣文王殷人而從殷正又何疑焉六爻皆變為遯兑上坤下為萃序卦傳曰蠱者事也有事而後可大故受之以臨臨者大也可大之業繇事而生因蠱之有事而後有臨之盛大臨所以次蠱也玩辭臨不訓大以臨有盛大之義二陽進而四隂退駸駸向于大矣故以大稱之若豐者大也則豐真訓大矣是以六十四卦有二大而不相妨焉彖傳曰臨剛浸而長説而順剛中而應大亨以正天之道也至于八月有㐫消不久也浸漸也二陽長于下而漸進也隂符經云天地之道浸故隂陽勝浸字甚有味列子云一氣不頓漸一形不頓虧説苑云江以逶迤故能永山以陵遲故能髙學以積漸故能進人以涵泳故能豪皆浸之説也自復一陽生積而至臨則二陽長矣故曰剛浸而長遯者臨之反也臨彖曰剛浸而長易為君子謀也遯彖不曰柔浸而長而止曰小利貞浸而長易不為小人謀也以兩體言内兑外坤剛以悦進而柔在上順之説而順也以二五兩爻言二為卦主以剛居下卦之中而五之柔在上應之剛中而應也元亨利貞乾之四徳復進于臨陽氣日盛𫝑必至乾故聖人以四徳繫之而賛之曰天之道也然曰大亨以正而不以四徳析言則亦與乾異矣剛浸長而悦順者大亨也剛中而應柔中者以正也二隂之法未㡬八月之期易至故曰消不久也是雖天運之當然在君子可不預為之戒哉象傳曰澤上有地臨君子以敎思无窮容保民无疆澤之上有地澤崖也水之際也物之相臨无如水之在地故澤上有地為臨也澤之漸入于地者淵泉不涸故其麗澤為不竭地之周于澤外者涓流不洩故其容受為无方取兑之講習以施敎然不徒曰敎而曰敎思則其意思如兑澤之深矣取坤之含𢎞以保民然不徒曰保而曰容保則度量如坤土之大矣无窮无疆皆為深遠之圖慮其衰也无疆言无有限界初九咸臨貞吉變坎為師山澤通氣故山上有澤其卦為咸澤上有地初二爻亦謂之咸者以陽臨隂反在隂下有男下女之象故皆為咸夫之臨婦其道如此初本得正應在四又正以貞相感故曰咸臨貞吉變則失正或以皆訓咸謂陽雖長而隂猶盛非協力不足以勝故初二皆曰咸臨亦通但以爻言則尚未有皆義象傳曰咸臨貞吉志行正也王輔嗣云以剛感順志行其正以斯臨物正而𫉬吉也焦弱侯云正有守正有行正屯六二女子貞不字言守正而不行若臨之初陽欲上行以臨人與屯初九之義同聖人皆以志行正發之見與靳靳自守者異也九二咸臨吉无不利變震為復互體震變坤二咸臨與初同獨稱吉无不利者初剛得正未見其𫝑之進故曰貞吉二剛中而應𫝑可以上進故不特曰吉又曰无不利震為兑動而悦東西相感亦咸義卦變復出入无疾朋來无咎亦无不利義象傳曰咸臨吉无不利未順命也所謂咸臨者言以感為臨非進而凌逼之謂夫以大臨小則敎之惟我容之惟我必以感臨之然後與天道相似所以然者葢隂非吾𩔖彼未肯順命非感无以服其心也苗之逆命也益曰至諴感神聖人之貴感如此六三甘臨无攸利既憂之无咎變乾為泰互體震變兑約象坤變震六三互坤之下畫坤土味甘兑口柔悦以言媚人隂柔不正下臨浸長之剛𫝑將逼已而甘言以媚悦之故曰甘臨雖然柔悦豈足以禦陽剛之進哉雖甘亦无所利也節卦九五變臨亦曰甘節然彼以中正為甘則吉此以不中正為甘故无攸利三雖臨二剛之上而未離下體若能以剛進之不可遏為憂變其媚態歛藏退避以竢剛之上進則可无咎此聖人折小人以扶君子也互震為恐懼變乾九三惕若皆憂象項平甫云六三以甘媚臨而无攸利見君子之難悦也既憂之无咎又見君子之易事也其處已也嚴故不受不正之媚其與人也寛故不治既憂之人爻辭雖為六三言之然亦可以見二陽之用心矣象傳曰甘臨位不當也既憂之咎不長也位不當謂以隂居陽又乘陽之方長者也始雖有咎憂而免故曰咎不長也六四至臨无咎變震為歸妹互體震變離約象坤變坎虞仲翔云至下也謂下至初應當位有實故无咎按説文云至鳥飛從高下至地也從一一猶地也象形不上去而至下來也仲翔之解至本此竒而􅃀矣兑為震悦而動卦變歸妹男女相媾亦有至臨象象傳曰至臨无咎位當也謂以隂居隂且應方長之陽也二之位不當反此六五知音智臨大君之宜吉變坎為節約象坤變艮王輔嗣云處于尊位履得其中能納剛以禮用建其正不忌剛長而能任之委物以能而不犯焉則聰明者竭其視聽智力者盡其謀能不為而成不行而至矣大君之宜如此而已蘇子瞻云見於未然之謂知臨之𫝑陽未足以害隂而其𫝑方鋭隂尚可以抗陽而其𫝑方卻苟以其未足以害我而不内以吾尚足以抗之而不受則陽將忿而攻隂六五以柔居尊而應于二方其未足而收之故可使為吾用方吾有餘而柔之故可使懷吾徳此所以為知也天子以是服天下之强者則可小人以是畜君子則不可故曰大君之宜吉惟大君為宜用是也大君以是行其中小人以是行其邪胡仲虎云六五自是柔闇之主何為以知稱葢謂之臨多是以己臨人五虚中下應九二不任己而任人所以為智所以為大君之宜中庸曰聰明睿智足以有臨又曰舜其大智也歟舜好問而好察邇言其皆出于此歟夫子釋乾四徳言仁義禮不言知知光大言于坤周公爻辭獨于臨之坤體曰知臨五常之徳知藏于内坤以藏之故也爻變坎坎為通亦知象象傳曰大君之宜行中之謂也六五中九二亦中二五相應故曰行中猶舜用中之謂上六敦臨吉无咎變艮為損敦爾雅云如覆敦者江東呼地高堆為敦上爻乃坤土最高處敦象坤為艮地上有山亦敦象故艮上亦曰敦艮上六與四五同體而无應三之情見五知臨者二亦志在内之二見四至臨者初亦志在内之初是其處順之極而能敦厚于四五之所臨者也蘇子瞻云六五既已應九二矣上六又從而附益之謂之敦臨復之六四既已應初九矣六五又從而附益之謂之敦復其義一也曰吉曰无咎者本亦有咎繇吉故得免耳若三之甘臨而上與之為應則其咎也象傳曰敦臨之吉志在内也内二剛也志在順乎内之二剛以俟其進故吉曰志者非正應也按翼傳曰臨者大也二剛下四柔則似不能勝何以言大以剛主其感而柔皆化之則共偕大道矣十二辟卦中惟臨无小人故聖人以臨道予君子而大之也初二日咸臨亦猶泰之内君子外小人而言上下交也知咸臨交泰之義則知陽剛化隂柔之道矣坤下㢲上觀卦内俱如字本去聲後人讀平聲反以去為轉音盥而不王肅本作觀薦古本又作􅶓有孚顒若許慎云觀諦視也从見雚聲榖梁子云常事曰視非常曰觀卦本四隂消陽聖人名卦以二剛在上四柔在下上下相觀取義初二三四之觀下觀上也五上之觀上觀下也與臨卦象同故其義亦同若彖辭之觀則但以陽剛居尊羣下所仰觀為義盥沃盥也互艮為手㢲為潔薦進也謂薦爼也下體坤為牛有牲象鄭康成云諸侯貢士於天子鄉大夫貢士于其君必以禮賔之唯主人盥而獻賔賔盥而酢主人設薦爼則弟子也愚按觀卦二陽在上四隂在下羣隂上進至四而極五居尊位以鎮壓之四欲逼五而不敢故為率下三隂以賔王之象禮諸侯貢士則君以禮賔之四則賔也五則主人也卦惟取四與五兩爻相酬酢為成邽之義故其象為盥而不薦所謂有孚者何也四五得坎半體有孚指五也許慎云顒頭大也爾雅云顒顒君之徳也廣韻云顒仰也五至誠以動物而物咸仰焉曰顒若者象大頭在上為人所仰之意舊説盥而不薦作祭祀解細審爻中无此象且云初盥降神誠意未散至薦簡畧則不足觀猶夫子既灌而往之説也朱子非之以為王者之薦豈有不誠之理云不薦者言常持誠敬如盥之意常在也今按榖梁註云无牲而祭曰薦薦而加牲曰祭禮記王制云大夫士有田則祭无田則薦祭法庶士庶人无廟死曰鬼註疏云凡鬼者薦而不祭是薦非盛禮无王者之祭乃以薦言斷宜從鄭義又按李鼎祚易解引康成云坤為地㢲為木互體有艮艮為鬼門又為宫門地上有木而為鬼門宫闕者天子宗廟之象也同是鄭義而彼此舛殊若此殆不可曉或一謂觀即樓觀之觀全體互艮艮為門闕爾雅觀謂之闕又一謂觀即鸛鳥禽經仰鳴則晴俯鳴則隂有上陽下隂之象震為寉陽禽㢲為鸛隂禽按莊子觀雀觀與鸛通然皆穿鑿不成義理六爻皆變為雷天大壯坤上㢲下為升序卦傳曰臨者大也物大然後可觀故受之以觀物之小者在下視之而不見必大而後可以觀也以臨卦二陽之大反易其體則大者在上矣故為在下四隂之所觀或云良工不示人以朴寧以晚成毋以小試此曾㸃漆雕開所以見大意而子路使子羔子皮使尹何所以失也學一先生之言而遽欲師表人倫一問而智窮矣操包苴于牘之小智而欲勝王公大人之任一試而力竭矣雖小道必有可觀者焉致逺恐泥是以君子不為也故大徳不官大道不器大信不約大時不齊大勇不鬭大兵不寇大匠不斵大庖不豆小利大利之殘小忠大忠之賊也其意甚好彖傳曰大觀在上順而㢲中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設敎而天下服矣大觀在上指五上兩爻言大者陽也物大而後可觀故謂之大觀五居君位上為師傅鄧汝極云二陽既老徳成而刑有大觀在上象項平甫云觀四隂方盛以二陽為大而曰大觀大壯二隂在上以四陽為大而曰大壯不論其多寡上下而論其徳也順而㢲指兩體言下坤之性本順而上以㢲風披拂之也中正以觀天下指九五言五居中正之位以觀天下之情態即象傳之所謂觀民者已包神道設敎意京房云觀内象隂道已成威權在臣雖大觀在上而隂道浸長夫上進如四然終帖然安分偕其朋𩔖以用賔于王而不敢逼非五之中正居尊何以得之盥而不薦與四相酬酢唯五之有孚足為人所仰故其下之三隂胥觀而化不敢羣進以陵陽也曰上曰下皆指上下卦言卦取上下相觀為義以觀天下之觀上觀下也下觀而化之觀下觀上也然所謂中正以觀天下其作用果安在哉葢將觀天之神道以設敎㢲風運于上天有神道之象觀者聖人觀之也曰四時不忒者天有八風立春條風至春分明庶風至立夏清明風至夏至景風至立秋凉風至秋分閶闔風至立冬不周風至冬至廣莫風至此天之所以舒慘萬物也聖人象天之風以中命行事陳之藝極布之話言賞以春夏刑以秋冬彰善癉惡樹之風聲而民莫敢不若于政不化于訓究至四方從欲比戸可封者此九五體㢲之力也五為天位下坤民象神道設敎之旨如此後世如王欽若杜鎬妄引以誤主其罪不可勝誅矣舊解維𤣥維嘿為天之神道不顯其刑為聖之神道都與卦義无涉象傳曰風行地上觀先王以省方觀民設敎風行地上周及庶物為遊厯周覽之象四方風氣不同民之習俗亦異故省方以觀之而後敎可設也省方之典虞周之法備矣或一嵗分巡或五載涖會協時月正日同律度量衡命大師陳詩以觀民風命市納價以觀民之好惡省察其俗有不同者設敎以訓之如齊之末業敎以農桑衛之淫佚敎以禮别奢如曹示之以儉儉如魏示之以禮所以一道徳而同風俗也雖然古之所以時巡而不擾者從衛寡而供需儉也叔世則安能无其簡善設敎者而代之省乎觀民即九五象傳之所謂觀民設敎即彖傳之所謂設敎坤為土方象又為衆民象㢲為申命設敎象歐陽永叔云聖人處乎人上而下觀于民各因其方順其俗而敎之民知各安其生而不知聖人所以順之者此所謂神道設敎也或曰順民先王之所難與曰後王之不戾民者鮮矣初六童觀小人无咎君子吝變震為益觀本以四隂而逼二陽聖人却謂二陽在上為天下所仰翻作一段絶好境界其扶陽抑隂往往如此初之童觀二之闚觀但據九五言以五居尊位而與隂相近觀必以近為明初去五最逺故為兒童之觀取童象者以初最處下位陽而爻隂陽則男而隂則穉也又吳幼清云觀艮之複體艮少男為童亦通小人下民也所見昏淺不能識君子之道乃常分也不足謂之過咎在君子則大人在上而失利見之會何羞吝如之變剛則為君子象傳曰初六童觀小人道也猶云小人之分言非君子所宜有也六二闚古本亦作窺觀利女貞變坎為渙互體坤變震闔户為坤三四五互艮為門闕二以隂柔居内而觀外雖與五為應前為三四所蔽所見不明闚觀之象初二皆隂故皆取幼穉象初位陽故為童二位隂故為女程子云二既不能明見九五之道能如女子之順從則不失中正乃為利也愚按仲長統有言中世之選三公也務於清慤謹慎循常習故者是乃婦人之簡柙鄉曲之常人耳烏足以居斯位哉女子唯閨閣是事故闚觀者亦稱貞亦稱利而无丈夫之才者退守常分奉職循理亦女貞之利也若大人君子則不當以此自限矣變坎處坎窞之中觀天所觀㡬何闚觀之象也象傳曰闚觀女貞亦可醜也婦无公事所知者蠶織女无是非所議者酒食則闚觀乃女子之正道也丈夫志在四方宇宙内事乃吾分内事又得大君之應不能明見九五陽剛中正之道但覘祖朝美一班於形似之粗此女子之見耳丈夫而效女子之見不亦醜乎六三觀我生進退變艮為漸互體坤變坎約象艮變離諸家解生有以生為動作如生之謂性之生有以生為道如生生謂易之生皆强解也此生即相生之生我者三自我也乾一隂始生為姤繇一隂而生二隂為遯繇二隂而生三隂為否繇三陽而生四隂為觀故觀以六四一爻為卦主六三之觀我生乃觀四也六四㢲之下畫㢲為進退四隂進逼而消陽六四為之先初六六二遠弱未有凌陽之勢六三居下卦之上居剛而不中正與六四同惡者也然雖隂盛之時而陽剛中正之君在上六四逼近九五者方且臣順則六三豈能獨進故比於六四唯觀六四之動作而為進退耳六四進而凌偪則六三亦隨之而進六四退而臣順則六三亦隨之而退又來矣鮮云下爻皆觀乎五三隔四四已觀國之光三惟觀我生而已我生者我隂陽相生之正應也即上九也為進退為不果者㢲也㢲有進退之象故曰觀我生進退亦通變艮為光明故有觀我生以衡進退之象象傳曰觀我生進退未失道也六三從六四同進消陽然觀六四而為進退四猶臣順則三亦未失臣道也迨觀進為剝則未失者失矣又來矣鮮云道者隂陽相應之正道亦通六四觀國之光利用賔于王變乾為否互體坤變艮約象艮變㢲王輔嗣云觀之為義以所見為美者也故以近尊為尚逺之為吝四雖隂柔而㢲體居正切近於五觀見而能順從者也光者九五陽明在上被四表光四方者也下坤土國之象中爻艮輝光之象以陽剛臨坤土之上國之光也四承五賔主之象九五王之象諸侯朝貢于王曰賔四隂𫝑盛進逼二陽幸九五能君故六四不敢不臣以强臣逼上之𫝑轉為諸侯朝王之象彖言盥而不薦正指此爻項平甫云履正故為賔使其不正則為敵矣國有光則賔无光可觀則敵當觀之時聖人懼焉左傳陳厲公生敬仲其少也周史有以周易見陳侯者陳侯使筮之遇觀之否曰是謂觀國之光利用賔于王此其代陳有國乎不在此其在異國非此其身在其子孫光逺而自他有耀者也坤土也㢲風也乾天也風為天於土上山也有山之材而照之以天光於是乎居土上故曰觀國之光庭實旅百奉之以玉帛天地之美具焉故曰利用賔于王猶有觀焉故曰其在後乎風行而著於土故曰其在異國乎若在異國必姜姓也姜大嶽之後也山嶽則配天物莫能兩大陳衰此其昌乎及陳之初亡也陳桓子始大于齊其後亡也成子得政杜元凱注云四為諸侯變乾有國朝王之象艮為門庭乾為金玉坤為布帛諸侯朝王陳贄帛之象變而象艮固知當興于大嶽之後史記注張守節云六四變内卦為中國外卦為異國内卦為身外卦為子孫此爻是辛未觀上體㢲未為羊㢲為女女乘羊故為姜又鮮于子駿云六四處㢲順之下以隂居隂故以祭祀明之如二王之後作賔王家助祭宗廟也按此則與舊解盥而不薦為祭祀合存之象傳曰觀國之光尚賔也尚上通言上進以朝貢于王而為賔九五觀我生君子无咎變艮為剝約象艮變坤觀我生與六三解雖異而意則同我者九五自我也我生謂下四隂葢觀本乾卦四隂皆從乾而生遡其本也隂生至四唯五上二爻乾體猶在故五以下四隂為我生上亦乾體但以隔五故據五而言以下四隂為其生何謂觀我生傳以觀民解之即大象觀民設敎之意君子觀民以設敎必有中正之徳足為四海之儀刑然後无咎耳觀道如是而僅曰无咎觀豈易言哉記云君者則于人者也民者則人者也又云堯舜帥天下以仁而民從之其所令反其所好而民不從觀民自觀自是實理項平甫云觀本是小人逐君子之卦但以九五中正在上羣隂仰而觀之故聖人取以為小人觀君子之象象雖如此𫝑實漸危故五上二爻皆曰君子无咎言君子方危能如九五之居中履正能如上九之謹身在外僅可无咎耳不然則九五建中正以觀天下雖元吉大亨可也豈止无咎而已哉明二陽向消故道大而福小也此即唐武宗之時内之宦者外之牛黨之徒皆欲攻李徳裕者也但以武宗剛明在位故仰視而不敢動一日事變萬事去矣陽為君子此爻變則為剝不變則无咎象傳曰觀我生觀民也孔子恐人不明其意特釋曰觀我生觀民也民即指下四隂而言上九觀其生君子无咎變坎為比九五陽明中正在尊位上九亦賢明在師傅之位觀其生指下四隂言不曰我者避五也民者君所有故五曰我生上曰其生隂長自四陽有漸消之𫝑上九與九五合徳岌岌乎危之以已處具瞻之位負逹尊之望亦當自考其所行以樹表儀于天下果能貞守其陽剛而不變則大剛在上庶乎枉可化而直矣臨以下二陽為主觀以上二陽為主故其辭皆𩔖必君子而後无咎難乎其為无咎也變坎為比則有无首之㐫又漢書成帝建始元年四月壬寅晨大風從西北起雲氣赤黄四塞天下終日夜下着地黄土塵也是嵗帝元舅王鳳始用事又封鳳母弟崇為安成侯庶弟譚等五人悉封為列侯哀帝即位封外屬丁氏傳氏周氏鄭氏凡六人為列侯楊宣對曰五侯封日天氣赤黄丁傅復然此殆爵土過制傷亂土氣之祥也京房易傳曰觀其生言大臣之義當觀賢人知其性行推而貢之否則謂聞善不與兹謂不知厥異黄厥咎聾厥災不嗣愚按風行地上為觀故大風晨起黄土着地為其應云至若以觀生謂貢賢人之在下位者與康成貢士天子之説殊合附存之象傳曰觀其生志未平也觀之所以異于剝者特多此一陽耳烏可无同徳之扶故上九惓惓助九五以觀民設敎故以羣隂方進陽徳甚孤其志未能帖然安平而无憂患也諸爻漸近于陽則吉漸遠于陽則㐫而陽之爻皆以君子勉之不曰吉而曰无咎其扶持之意至矣哉第十一對噬㗐賁襍卦傳曰噬㗐食也賁无色也頤中有物食其所有以中四爻言也白賁无色文反于質以上一爻言也臨觀之後繼以噬嗑以義揆之即敎以先之刑罰以繼之明刑以弼敎也故噬㗐曰明罰勑法賁曰无敢折獄蕭氏漢中云上經離六體二體本卦離二體合乾成同人大有一體合震成噬嗑一體合艮成賁震陽畫在下故於上經為下卦以合陽也艮陽畫在上故於上經為上卦以合陽也又云離於上經主不合坤客不合㢲兑合陽不合隂也亦所謂隂在陽中皆逆行也又其所以不合坎者離之配也上經乾坤交六子不交云愚按上經之終自隨蠱起至坎離凡十四卦除坎離與乾坤四正卦為上經之主故以殿上經之後隨蠱與頤大過為遥對隨蠱四偏卦男女交頤大過四偏卦男女不交也先其交而後其不交也臨觀與大畜无妄為遥對臨觀坤統長女少女无妄大畜乾統長男少男也先坤而後乾者上經之終坤為主乾為從也噬嗑賁剝復四卦居中噬嗑賁以離合震艮剝復以坤合震艮所以獨合震艮者震陽也上經之終雖陽中之隂而本實陽也獨取坤離合之者上經之終其君卦則坤為主其臣卦則離用事故也又先噬嗑賁而後剝復者以明離既用事而坤亦往從之也震下離上噬㗐亨利用獄噬齧也嗑許慎云多言也从口盇聲愚按翼曰㗐者合也從許説則无合義唯爾雅曰盇合也盇从血从大以覆為義今以合訓㗐當是通㗐作盇古人字同偏傍者多借用噬㗐除間之卦也凡物不合繇有間也卦象頤口中虚而有一剛畫間隔于其中頤口本合有物間之則不合矣故必齧噬其中之間而後上下合也頤中不可使一物之為梗天下不容有梗化之民噬而去之而天下之治可濟聖化或不能懷而有以濟其所不及斯不失其為亨矣雖然物至于噬而後㗐㗐而後亨徳下衰矣所謂三辟之興皆叔世也故僅曰利用獄焉葢卦徳之小劣者也張子云子路禮樂文章未足盡為政之道以其重然諾言為衆信故片言可以折獄如易利用獄利用刑人皆非卦爻盛徳適能是而已焉李鼎祚云互體坎坎為法律又為刑獄或云一陽居中四象按噬㗐六爻中兼治罪之人與被罪之人取象皆繇淺入深從微至著以次序觀之乃得若九四一爻為頤中之物乃種惡之根株而得情之最不易者故惟重此一爻焉不曰利用刑而曰利用獄者獄所以治間而求其情必先之以電之明而後雷從之也電之明所以察獄雷之威所以決獄獄情未得而輕言用刑焉烏可六爻皆變為水風井震上離下為豐序卦傳曰可觀而後有所合故受之以噬㗐㗐者合也在上无可觀在下引而去矣非可觀而能有合乎彖傳曰頤中有物曰噬㗐噬㗐而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也頤卦初上二爻皆陽中四爻隂虚有頤口之象六四變九四則為噬㗐與頤卦之中虚不同矣故為頤中有物之象初上二剛象頤口上下齗齶有齒牙能噬者也其中四畫乃頤中虚而容物之處故各象所噬之物二三五柔畫物之脆者四剛畫物之堅者舊説専指九四一爻為頤中之物非也觀爻辭二三四五皆有所噬奈何獨噬九四一爻乎夫頤之未合為中有物間之去其所為物者則无間而得合矣故曰噬㗐彖辭云噬㗐亨得加一而字者謂必噬之使㗐而後亨也繼之曰剛柔分正謂中四爻所噬者如膚則柔如乾胏則剛如腊肉如乾肉則柔中剛皆頤中之物所謂分則剖别之謂也觀此益知頤中有物不獨指九四一爻矣震動離明卦之徳也震雷離電卦之象也動明以問刑擬罰言雷電以致刑行罰言折之惟敏擬之惟決不為威屈不為利誘者動之謂也折之惟精擬之惟當无輕而失之重无重而失之輕者明之謂也至于行罰致刑則獄理成而獄事畢矣故曰雷電合而章雷得電爍而益威電得雷轟而益曜昔五侯僣逼罪狀顯明成帝得于親目非不明也乃不能置之法則雷不與電合矣趙葢韓楊之死宣帝非不斷也然皆罪非當死則電不與雷合矣此卦卦象雷電並作則是當罰即罰當刑即刑如雷之奮而與電合罰所當罰刑所當刑如電之赫而與雷合有以克協乎獄理克成獄道矣故曰雷電合而章然獄權在君五陽位以隂居之位雖不當而剛以柔濟則明不失之察威不失之酷刑之一成不易者自不至於􅁈所以利用獄也九五爻辭所謂得黄金者本諸此柔得中故雖懷惟恤之心而斷制枉直不失情理若周之吕刑雖一篇之中殊極哀矜惻怛之意然至大辟亦與其贖則是姑息之甚未免柔而失中矣然則觀之噬㗐固可見用獄之道亦可見聖人不得已而用獄之心象傳曰雷電噬㗐先王以明罰勑法程子云象无倒置者疑此文互也雷電相須並見之物亦有㗐象錢國端云泰不言地天交而言天地交噬㗐不言電雷而言雷電原是易中之正例按蔡邕石經及李鼎祚本皆作電雷電雷震曜聲光閃爍撼動若有吞噬之狀又吳㓜清云既開為電而有光矣又合為雷而有聲既開又合猶噬之而使開者合也故卦名噬㗐亦通明者辨别精審之意勑者整飭嚴儆之意明象電光勑象雷威罰者一時所用之法法者平日所定之罰一時所用之􅁢當者示平日所定之信必也故明其罰所以勑其法黄㓜𤣥云噬㗐成章而明罰勑法何法法電先見而雷乃出也電不見而雷乃出則物惘惘而不知避聖人之為刑也不掩物於所不避不慢令而與之死蔡子水云明罰如電先雷而顯勑法如雷繼電而至愚按豐震在明前故重在折獄致刑噬㗐明在震前故重在明罰勑法繫辭下傳曰日中為市致天下之民聚天下之貨交易而退各得其所葢取諸噬㗐解見本傳與卦義无涉初九屨校㓕趾陸徳明本作止无咎變坤為晉六爻皆言治獄者周官掌囚下罪桎桎足械也械亦曰校王輔嗣云校者以木絞校者也即械也校者取其通名也震為木校象屨謂着于其足如納屨然㓕者没也遮没其趾也震為足下畫為趾初剛横亘於震足之下足械㓕没其趾之象足械之制周圍其脛而已下不及趾也今械木之廣既圍脛而遮掩又過其脛并不見脛下之趾也又侯果云坎為校震没坎下故屨校滅趾亦通變坤不見其震之足亦滅趾象无咎主治獄者言子夏傳云戒為治者不可不禁其微得爻旨矣屨校不懲必至何校滅趾不戒必至滅耳象傳曰屨校滅趾不行也震為足震動于下不禁則行校其趾使不敢如震之動所以止惡于其初也繫辭下傳曰子曰小人不耻不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾无咎此之謂也王輔嗣云凡過之所始必始于微而後至于著罰之所始必始于薄而後至于誅過輕戮薄故屨校滅趾桎其行也足懲而已故不重也過而不改乃謂之過小懲大誡乃得其福故无咎也按无咎若非主治獄者言則屨校之人雖未入于大罪然已挂吏議謂之无咎得乎六二噬膚滅鼻无咎變兑為暌互體艮變離鄒汝光云中四爻象上下齒故皆曰噬膚皮之表也馬季長云柔脆肥美曰膚爻取噬為治獄之象取膚肉腊胏為獄囚之象二言膚者皮也以柔居柔也三言腊肉者皮中之肉也以柔居剛也四言乾胏者肉中連骨也以陽剛也五雖剛位而以柔居之則又言乾肉矣爻位以㳄漸深噬肉以㳄漸難正頤中有物之象滅亦没也齧膚最易入故入之深至没其鼻也焦弱侯云噬肉而掩没至鼻不可謂无如史言曹操佻易无威重歡笑至以頭没杯案中没即此滅字意也互艮為鼻又為黔喙噬膚滅鼻之象又吳㓜清云膚者豕腹之下柔軟无骨之肉古禮别實于一鼎曰膚鼎坎為豕二在互坎下畫之下象豕腹向下之膚艮為鼻二當互艮之下畫鼻之下端也正與所噬之膚相直故有膚滅其鼻之象亦通又二變則中爻為離不見其艮之鼻亦滅鼻象噬㗐在于去間所噬者易噬是其間易去也故雖噬過其分而无咎象傳曰噬膚滅鼻乘剛也它卦以乘剛為厄噬惡者以乘剛為利二最易噬又近初剛初為頤之下齶凡噬物下齶之動最有力以至近能噬之剛噬至柔易噬之物一舉盡臠畧无留難以至所噬之膚揜過噬者之鼻也乘剛有難處有得力處屯六二震六二難處也噬㗐六二得力處也六三噬腊肉遇毒小吝无咎變離為重離互體艮變㢲約象坎變兑腊正作㫺上象肉之形下从日肉之晞於陽者也其後假借為今昔之昔乃於左畔加肉以别之而為腊肉之腊非字之正也周禮腊人掌田獸之脯鼎實以兎之薧為腊鼎田獵所獲野物或獸或禽全體乾之通謂之腊彼單稱為腊此言腊肉非指野物全體之乾者而言葢六三六五二柔畫爻辭並云肉謂无骨者也九四一剛畫爻辭不云肉而云胏謂有骨者也若以六三為全體帶骨之腊則與爻象不合互坎為豕三為坎之下畫有離日在上豕肉受日之暵者肉者六之柔也腊之則柔亦堅矣位剛故也毒者腊肉之陳久太肥者也説文云毒者厚也五行志云厚味實腊毒注云腊久也味厚者為毒久張景陽七命云甘腊毒之味是也亦取互坎故有毒象噬腊肉視膚稍難矣惡不早治以至于三治之浸難故其象為噬腊肉豈惟難噬彼其意恣而機慣夫且能肆毒故又為遇毒之象小以隂柔言三以柔居剛乃柔而不得中者故罪人未肯遽服治獄如是吝矣然詰姦懲暴自是正法噬之不已彼雖兇頑終當自服何咎之有震為離動而明故克噬腊肉象傳曰遇毒位不當也楊廷秀云六三以柔弱之才居剛決之位此弱於齒而噬夫堅者也能不遇毒乎故曰位不當也九四噬乾胏子夏傳作脯得金矢利艱貞吉變艮為頤互體艮變坤約象坎變坤胏肉之帶骨者與胾通離為乾卦四在離體之下火所乾也骨而又乾其堅至矣互坎中畫之剛象之骨而連肉剛之居柔象之乾胏以喻惡人卦中最難噬者在此一爻大抵罪犯重大者必剛狠强梗之徒況當成獄之際其逞奸極辨尤甚故有噬乾胏之象金矢藏于乾胏之中噬乾胏而得金矢猶君子之于獄再四推鞫而得其情也金矢矢之帶金者即鐵箭鏃也離本乾所變乾為金故離之陽畫亦稱金離又為矢解見剡木為矢章吳㓜清云殺矢之金金三錫二金之襍錫亦猶骨之連肉皆九四以剛居柔之象也太平御覽載王肅解云金矢所以獲野禽故食之反得金矢君子於味必思其毒於利必備其難也按王肅之解深為得之或指周禮大司寇以兩造禁民訟入束矢於朝然後聽之所以自明其直也以兩劑禁民獄入鈞金三日乃致于朝然後聽之所以自明其實也此其於解得金矢似矣然於噬乾胏句全不相蒙斷不可用惡之堅者其情未易驟得非九之陽剛不足以勝之故戒之曰利艱貞吉慮其變柔也丘行可云噬㗐唯四五兩爻能盡治獄之道彖以五之柔為主故曰柔得中而上行雖不當位利用獄也利用之言獨歸之五而他爻不與焉爻以四之剛為主故曰噬乾胏得金矢利艱貞吉吉之爻獨歸之四而他爻謂之无咎也主柔而言以仁為治獄之本主剛而言以威為治獄之用仁以寓其哀矜威以懲其奸慝剛柔迭用畏愛兼施治獄之道得矣九四位近君乃大司寇掌邦刑之任此爻葢獄之上司寇者也變艮為頤亦无間之可去矣象傳曰利艱貞吉未光也噬至于乾胏噬之難者也必戒之以艱貞而後得吉葢繇其不能如屨校滅趾禁之于微是其道之未光也離為明四為離初畫故其明未暢六五噬乾肉説文作得黄金貞厲无咎變乾為无妄約象坎變㢲約象居坎上畫亦豕肉也與六三皆質柔居剛象无骨之肉六三在離日之下日所乾者故曰腊六五在離火之中火所乾者與九四同故曰乾黄中色離得坤中爻為中女則離之中乃坤土也故曰黄變剛為乾故曰金問乾肉中何以得黄金曰昔有韓嫣者以黄金丸彈雀時人為之語曰苦饑寒逐金丸何為乾肉中无黄金也或仍祖周禮之説謂訟出矢獄出金訟為小獄為大四於獄訟兼得大小兼理之也五君也非大獄不敢以聞書所謂罔攸兼于庶獄是也故獨曰得黄金葢君臣之分如此尤自牽强穿鑿曰貞厲者五為君位六非所以居之若守柔而不變則厲言宜變剛也然治獄者大司寇之事王特決其成而已柔而得中不以得情為喜則下自无寃民故无咎也正彖傳所謂雖不當位利用獄也李氏過云九四以剛噬六五以柔噬以剛噬者有司執法之公以柔噬者人君不忍之仁金一所云此卦當與訟卦合觀訟者方争而求辨非剛中之君不能畏其志故曰利見大人獄則已斷而行刑非柔中之君不能恤其情故曰利用獄然與其恤之于終不若化之于始故此六五之无咎終不如訟九五之元亨也又蘇君禹云噬㗐聖人之刑書也聖人豈樂于用刑哉顧天下之人智則角謀强則角力誇則角辯而其中有桀驁而難制者苟小之不懲遂釀大惡過之不儆遂成怙終如之何其廢刑也聖人知其然於是權其輕重察其難易要以懲其始戢其終俾孚窒者輸其情而桀驁者有所制而不得遂耳然此法也非所以論于法之外也若論其心則執法之臣惓惓然于艱貞之戒用法之君汲汲然於貞厲之防葢不恃其明而常有慎重之思不恃其威而常有哀矜惻怛之意如是而已㫺之論刑者始于虞書而備于周禮虞廷更飭所云五刑五用五宅三居周禮秋官之職所云三典五刑八成五禁何其詳也乃帝之叮嚀曰欽哉欽哉惟刑之恤哉而小司寇以五聲求民情懇然於言辭氣色耳目之聽大司寇悉聰明致忠愛于棘木之下王且命三公參聽之至三宥然後刑焉又何謹也噫是可以得聖人艱貞貞厲之心哉吴㓜清云四五兩爻有噬有得噬者除其惡得者取其善有惡則去有善則取憎而知其善也愚按吳之云取善似未必然但兄民之情實未有不自好者其所犯乎罪非出于不得已則䧟于不自知耳欲善民善又安用殺推勘至是亦所謂得黄金者也象傳曰貞厲无咎得當也離初故未光離終故不明此離之中故得當彖言不當而爻言當猶漢獄得當失當之云位與事之分也在一卦柔居五位本不當故曰貞厲在一爻則柔中居尊故于用獄則得當而无咎上九何古本亦作荷校滅耳㐫變震為重震何負也謂負之于首也上畫為首剛畫在上首械之象械加于首而没其耳鄭康成云離為槁木坎為耳木在耳上何校滅耳之象也吳㓜清云三四五互坎為耳首械之制周圍其項上不及耳今首械在坎耳之上是械之厚掩過其耳而耳不見也居卦之終葢問獄已成以其有罪而首何至厚之械罪不可解矣變震為木亦校象又來矣鮮云中爻坎為桎梏初則曰履上則曰負以人身分上下而言也亦通六爻意皆主治獄者各就本爻取象若以初上為受刑之人則以滅趾為无咎甚不通矣初治于未甚故无咎上在卦終而猶有怙終加以賊刑者百姓有過在子一人謂非為人上者所致不可故曰㐫葢惟當上㐫而後見聖人泣罪人之心象傳曰何校滅耳聰不明也離為明何校而揜没其耳則其聰已塞豈能分别詳審如離之明也葢罪狀既成不能有所補救亦終于不可解而已然使上之人時開悟而禁止之于先亦何遽至此哉繫辭下傳曰善不積不足以成名惡不積不足以滅身小人以小善為无益而弗為也以小惡為无傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳㐫此爻與初爻相闗初之不仁不義即上之罪大惡積只一人也惟惡積而不可掩故罪大而不可解然小人何知之與有是亦在上者有過焉離下艮上賁亨小郭京舉正作不云不字草書勢如小字利有攸往許慎云賁飾也从貝卉聲貝水蟲背有文如錦故為文飾之義京房云五色不成謂之賁文彩襍也傳氏云賁古斑字文章貌王肅鄭𤣥皆云賁黄白色也孔仲達云艮為山離為火以火照山之石故黄白色也楊子雲太𤣥經礥首㳄二曰黄不純屈于根注易賁卦山下有火黄白色也故曰黄不純也家語孔子筮得賁愀然有不平之色子張進曰師聞卜者得賁卦者吉也而夫子有不平之色何也孔子曰以其離耶在周易山下有火賁非正色之謂也夫質也黒白宜正焉今得賁非吾兆也吾聞丹漆不文白玉不雕何謂也質有餘者不受飾也吕覽孔子卜得賁孔子曰不吉子貢曰夫賁亦好矣何謂不吉乎孔子曰夫白而白黒而黒夫賁亦何好乎繇此觀之則以黄白不純色為賁其解確矣卦體剛一而實配質柔二而虚配文剛為大柔為小質為本文為枝内體離以一柔而文二剛之間是天徳之剛渾然充實而有和順之徳以文之文之在中者何光明洞逹也故曰亨然陽實隂虚往而不返則虚文日勝外體得乾一畫居坤上以成艮則文明以止而得彬彬之道作止語黙纖悉各當故小利有攸往小謂隂也小利有攸往猶周旋中禮之謂非不足之意葢人情自質而趨文也易繇文而返質也難聖人畫卦内文明而外艮止意深逺矣六爻皆變為澤水困離上艮下為旅序卦傳曰㗐者合也物不可以苟合而已故受之以賁賁者飾也蘇子瞻云君臣父子夫婦朋友之際所謂合也直情而行謂之苟禮以飾情謂之賁苟則易合易合則相凟相凟則易以離賁則難合難合則相敬相敬則相久吳㓜清云不執贄不可以成賔主之合不受幣不可以成男女之合表記云无辭不相接也无禮不相見也欲民之无相䙝也彖傳曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下離本明艮亦光明兩者合而相賁故曰賁賁之所以亨者何也人知文之為賁而不知質為之主質賁于文者也非賁乎文者也得其道則亨矣剛為質柔為文柔來文剛是本先立矣而文載行焉故亨分剛上而文柔者非以剛為文也分剛畫居上而柔始得成其文不然无質之文非文已曰小利有攸往言隂進而反于陽也復歸于朴所謂至文胡仲虎云柔來而文剛是以剛為主也剛往文柔必曰分剛上而文柔者亦以剛為主也葢一隂下而為離則隂為陽之助而明于内一陽上而為艮則陽為隂之主而止于外是知皆以剛為主而彖傳以隂為小者此也其謂天文者何也程子云質必有文自然之理理必有對待生生之本也有上則有下有此則有彼有質則有文一不獨立二則為文非知道者敦能識之天文者自然之文非人所能致力承上文言不必依王弼增剛柔交錯四字于辭反贅或云賁象斗初四相應為經象斗柄二三五上各相比為緯象斗腹天文主也亦未必然以卦變言則剛柔之交可以見天文以卦徳言則下離明而上艮止可以見人文止者極而不變限而不過之謂人文燦然倘不止于禮義則流蕩淫靡罔所底止敝有不可勝言者矣一文之一止之而文成禮以節文為訓即此意觀乎天文以察時變所謂三正之綂如循環也自忠而質以趨于文柔來而文剛也文既薄矣則革而從忠分剛上而文柔也然世道汚隆雖因天地之氣運以為轉移聖人于此必施其斡旋之力使之相安于可久觀乎人文之所以无敝既以柔文剛而成飾又以剛文柔而止之則文質得中而崇雅黜浮之化始可成于天下耳象傳曰山下有火賁君子以明庶政无敢折獄山者百物之所聚也山下有火則照見其上品彚皆有光彩故為賁飾之象然明得山止而不過則亦不輕用明之象也故君子法之于凡百司庶府之政一一用吾明以辨理亦如火之照山也法度典章粲然成天下之至文唯于折獄則不然吕刑云非佞折獄惟良折獄苟恃其明察而深文巧詆緣飾以没其情民且有含寃矣故言刻覈者曰深文言鍜鍊者曰文致法曰文網弄法者曰舞文治獄之多寃未有不起于文者此皆敢心誤之也君子之无敢折獄何法法火之止于麓也鄧汝極云噬㗐賁皆離從震艮噬㗐貞震震元陽雷象電從奮焉故利用獄賁貞艮艮陽上止山象火從耀焉故毋敢折獄卦有大小如此朱子云此與旅卦都説刑獄事但争艮與離之在内外故其説相反止在外明在内故明庶政而不敢折獄止在内明在外故明慎用刑而不留獄又沙隨程氏云離為刑獄之象凡四卦賁旅豐噬㗐葢卦體象囹圄所主在朱鳥丽嶽之辭又丽義也初九賁其趾古本一作止舍音捨車鄭張本作輿陸徳明云車音居從漢時始有居音而徒變艮為重艮初畫在下為趾壯于趾鼎顛趾屨校滅趾皆取初象賁之者六二二為離中畫文明所在初最近二故有賁飾其趾之象二三四五坎為車此車指六二言以初應四而不比二故曰舍車變艮為止舍之象也徒步行也初本象趾應在震震又為足乃相將而步行者兼應爻取象其義乃全内卦本以九二之文來飾初九九三之剛然九三无應而初九有應故六二之文初九之所不受也初惟自潔以荅六四之好故義不乘六二之車而自飾其趾徒步上行以合于四葢寧與同徳者飭躬勵行不與異趨者騖利競榮舍車而徒有紛華不慕淡泊自甘之象焉此豈世之役役于軒冕者敢望乎象傳曰舍車而徒義弗乘也凡升乎車者必在上方可乘易中言乘者皆在上也言承者皆在下也初在下无乘之理故曰弗乘初之應四正也從二不正也正則義而成其為文不正則不義而不成其為文君子之取舍一決于義而已六二賁其須變乾為大畜互體坎變兑説文須面毛也漢書注師古云在頤曰須在頰曰髯三四五上肖頤六二在頤下須之象變為口口旁之文莫如須凡頂之有髪口之有須耳鼻之有毫皆隂血之形而柔所以文剛者然隂柔不能自動必附麗于陽如須雖有美必附麗于頤也六二卦之主也以一柔來文下卦之二剛初九自賁而不受六二之賁矣六二既自賁又附麗于九三而為九三之賁也大抵剛為質柔為文文不附質焉得為文本卦惟初四一柔一剛得其正應二五皆柔三上皆剛故二必賁其須以從三五必賁于丘園以從上聖人右質左文之意於此可見或謂須賤妾之稱婦職之卑者也天官有須女四星離中女无正配故取其象以二之柔中文三之剛正位在參佐力効賛襄猶須女雖賤可以賛君内助也其解雖異而意相合亦可從象傳曰賁其須與上興也與者相從也上指三以爻位在二之上興者興起也須隨頤而動者繫于所附與上同興也或云須其所相須者也文剛者二也文柔者上也是相須以成賁者也與上興者謂二與上相應以興起文明之盛也亦通但從前説則分析六爻似更有條理九三賁如濡如永貞吉變震為頤互體坎變坤約象震變坤三與上位應而徳敵兩剛不相賁故九三之賁六二賁之也而又處六四之下以一剛介二柔之間錯襍成文且上下體離艮相連又以兩卦相賁取象賁之盛者也如助辭也曰濡如者九三互坎之中畫坎為水有濡象猶詩言六轡如濡謂所飾之文采鮮澤也然謂之濡則亦有䧟義若既未濟言濡首濡尾皆濡而䧟者也受物之飾恐為物溺故戒之曰永貞吉戒其文之過也威儀文詞禮之文也以其外心也中正无邪禮之質也以其内心也長守其陽剛之正而不為隂柔所溺則不至以文滅質而隂之賁我者且為潤澤之濡不為䧟溺之濡矣變震為動必至于不貞聖人當離之終而預告以艮之意象傳曰永貞之吉終莫之陵也陵者䧟溺之謂也文太勝則勢必至于滅質斯謂之陵三以剛正自持而不溺于隂雖其若濡孰得而陵之六四賁如皤鄭𤣥陸績本作燔云四欲適初進退未定故燔如如白馬翰如匪寇婚媾變離為重離互體坎變㢲約象震變兑三四剛柔錯襍離艮交故皆曰賁如入艮賁且止而反質矣故色尚皤馬尚白也老人鬢白曰皤書皤皤良士班固詩皤皤國老皆指鬢髮言艮三爻皆剛上文柔然四五柔爻也何能以柔文柔必以上為主四欲文初而不自用首戴上白以為白以上之白首樹初之觀刑皤如象也鄭康成云九三位在辰得㢲氣為白馬其理未詳然艮三爻皆言白當從康成詩箋以黄白色解賁山下有火火光照石故有黄白之色黄者離色所以言白者艮為石石色白也故四曰皤如曰白馬五曰束帛上曰白賁也不然不可通矣中爻震為􅑓足為的顙􅑓白足顙白顛皆白馬象也翰如者馬如翰之飛也中爻坎坎為亟心之馬翰如之象也又陸徳明云翰馬舉頭高仰也寇指三婚媾指初坎為盗九三互坎中畫與四相比而四惟應初故其白馬之翰如者匪親比三之寇也乃自求其初之婚媾耳蘇君禹云六四一爻當以白賁之義推之四與初相賁者也初以實心而賁乎四不為外觀四以實心而求於初不為虚飾初曰賁趾四曰皤如初曰舍車四曰白馬同一白賁之風而已又禮商人尚白戎事乘翰注白馬曰翰按此則翰如乃白馬之象然下文有匪寇婚媾之語乃是乘馬以往求其耦故但取如翰之飛為義詩云如飛如翰是也子夏傳亦云得位有應賁而成文故潔其儀白其馬欲翰如而速往也變離為重離文明之極乃賁如象然實艮體也故但言白象傳曰六四當位疑也匪寇婚媾終无尤也蘇子瞻云六四當可疑之位者以近三也六二以其賁賁初九而初九全其潔皤然也初九之所以全其潔者凡以為四也四可以不潔合之乎是以潔其車馬翼然而往從之以三為寇而莫之媾也此四者危疑之間交争之際也尤過也六四守正三不能求故終无過尤矣六五賁陸徳明引黄本作世于丘園束帛戔戔子夏傳作殘殘吝終吉變㢲為家人約象震變離六五无應于下而宻比于上九剛陽之賢受賁于上九者也丘園指上上陽剛而處外乃賢人隱丘園之象此與蠱卦艮同居上體觀蠱上九不事王侯則此上九為山林之賢无疑矣五君位本義以為有丘園之象似未妥或謂五賁上六亦非也據彖曰剛上文柔則六五乃上所賁者爻所謂賁于丘園猶之曰受賁飾于丘園也云耳如伊尹樂道耕莘傅説胥靡版築白賁之光實有輝映于商邦者非賁于丘園而何艮為山丘為果蓏丘園象周禮場圃任園地園在國外亦象上在卦外也束帛者幣聘之禮張衡東京賦云聘丘圉之耿介旅束帛之戔戔是也按婚禮納帛一束束五兩注十端為束以帛從兩頭卷至中以十端成五兩用聘女因以聘士云子夏傳云五匹為束三𤣥二纁象隂陽也五陽位六隂畫故有隂陽象坤為帛此艮體坤之上畫連乃束之於外之象又李鼎祚云離為中女午為蠶絲束帛象戔戔剪裁分裂之狀淺小之意按説文戔賊也从二戈徐鍇云兵多則殘也故子夏傳戔戔作殘殘虞仲翔云五動成㢲㢲為繩艮手持故束帛以艮斷㢲故戔戔束帛戔戔其跡似吝因卦體文明以止特取此以見敦本尚實之意耳其儀文雖薄然孚契真儒挽回末俗之機實在于是故終與上九合志而吉艮為㢲有光明之徳而㢲于賢故有陳束帛以聘士之象象傳曰六五之吉有喜也得上九高賢以共事於以成崇雅還淳之風其可喜何如上九白賁无咎變坤為明夷子不云乎質有餘者不受飾賁非君子之所樂也故終之以白賁白指上九其所賁者四五非上九自以白為賁即彖傳所謂分剛上而文柔是也云白者以假象言若作實象只是質矣此白字較四之皤白更深四未當止處只一節之白此則居卦之上艮止之終全體无文之賁即文明以止之止字也惟上九以白色下賁乎二柔故四得之而為皤如五得之而為束帛而下卦之文明者亦將得之而有所砥大凡文極必弊有艮之篤實以敦厚其終則不至于弊何咎之有胡仲虎云初取上下之義賁其趾下象也上取始終之義文之極則反為質白賁終象也變坤正乎至静而不飾亦白賁義象傳曰白賁无咎上得志也上居賁之極志欲救文之窮必將繁文縟禮一切掃去只從本色上做然後能返其陵替以歸于淳朴此賁道之所以无咎雖聖人治天下亦惟慮淳朴之不可返也而果臻于兹道則其得志為何如夫文質彬彬然後君子而以白賁為得志何也天文一日无誠則天道隳人文一日无誠則人道離故寧先質而後文无以文而滅質此聖人復古之意而法天治人之大端也嘗觀周禮一書大而八法八則六典六官微而昆蟲草木靡不畢具其文章多矣其禮樂綢繆矣乃周公作詩獨于不顯之文三致意焉聖人葢憂其文之弊而欲其返也噫是可以得賁辭之精矣第十二對剝復襍卦傳曰剝爛也復反也爛謂一陽窮于上復謂一陽生于下如碩果不食爛而墜地核中之仁復生也章本清云噬㗐賁後繼以剝復艮正離上震動離下為噬㗐賁艮止坤上震動坤下則為剝復離之一隂其坤之機乎夫陽一也初九之不遠復即上九之碩果不食者是也特因上下而有剝復之異耳傳于剝復皆曰天行然于剝則曰順而止之于復則曰動而以順行剝以順而止復以順而行君子于隂陽消長之間未嘗一毫不以順也所以剝之厚下固欲以安夫上之陽復之閉闗亦將以養夫下之陽皆順道也學易者以此反求諸身觀剝之象可見夫人之真心雖剝喪而未嘗盡泯觀復之象可見夫人之真心雖已復萌而羣隂未易以頓消也特隂氣不盡則陽氣不萌不剝則不復而其機間不容髮然一毫隂氣未融不可以為純乾之體惡容已于自强不息之功哉故曰復徳之本也鄧汝極云剝復坤合艮震也非主坤而長少二男合之耶不主坤主卦一陽貴陽也又一者貴也母從子也爾有剝必復如剝旋復見天地心間不容髪觀反對躍然抑天道凜冽下霜萬物揫歛剝盡矣而後陽氣下復于黄宫人心退藏寧謐萬膠俱解而後天徳復還其真宅不剝不復既剝乃復故剝先復而君子務下務内務􅋻小自約母敢或處其極焉坤下艮上剝不利有攸往許慎云剝裂也从刀从彔彔刻割也鄭樵云聲兼意言以刀割削而去之也隂長至五僅存一陽小人極盛君子不可有所之故不利有攸往也不往非絶世之謂謹身晦迹孫言衡命恬約以待事之㑹此不惟免于剝轉剝為復之道自寓矣六爻皆變為澤天夬艮下坤上為謙序卦傳曰賁者飾也致飾然後亨則盡矣故受之以剝凡彌文盡飾皆屬隂柔坤為文也坤為文則乾為質矣致者専事文飾之謂也文飾太過則為亨之極亨極則文盛而實衰故曰致飾亨則盡矣繼賁以剝明賁之即為剝也虚美熏心秦亂之萌浮文妨要晉衰之兆昔者舜甑釡无羶而下不以餘獲罪飯乎土簋啜乎土型而農不以力獲罪麑衣而䀈領而女不以巧獲罪法下易繇事寡易為而民不以政獲罪故大道多容大徳多下聖人土為忠易為禮誠易為辭故能保有陶唐之業貽之有夏也先王憂質之不能不遷而為文也思從先進而不得而可致飾以迫之乎則剝而已矣彖傳曰剝剝也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虚天行也剝者陽剝也所以剝之者隂也五之隂上進而欲變乎上之一陽也陳友文云夬彖曰剛決柔而剝曰柔變剛何也曰此君子小人之辨也君子剛明果斷小人隂賊險狠君子之去小人聲其罪與天下共棄之名正言順故曰決小人之欲去君子辭不順理不直必萋菲浸潤以侵蝕之使之日消月爍而不自知故曰變一字之間君子小人之情狀皦然矣所以言君子不利有攸往者以卦體言之小人長也隂邪之聲勢方張也黄正憲云自姤至觀雖皆隂進之卦猶未剝及五也五君位君心未剝則轉移有機故包于姤嘉于遯休于否大觀于觀陽道猶有可行至此則併君心剝之矣君子觀坤下艮上之象而得順止之義紓徐容與使小人不能恣逞以隂培我正人之氣此碩果不食所以基七日之復也不然憤而力抗徒激變生亂糜爛其身則黨錮熙豐之禍可鑒矣胡仲虎云凡卦畫皆象也皆當觀也於剝獨言之者為處變君子言也又按虞仲翔謂五消觀成剝故曰觀象章本清焦弱侯皆從其説然於文理鑿矣尚猶貴也消息者盈虚之方始盈虚者消息之已成消息盈虚四字皆以陽言復者陽之息姤者陽之消乾者陽之盈坤者陽之虚剝正陽消而將虚之時也天行者天道自然之運也天運流行消必有息盈必有虚君子尚之順天時行故雖處剝之時而不至于咨嗟戚憂而變其所守者知其後之必復而屏心寧耐以待之也古云江河之盛不過三日大凡小人既極其盛盛則必衰自有可以順止之理如夜則安静以俟晝冬則安静以俟春非以冬與夜為不可往而遂逃也逃將安適乎或云聖人以天自處亦有不可為之天與此非聖人之所忍言不得已也佛肸欲往公山欲應沮溺丈人荷蕢接輿晨門微生之流皆弗納其論而欲陶鑄于吾道之中卒不能逃其所料而始㝠心于消息盈虚之數聖人亦盡其在我耳天降下民作之君作之師以助上帝此天意也不可弗承也天生徳於予期月三年皆可自信又天意也不可以弗承也至于終不遇而後知天生予之意乃在斯文不在斯世乃在萬世不在斯世可㝠心而安於命向令坐而安命猶耕者不耕而曰嵗當饑蠶者不蠶而曰嵗當燠遽自廢其耕蠶也不亦果哉然則无前知乎非然也子路固曰道之不行已知之矣夫子亦盡其在我而已剝順止之象顯于外曰觀象復順動之㡬涵于内曰見心剝以象觀非人之象而天之象復以心見非人之心而天之心剝復皆曰天行而君子若皆不以已與之復原始為天剝要終為天君子之天之有定固如此象傳曰山附於地剝上以厚下安宅山髙聳于地者也山之下址朽蝕銷圯則山之上頂頽塌䧟下而附着于地如梁山崩之類象稱上惟剝取一陽在上之象厚下取坤象安宅取艮象下者上之本未有基本固而能剝者也故上之剝必自下下剝則上危矣居上者而知此理則厚其下乃所以安己之宅也因艮體一陽覆幬于上有宅舍之象故以宅言之所以上九亦以廬言者以有廬之象也卦言下剝上傳言上厚下似若不同然意有可相通者陽為君又為君子隂為民又為小人論上下相倚之勢民生厚則邦本自固論君子小人相持之勢反側靖則正類益安彖之順止上之得輿此之謂也初六剝牀以足蔑荀爽本作滅貞㐫變震為頤牀與貞指君子剝與蔑與㐫指小人蔡介夫云牀有二如陳元龍自卧大牀而客坐于下李林甫一夕屢徙其牀韋應物詩風雨對牀眠是卧牀若謝萬據胡牀管寧坐藜牀楊素撫牀謂李靖君當坐此牀諸葛亮每見龎徳公輒拜牀下此坐牀也牀者人之所安其體則上實下虚故取以象剝足在下又取以象初剝之初六即姤之初六也隂消陽自下始五月姤之一隂始消一陽于下猶剝牀而先及其足也王輔嗣云蔑猶削也孔仲逹云蔑謂微蔑物之見削則微蔑也吳㓜清云楚俗有削蔑之言貞正也謂陽也隂邪陽正剝牀以足而遽曰蔑貞者誅其心也如今削人權勢先削爪牙建成元吉欲剝世民先譛程知節出為康州刺史又譛房𤣥齡杜如晦逐之知節謂世民曰大王股肱盡矣身何能久即此意夫善人者天地之紀而民之衛也故天下之惡莫大于傷善當其念始萌㡬始發而孽已通於天矣故聖人案之以滅貞而斷其㐫葢深為小人戒也便與小人剝廬一意孟子云不祥之實蔽賢者當之蔽且不祥而況害乎又楊敬仲云蔑无也貞正也小人剝牀无能正之則㐫六爻惟初與二曰蔑貞㐫言初與二小人之勢未甚壯尚可正之也過此則雖欲正之亦无及矣禍成矣其説亦通但據荀爽本蔑作滅與傳滅下合故斷從前説變震為動剝心一動㐫道也象傳曰剝牀以足以滅下也吳㓜清云滅與爻辭蔑字同義非滅没滅息滅絶之滅剝其足者謂削蔑其下也先從下剝漸及于上以此闡其蔑貞也六二剝牀以辨蔑貞㓙變坎為蒙互體坤變震崔憬云今以牀言之則辨當在第足之間是牀梐也孔仲逹云辨謂牀身之下牀足之上與牀身分辨之處程子云辨分隔上下者牀之幹也剝之六二即遯之六二剝陽至下卦之中畫猶自牀足而上剝至于幹也如是則毒益深孽益重蔑貞之㐫可知已夫受剝者之㓙易明也而失其所承以同歸于盡吾固知剝人者之㓙必无異于受剝者之㓙兩爻重言之者傷之深戒之切也否之初二聖人皆開其自新而與其吉剝而皆曰㐫者何否非其時猶可易志也剝則有害心不可逭矣變坎為險剝而至於心乎險剝滋深矣坎於木為堅多心亦幹象象傳曰剝牀以辨未有與也丘行可云與應也凡隂陽相應為有與咸六爻皆應則謂之感應以相與艮六爻皆不應則謂之敵應不相與剝之未有與者言當剥之時在上未有以應陰无以止陰之進也大凡小人為害使其間有一君子與之為應以遏止則猶有所顧忌而不敢肆惟其未有與此剝道所以進長而不可救也吳㓜清云未有云者言六二之所未有至六三而後有也葢傷有與之不早而僅能存一陽也愚按二之所應者五五君位也其闗係為至大得九五則有與其卦為觀故大觀在上下觀而化得六五則未有與其卦為剥故小人道長引類而升變剛之惡蔑貞之凶皆以无與得之葢深惜剥之不得為觀者柔道偏勝而无剛陽以制之也六三剝之陸徳明本无之字云一本作剝之无咎非无咎變艮為重艮互體坤變坎約象坤變震之指未變之陽言吳㓜清云剝之六三即否之六三此以否之六三言之謂剝陽已及三也三牀之上也不言剝牀而汎言剝之其辭比初六六二六四差緩也剝陽及三者乘隂長之勢至此非専三之罪三雖居剝陽之位而獨與上九一陽為應則无害陽之心故聖人繫爻特異其辭以别于初二四之三隂也朱子云衆隂方剝陽而已獨應之去其黨而從正无咎之道程子云如東漢之吕强是也胡仲虎云剝之三即復之四復六四在五隂中獨與初應而不許以吉剝六三在五隂中獨與上應而許以无咎何也曰復君子之事明道不計功不以吉許之可也剝小人之事小人中獨知有君子不以无咎許之則无以開其補過之門也變艮為止止而不剝與上九同義象傳曰剝之无咎失上下也三居四隂之中不與之同黨而獨與一陽為應與是所失者上下之隂而所得者上九之陽也惟其失四小人所以得一君子葢小人害正皆同黨使然三以失上下而无咎猶坤以喪朋而有慶聖人恐其係戀同類故勸之以斷曰失上下六四剝牀以膚京房本作簠謂祭器㐫變離為晉互體坤變艮約象坤變坎膚崔憬謂薦席也云若獸之有皮毛也牀以剝盡㳄及其膚隂長已盛陽剝已甚貞道已消故更不言蔑貞直言㐫也小人雖計剝君子不知其乃自剥耳是故聖人數稱㓙以儆之艮為離火焚山山實且敗亦剥膚之象象傳曰剝牀以膚切近災也切即近意剝床及膚災近于身小人近身災切于君故曰切近災也舊説以膚為體膚之膚言剝牀而及于人之肌膚也若爾則身已在災中豈止切近而已且以卦象觀之一陽横亘于五隂之上上實下虚故象牀四在陽下與羣隂襍處无縁有身在牀上之象當從薦席為妥六五貫魚以宫人寵无不利變㢲為觀約象坤變艮凡易中所言魚皆指㢲中孚上㢲則曰豚魚井下㢲則曰鮒姤亦下㢲則象有魚无魚乾之自初逓變而至四毎爻皆有㢲象至五隂為剝則㢲始亡故爻辭曰貫魚本爻變㢲為繩體艮為手所貫之魚指下四爻如魚駢頭而貫也五本君位以一陽在上五隂戴之為主故取上為王象而以五為王后位亦變例也體艮為門闕宫象以王后居五推之四為夫人佐后者也三為九嬪以至九御下卦之長也二為世婦初為御妻自四而下總名為宫人皆以隂爻取象以之者將之也誰以之后以之也五與上剛相親故有獲寵象后為宫人之主五統羣隂如后統衆妾衆隂戴陽如后以衆妾進御而均被寵愛于王按禮注天子御妻八十一人九人旅進當九夕世婦二十七人亦九人旅進當三夕嬪婦九人當一夕三夫人尊當一夕王后又尊専一夕凡十五日而遍有魚貫而進之象焉剝而至四㐫矣過此非聖人所忍言也故特發此義以示天下之母儀若曰與其剝陽而至于㓙孰若以㳄承陽之為利哉凡卦五隂而一陽則一陽為之主矣三失上下獨以一爻歸猶能无咎五舉衆内附其功尤大宜承天寵无所不利豈特无咎而已勸勉之也丘行可云遯剝皆隂長之卦遯隂長而猶微可制也在遯之九三言陽制隂之道故曰畜臣妾吉剝隂長而已極不可制矣故不復言陽之制隂而言隂之從陽是以六五曰貫魚以宫人寵畜隂之權在陽則告陽以制隂之道剝陽之權在隂則敎隂以從陽之道胡庭芳云聖人於觀四别取觀國之光義而於剝五又取率羣隂以受制于陽為利焉其扶陽抑隂之意毎如此象傳曰以宫人寵終无尤也五本以隂剝陽今率羣隂以受寵于陽則隂受制于陽矣何過尤哉抑聞之曰三為羣隂之中五為羣隂之極而聖人系以无咎无不利者一則應陽一則承陽也小人知有君子則君子亦且與之開以補過之門不使終為剝也是所謂厚下也夫小人非性而有也一念私成小人此小人之始也將挽小人而歸于君子之途亦自其一念善與之矣必誅之則小人未必能誅而君子之禍必烈且誅非天心也天心者必反道敗徳之尤乃誅其他則可宥而宥之矣自好貨好權而外苟非好亂之尤誰非可宥者乎此义還小人為君子之始也世之人有小人而世之人主无小人人主不幸而没于小人之中欲自振拔不可得而君子者往往為之誅小人以増其危人曰此不講於權術之故而不知大道甚明无庸權術大道者善容善任而於天下之小人皆有所以位之无棄物也如女子婦人者最為難養然使后妃理隂教而統率宫人魚貫以承君之寵彼后妃安能為擅而宫人安能為蠱乎吾見椒序之下下陳之上不可缺一人耳君子之所以位小人者若是則上无拂于君下无擾于臣物各得其所利以成義之和此至大至正之道而非一切權謀之術相引而歸于君子之途化佞為忠反賊為良必繇此也蘇子瞻云聖人之敎人也容其或有而去其太甚庶幾從之如責之以必无則彼有不從而已矣上九碩果不食君子得京董本俱作徳輿董作車小人剝廬變坤為純坤碩果者碩大之果陽大隂小碩之象也艮為果窳艮上陽下隂果陽而窳隂乾為木果衆陽皆變而上九一陽巋然獨存猶碩果之在喬枝而幸不為人所食不食則將有復生之理矣夫以諸柔克折之時而國之遺老猶有存者彼其身名未衊足以待用當年即不然而名徳所留猶足興起後進此化生善類之種也造物者寧无意乎焦弱侯云召平董公四皓魯兩生之流士不以秦而賤也伏生浮丘伯之徒經不以秦而亡也萬石君之家俗不以秦而變也陽非隂之所能盡剝故曰碩果不食君子謂一陽坤為輿五隂承載上九之一陽如人之在車上又此爻變亦坤故象得輿程子云隂道盛極之時其亂可知亂極則自當思治故衆心願載于君子君子得輿也詩匪風下泉所以居變風之終也理既如是在卦亦衆隂宗陽為共載之象小人謂上九變為柔也一陽上覆五隂有廬之象竒變為偶則如廬之破壞穿漏其上而无以葢覆其下朱子云小人剝廬是隂到這裏時把他這些陽都剝了此是自剝廬舍无安身已處又云惟君子乃能覆葢小人小人必賴君子以保其身今小人欲剝君子則君子亡而小人亦无所容其身如自剝其廬也且看自古小人欲害君子到害得盡後國破家亡其小人曾有存活得者否胡仲虎云牀上之藉下以安者也廬下之藉上以安者也始而剝牀欲上失所安今而剝廬自失所安矣亦豈小人之利哉按君子得輿小人剝廬二義不並行二占不並用若君子得輿則小人亦得其廬矣若小人剝廬則君子亦失其輿矣上九當剝之終吉㐫未定天若祐晉則為謝安之止桓温而天下皆得所載天不祐漢則為王允之死於㴶汜而小人亦相隨而亡斯二者天也此爻獨不言吉㐫聖人之意深矣愚又聞之師云此君子之秋也所謂一不為少夫觀有二君子焉雒蜀牛李之黨所自起也五之見消未必非此今其定矣烏乎定定于一又云君子守道固窮人亦无如之何也或曰民之望也不可殺或曰不足殺及乎事過又不可得而殺也是以常在又云艮為宫闕小人不足以當之故變言廬廬者殿中直舍也陽居上得民隂欲謀上事亦无成祗足自害剝運告終天下无事矣三復斯言大足為上九増氣象傳曰君子得輿民所載也小人剝廬終不可用也民謂五隂君子得輿則衆隂不以小人稱矣故曰民所載也廬所賴以安身者也今既剝矣身將安庇吾為小人籌此術終不可用必慎載君子而後可焉夫世治豈惟君子之利抑小人之利世亂豈惟君子之害抑小人之害小人可悔矣是卦也於君子則勸之容小人於小人則戒之剝君子委曲以為之扶抑是聖人之為世道計也又蘇君禹云剝之卦隂剝陽也以造化言生長為陽肅殺為隂以世道言君子為陽小人為隂以吾心言理為陽欲為隂小人之剝君子也始于隂謀極於一網一網盡而世道隳矣人欲之剝天理也始於潜滋極於牿亡牿之反覆而人道滅矣世未有不培吾心之君子而能培世道之君子未有不去吾心之小人而能去世道之小人者也夫陽明之氣非獨歉也惟其自震耳隂濁之習非獨勝也惟其自反耳上之碩果不食也是夜氣之息也好惡與人相近也養之斯為君子矣剝之斯為小人矣舜跖之分利善之間甚可懼也嗟夫人之一身所立天地間者惟此安宅耳剝牀不已至于剝廬茫茫宇宙容身无所奈何不思震下坤上復亨出入无疾朋京房本作崩來无咎反復古本一作覆其道七日來復利有攸往許慎云復往來也从彳复聲徐鍇云往來為復故从彳彳相連也按説文彳小步也象人脛三屬相連也㚆古作㚆行故道也从夂畗省夂象人兩脛有所躧也然則復原以既往而來為義故从彳會意从复亦以聲兼意鄭康成云復反也還也隂氣侵陽陽失其位至此始還反起於初故謂之復按卦以陽生為復隂生為姤須明二卦取義何來六合之氣天陽氣初生為主地隂氣後凝為客陽本包隂然其分時司令則氣皆平分陽生于子月至已而極隂生于午月至亥而極復者主宅其居姤者客驟而至此命名之本意也陽反而復生生之氣自此萌動故亨出入无疾以下皆主初九一爻言出者剛長也入者剛反也疾者遽迫也自一陽始生漸進而為六陽之乾在臨則為九二在泰則為九三在大壯則為九四在夬則為九五在乾則為上九凡所以為六辟卦之主者皆此一陽也至姤一隂始生則陽以㳄而消而此一陽者先不見矣待其後五陽消盡而此一陽始復生于下是自出而入絶无急迫故曰出入无疾即臨卦剛浸而長之浸字也朋同類也一陽生則諸陽以漸而生故曰朋來乃自其未然之勢言臨泰且至是方來也无咎即疇離祉意一陽先事動而以順行則衆陽亦各依其序而至而无凌逼之失故无咎反者往而還也來者還而至也曰反復其道者言反以復其道卦畫從下起復之一陽即開天之一畫所謂乾元也道猶路也震為大塗有行道象其道乃自復而臨而泰而大壯而夬而乾之道復之初爻乃其行之所發軔故曰復其道此復字與來復之復同義然反尚以在途言及曰來則歸就本位矣七日則其反而來之期也自乾而姤一隂始生乾上九之陽擯在卦外反之始也厯二隂遯三隂否四隂觀五隂剝六隂坤此一陽皆迤邐而未至至復而始見則厯七卦矣以卦配月自建午至建子為七月所以言日者古人呼月為日豳詩一之日二之日是也月所以紀日也隂陽平分其數各六升降往來至七而還其本位故厯家建破以七日而更醫家之論傳經亦以七為審楊敬仲云陽言日隂言月故臨言八月季子思云於臨曰八月有㓙於復則曰七日來復陽消而數月者幸其消之遲陽長而數日者幸其長之速按七日之解不一或取隔坤六爻成七或取倒剝六爻成七雖各有可通然據彖傳明解曰天行也當以自姤五月一隂生至復十一月一陽生之説為正或有祖六日七分解者以為剝卦陽氣之盡在於九月之末十月當純坤用事坤卦之盡則復卦陽來每卦得六日七分從剝盡至陽氣來復隔坤之一卦六日七分舉成數言之故言七日也鄭康成王輔嗣孔仲逹李鼎祚皆如此説余以分卦直日之法考之則諸家之説誤也法云離坎震兊各主其一方其餘六十卦卦有六爻爻别主一日凡主三百六十日餘有五日四分日之一毎日分為八十分五日分為四百分四分日之一又為二十分是四百二十分六十卦分之六七四十二卦别各得七分是毎卦得六日七分也所以推離坎震兑為四正者本之説卦言坎北方之卦也震東方之卦也離南方之卦也兑正秋也於三卦言方則知坎離震兑各主一方矣於兑言正秋者秋分也兑言秋分則震春分坎冬至離夏至為四正矣四正直四時為方伯監司之官不在直日數内又以復臨泰大壯夬乾姤遯否觀剝坤十二卦為辟卦直十二月毎一卦各管四卦如坤十月卦也厯未濟蹇頤中孚四卦而後成復復主冬至而冬至中氣實起於中孚故易緯稽覽圖謂卦氣起中孚所傳焦延夀京房推筭之法葢如此然則復之去坤尚隔五卦計三十一日有竒不得徑以復接坤而曰僅隔坤卦之六日七分也若謂中孚與復止隔一卦七日來復葢指中孚言耳此於分卦直日之法合已若然則中孚之時陽氣已動聖人當言于中孚見天地之心不待至復也且積日成月積月成時十二辟卦主十二月既皆在直日用事之中何得棄四正卦不用豈月外有時乎緯文鄙淺原不足信諸家更誤述之見又在焦京下也七日來復専言一陽方來其數如此利有攸往則又言一陽之長可為臨為泰以至于乾也上文曰出入自出而入也此曰利往自入而出也六爻皆變則為天風姤震上坤下為豫序卦傳曰物不可以終盡剝窮上反下故受之以復物无剝盡之理隂極則陽生陽剝極于上而復生于下窮上而反下也如列子所謂運轉无已天地宻移疇覺之哉張子云剝之與復不可容線須臾不復則乾坤之道息也故適盡即生更无先後之㳄也此義最大彖傳曰復亨剛反動而以順行是以出入无疾朋來无咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎剛反釋復字而亨之意在其中剛既反則日長日盛而亨矣以卦徳言之下動上順震動行于坤順之中順者所以善其動也是以其始也一陽自出而入而无凌遽之病其既也衆陽引類而進而无壯罔之愆大抵氣難助長學貴深造亦動而以順行之意楊中立云四時之變浸而為寒暑固非一日之積也天且不能暴為之況于人乎自隂生至陽復凡七月此乃天道之行自然而然如人往之有反行之有復也天行言既去而復來之時剛長言已復而又盛之勢一陽雖微其勢則長五隂雖衆其勢則消利有攸往于兹決矣剝復二傳皆對言剝曰君子尚消息盈虚天行也復曰反復其道七日來復天行也剝曰不利有攸往小人長也復曰利有攸往剛長也葢以反剝即為復也六十四卦无非天地之心所寓而獨見于復則惟一陽初動之際為能見其心也天地何心哉萬古生物无少息時則其心矣然則无時不可見而何獨于復見之譬之晝不稱光而昧爽稱光為夜无光而光始動于晨耳冬乃大肅疑不仁矣无何而陽回然後知殺果非其心而心于仁也不仁而曷為萬古生生以至于今哉程子云人説復其見天地之心皆以為至静能見天地之心非也復之卦下面一畫便是動也安得謂之静朱子云十月陽氣收歛一時闗閉得盡天地生物之心固未嘗息但无端倪可見惟一陽動則生意始發露出乃始可見端緒也言動之頭緒于此處起于此處方見得天地之心或問動之端乃心之發處何故云天地之心曰此須就卦上看上坤下震坤是静震是動十月純坤當貞之時萬物收歛寂无蹤跡到此一陽復生便是動然不直下動字却云動之端端乂從此起雖動而物未生未到大叚動處凡發生萬物都從這裏起豈不是天地之心又云程子説天地以生物為心最好此乃是无心之心也又云三陽之時萬物蕃新只見物之盛大天地之心却不可見唯是一陽初復萬物未生泠泠静静而一陽既動生物之心闖然而見雖在積隂之中自掩藏不得此所以必於復見天地之心也又云要説得見字親切葢此時天地之間无物可見天地之心盡散在萬物不能見得如此端的又云聖人賛易而曰復見天地之心今人多言唯是復卦可以見天地之心非也六十四卦无非天地之心但於復卦忽見一陽之復故即此而賛之耳又云伊川與濓溪説復字不同濓溪就坤上説就回來處説如云利貞者誠之復誠心復其不善之動而已矣皆是就歸來處説伊川却正就動處説如元亨利貞濓溪就利貞上説復字伊川就元字頭説復字以周易卦爻之義推之則伊川之説為正邵子詩云冬至子之半天心无改移一陽初動處萬物未生時𤣥酒味方淡太音聲正希此言如不信更請問包犧朱子詩云忽然夜半一聲雷萬户千門㳄第開識得无中含有處許君親見伏羲來按以上數條深于翼傳有所發明故詳録之象傳曰雷在地中復先王以至日閉關商旅不行后不省方陽氣出地為雷自秋而冬陽往而消无能為雷者今一陽復還于地中雖未能為雷而春時之雷即此復還之陽之所為故曰雷在地中也陽始生于下而甚微安静而後能長先王順天道當至日陽之始生安静以養之春秋謂之分冬夏謂之至分者春秋各九十日而二分居其中以隂陽均故曰分至亦各居九十日之中周禮五月日長至日長之極陽極隂生也冬十有一月日短至日短之極隂極陽生也今呼冬至為長至以隂極陽至短極長至為義三禮義宗云至有三義一以明隂陽之氣之至極二以明隂陽之氣之始至三以明日行之南北至此至日葢謂冬至之日闗者四郊之門既曰先王又曰后者后指後王言也明先王之制如此至日一陽初生故閉闗不開商旅不通行則外者不入内人君不巡狩則内者不出外葢欲地上安静以養地下初動之陽也亦皆象雷之在地也商旅舉其朂動者省方舉其最鉅者以該其餘月令是月也齋戒掩身以待隂陽之所定亦此意舜十一月朔巡狩而此言后不省方者葢巡狩者是月也不省方者是月之至日也至日震一陽象闔戸為坤又一陽横亘于下為閉闗象震為大塗坤為衆商旅象闗閉矣不行象震為君后象坤為國土方象君不居五而居初潜居深宫不省方象按㢲為商旅為近利市三倍以震見㢲伏故商旅不行姤象曰后以施命誥四方以復見姤伏故后不省方虞仲翔之解云然其取象確矣又蘇君禹云復之閉闗也非閉有形之闗閉无形之闗也不營營于功利不憧憧于往來商旅之不行也天君泰然于内而不馳騖于外后之不省方也粗舉假象有裨理學復閉闗所以貞一嵗震動之生幾而使行之无不順隨宴息所以貞一日震動之生幾而使行之无不説知閉闗之義日日有至有復知宴息之義息息有宴有隨繫辭下傳曰復徳之本也豁然而還其本心之為復韓康伯云夫動本于静語始于嘿復者各反其所始故為徳之本所謂立天下之大本者此也王輔嗣云復者反本之謂也凡動息則静静非對動者也語息則嘿嘿非對語者也然則天地雖大富有萬物雷動風行運化萬變寂然至无是其本矣故動息地中乃天地之心見也若其以有為心則異類未獲具存矣愚按程朱以動解復據一陽下動言也王韓以静解復據雷在地中言也旨似互異理實同歸葢静以君動乃動之本體特静无可見於動之端處想見其頭緒耳故朱子亦有未到大段動處之説應知尚有本體在又曰復小而辨於物些子靈玅視之不見聽之不聞謂之小即道心惟微之微以一陽言辨分辨之辨物謂物欲以五隂言辨于物者言物欲之所不得溷又曰復以自知六十四卦孔子惟稱復為見天地之心又曰復以自知自知之知即乾知大始之知即知天地化育之知是真知也見天地之見即人所不見之見即參前倚衡之見是真見也吾之心即天地之心一念自知則惺然常存豁然貫通知天而天知天之未始不為我知地而地知地之未始不為我不過識得此真心而已此復所以為徳之本與雖然自知之復豈易言哉克已而後復禮格物而後致知夫惟内不見已外不見物而後可謂之真見也此閉闗之極而顔氏之子所以為庶㡬也初九不遠復无祇祇以示氏聲有兩音音岐者訓神祇之祇云支者訓適吴㓜清作祗按古文易註曰祇作祗者尤非祇从衣氏聲短衣也王肅作禔云妥也九家本作多音支又作㩼與多同義猶但也悔元吉變坤為純坤復卦辭専以氣數言爻辭専以人事言上體乃坤而静之時下體乃震而動之始初九又復而反之機初以一陽為三隂之主動而即復不遠而復也悔生于動動涵于初陽内復而天心還肫盎粹然自知烱然以故居動之體无動之悔祇適也増韻云適所以之辭若動而過過而忘反則適所以召悔而已楊廷秀云動生于心復亦生于心復心一生動心自寂君子以此修身吉之大也何悔之有又悔有變義初九為復卦之主變則无陽矣象傳曰不逺之復以修身也彖言心言見象言身言修不逺之復已見天地之心故能以之修其身不然與天地稍不相似便成一箇軀殻之身何修之有近溪羅氏云以修身也明不逺復是箇反身而求鞭鞭着在肉上方復得來此語更痛快繫辭下傳曰顔氏之子其殆庶㡬乎有不善未嘗不知知之未嘗復行也易曰不逺復无祇悔元吉楊敬仲云意起為過不繼為復不繼者不再起也是謂不逺復意起不已繼繼益滋後雖能復不可謂不逺復不逺之復孔子獨與顔子謂其有不善未嘗不知知之未嘗復行者繼之之謂意起即覺其過覺即泯然如虚之水泯然无際如氣消空不可致詰人心自善自神自明自无汙穢如四時之錯行如日月之代明冰鑑中之萬象意微起焉即成過矣顔子清明微過即覺覺即泯然无際如初神明如初是謂不逺復无始也復於意未動之始也是元即乾元即坤元元不可思元不可度姑謂之始又謂之大又謂之道心又謂之天地之心其曰元吉吉孰大焉愚謂復小而辨于物顔子惟察乎至善之體故有不善未嘗不知知之未嘗復行否且真妄不分焉知所復此復所以貴自知也六二休復吉變兑為臨互體坤變震許慎云休息止也从人依木人於勞暍之時得依木之芘䕃以息至美也故休亦有美義復有震之竹與雈葦為芘䕃可休之處六二得位處中最比于初上无陽爻以疑其親在初之上而附順之有休之象大凡人心所以不純乎天理者祇以有所馳而未休二不能不涉于隂與初之不逺復異矣幸其以初為輔仁之友因往依之用以息其劓而補其黥則二亦從此能復吉道也文中子云學莫便乎近其人初九己自為復者也顔子之克己復禮以之六二依人而復者也曾子之從事吾友以之六爻皆以自復言必謂指初非或云休讀如休休有容之休隂多忌陽六二柔順中正見一陽之復其心休休焉樂與之比故曰休復亦通變兑有悦而就下之義卦變臨二陽同徳剛方長故克休復象傳曰休復之吉以下仁也仁謂仁人指初言震本為仁二在初上何得云下仁王肅謂下附于仁是也易六十四卦未嘗言仁僅見于此是知不逺復便是仁也故孔子曰仁逺乎哉補陽稱元言二隂亦稱吉親賢之益葢如此象提吉字亦有味六三頻古本又作嚬鄭𤣥本作卑音同當是顰蹙之顰从頻卑聲古文省耳復厲无咎變離為明夷互體坤變坎約象坤變震許慎云頻水涯也人所賔附頻蹙不前而止有躊躇煩躁之意故其義為數為急為連三體震性動又決躁變剛互體成坎阻水不能進而後復復之不早者也故為頻復象初九一過六二二過六三三過初九有不善未嘗不知知之未嘗復行一過而已无復過矣故稱不二過若二者待人而後補過不得人能无過乎是二過者也至于三而過甚矣復遲矣急忙連步反歸求初視二已隔一層能无厲乎然猶未離乎内與初同體故亦有復象而猶可以免咎如其復而又過㐫咎悔吝將並集之豈曰厲而已乎髙順云舉動不肯諦思動輒言誤誤事豈可數慎毋恃改過為盛徳而澷无絶私勝己之力也變離為明夷非不知復者卦變明夷亦傷矣故厲象傳曰頻復之厲義无咎也頻雖有厲復則能補過矣故於義為无咎然聖人終恐人之狃頻復為无咎也特提出厲之一字以醒人焉六四中行獨復變震為重震互體坤變艮約象坤變坎糓梁子云三有中五亦有中四上下皆有二隂而處厥中不從其類而獨應初故其象為中行獨復或云此卦全體象震震為足又為大塗卦之五隂二三近陽五上逺陽四居逺近之中猶路之半也故曰中行或又云凡卦三四皆可言中益卦三四言中行是也不獨二五為上下之中而已皆通中雖以五隂之中言然自中立不倚之義四以應初故能復非以應初為復也謂之獨者惺然獨覺獨往不從外得不徇衆見對衆人而言也復六四即剝六三故皆以離類從陽取義體坤故能順陽變剛則與下卦同是震體下畫一陽與初九一陽同亦從而復之象朱子云當此之時陽氣甚微未足以有為故不言吉然理所當然吉㐫非所論也董子曰仁人者正其誼不謀其利明其道不計其功於剝之六三及此爻見之象傳曰中行獨復以從道也謂惟道之從不從衆也隂陽有淑慝之分四處衆中而獨能從道曰獨者難之也微陽及物之功未廣故不言吉四知道之當從而已豈計其功乎胡仲虎云修身以道修道以仁小象曰修身曰仁曰道惟初九當之六五敦復无悔變坎為屯約象坤變艮初為復之主爻四與之應五去初逺又非其應其下而從之也亦附于四而已敦者附益而加厚之意與敦臨意同約象坤五為坤上畫又變艮敦象夫五去初遠而私淑之非功力之加厚亦何繇復哉五能敦于其復不以攻取移不以始終易焉是復善而无悔之道也太甲處仁遷義克終允徳以之李子思云易中陽長之卦凡在上隂柔之主則未嘗不附而順之故復為一陽之長而六五則敦復无悔臨為二陽之長而六五則以知臨為宜泰為三陽之長而六五則以帝乙歸妹為祉大壯為四陽之長而六五則以喪羊于易无悔諸卦六五爻大率皆以下順陽剛而得居上之體作易者當陽長之世以此垂訓要之皆所以為君子之地云耳程子云陽復方微之時以柔居尊下復无助未能致亨吉也能无悔而已卦變屯屯固也亦敦篤義象傳曰敦復无悔中以自考也自考即視履考祥考其善不善之考侯果云體柔居剛无應失位所以有悔能自考省動不失中故曰无悔矣復自知不待外求中自考亦不待外求不動于意不遷于情以體認未發氣象此敦復之學也復以自知乾之知始也敦復无悔坤之厚終也上六迷復㐫有災鄭𤣥本作烖陸徳明本作灾按説文烖正字也灾或字也災籕文也眚用行師終有大敗以其國君㐫至于十年不克征變艮為頤上為㝠昧之位六為柔暗之資地絶既无下仁之美剛逺則失遷善之機隂重已有難開之蔽柔終安望改過之勇坤本先迷今居其極則迷之甚矣以迷復二字連言者言迷于復即昏迷而不知所復之謂非如楚辭所云迴朕車以復路兮及行迷之未逺者也蘇子瞻云乘極盛之末而用之不已不知初九之己復也謂之迷復㐫字貫下以天意言則㐫見于災𤯝以人事言則㐫見于行師子夏傳云傷害曰災妖祥曰眚鄭康成云異自内生曰眚自外曰祥害物曰災災眚者上天之罰也初九之復天也衆莫不予而已獨迷焉雖天其肯佑諸故有災𤯝何以言行師以其敵陽也陽初復隂極盛正龍戰于野之時坤為衆變艮大象離離為戈兵下震為大塗衆人以戈兵而震動于大塗行師象也卦之全體似師下不成坎師毁而大敗之象苟慈明云陽息上升必消羣隂故終有大敗坤為邦國乾為君滅藏于坤故以其國君㐫皆上六所致也十年不克征亦七日來復之反乾无十坤无一隂數極于六而七則又為乾之始陽數極于九而十則自為坤之終故凡言十年者坤終之象也屯十年乃字頤十年勿用皆互坤坤數窮于十无不反于一十乃坤之終一即震之始上有坤之終迷更无震之反生量斯形勢雖至十年猶不能征伐㐫孰有過此者乎然曰十年終有可復之日不然陽道在天地間當遂滅息矣豈理也哉一陽漸進以至于夬則決而成乾此上六復之日也左傳子大叔告子展曰楚子將死矣不修其徳政而貪昧于諸侯以逞其願欲久得乎周易有之在復之頤曰迷復㐫其楚子之謂乎欲復其願而棄其本復歸无所是謂迷復能无㓙乎楚不㡬十年未能恤諸侯也又成公十六年晉楚遇于鄢陵晉侯筮之史曰吉其卦遇復曰南國䠞射其元王中厥目國䠞王傷不敗何待公從之及戰吕錡射共王中目杜預注云復陽長之卦陽氣起子南行推隂故曰南國䠞也南國勢䠞則離受其咎離為諸侯又為目陽氣激而飛矢之象愚謂此卦占辭與卦象全不類注終未的確意者震坤拱㢲離在中間楚正南國今有東方震西南角坤而无㢲離㢲離共坤各得坤一半坤為國豈非南國䠞乎㢲為白眼離為目光无離无㢲豈非喪目乎震為蒼筤竹豈非矢乎若只就兩體言貞我悔彼初九元吉上六迷復㐫有災𤯝用行師終有大敗以其國君㓙坤西南即南國也震木克坤土射之義也國君即元王有災眚𤯝為目疾即中厥目之象也亦可以旁通矣或謂行師以下皆假象以喻一心不能馭衆動徇象必至喪天君亦通象傳曰迷復之㐫反君道也迷復與不遠復相反陽剛即君道坤隂滅之故曰反君道也剝上九民所載也一陽在上指衆隂之為民復上六反君道也衆隂之極表一陽之為君扶抑之旨嚴矣第十三對无妄畜大襍卦傳曰大畜時也无妄災也蘇子瞻云以艮畜乾而可者時也以乾行震而不可者災也愚謂得時則无災災者失時者也大畜若上九天衢之亨可謂得時矣然无畜而時不謂時也大畜故謂之時耳无妄若六三或繫之牛可謂逢災矣然有妄而災不謂災也无妄故謂之災耳孔子困于陳蔡之間語子路曰知者必无罪乎王子比干何為刳心而死義者必聽乎伍子胥何為抉目而懸吳東門亷者必尊乎伯夷叔齊何為餓于首陽忠者必信乎鮑叔何為而不用葉公子高終身不仕鮑焦抱木而泣子推登山而燔君子博學深謀不遇時者衆矣賢不肖材也遇不遇時也故虞舜耕于厯山之陽立為天子其遇堯也傅説負土而版築以為大夫其遇武丁也伊尹故有莘氏僮也負鼎操俎調五味而立為相其遇湯也吕望行年五十賣食棘津年七十屠于朝歌九十乃為天子師則遇文王也管夷吾束縛檻車為仲父則遇齊桓公也百里奚自賣五羊之皮為秦伯牧牛舉為大夫則遇秦繆公也伍子胥前功多後戮死非有盛衰前遇闔閭後夫差也夫驥罷鹽車莫之知也不得伯樂安得千里之足造父亦无千里之手矣蘭茝生于茂林人莫見之故不芬學者非為通也為窮而不困憂而不哀先知禍福之始而心无惑焉使舜居桀紂之世能自免于刑戮善矣亦何為之有桀殺闗龍逢紂殺王子比干當此之時豈闗龍逢无知而王子比干不慧乎此皆不遇時也故君子務學修行而須其時者也又按剝復之後繼以无妄大畜剝復艮震交以坤无妄大畜艮震交以乾震動于天之下動以天也艮止于天之上畜以天也天全而无妄仝于天而大畜聖學本天其動止皆天焉震下乾上无妄史記作望元亨利貞其匪正有眚不利有攸往妄謂虚妄乃意必固我之總名凡天下之乍起乍滅而非真實者皆妄也故想曰妄想見曰妄見无妄者誠也為卦乾上震下動以天者也故曰无妄若動以人欲則妄矣自馬鄭王肅皆云妄猶望史記无妄作无望可知无所希望即是无妄但无妄意淺无妄意深耳元亨誠通利貞誠復誠者天之道也无妄則誠故四徳與乾同然元亨固賛辭利貞亦勉辭主義理而言工夫也光明洞逹之謂亨畧无芥蔕合徳于天之謂元亨利者宜也貞者正也誠本无不正守正所以入于誠故又宜于貞翼辭以字可見斷不可岐誠與正為二而謂天下有不正之誠也其者别設戒辭眚即復卦有災眚之𤯝彖所謂天命不祐者夫心天而道則无不正故動罔不利其匪正而欲有所往則是為人欲所使乃妄動也往必不免于過尤何利之有按无妄卦爻中所取者三焉其一以剛實為无妄其二以當位為无妄其三以不繫應為无妄初九三者皆全最善矣九五剛而當位則有其二亦其㳄也九四剛而不當位與上九同然上有應而四无應故四亦得其二又其㳄也六二當位而柔僅有其一而已又其㳄也上九與六三俱繫應而不當位故皆不免于災繇云元亨初九是也四與初敵應亦庶㡬之而有戒辭云利貞九五是也二與五正應亦庶㡬之而有戒辭三上皆以不中正相應而六三柔體猶可望其守静自特上九則過剛而亢矣故聖人于爻辭尤加戒焉繇云其匪正有眚不利有攸往則唯上九當之六爻皆變為地風升震上乾下為大壯序卦傳曰復則不妄矣故受之以无妄无妄者誠也復者所以求反于誠也人心但一静息便見真心人氣但一静息便見元氣天成條理本自如此第患其不復耳復則不妄繇不妄然後能无妄也无妄則其動也天夫乾震合體與震復坤下其力量自見不同无妄所以㳄復也復者賢人之事人之道也无妄者聖人之事天之道也彖傳曰无妄剛自外來而為主於内動而健剛中而應大亨以正天之命也其匪正有𤯝不利有攸往无妄之往何之矣天命不祐行矣哉震初一剛其所從來即乾之初畫无妄外乾内震初九得外卦乾剛初爻以為内卦之主故曰剛自外來而為主于内如是而動全是天動而非人動卦所以名无妄也下剛而動上剛而健私欲不作柔邪自消雖統言卦徳然意専歸初九葢震之為動惟在初九一爻而與九四為正應乃乾健之首畫也其力至大即六二九五猶不能並況六三上九乎剛中而應謂九五也五以剛居中正二復以中正相應是亦順理而不妄者故總括之曰若此則其道大亨通而貞正此聖人純乎自然之心實帝天賦予本然之命也人而天者也吳㓜清云天之命即天之道以其主宰則曰道以其流行則曰命改字叶韻耳夫人之心一天之命誠者天道何妄之有不正從妄生則以不止于无妄而欲更有所往是于本无妄之中自生妄也故告之曰无妄之往何之矣上之字語辭下之字即往也天命即上文天之命義理與氣數非二物也既不能大亨以正則咈乎天之命即為天所不祐助而謂其可行否乎矣哉疑辭愚聞之師云人之妄也儆之以天而不懼申儆之以震震東方也東方之情怒是謂天之變相故震夷伯之廟以戒展氏之慝啟金縢之書以彰周公之徳詩曰敬天之怒无敢戲豫君子誦无妄之辭如砰訇之駐耳齋戒以神明其徳象傳曰天下雷行物與无妄先王以茂對時育萬物天下雷行則是雷徧行于天下而无一處之不聞葢驚蟄時也與風行地上之象同亦謂風徧行于地上而无一處之不被故惟二象以行字言物與屬上雷行為句无妄自是卦名與猶言從也應也張清子注云天雷而物應胡旦演聖通論云物物相與以應雷行是也近代王龍溪亦依此讀雷聲之震動无物不及凡物之蟄者无不從雷而驚起雷无私震物无私與故以為无妄之象先王觀此以茂對天時養育萬物順萬物而不逆萬物養天下而不私天下是能全其无妄者也茂盛也對時謂順合天時對時而曰茂涵蓄多少盡性至命之理非極誠无妄者不能萬物當自我育對時正所以育之也應天時行時至事起其動以天者也又虞仲翔云震為反生萬物出震而京氏及俗儒以為大旱之卦萬物皆死失之遠矣有无妄然後可畜不死明矣萬物皆死將何畜聚以此推也按京氏所謂大旱之卦其理未詳初九无妄往吉變坤為否此爻足蔽无妄全卦震陽初動誠一未分又與九四為應兩剛相遇不牽于繫應之私是之謂无妄以此而往動與天合何不吉之有彖言不利有攸往匪正之往也此言往吉无妄之往也變則為否象傳曰无妄之往得志也剛主于内居初无應直心而往得此心之本體故曰得志六二不耕穫陸徳明云或依注作不耕而穫非下句亦然不菑畬則利有攸往變兑為履互體艮變離耕春耕穫秋歛菑者田之一嵗墾而方成者畬者田之三嵗墾而已熟者人之有妄在于期望期望萌生得失胥患未耕望穫未菑望畬始耕望穫既菑望畬耕期多穫菑期饒畬意欲日廣謂非妄歟六二中正應五本自利往然无妄卦中獨不取應慮其有所繫着也故告之曰不耕穫不菑畬則利有攸往不耕穫者不方耕而即望有其穫也不菑畬者不方菑而即望成其畬也正其誼不謀其利明其道不計其功也夫造其事而不欲有其功雖田夫野老豈其不慧至此哉然時至事起日冀之不能速其來日置之不能遲其去則有順而无逆矣故他民多機可以庸其機故也惟農最為樸民而農之業為本業以其无妄心也學者之除妄心而必有事焉當如此矣故曰則利有攸往言必如此而後利也與匪正有𤯝者不侔也楊敬仲云利有攸往者以无妄而往也不然則往皆放逸也何利之有孔子與門弟子言每毎戒其意戒其必戒其固戒其我皆所以攻其害道者使虚也初為地位二為田故乾九二曰見龍在田震為耒耜為禾稼互艮為手耒耜在手耕象禾稼在手穫象變互艮為離以離火焚離牛耕而菑畬象變兑為悦慮其邪媚不正故當發此戒象傳曰不耕穫未富也富謂陽實也二隂虚未富有應于五聖人慮其有妄求之心故以不耕穫示戒六三无妄之災或繫之牛行人之得邑人之災變離為同人互體艮變㢲約象㢲變兑六三與上九剛柔相應非不自以為无妄也然而不免于災者則以處不當位不中不正故也凡禍之出于意外者為災六三處不當位禍若其所自取矣而目之為災者陽主唱隂主隨故歸其造災之繇于上九焉牛三所有也此爻變為難牝牛象也或繫之者上九繫之也上九與六三為應故繫之也約象㢲為繩互體為手以手持繩繫象也行人邑人皆指六三一人三為人位行而在路則為行人震為大塗又為足行人象也居而在邑則為邑人約象㢲為市邑互體艮為止邑人象也詳觀爻義葢謂上九縱欲繫六三而六三必不可應上九也何者无妄一卦皆以繫應為妄況三與上之不中不正者乎故聖人為六三告曰今汝有牛于此上九將來繫汝牛矣汝若行而他往不與上九為應則牛仍汝之有也汝若止而不行與上九應則牛將為上九所得非汝之有也夫以已本有之物而忽屬之他人焉非災而何言此以為知誘物化者之借喻必朗然高矚超然遠引而後可免于徽纆也此无妄之本旨舊解未有及此者象傳曰行人得牛邑人災也行人將牛以俱去故得有其牛若栖遲于邑中則必有起而攘之者矣嘻速駕哉九四可貞无咎變㢲為益互體艮變坤約象㢲變艮四剛陽而居乾體復无應與本自无妄者也可貞固守此則无咎曰可貞者恐其未必貞也故決之僅曰无咎者位不當故難得志然能守其无妄以遠咎亦足矣初九之无妄往吉行乎其所當行者也九四之可貞无咎止乎其所當止者也互艮為止有貞義凡爻言貞者皆不貴變如此爻變則又有繫應之嫌矣象傳曰可貞无咎固有之也固有者言其剛實无應本无妄也本无妄故可貞无咎所謂食舊徳也九五无妄之疾勿藥有喜變離為噬㗐約象㢲變坎九五剛健中正可謂无妄矣但以其與二為應有應則恐不能无私故以為疾然五以中正居尊二以中正應之應而无害于應故太虚雲影自去自來豈足病哉若以此而攻治之是自生妄也浄名云彼自无瘡勿傷之也正此意告子之㝠然罔思悍然力制以為不動心釋氏之息滅人倫違棄世故以為不住相犯勿藥之戒者也疾去曰有喜凡疾生憂憂亦生疾病者必愁思慘慘而不樂如將瘳也其神必自喜易凡三言之曰勿藥有喜又曰介疾有喜又曰損其疾使遄有喜葢喜者將瘳之候亦治病之方也不用藥而病自去矣變離為火心本无妄倏動而火疾象互體變坎坎為心病疾象中爻㢲木艮石藥象坎為多眚故藥不可試勿藥象九五之疾生于應下五四三倒體向下為兑悦有喜象象傳曰无妄之藥不可試也試謂少嘗之也既已无妄而復藥之則反為妄而生疾矣戒勿嘗藥以无所需藥故楊敬仲云起意于善是謂无妄之疾若又治此疾則於意上生意疾中加疾惟道心大明者始知此未至於大明者終疑上九无妄行有眚无攸利變兑為隨上九居乾之終則純乎天矣宜无妄也然而上九不自安于无妄也以其與六三震足為應有行之意焉故告之曰而之時位已處其極矣前无可往之地不過退而下以就所應耳然兩皆處不當位不中不正若不能以理勝欲行必有眚何利之有第静守而終焉可也彖所謂匪正有眚不利有攸往者正指此爻以上極且變有不能安止之象故發此戒變兑為悦亦有邪媚之嫌云象傳曰无妄之行窮之災也无妄之行猶彖傳所云无妄之往上九乾之窮非乾之正與乾亢龍義同故二小象亦同夫无妄之徳動而健未嘗禁其行也但上在卦終時位已至窮極以九居上又所處不得其正故不可以有行耳以其意于行故曰眚以其時位使然故曰災程子云災天災自外來眚已過繇自作乾下艮上大歸藏作􅬦畜古本又作蓄利貞不家食吉利涉大川畜為畜止又為藴畜義與小畜之畜同為卦艮上乾下取艮之止乾則為畜止取天在山中之象則為藴畜止而後有積理自相通大小畜所畜皆乾其别者艮㢲耳小謂隂㢲以隂畜陽畜之力小曰小畜大謂陽艮以陽畜陽畜之力大曰大畜畜者畜之以成其徳也何畜乎乾懼其過鋭而或躁過剛而或折過大而或簡故畜焉以裁之此聖人陶鑄天下之玅機師道也唯上九一爻當之貞正而固也畜以貞静為主艮陽在上乾之三陽上進賴此以畜養之而健始不過故曰利貞畜極而通則當食君之祿而不食于家上九所謂何天之衢是也表記子曰事君大言入則望大利小言入則望小利君子不以小言受大祿不以大言受小祿易曰不家食吉此言必大畜君子然後可以不家食受大祿也艮為門闕家象師上爻以坤變艮稱承家損上爻以艮變坤稱无家二象可見中爻兑口食象上九畜極而通艮家變為坤國故有不食于家而食于國之象與小畜上爻變不雨為既雨意同如吳㓜清解但以兑口在四寄食于外象不家食則于家字无着落若虞仲翔謂二五易位成家人又近于鑿矣或云乾為賢人艮為宫闕令賢人居于闕下不家食象亦通利涉大川者言出而可以濟天下之險乃不家食以後事卦以乾健涉兑澤中爻震木在兑前舟行而前涉大川象或云自三至上中空肖離亦舟象六爻皆變為澤地萃乾上艮下為遯序卦傳曰有无妄然後可畜故受之以大畜无无妄而畜畜偽耳有无妄真種子以為聖賢萌蘖而後可畜以至于大彖傳曰大畜剛健篤實輝光日新其徳剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也乾體剛健艮體篤實朝旦為輝日中為光艮為光明而乾之行也日一周皆有輝光日新象又互體離離為日亦其象也王輔嗣云凡物既厭而退者弱也既榮而隕者薄也夫能輝光日新者唯剛健篤實也蘇子瞻云剛健者乾也篤實者艮也輝光者二物之相磨而神明見也乾不得艮則素健而已矣艮不得乾則徒止而已矣以止厲健以健作止而徳之變不可勝窮也按據文氣觀則輝光日新四字當自為句其徳二字當屬下剛上指上九尚者孚契之意上九躬剛徳以自拔于一卦之上而獨嘉尚下卦之三陽同徳故也李鼎祚云乾為賢人下文能止健乃著其尚之之實夫下三陽之所以可尚者惟其健也然健而不知止未免過于健能止健是發揚者戒于太猛精進者戒于太鋭健而不過乃得其正凡此皆剛上之力也大正之大即大畜之大主艮上一陽言考爻義則止乾之健者艮之二柔為之也彖傳乃謂一剛之大正主其事而非二柔之小者為之葢畜陽者隂也所以畜陽者非隂也不以止健之功歸之隂小乃聖人之微意不家食吉所養者乃下三陽之賢也學至君求出而尸大烹之奉誰曰不宜然所以陶鑄而成其徳者葢有自矣利涉大川應乎天者謂應乾也此取上下卦兩體相應不専指一爻言乾健本知險既有乾健之力又加以止健之養故能乘時而出以濟天下之險難也大畜一卦以艮為主而艮又以上爻為主故彖傳賛之其詞繁而不殺如此蘇子瞻云乾之健艮之止其徳天也猶金之能割火之能熱也物之相服者必以其天魚不畏網而畏鵜鶘畏其天也故乾在艮下未有不止而為之用也物之在乾上者常有忌乾之心而乾常有不服之意需之上六小畜之上九是也忌者生於不足以服人爾不足以服人而又忌之則人之不服也滋甚今夫艮自知有以畜乾故不忌其健而許其進乾知艮之有以畜我而不忌故受其畜而為之用象傳曰天在山中大畜君子以多識前言往行以畜其徳乾鑿度云山含元氣自地而上皆氣則皆天也山特氣聚成形而為物之大者其峙于地上磅礴蔽虧四畔環合若將藴天其中而有之者大畜象也前言往行有著見之跡猶山也徳體𤣥黙清虚猶天也天在山中徳在言行中夫山乃天中之物原不足以域天言行乃徳之餘亦豈足以域徳哉葢前言往行俱是古人用心處因其言而黙識其所以言因其行而嘿識其所以行則吾心之徳實不外是譬山中之天與山外之天无二天也子夏曰博學而篤志切問而近思仁在其中矣孟子曰學問之道无他求其放心而已矣皆畜徳之意學不徹本原而䂓䂓為間見所囿則山中之天與坐井之觀何異中爻震足有行象兑口有言象蘇子瞻云孔子論乾九二之徳曰君子學以聚之問以辨之是以知乾之健患在于不學漢高帝是也故大畜之君子將以用乾亦先厚其學丘行可云大畜言徳小畜言懿文徳徳雖同而文徳則徳之小者也初九有厲利已變㢲為蠱他卦取隂陽相應此取相畜内卦受畜以自止為義外卦能畜以止之為義故他卦相應則相援大畜之應乃其敵也健體居下履乾之初行而未成正用潜時也恃鋭而往與應為敵厲必及矣故告之利己已止也欲其受上之畜養徳於晦以俟時也葢大畜之制乾非欲制之將抑而成就之也子夏傳云居而俟命則利往而違上則厲然所謂厲者非獨以仕進言凡逞剛好大矜勝露才之屬皆是蘇子瞻云小畜之畜乾也順而畜之故始順而終反目大畜之畜乾也厲而畜之故始厲而終亨君子之愛人以徳細人之愛人以姑息見徳而愠見姑息而喜則過矣初九欲進之意无已也至於六四遇厲而止六四之厲我所謂徳也使我知戒而終身不犯于災者六四也乾為㢲健而能遜亦有受畜之義象傳曰有厲利己不犯災也厲即災也惟已故不犯需曰不犯難謂坎水之險此曰不犯災謂艮山之阻九二輿古本或作轝説吐活反輹古本或作輻坎變離為賁互體兑變二處失正上應于五五據在上之勢豈可犯也故且脱輹停留待時而進此能自畜以待價者也進乎初矣然説輹亦不獨以仕進言舉一切勝心英氣意識見解而悉脱之之謂也二三四互兑兑為毁折互變為坎坎輿而毁其下畫是脱去輿下之輹也按輹與輻不同老子云三十輻共一轂是車輪之輳凡三十條者輹車上伏兎所以承輻者小畜之説輻為隂所止所脱者重久住之計也大畜之説輹自止而不進所脱者微暫止而可旋起者也乾為離健而明且中虚故能自畜如此朱子發云初剛正也二剛中也四五柔也柔能畜剛剛知其不可遽犯而安之時也夫氣雄九軍者或屈于賔賛之儀才力葢世者或聽于委裘之命故曰大畜時也象傳曰輿説輹中无尤也尤尤人之尤小畜以一隂而畜五陽而六四為小畜之主近畜九三以小畜大以隂畜陽又非正應其説輻不得已也所以九三不受畜而有夫妻反目之象大畜則艮能止三陽之健九二在下卦之中而上受六五大君所畜以君畜臣以上畜下其説輹也中心願之故曰中无尤也九三良馬逐鄭𤣥姚信本俱作逐逐利艱貞曰鄭𤣥本作日閑輿衛利有攸往變兑為損互體兑變震約象震變坤初剛為四柔所畜二剛為五柔所畜至三上則陽剛同徳皆上進之物可以行矣猶且踟蹰焉而未敢驟葢畜之極也乾為良馬且畜而至三則陽剛之性已銷鎔變化良孰如之三陽並進中爻震動故有良馬馳逐之象然二柔止之于前未可輕鋭而進故告之以利艱貞艱者艱難其思慮恐其失於太易也貞者貞固其作為恐其失于助長也曰者自嘆之辭本卦乾為言變兑互兑為口曰之象也約象變坤為車輿象互體有震為警衛象考工記云車有六等之數戈也人也殳也㦸也矛也軫也皆衛名葢有馬則有輿有衛是一路事閑者習也習其車輿與其防衛也閑習有優游自得之意曰閑輿衛者自嘆其當閑輿衛也時乃利有攸往此其受畜于上九者深矣故養徳之䆳如此然曰逐曰往亦不専以仕進言來矣鮮云輿者任重之物衛者應變之物以人事論君子不當家食以一身而任天下之重者輿也當涉大川以一身而應天下之變者衛也必多識前言往行之理畜其剛健篤實之徳以徳為車以樂為御忠信以為甲胄仁義以為干櫓涵養于未用之時以待時而動此閑輿衛之意也閑輿衛又利艱貞之象也舊註謂不相畜而俱進殊不知卦名大畜下體非自止則藴畜也无進之意爻變兑健而能説亦説于受畜者也象傳曰利有攸往上合志也上欲畜之以成其徳三亦忻自畜也故稱合志合志與彖傳尚賢應惟合故能畜極而通何天之衢六四童廣蒼作犝説文作僮牛之牿説文及九家本俱作告鄭𤣥本作梏元吉變離為大有互體兑變乾約象震變兑小畜之畜乾者六四也九居五為之助者也大畜之畜陽者六四六五也九居上為之助者也夫外无陽爻則坤順而不能畜内无隂爻則同類而不相畜然則成大畜之義者在艮之上九而能畜乾之陽者在艮之六四六五也舊説以四下畜初初為童牛四為牿五下畜二二為豶豕五為牙於理亦通然按初二兩爻實无童牛豶豕之象細思之大畜成卦之體原是以二隂畜二陽即九三一爻亦為四五所畜非如他卦必論應與也是故童牛之牿豶豕之牙専就六四六五言也童牛之牿豶豕之牙四字須連讀葢但取象于牿與牙耳何謂牛變離故稱牛何謂童艮之初畫也艮為少故稱童牿牛馬圈也所以防牛馬之逸者書曰牿牛馬是也三至上外實中虚有牿象四五皆艮體故以牿牙取象三陽馬也方其馳驟時有牛牿豕牙當其前自止而不進矣吉乃下卦三陽之吉剛柔相濟隂陽不偏何吉如之故曰元吉象傳曰六四元吉有喜也四能畜陽雖四之喜亦三陽之喜掲有喜以歆陽也恐其疾夫牿也六五豶豕之牙吉變㢲為小畜約象震變離象與童牛之牿一句同例舊謂豕去勢曰豶然吾證之爾雅云豕子豬􅭘豶豶者豬子也當從之陸農師云牙者所以畜豶豕之杙也今海岱之間以杙繫豕謂之牙變㢲為繩繫之象㢲本杙之象所以言豶豕者坎為豕六五上九坎體半見故但稱豶豕也童牛豶豕是的對牛牿豕牙又是的對四五皆隂艮為少為止故取象同先畜陽者四也五特助之而已故但言吉而不言元吉象傳曰六五之吉有慶也慶即一人有慶之慶喜狹而慶濶五為君位以造就天下人才為慶詩云肆成人有徳小子有造六五以之掲有慶亦以歆陽也恐其疾夫牙也上九何天之衢亨變坤為泰何儋也負也詩何天之龍百祿是何義同俗作荷艮為背又為手手上接背處為肩何物處也四達謂之衢上為天位艮為徑路天衢象也何字讀畧斷何天之衢言有所負何于天之衢也絶非背負青天之説或謂何為發問辭尤非王延壽賦云荷天衢以元亨可證小畜以隂畜陽至于上亦既雨既處矣大畜以陽畜陽有不極而通乎畜之大者則其發散亦大肩鴻任重以翺翔于天衢與之共濟天下之險則涉川之功成矣觀之三陽也先之以有厲申之以説輹守之以艱貞觀之四五也用牿以制之用牙以守之兢兢乎才不使遽逞健不使遽試如斯也然後足以當大任而不懾是豈一日之積哉人有不為而後可以有為此之謂也焦弱侯云牿之牙之皆止而不進之意至上畜極而通恣其進而大用之更得以翺翔天路而不為羈勒之所制葢前之畜者非故抑之也養其鋭而徐用之也成就人才之術也此之不畜者非故縱之也君子之才徳已就輿衛已閑可无虞于覂駕也廣開賢路之道也李氏詩云千年古道萬年堤老牯馴馴不解迷牧子不知何處去亂山芳草鷓鴣啼最深于畜上天衢亨之㫖變坤地在乾上天衢象卦變泰君子道長象傳曰何天之衢道大行也備于身之謂徳逹于世之謂道何于天衢所措施者道耳道可大行其亨可知彖所謂不家食吉而利涉大川者此也第十四對頤大過襍卦傳曰大過顛也又曰頤養正也俞氏云頤大過相反初上者本末之地以陽居之則正以隂居之則顛愚謂此皆指上爻言大過上六處過之極故其辭曰滅頂猶首之向下而顛也頤上九為頤之主故其辭曰由頤以動而知止為正也抑頤二陽秉榦于外毓羣隂其中太和以保合而頤大過四陽専制于中二隂莫抵焉彊陽溢而過矣與過而失養乎无寧不及而得養也頤大過四偏卦合覆觀如一无反對之象而合二卦六爻為隂陽匹耦固亦相對也先頤而後大過者先其陽而後其隂耶頤始動于下終止于上盡陽道之運行大過下㢲内入上兑外説竭隂徳之情狀矣葢大過陽内隂外類坎頤外實内虚象離於以啟坎離之先振上經之終頤震艮合皆男大過㢲兑合皆女又以成咸恒之交開下經之始更置之為中孚小過易道窮而二經此囊括矣胡庭芳云或疑頤與大過對者也何不名為小過中孚與小過對者也何不名為大過葢大過以四陽在中言小過以四隂在外言此是聖人内陽外隂之微意以陽自内而過者為主隂自外而過者為客大過四陽過盛於内而主盛于客若頤之四隂在内不可以隂為主矣故不名之曰小過而自取象于頤小過四隂過盛于外而客勝于主若中孚之四陽在外不可以陽為客矣故不名之曰大過而自取象于中孚況當大過之時陽之在内者四而隂之在外唯二陽盛而隂衰也今至小過陽之在内者僅存其二隂之在外者浸消陽而有四是隂反盛而陽反衰矣此大過小過之辨與震下艮上頤貞吉觀頤自求口實頤本作􅒳許慎云頷也象形篆文从頁作頤指事鄭康成云頤口車輔之名也震動于下艮止于上口車動而上因輔嚼物以養人故謂之頤丘行可云輔上九之象車初九之象中四隂衆齒之象上覆下承衆齒森然全頤之象見矣按翼傳云頤者養也頤者人之頤頷飲食所自入以養身者故有養之義或據説文以頷解頤以養解宧遂謂頤當作宧室東北隅謂之宧食所居所以取東北者李巡謂東北陽氣始生育養萬物艮震相連東北之卦故取象于宧抑鑿矣卦内之義皆當以養生言如孟子養大體而不養小體之説下動上止中虚无物止乎虚不動乎欲如是言頤是之謂貞是之謂吉貞對動可知貞吉主艮言所謂口容止也卦爻辭同意上三爻止體皆吉下三爻動體皆㐫李子思云頤中有物曰噬㗐頤中有物則害其所以為養故不取頤養之義而頤中之虚元未有物則以貞吉告之方其未受外物之間要當擇其所養張希獻云頤養之道當以静為本静則知止而不妄求所以得貞而吉一累於動専為口體之奉則失所養之正而㓙矣本卦大象離離為目故有觀象侯果謂觀卦初六升五九五降初則成頤吳艸廬從之終屬牽强觀所養之正不正而吉㐫判矣故曰觀頤然所養之正不正豈人則貽之故曰自求口實頤之吉㐫无不自已求之者可弗慎與鄭康成云頤中有物曰口實自二至五有二坤坤載養物而人所食之物皆存焉觀其求可食之物則貪㢘之情可别也夫人七日不飲食則死萬物章章以害一生生无不傷以利一生生无不長宜消宜息唯腹知之常珍之外尤非易御故曰自求口實人惟口實之為快而忘吉㓙之恤故聖人特於此卦發觀頤之義六爻皆變為澤風大過震上艮下為小過序卦傳曰物畜然後可養故受之以頤頤者養也畜者止也聚也既畜之不可无以養无養則不能存息杜預之論讀書云學者原始要終尋其枝葉究其所窮優而柔之使自求之饜而飫之使自趨之若江海之浸膏澤之潤渙然冰釋怡然理順然後為得此養之説也若養氣養心養性之道莫詳于孟子則君子之所養可知矣畜貴止頤亦貴止頤養之方如莊子之言養虎栁子之言種樹其槩也按需頤皆有養義然需當物生之初若兒之須乳苗之須溉故曰飲食之道其養小頤當畜聚之極其養大孟子云養其大體為大人養其小體為小人彖傳曰頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頤之時大矣哉人需養以生需頤以養者也日用飲食孰非天職裁物養物孰非天則頤下動上止動需養于物而止制節于已命以坊欲理以裁惑則貞之吉也葢養之以正故吉也觀頤者觀其養之得失正則吉否則㐫而所養之得失一本于口實之自求故曰觀其自養也四句只一意舊分養人自養非是且卦中亦无養人象喫𦂳在自之一字能中虚以茹无逐逐乎能止于所止无汩汩乎夫然者我无欲而民自靖我得正而民自正即天地所以養萬物聖賢所以養萬民之道不外是已天地无心而成化聖賢有養而无私以卦象倣之上天下地中萬物天施地受二氣訴合如頤為萬物造命矣上聖初賢中萬民聖養賢賢推恩一徳脗合如頤為生民立命矣萬物之生與養時為大天地養萬物養之必以其時聖人養賢以及萬民養之亦必以其時應乎時而動非其時則止所以養正也故論語曰不時不食孟子曰食之以時其道甚大聖人之所以賛化育而配天地者此也夫能養正者不徒正已兼以正物故必无欲然後可以行王道必无欲然後可以言王佐奈何徒徇口腹之私甘為飲食之人而已乎孔子上嘉大禹首以菲飲食為言至其論學則於食求飽恥惡食恒惓惓焉固知非𤨏事也象傳曰山下有雷頤君子以慎言語節飲食山内為陽氣所包每遇天隂雨時陽氣轟隱而出則成雷頤合艮震成卦以卦義言之上止下動頤頷之象以卦形言之外實中虚頤口之象人之開發言語咀嚼飲食皆動頤之事諺云禍從口出病從口入言語一出而不可復入君子慎之所以養徳飲食一入而不可復出君子節之所以養身是皆有得于養之㫖者也言語飲食動象曰慎曰節止象初九舍音捨爾靈龜觀我朶京房本作瑞頤㐫變坤為剝凡卦陽在上下者象離隂在上下者象坎離為龜龜伏氣咽息空腹不食中虚之象虚能生靈故龜有靈徳頤大象離四柔在中初皆以靈龜目之我者初自我也觀三五皆曰觀我各指本爻而言或指上九非是朶説文云樹木垂朶朶也頤動則下垂以卦象觀之正初位也人全其靈而以内照為觀則所養必皆得正而吉人失其靈而以朶頤為觀則其動必皆徇欲而㓙故為初九告中四爻之辭以示戒變坤為剝碩果不食亦有樹朶下垂之象象傳曰觀我朶頤亦不足貴也以人而靈不如龜徒為飲食之人而已何足貴乎六二顛頤拂子夏傳作弗云輔弼也經于丘頤征㐫變兑為損互體坤變震隂虚資陽實以為養卦惟初上二陽二雖與初近比而實非正應若下而求養於初則為顛倒而違其常理更進而求養于上則其勢益逺非其族類妄往求之取辱得㓙必矣艮為山上九在外而高有丘象㓙者吉之反知正之為吉則知不正之為㐫夫二五虚中相應初之所美為靈龜者也二以震體好動不能安于清虚既求乎下復求乎上聚物愈多為害彌甚往而不已所謂益生不祥也嬰兒之病病于飽貴人之病病于寵不如返其中虚之為得爻變兑兑為口又悦也口以有所悦而動故其戒如此象傳曰六二征㐫行失類也震為足有行象從初已拂經若征而從上則非比非應更為失類要之拂經失類无一可者六三拂頤貞句程伊川楊敬仲皆如此讀㐫十年勿用无攸利變離為賁互體坤變坎約象坤變震按初與上陽剛之徳同而吉㐫不同者初為動之主上為止之主養道宜静故也三居動極則尤㐫矣拂頤貞者言其拂違于頤之正道也雖與上應然上以理止三以欲動判不相入以斯求養豈唯一時不可行即徘徊至十年之久猶不可用言必為上所棄也十者數之極十年者坤數本爻互體約象皆坤故云然終不可用則三亦何利而為此乎震木也艮山也變離火焚山木將安逸是以㐫也象傳曰十年勿用道大悖也道者養正之道大悖道故曰拂初九以陽居陽未全悖道六二以隂居隂不征則免于㐫六三以隂居陽不中不正亟動于欲故曰道大悖凡易中言大者皆謂陽三與上九陽爻雖應而道則相拂是以大悖十年勿用㐫可知已六四顛頤吉虎視眈眈其欲逐逐子夏傳作攸攸蘇林音迪志林云攸當為逐漢書作浟荀爽本作悠劉瓛本作跾云遠也按説文跾音式六反无咎變離為噬㗐互體坤變艮約象坤變坎顛亦顛倒之義與六二同意二本與上卦之五為應反倒從乎初顛而下也四本與下卦之初為應反倒從乎上顛而上也夫四之顛與二同而无拂之嫌有吉之美者何也二徇人而喪已者也四舍已以從人者也葢初之徳動上之徳止動止之分理欲判矣況四上同體而上為卦主四舍其應以從主乃能以理自持而不動于欲者吉孰如之大象離此爻變亦離故亦以虎稱又荀九家易艮為虎四象虎以體艮故亦通眈眈虎下視象離為目故能視虎无項行常垂首下視于地應爻初為地位故四之視初取虎視地象陽主理隂主欲中爻四隂人欲相叠逐逐象也此明四本應初眈眈下視有垂涎之意其欲逐逐若必以朶頤為快者終能不繫于應以從乎上故要歸无咎葢以理勝欲者也卦變噬㗐食也故有虎噬象象傳曰顛頤之吉上施光也上謂上九施光者養之以光明之徳若施也艮為光明變離日亦光象六五拂經居貞吉不可涉大川變㢲為益約象坤變艮二五相應經也二不應五而從初五不應二而從上舍應從比非其經常故皆曰拂經居指本爻言貞即彖辭貞吉之貞指上九言五拂其相應之經而居之以貞則吉言當從上九也此爻約象變艮上畫艮為止故亦有居貞象六二動體反是所以不可涉大川者頤四爻空洞在中但不受饑渴之害而已恐其養道未盛必如上九之剛實在上然後柔者養之以至于充弱者養之以至于强始可以涉乎大川也夫欲猶水也利涉大川即入水不濡之意五之居貞但斤斤自守而已故未可以語此按爻无大川象以六五上九坎體半見故云五才柔不能濟險彼岸尚遥得不望涯而反乎變㢲為益木道乃行可以涉大川矣象傳曰居貞之吉順以從上也約象坤為順以從上解居貞明此卦之言貞者指上也變㢲亦有從義蘇君禹云養得其道則若顛而可以相濟似拂而可以相成不然則為養小之小人而已觀者辨之上九由頤厲吉利涉大川變坤為復曰由頤者言必繇此而始成其為頤也以象言人得食則頤動是頤之所以為頤者震也然震不自動繫于艮而後動艮不止之於其上則震雖動不能也則其所以為頤者艮也以理言頤之道吉于静而㐫于動也動以求養静而知止養道之善者也不止則妄動而失所以養矣上九艮主爻也貞于止者也故曰由頤夫貞于止口腹之欲不得騁雖㡬于厲矣然厲于人心而不厲于道心也攖而後寧故厲而得吉若此者以直養而无害將塞乎天地之間而于大川之利涉何有乎葢嘗論之頤上下兩陽合而中虚生生之道盡于此匪上九一陽在上則第為復不為頤也葢養生之道聚其氣使不散而已顧氣聚即壅而為禍必也於世无營蕩蕩嘿嘿虚中内轉周流不息不以思慮得喪衡其心而令飲食起居咸中其節乃為得之或梗於物或梗於道性情一偏則臟腑亦隨之而偏居常不覺而久則害成故頤取其中虚也虚心之盡始能虚氣虚而能聚又非全虚故棄世逃物之士猶或難之而猥云常應常聚談何容易哉人之生患不能盡其天年盡其天年以考終命則聖人所謂養生也若夫奪神工竊天命彼其敎中亦自謂之賊故孔子曰老而不死是謂賊非聖人之所尚也一陽下一陽上而中四爻虚者頤也二陽下二陽上而中二爻虚者中孚也一陽下二陽上而中三爻虚者益也二陽下一陽上而中三爻虚者損也此皆可以識養生之義也本爻體艮為徑路下臨震為大塗有人所共繇象變坤亦萬物所繇以致養者繇頤象也凡易言涉大川者其象不一取乾者以卦徳乾天下至健徳行恒易以知險也需同人大畜是也取水木者以卦體刳木為舟以涉水也渙蠱未濟謙或取中爻或取卦變是也取中虚者以卦象中虚象舟也益中孚頤是也若頤之六五不利涉而上九利涉者則各就本爻言有剛柔之異耳黄成孫云艮三皆吉震三皆㐫今夫外徇者内喪故頤之剝曰舍爾靈龜觀我朶頤逐于末者其本必顛故其損曰拂經于丘頤以其所以養害其所養則弗能為也故其賁曰拂頤十年勿用此震體也皆動而㐫者也暝而坐者見乎四海馳而視之不觀乎車之下則静者常察也故其噬㗐曰虎視眈眈其欲逐逐當其不可為而不為則其不為之也功故其益曰拂經居貞吉不可涉大川動者病矣然静而不能動則静者常死夫惟天下之至静而後能動故其復曰由頤厲吉利涉大川此艮體也皆静而吉者也象傳曰由頤厲吉大有慶也大謂陽得上九一陽以成由頤之功而與天地聖人之養道並美吉孰大焉奈何以厲為嫌乎㢲下兑上大過棟橈利有攸往亨大陽也過者不及之對卦有六畫隂陽各三則為均平此卦陽畫四隂畫二陽倍于隂大者過也故為大過小過震艮皆剛以柔小四爻用事外内謂之過大過兑㢲皆柔以剛大四爻合處于中謂之過陽過于中而上下弱矣故有棟橈之象易中四陽之卦亦多獨此名大過者以此棟説文謂之極爾雅謂之桴其義皆訓中也即屋之脊檁負棟謂之樑橈弱而曲也上棟下宇取諸大壯然大壯四陽在二隂之下其本壯也兹二隂在四陽之上下中四陽象木之强初上二隂象木本末之弱以此木為屋棟則衆材輻輳不勝其重而橈此卦大象坎按荀九家易坎為棟坎主險䧟又為矯輮皆橈象也夫大小相為主輔剛柔不可偏勝所貴乎陽之能御隂不貴乎陽之陵隂而蔑之也人徒知夫隂過乎陽之為禍豈知夫陽過乎隂之不為福哉乃今大者據要而輘踔為厲小者奔命而疲脆難堪夫枝强于幹世共憂之矣居重馭輕世共韙之矣而在審勢者必識其重而亟反之往有所事損有餘補不足嘿運轉移之術迺坐收扶抑之功此則過而不過而有可亨之道矣苟忽天下之大勢而眩于所往恐外无支棟者即棟不自支弊且折而入于頽尚何亨之有哉利有攸往舊説只作事應非既曰事應何必復言亨乎惟大過是以棟橈惟棟橈是以利有攸往唯有攸往是以亨利往着工夫説翼傳乃字當玩卦辭言棟槩指二三四五言也爻辭専及三四者舉中樞也而惟九三過剛不中故棟橈之㐫専歸之若九二九四則陽居隂位剛而能濟以柔皆所謂利有攸往者也司馬君實云大過剛已過矣止可濟之以柔不可濟之以剛也故大過之陽皆以居隂為吉不以得位為美六爻皆變為山雷頤㢲上兑下為中孚序卦傳曰頤者養也不養則不可動故受之以大過程子云凡物養而後能成成則能動動則有過大過者陽過也彖傳曰大過大者過也棟橈本末弱也剛過而中㢲而説行利有攸往乃亨大過之時大矣哉大之不可過于小猶小之不可過于大也今剛不特半于柔且居中而過之不平之勢聖人所憂故以大過名之欲人識其重而反于平也夫既曰大過棟宜隆而反橈何也剛過始致本末之弱本末既弱剛亦不能獨支下无承藉上无寄附夫棟安得巋然孤植而不橈哉棟橈以究竟言也本末弱即大過之象乃棟所繇橈也古文本末字皆從木以一陽畫藏于木之下則根株囘暖故為本以一陽畫散於木之上則枝葉向榮故為末大過二柔畫處于初上猶之木焉上缺下短所謂弱也若在六爻中則惟六三當之解見本爻剛過而中以九二言之舊解以二五為中然五以陽徳居陽位位雖中而徳非中矣觀二五爻辭可見㢲而悦行指九二九四言之㢲兑皆以隂主卦知剛之不足恃而以柔道行之夫且泯其剛于无迹雖過不過矣觀四陽爻居陽者皆不利居隂者皆利則其貴于用柔可知已攸往即爻之所謂過以相與者亨即爻之所謂棟隆者夫當大過之時最為難處曰大矣哉者非駭其時也難其徳也无剛柔相濟之徳則无以抑中强之弊扶本末之弱矣有非常之涵養乃有非常之設施大豈易言耶鄧汝極云天道隂陽平乃和和乃中人性剛柔輕重平乃和惟其中陽居中過重乎雖其大徳信直勇剛嚴毅幹固詎不矯其强乎而不敬不温不塞不義賊絞亂狂厥美為蔽必暴挺而折必熇燥而裂必有怙而恣必无畏而蔑必且極重无制而蹶也畏哉其惟用中乎剛不過也内㢲沈㡬外悦有與有攸往以變調則謨九徳之祇敬範三徳之用乂也亨已易過至中矣天為大徳猶不干時干時專勝勝復推移聖為至徳惟時是因禪讓放伐敢與以人大過之時大矣哉故君子不處過不處極用其時兢兢焉象傳曰澤滅木大過君子以獨立不懼遯世无悶此以兑上㢲下取象㢲在他卦皆為風惟在澤地水火之中皆為木澤卑木高澤水本以滋養乎木今澤漲溢浸過木杪則滅没其木矣卦名大過大者陽也天一生水水陽類也澤者水之所鍾至于滅木天一之氣太盛故象大過君子用此卦象獨立不懼舉世非之而不顧也如木在水中挺持而不傾欹遯世无悶舉世不見知而不悔也如水過木杪淹没而不呈露或云不懼㢲木象无悶兑説象亦通是皆君子處大過時之道也葢時當大過賢智之士多矯枉過正互相標榜以為名高如季漢黨人之類君子以世道為己任而中持其衡豈肯隨時而矜已甚之行哉繫辭下傳曰古之塟者厚衣之以薪塟之中野不封不樹喪期无數後世聖人易之以棺槨葢取諸大過解見本傳與本卦義无涉初六藉用白茅无咎變乾為夬藉薦也承薦其物也古者祭祀縮酌沃灌薦牲薦黍稷皆藉以茅㢲為白又為茅初柔在下而承剛如白茅藉物之象陽之勢過盛不足于陽徳而心獨尊陽故用白茅以藉之是亦諸陽之所賴以安者也雖處卑弱然知敬慎庸何咎變剛連亘亦藉象象傳曰藉用白茅柔在下也柔茅象藉下象此示人以取象之義繫辭上傳曰初六藉用白茅无咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其无所失矣蘇子瞻云白茅初六也所藉者九二也茅之為物賤而不足收也然吾有所甚愛之器必以藉之非愛茅也愛吾器也初之於二强弱之勢固相絶矣其存亡不足以為損益然二所以得養安于上者以有初之藉也棄茅而不收則器措諸地棄初而不録則二親其勞矣故孔子曰茅之為物薄而用可重也九二枯楊生稊鄭𤣥本作荑云木更生為荑老夫得其女妻无不利變艮為咸互體乾變巽巽為木兑為澤楊澤木也木在水中必毁唯楊可生二五皆取象枯楊者四陽之剛皆同為木但二五近本末之弱故以楊言曰枯者取過時義變柔中空亦枯象至三四成乾之堅剛則言棟矣或云白楊性勁直堪為屋材出齊民要術稊楊之秀也夏小正正月栁稊注云發孚也禾成穗曰秀栁亦有穗唐詩所謂栁線也孚如中孚之孚毛未出卵殻曰孚牡丹芍藥其花蓓蕾皆如鳥卵形栁初發苞亦如鳥卵形而小故曰發孚舊註云根非是按字書稊本不訓根據易爻初為木本或可象根至二爻則非根矣然所以取象生稊者亦取初隂在下象葢以栁線垂下故也九陽夫象六隂妻象九二在初六之上老於初六故二為老夫而初為女妻九五在上六之下少於上六故上為老婦而五為士夫各就所比之爻自為老少舊載荀公以初隂失正當變數六為女妻二陽失正數九為老夫以五陽得正位不變數七為士夫上隂得正數八為老婦亦稍可通若必狃二五相應則如虞仲翔以二為老夫亦為老婦五為女妻亦為士夫而吴幼清則謂二為女妻又為士夫五為老夫又為老婦其不通甚矣老夫女妻猶能生育譬枯楊之生稊生意猶存故无不利養老之禮行役以婦人取初之柔濟己之剛以近相得老夫得女妻之象程子云九二當大過之初得中而居柔與初宻比而相與初既切比于二二復无應于上其相與可知是剛過之人而能以中自處用柔相濟者也過剛則不能有所為九三是也得中用柔則能成大過之功九二是也卦變咸隂陽相感陽止隂悦故其象如此象傳曰老夫女妻過以相與也大過陽剛之世也九五驕甚而九二猶未甚下比初隂以之相與則剛柔相濟過而不過而生育之功可成矣張子云扶衰于上使枯木生稊拯弱于下使㣲陰獲助此剛中下濟之功亦自獲助故二于物也凡卦皆上下相應唯大過以所比為親與初相與五與上相與九三棟橈㓙變坎為困互體乾變離約象乾變㢲三四二爻居卦之中變坎為棟于木為堅多心故皆取棟象通六畫象一木為一棟以東西霤之屋譬之棟之兩端指南北初六木之本也指北而在後上六木之末也指南而在前三四木之中身也以木末之弱故當中身之處任重而曲橈此一卦之象也故彖辭曰棟橈爻之三四皆當橈處故九三爻辭取象與彖辭同九四亦當橈處乃不曰橈而曰隆何此又因兩爻之義有不同而畢其象以寓敎戒也夫棟之橈者别用木以輔之則可以取平而不橈矣九三以剛居剛强悍不受人益故補救无所施而橈者自若九四以剛居柔謙抑能受人益故剛柔終適均而棟之橈者隆然以起大槩陽過之時惡剛之居剛者惡其自恃也喜剛之居柔者喜其有以相濟也或云當大過之時必有維持之道圖之於其本則可因本以及末圖之於其末則未免因末以廢本矣三四居卦之中俱有維持世道之責然四應乎初救其本也救其本于未過之先故其弱者可得而振三應乎上救其末也救其末於已過之後則其弱者亦終于弱而已亦通棟既橈矣其厦必顛㐫孰甚焉象傳曰棟橈之㐫不可以有輔也輔助也輔車之輔同體之初既弱應爻之上又弱雖不克輔要亦以三剛愎不可輔故㐫九四棟隆吉有它吝變坎為井互體乾變兑約象乾變離四亦變坎故有棟象隆者隆然而高起也比㢲上爻為長為高亦有隆象三四皆棟四居外卦隂虚在上非如三之隂虚在下也下卦上實而下弱下弱則上傾故三居下卦之上而曰棟橈上卦上弱而下實下實則可載故四居上卦之下而曰棟隆況九四以剛位柔剛柔相劑行之以説衆且翕然戴之其何不吉乃有它吝者則三之為也它指三也按子夏傳云非應稱它本卦體不取應而取此三與四比然既已橈矣與同棟實有辱況二爻皆剛无相與之情若比之恐其過剛而至于折也故曰吝卦變井井徳之地也傳云不厚其棟不能任重重莫如國棟莫如徳其九四之謂與象傳曰棟隆之吉不橈乎下也謂不因下之弱而至橈則四能柔克故也又初上雖皆弱然初位剛也故亦不至牽上而橈經曰隆傳曰不橈明四與三異蘇子瞻云初上非棟也棟之所寄而已所寄在彼而隆橈見于此棟之隆非初之福而四享其利及其橈也上亦不與而三受其名故大過之世智者以為陽宜下隂而愚者以為隂宜下陽也九五枯楊生華老婦得其士舉正作少夫无咎无譽變震為恒約象乾變兑枯楊義見上焦弱侯云陽非難也而難于遇隂今夫五陽在下一隂在上為夬有决裂孚號之厲以其志在勝隂也五陽在上一隂在初為姤有女壯勿取之戒以其志在畏隂也若夫四陽居内上不能乘下不能消自以為盛矣然處偏重之勢本末皆弱徒自囿于中而不知其橈折乎外也故陽為隂郛者養而隂不足以郛陽也則失其所以養而滅此澤所以滅木而二與五所以皆為枯楊也生華者華生于上也上有一柔華象生稊則生機方長至生華則洩且竭矣以四陽至此而極故然玩辭二五皆无正應而過以與隂者也二所與者初初本也又㢲之主爻為木為長為高木已過而復茅又長且高故有往亨之理五所與者上上末也又兑之主爻為剛鹵為毁折為附決皆非木之所宜木已過而生華又毁且折理无久生已老婦士夫義亦見上五以剛居剛則剛之極故為士夫上以柔居柔則柔之極故為老婦剛柔不能相濟其橈可知曰无咎者以為猶賢于孤陽无伉儷者而已然終不能成生育之功何處得譽乎兑為震隂悦陽以動非男下女之正也故其象如此君子而自任太過則小人反將藉之以為用如老婦之誘惑士夫者可不戒哉象傳曰枯楊生華何可久也老婦士夫亦可醜也盛極將枯而又生華以自耗竭而不能久矣二以剛居柔初以柔居剛此未甚過者也又在卦初故過以相與可成生育之功五以剛居剛上以柔居柔皆過者也又在卦終故隂陽相比祇以為醜其相反如此无咎无譽詞同括囊聖人懼人之託以自解也故直以可醜斷之上六過涉滅頂㐫无咎變乾為姤大過有坎象積陽為中一畫水深之極上又為兑澤變乾為首近比于五下應于三如人過涉水自淺處至深處愈趨愈下而没其頂也四陽過盛初柔在下從陽以進猶可自存上柔在上為陽所偪三本應也而剛暴不可輔五雖比也而剛柔不相濟是棟將壓而橈之甚也故襍卦曰大過顛也大厦之顛非一木所能支上以臲􅑶寄其上勢不至滅頂不已是雖上所值之㐫然有尸其咎者矣剛實為之柔何罪焉此无咎與初之无咎同二隂非敢抗陽者其所自處未有失也而上不幸而不與初同免于㐫者則以上居大過之極故也諸家皆謂此爻為殺身成仁之事殊无謂馮竒之云易大抵上下畫停者從中反對為象非他卦相應之例也頤中孚小過皆然而此卦尤明三與四對皆為棟象上隆下橈也二與五對皆為枯楊象上華下稊也初與上對初為藉用白茅之慎上為過涉滅頂之㐫也又漢趙温云于易一為過再為涉三而弗改滅其頂㐫其説又異象傳曰過涉之㐫不可咎也言當歸咎于陽也第十五對坎離襍卦傳曰離上而坎下也乾交于坤而得坤之中者離以炎上為性也坤交于乾而得乾之中者坎以潤下為性也夫乾陽而在上坤隂而在下者隂陽之定體如人之首上而腹下也離女在上坎男在下者隂陽之精氣互藏其宅如人之心上而腎下也是故腎之精升而為氣則離中之隂也心之精降而為液則坎中之陽也火隂物也而附于陽故炎上水陽物也而藏于隂故就下然則日為隂月為陽乎曰日則陽矣而日中之精則隂之神也月則隂矣而月中之精則陽之神也故曰離上而坎下坎為陽之中離則隂之中陽中之隂隂中之陽即乾坤交而各得乎隂陽之中耳上經首之以乾坤終之以坎離正謂此也李子思云乾坤三畫以初相易而成震㢲以中相易而成坎離以三相易而成艮兑故乾坤者隂陽之祖而坎離則天地之中也坎居正北於時為子為夜之中離居正南於時為午為日之中夜之中而一陽生焉故坎之三畫一陽居中日之中而一隂生焉故離之三畫二隂居中天地隂陽之中此乃造化張本之地故易上經首乾坤而終坎離貴其得天地隂陽之中而為易之用也且天一下降坎中在物為水而在人為精以畫觀之坎之一陽居中而中實即精藏于中而水積于淵之象也地二上升離中在物為火而在人為神以畫觀之離之一隂在中而中虚即神寓于心而火明于空之象也坎之中實是為誠離之中虚是為明中實者坎之用中虚者離之用也作易者因坎離之中而寓誠明之用誠明起于中者易之玅用而聖人之心學也又云乾坤者隂陽之純坎離者隂陽之中不若震㢲艮兑為隂陽之偏也以六十四卦之序觀之乾坤居首坎離居中尤有深意葢坎離二卦為天地心天地造化之本坎藏天之陽中受明為月離麗地之隂中含明為日坎為水而司寒離為火而司暑坎為月而司夜離為日而司晝水火日月之用寒暑畫夜之運天地造化之玅孰有出于此哉鄧汝極云經先坎先陽中耶乾坤後經卦皆主坎水用行焉為誠明之性其後離後隂中耶交泰後經卦皆主離火功著焉為明誠之敎均之以合徳天地而成位乎其中焉坎下坎上習舉正謂習字上脱一坎字坎歸藏易坎卦名作犖劉巘本作欿有孚維心亨行有尚習重也鑿險而䧟物曰坎乃水之所行非訓水也坎之卦體乾中畫交坤上下二畫乾畫天一之水也坤畫兩岸之土也坤地䧟下而水流其中岸高水深故為䧟為險水繇地中行者為坎非泉穴初出之水非平池散漫之水非沮澤鍾聚之水也習坎者二坎相重䧟而又䧟險而又險者也項氏云重卦之序坎在六子之先故加習字以起後例示離震艮㢲兑皆當以重習起義不與初經三畫之卦同也乾最為首不於乾加習字乾坤六畫只是一爻自二以上皆為習習義在爻不在重卦至六子而後重與單異此説良然一説坎象曰龜蛇方曰北曰朔揚雄太𤣥取网與㝠配坎皆有重義或又謂混沌之初通是水及其消盡復化為水所以八純之卦惟坎加一習字葢寓水與天地終始循環无窮之意似皆附㑹孚信也二五陽實在中為有孚象維繫也中剛象心二柔纒絡于外為維心象亨通也坎為通水内陽而外隂其明内景故有亨象人處安樂則心渙散處憂患則心沉凝八卦惟坎為憂患之卦兩坎相遇處之尤難惟不以逆境為苦我而借之以維繫其心則雖處坎險自有亨通之道何虞險之不可出哉葢誠能生明故孟子曰人之有徳慧術智者恒存乎疢疾此維心亨之説也章本清云六十四卦獨于坎卦指出心象以示人可見心在身中真如一陽䧟于二隂之内所謂道心惟微者此也行有尚者進一步言有所貴尚惟在于行也坎以能出為功必動而後險可出若止而不行則終于坎矣進一坎復進一坎尚往不窮行之象也需蹇解皆以坎稱往有功漸亦互坎意可繹已中爻互震為大塗亦行象六爻皆變為離序卦傳曰物不可以終過故受之以坎坎者陷也過極必陷坎者一陽陷于二隂之中也彖傳曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉坎只是水之科坎當不得水字重則習也此坎之名義也楊敬仲云習坎之義何義也人心遇險而懼懼而甚則亂亂則或失其信其心安能亨有能在險中而不失其信迹雖在險難而心亨已難乎人矣至于再遇險而亦不失其信其心亦亨者非深得其道成于其徳者不能也大抵有志于善者皆能履其初險而至于重險則難故聖人特于坎曰習所以明其道也得乎道則重險猶初險也雖十百千萬險猶一險也人心即道道心无體无體則易猶是也險猶是也一險猶是十百千萬險猶是也而況于重險乎人人皆有此道心而昏昏者衆昏則亂昏甚者遇險輒亂不甚者重險則亂唯不昏而常明者雖厯十百千萬險而不亂故于坎曰習所以明其道也不為重險所亂則无不通矣夏易曰連山以重艮為首則艮亦可以言連今周易艮不言連者山可以連艮不可言連取義不同立言隨義水流而不盈釋卦名坎字行險而不失其信釋彖辭有孚水字一讀以别險也坎為水流水也兑為澤止水也兑隂卦隂静故止坎陽卦陽動故流惟流故不盈若待盈而後流則止水耳雖行于險陷之中而不失其有常之信循科而行必繇此而後逹彼此其所以為有孚也彖謂維心亨者乃謂人借逆境以維繫其剛實之徳于中則自有亨通之道蘇子瞻云物之窒我者有盡而是心无已則終必勝之水之所以至柔而能勝物者維不以力爭而以心通也不以力爭故柔外以心通故剛中解最親切在爻則二五是也蒙卦比卦皆坎亦以陽剛在内故皆曰以剛中夫水停而不行則滿滿則終陷于坎惟流故滔滔樂易而有百折必東之勢然則人之在險中者得不以行為貴乎行而尚往則能出險而有功矣且人无以處險為不幸也苟明其時用之大則非惟不足為吾病且足為吾助王公惕于外侮之來觀于天而有不可升之險觀于地而有山川丘陵之險于是設為城郭溝池之險以守其國正以險御險也然則處險之時其用至大如此誰謂險非醒心之藉哉設險之險雖王公所自設然亦從外之有險而生守國與維心同意理可借觀六爻三上為天位主爻在二五有險不可升之象中爻艮止守之象坤土中空國之象險之為用上極于天下極于地中極于人故以天矣哉賛之與睽蹇同象傳曰水洊至習坎君子以常徳行習敎事六子皆重卦也坎曰水洊至離曰明兩作震曰洊雷艮曰兼山㢲曰隨風兑曰麗澤皆取重複之義乾坤純體也故直曰天行地勢云洊爾雅云再也劉瓛云仍也上下二卦皆坎下之坎水為已至矣上之坎水為再至焉是為習坎之象自水之流行无間既見其有常自水之盈科而進又見其重習此坎中之所以常流而水不終陷于坎也君子體之以常久其徳行而習熟其敎事葢治已治人皆必重習然後熟而安之學之而不厭誨之而不倦仲尼之有取于水也説卦傳曰坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎又曰坎陷也又曰坎為豕又曰坎為耳又曰坎再索而得男故謂之中男又曰坎為水為溝瀆為隱伏為矯輮為弓輪其於人也為加憂為心病為耳痛為血卦為赤其於馬也為美脊為亟心為下首為薄蹄為曳其於輿也為多眚為通為月為盜其於水也為堅多心解見本傳初六習坎入于坎窞㐫變兑為節以三畫卦言二五陷于坎中者初三四上皆坎也以六畫卦言二三四五皆陷于坎中者惟初上是坎耳故獨兩爻稱㓙下坎已在上坎之下于險為重習坎之象坎初更入下坎之下坎中又有小坎入于坎窞之象字林云坎中小坎曰窞坎上下畫象水旁兩岸畫皆偶象岸側小穴故初與三皆有窞象當坎之時往則有功曽不求出又且自入于坎窞不亦㐫乎初六才弱而不能自拔故其象如此胡仲虎云初與三皆曰入于坎窞初㐫三但曰勿用初之入未能出三之入將可出也坎而為兑川壅澤也卦變為節節止也壅而止亦習坎入坎之象象傳曰習坎入坎失道㐫也剛中出險之道也今隂居重險之下則與剛中相反失出險之道矣所以㐫九二坎有險求小得變坤為比互體震變坤坎險也又曰有險者何謂已在坎中而又前遇險也上卦是也小謂六三也隂為小按坎卦六爻相值俱无應援但以隂陽相比為義九二上雖无應然處下卦之中承三而與之相得據隂有實故求小得也蘇子瞻云居坎之世其人可與同處患而不可與同處安九二之於六三九五之於六四皆相與同患者也是以相得而不叛至于初上處内外之極最遠于敵而不被其禍以為足以自固而有餘是以各挾其險以待其上初不附二上不附五故皆有失道之㐫焉二所以能得三者以二爻皆未出於險中相待而後全故也坎為坤坤順也處險而順亦善矣非所語于剛健而不陷也故求小得象傳曰求小得未出中也處中而比三三體柔弱未足以為大援雖求小得尚未能出于險中六三來之坎坎險古文及鄭𤣥向秀本作檢鄭云木在首曰枕在手曰檢如桎梏之類且枕古文作沈沈直林反九家作玷入于坎窞勿用變㢲為井互體震變兑約象艮變離之往也居上卦之下象來居下卦之上象之下來亦坎上往亦坎三處二坎之間故稱坎坎猶乾九三之稱乾乾也險指九二六爻唯九二曰有險以此知之枕朱子云便如枕頭之枕中爻震木横于内而艮止不動枕之象也險且枕者言下有九二之險而已且枕于其上也三居陽位奮圖出險奈才不剛位不正天未悔禍往來皆坎亦終入于坎窞已矣雖勞何功故戒之曰勿用葢欲其别求出險之路而静以需之也李宏甫云身在險中可遽出乎是以君子不喜其能出險而復喜其能㢲入于險何以故葢當此无可奈何之時必有可以奈何之勢然後徐定以圖出若西伯之羑里是已是故既入于險即安于險勿用勿遽求出為也方且以險為枕而入于坎窞之中斯為處險之第一義耳是非不愛出也此時欲出終必无功故唯六三獨得處坎之道而文王復舉以示戒焉若初正自入于坎者也既入于坎窞矣欲以誰尤耶陳東歐陽澈輩是已若上幸已出于險者也而復繫徽經寘叢棘仍有三嵗之㓙焉是亦不可以已乎李固陳蕃輩是已此皆世之大賢人者卒之身不保國受殃而猶自以為名節傷哉變㢲為進退為不果為伏為入卦變為井業已處坎猶且進退不果伏而入于井故其象如此象傳曰來之坎坎終无功也險者人之所欲出也必得其道乃能出之勞而无功亦何益哉六四樽酒句簋貳句用缶句納約自牖陸績本作誘終无咎變兑為困互體震變離約象艮變㢲二副也謂樽酒而副以簋也禮天子大臣出㑹諸侯主國樽棜簋副是也坎為𤣥水酒象互變㢲為木又互震為木為足坎酒在上亦樽酒象簋黍稷器震為竹簋象震主祭器故兼有樽簋象舊解簋貳即損卦二簋然貳與二字義不同缶爾雅釋盎風俗通云缶者瓦器所以節歌淮南子君子有酒小人鼔缶詩坎其擊缶漢書擊缶而歌烏烏是也比卦坤土中虚初變震有離象故曰缶離鼓缶此互變離故亦曰缶以離中虚故通有樽簋象樽酒而貳以簋樂且用缶質之至也朱子依陸徳明以樽酒簋為句貳用缶為句則象不應曰樽酒簋貳程子以樽酒簋貳為句而以用缶為盛酒之器夫盛酒用缶則於樽酒二字為不通矣又鄭康成云六四上承九五又互體在震上爻辰在丑丑上值斗可以斟之象斗上有建星建星之形似簋建星上有弁星弁星之形又如缶未詳約約信也韻書言語要結曰約坎柔維繫中剛有繩約之象即彖傳行險不失之信牖穿壁以木為交窻古者一室一户一牖牖開明處自二至五中虚牖象言納此樽簋缶之物以要結于九五然不繇戸而自牖非常時所繇出之處非正應而以比近相得故也與遇主于巷同意一説約儉約也四隂小故稱約言陳列此至約之物自進于牖下亦通坎之内卦失位居險上卦三爻俱得位然上居險極乘剛而陷于罪唯四五二爻當位相得四以柔正上承五之剛中雖非正應然險難之世君之求臣也急于義弗戾也故終无咎來矣鮮云樽酒簋貳用缶見无繁文之設納約曰自見无儐介之儀世故多艱非但君擇臣臣亦擇君所以進麥飯者不以為簡而雪夜幸其家以嫂呼臣妻者不以為凟也修邊幅之公孫述宜乎為井底蛙矣變坎為兑兑説也當坎世而君臣相説故其象如此象傳曰樽酒簋貳剛柔際也剛五柔四際接也八純卦六爻俱无應唯以比而相交際為義居坎險之時以漸出上為貴六四離下體進而附五有欲出險之意真情相向不待縟禮也蘇子瞻云夫同利者不交而歡同患者不約而信四非五无與為主五非四无與為蔽餽之以薄禮行之以簡約而終不相咎者四與五之際也九五坎不盈祇説文京房本俱作褆鄭𤣥云當作坻旣平无咎變坤為師約象艮變坤坎不盈以其流也朱子云坎水只是平不解滿祇如亦祇以異之祇適也猶言適足也正與復卦无祇悔之解同言適于平而已即彖傳所謂水流而不盈也莊子云平者水停之盛也老子云上善若水政善治動善時平之義也白虎通水訓凖凖平也水之性行則亨止則盈水以亨為用不以盈也不盈所以平使不流則盈盈則濫能无咎乎彼其祇平而不盈正九五剛中處險之用然而未能大有功者以上有一隂畫在正猶岸然過此則出于險矣互艮艮為止安流不盈象變坤繇地中行祇平象象傳曰坎不盈中未大也中在上卦之中也與二同義未大釋不盈胡仲虎云大有六五以柔居五則曰大中坎九五以剛居中乃曰中未大者大有之時柔能統剛重坎之時剛猶陷于柔也上六係用徽纆寘子夏傳作湜劉瓛本作示云衆議于九棘之下也姚信本作寔云置也張作置于鄭𤣥本作用叢棘三歲不得㐫變㢲為渙繫拘也三股曰徽兩股曰纆皆拘孿罪人索變㢲為繩又為長故有繫用徽纆象又鄭康成云爻辰在已已為蛇蛇之蟠屈似徽纆也未詳叢棘如今之棘寺也獄外種九棘故稱叢棘坎為多心中實象棘身外偶象棘刺二坎象棘叢九家易坎亦為叢棘置叢棘者衆議于九棘之下也上坎第三爻故取三嵗象或云三者坎之數困卦坎在下故初六曰三嵗不覿亦通案周官司圜收教罷民能改者上罪三年而舍其不能改而出圜土者殺三嵗不得其罪大而不能改者與上居卦終理宜出險乃以柔暗而乘五剛是為有意陷陽而大迷不醒者其罹于罪戾宜矣變㢲為入坎尚往者也上居險極猶且伏而入以終則不能出險故㐫象傳曰上六失道㓙三嵗也道者濟險之道彖所稱有孚維心亨行有尚是也坎四隂爻以處陽外而陷陽者最㐫初上皆在兩陽之外初以柔居險之初最居下流故曰失道上以柔居險之極无意出險亦曰失道離下離上離古一作离利貞亨畜牝牛吉離説文云黄倉庚也从佳离聲借為離别之離轉為附離之離古人字多兩用如亂之為治是也故彖以麗訓離乃附離之離也卦取中一隂麗上下二陽其象為火以火之為物不能自見麗物而明也二離相重明而又明故仍名離然必利于正乃亨言不以察察為明也又為畜牝牛吉畜養也牛順物也牝牛順之至也養其柔順之徳所以消炎上之燥性故吉此皆主下卦六二一爻言下卦三畫皆正而六二尤正而中者坤為牛離中畫坤之中畫也坤之中畫麗乾上下畫中為牛係養于牢之象六二以隂畫居隂位故為牝若六五以隂畫居陽位雖牛而非牝牛矣胡仲虎云坎之剛中九五分數多故九五曰坎不盈卦辭釋有孚亦曰水流而不盈離之中正六二分數多故卦辭曰畜牝牛而六二爻辭亦曰黄離元吉序卦傳曰坎者陷也陷必有所麗故受之以離離者麗也陷于險中則必思有所附麗而後險可出離所以㳄坎也陷必有所麗與物不可終窮同意彖傳曰離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也説文麗旅行也鹿之性見食急則必旅行故取為相附麗之意曲禮離坐離立毋往參焉兩相麗之為離三相成之謂參齊覺翁云火无常形麗物而有形故人之生也得水為精得火為神其合也氣聚而形成于有其分也氣散而神泯于无葢精所以為形而神麗于形者也天地形之大者也日月麗乎天百穀草木麗乎土其神之發見而可見者也丘行可云五為天位故離上有日月麗乎天之象此以氣麗氣者也二居地位故離下有百穀草木麗乎土之象此以形麗形者也或云正體離為日伏坎為月互體㢲為草木伏震為百穀皆通此二句泛舉物之相麗者以著離之為麗其象亦如此也重明以麗乎正此以字如同人之文明以健賁之文明以止皆論上下兩卦上卦為重明下卦三爻皆麗乎正重明而不麗乎正則為詰為皦為詐為猾適足亂天下耳安㡬治哉唯上有重明之君下有麗正之臣故能照臨天下而成文明之化此所以亨也然所謂麗乎正者其所可貴唯六二一爻耳葢其涵柔順之徳居中得正故能致亨所以爻辭云畜牝牛吉者葢專為六二一爻言也離隂卦主爻柔也二五皆柔徳居中而五處不當位故傳特申言之以見意朱子云六二中正六五中而不正今言麗乎正麗乎中正㳄第説六二分數多象傳曰明兩作離大人以繼明照于四方離為日為火今以卦象觀之上離明于上有目象下離明于下有火象是明兩作也作起也陸農師云離言明兩作坎言水洊至起而上者作也趨而下者至也日照乎晝火照乎夜繼續而起不至絶曠是繼照也繼不絶也此為君臣同明之象舊解泥繼明為繼世義卦象中絶无此意大人謂六五也資于六二以繼續其明故明不可窮照于四方繼明之效也蘇子瞻云大得其所附則一炬可以傳千萬明得其所寄則一耳目可以盡天下天下之續吾明者衆矣亦此意六十四卦惟離稱大人皇犧結繩之治首取諸離文王南面而聽嚮明而治獨取諸離有以也繫辭下傳曰作結繩而為網罟以佃以漁葢取諸離説卦傳曰離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治葢取諸此也又曰離麗也又曰離為雉又曰離為目又曰離再索而得女故謂之中女又曰離為火為日為電為中女為甲胄為戈兵其於人也為大腹為乾卦為鼈為蟹為蠃為蚌為龜其於木也為科上槁以上解俱見本傳初九履錯然敬之无咎變艮為旅初為地位履在下之象詩傳云東西為爻邪行為錯本卦離火火性炎上本爻陽剛陽性上進皆有行之象故曰履又變艮為徑路交錯象也然者助語詞居離之始才剛而妄動識淺而未明所履紛錯未得其當惡能免咎唯敬以直内則能生明而不至于妄動方可免咎初爻首以敬之為言亦即畜牝牛之意變為艮明而能止歛其明于不用故有敬之之象胡仲虎云坎水潤下愈下則陷矣故以行為尚離火炎上愈上則焚矣故以止為吉象傳曰履錯之敬以辟咎也履錯然欲動而不知敬慎能免咎乎避者危之之辭六二黄離元吉變乾為大有互體㢲變乾六二本坤中爻黄者地之中色坤六五稱黄裳是也離者附麗也麗乎中道故曰黄離然亦二以中自麗也所謂牝牛之畜而柔麗乎中正者也六二大臣之位也微文明之徳不克佐其君以化成天下文明而或過又且有逼君之嫌乃六二文明而中正者也文足以經天下而稱于質明足以鑑天下而養于晦故其象為黄離夫黄中色非火色也火黄則色與土同而性為之柔得其用而違其害矣若人者主心安之衆志戴之天下之吉孰大于是變乾大明麗天正得所麗者也卦且變大有天下之所歸也故其象如此象傳曰黄離元吉得中道也二五皆中而二獨稱得中道者離性炎上上之中不如下之中也蔡伯静云坎之時用在中五當位而二不當位故五為勝離之時用在中二當位而五不當位故二為勝九三日昃説文作􅨫陸徳明本作􅉴之離不鼓鄭𤣥本作擊缶而歌則大耋京房本作絰蜀才本作咥之嗟㐫古文及鄭薛本无㓙字艮變震為噬㗐互體㢲變約象兑變坎八純卦皆有二體之義乾内外皆健坤上下皆順震威震相繼㢲上下相隨坎重險相習離二明繼照艮内外皆止兌彼已相説離三居下體之終是前明將盡後明當繼之時也故為日昃之離日過中為昃荀慈明云初為日出二為日中三為日昃云日昃之離者言人當此際所附麗者乃日昃之時也或以明解離云日昃之明亦通在天則晝之將夜故有日昃之象在人則老而將死故有大耋之象然晝夜壯者常理也一息尚存此志不容少懈奈何重明之道不講至于斯時茫然失措不鼔缶而歌謂人生㡬何而假喜樂以永日則大耋為嗟而朝不謀夕懼死期之將至或以喜消昃或以憂消昃晝夜不通生死俱罔㐫可知已三以剛居剛變震為躁動猖狂自恣哀樂不常故著此以深戒之見明之當繼也風俗通云缶者瓦器所以節歌變震為鼔為聲離中虚象缶解見坎四又鄭康成云艮爻也位在丑丑上值弁星弁星似缶未詳人夀八十曰耋火聲无常若笑若泣變震為聲互兑為口亦歌與嗟象象傳曰日昃之離何可久也三過中故昃日昃則時不久矣而笑歌嗟嘆皆非可久之道然則人不及時奮勵徒陶情絲竹嘆老嗟悲何為哉惟學有緝熙于光明不知老之將至則自有超于生死之外者否則未有不為九三之㓙也九四突如其來如焚如死如棄如變艮為賁互體巽變坎約象兑變震坎三離四上下之交兩卦於此深致意焉坎性下三在下卦之上曰來者來而下也離性上四在上卦之下來者來而上也突者竈突也曲突之突離中虚竈突之象也突如其來如者下體之火如竃突而炎上也火性炎上三之舊火既上于四而不能囘于其三四之新火又發五得中居尊四之火又不敢犯乎其五上下兩无所容則火止于四而已故必至于焚如死如成灰棄如而後已也如者助語詞互變二三四為坎火入水則滅而死也本爻變成艮火滅成灰而棄于艮山之下也又離火炎盛而薄艮山亦焚如象山敗則火无所麗亦死如棄如象來矣鮮云此爻暴秦似之秦法如火始皇舊火也二世新火也故至死棄而後已焦弱侯云均為離之初初以敬慎免咎四以剛燥取棄何也初乃火之始其勢未盛能以其明而避咎四則兩離相繼勢熖如焚不可嚮邇故有突如焚如之象至取死取棄而不能自已此不得火之明而得火之烈者也亦異乎牝牛之吉矣章本清云明之於人猶火之于木火宿于木而能焚木明本于人而能害人顧用之何如耳九四不中不正剛氣燥暴其害若此人以聰明才智為氣所使而其得禍反酷烈矣可不戒哉古占法載隋煬帝來江都筮易遇離之賁乃以離宫為寺名曰山火取卦象也後改曰山光在揚州北十五里地名灣頭其辭曰突如其來如焚如死如棄如王觀賦詩曰不須談賁卦興廢古今同象傳曰突如其來如无所容也三炎上而不能反五中尊而不敢犯故上下皆无所容六五出涕沱古本一作沲荀爽本作池若戚子夏傳作嘁子六反咨慙也嗟若吉變乾為同人約象兑變乾五為尊位天下之所附麗也然以隂居尊中而不正又逼于九四之陽故有危懼之勢以其明徳在中憂深慮遠至於出涕戚嗟是以獲吉若自恃其尊高之位泰然不懼安能保其吉也二五皆以柔麗剛二之辭安五之辭危者二得位五失位也失位則危知危則吉又五不自安進而自麗乎上則有上九之助其吉可知象傳見之胡仲虎云九三之嗟以死生為憂者也不當憂而憂故㐫六五之嗟居君位而能憂者也憂所當憂故吉涙出目為涕離為目出涕象沱若涕䫉二至五肖坎為水為雨有沱若象五當心位坎為加憂為心病戚象約象兑為口嗟若象又兑為澤以水勝火故有吉象變乾則大明中天矣象傳曰六五之吉離王公也王指五公指上九離王公者言王與公相為附麗也四上二爻皆為五所麗所以言上而不言四者火性炎上故四有焚五之形若五之于上則五為火而上為薪政如抱火厝諸薪下也故其明能遠及焉上九王用出征句有嘉句折首句獲匪其醜无咎變震為豐坎為法律為刑獄故上稱寘于叢棘離為戈兵為甲胄故上稱王用出征爻居卦上閫外之象也以陽徳居隂位剛不妄施乃將帥之賢者也王指五用者用上九也五附麗于上九用之之象也變震為動為大塗甲兵動于大塗之上出征象也有嘉者嘉上九也即嘉乃丕績之嘉猶言王三錫命也折首者折取其魁首也五用上九専征上九能敵王所愾而有折首之勲故王嘉之也獲匪其醜者言所執獲不及其醜類也夫殲厥渠魁脅從罔治正所以為王者之師上九即不獲醜王亦何咎焉卦體離離為火火炎崑岡玉石俱焚是逸徳也上九奉王命征討而不濫殺以為功此非有黄離之徳者不能葢上九與六二自是一人特用之于出征則為上九耳本爻乾陽在上首象離為上槁折其首之象上居卦終外无他畫為不獲醜之象變豐則宜照天下胡仲虎云坎水内明而外暗上六暗于外者也故必陷于刑離火内暗而外明上九明于外者也故可用行兵周省貞云坎離相反坎則陽之中聚離則陽之外散也坎主中聚其氣在裏三四皆當吉但三不中正四以得正得比故能全其吉離主外散其氣在表故初上皆吉而上比乎中五為尤吉愚又聞之師云㸃生畫畫生卦卦生乘之乘之生陣或曰陣可與于易歟曰乘之其至矣隂在内陽之守也陽在外隂之使也是生握竒握竒至矣繇隂陽有天地之名繇天地有風雲之名世稱兵法焉諸葛氏推演兵法作八陣圖陣圖之興自此始也夫其六十四陣當卦之數九六匽月以當二用上下无恒唯變所適如其易如其易或曰即如是易何以不言之曰易自言之此所謂王公設險者也夫名數法制附之于天者也城郭溝池附之于地者也皆不足當人險也人險者何六軍是已天子自將故稱王焉受脤而出故稱公焉書曰方行天下能戰而可以守矣且夫兵形象水水之轉物圓而行者其力差小方而行者其力斯大詩曰江漢滔滔武夫浮浮水之象也又曰其車三千方行之謂也夫如是堂堂整整真王者之師矣是故坎為隱伏兵之情也離為戈甲兵之形也坎以習事離以出征乾坤乃定不然易何以讃神武乎繫陣篇於易以為務之大者君子盡心焉爾象傳曰王用出征以正邦也征之為言正也寇賊亂邦故正之豈黷武之謂哉上九深體此意所以一折首而遂已也彖云畜牝牛吉故六爻皆以柔順為正二曰黄離初曰敬五曰戚嗟上曰獲匪其醜皆能伏其炎上之性者惟三四兩爻以重剛處于隂内為隂所麗三處下卦之盡似日之過中四處上卦之始似火之驟烈故皆㐫與坎之初上皆處乎陽外者同政以坎水内景離火外景故也古周易訂詁卷三
