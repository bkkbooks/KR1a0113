body:
  text: 古周易訂詁卷十六明何楷撰襍卦傳此夫子第十翼也襍者錯揉其次不依文王卦序也孔子恐後學顛倒文王所序之卦故為之傳以聨絡之又恐後學以序卦為定理故襍亂其卦前者居于後後者居于前然皆以兩兩相對為義有相戾而相勝者有相須而相生者有相似而宜辨者有相乖而兩存者大氐皆勢不可无而理所當有雖襍而有不襍者存必拘拘求之位置先後之間而强為之説則膠而鑿矣虞仲翔云昔者聖人之興因時而作隨其時宜不必皆相因襲當有損益之意也故歸藏名卦之次亦多異於時王道蹐駁聖人之意或欲錯綜以濟之故次序卦以其襍也蔡介夫云序卦傳所云流行之易也襍卦傳所云對待之易也故二傳之作聖人所不容闕也愚前合兩卦為一對已標舉襍卦之辭為之義疏以冠其前今不辭費乾剛坤歸藏易作奭按古歸藏易今亡惟存六十四卦名而又闕其四與周易不同今取其名異者附識于此又有瞿欽規夜分五卦岑􅨡林禍馬徒三複名卦不知當周易何卦也柔比毗志反樂音洛師憂臨觀之義或與或求屯見賢遍反而不失其居蒙襍郭京本作稚而著震歸藏作釐起也艮歸藏作狠止也損歸藏作員益盛衰之始也大畜歸藏作􅬦畜時也无妄歸藏作毋亡災也萃聚而升歸藏作稱不來也謙歸藏作兼輕而豫怠京房本作治虞翻本作怡也噬㗐食也賁无色也兌見賢遍反而巽伏也隨无故也蠱歸藏作蜀則飭也鄭𤣥王肅本作節剝歸藏作僕爛也復反也晉晝也明夷誅楊慎云古誅字有之繇切見韻補與晝相叶則晝亦音周也井通而困相遇也自乾坤至此三十卦咸歸藏作諴速也恒乆也渙歸藏作奐離也節止也解歸藏作荔緩也蹇難乃旦反也睽外也家人歸藏作散家人内也否泰反其類也大壯則止遯歸藏作􅋟則退也大有衆荀爽本作終也同人親也革去故也鼎取新也小過過也中孚信也豐多故句親寡旅也卦名皆在句上旅獨在下者取韻恊也或云親寡旅當作旅寡親于韻亦恊又荀爽本以豐多故親絶句寡旅也别為句離上而坎歸藏作犖下也小畜歸藏作􅳧畜寡也履不處也需歸藏作溽不進也訟不親也以上皆反對恊韻大過顛也姤遇也柔遇剛也漸女歸待男行也頤養正也既濟定也歸妹女之終也未濟男之窮也夬決也剛決柔也君子道長丁丈反小人道憂也自大過顛以下卦不反對疑有錯簡蔡伯靜為改正之曰大過顛也頣養正也既濟定也未濟男之窮也歸妹女之終也漸女歸待男行也姤遇也柔遇剛也夬決也剛決柔也君子道長小人道憂也依蔡氏所定卦既對韻亦恊吳草廬從之似不可易或有為立錯簡二圗者亦竒妙可觀今并附録于後大過以下八卦反對錯簡圗又圗大過姤頤漸大過頤姤漸濟既歸妹未濟既濟未濟歸妹夬胡仲虎云天地夬剛柔每毎相雜至若君子之為剛小間人之為柔决不可使相襍也襍卦之末特分别君子小人之道言之聖人賛化育扶世變之意㣲矣樊尚黙云夬終于男窮之後葢五剛决一柔而乾綱正人道立君子樂小人憂男其不終窮矣乎子華子曰上決而成天下決而成地決之時用大矣哉孔子誅少正卯却萊兵墮三都皆夬道也襍卦聖人之夬書也春秋聖人之易用也是皆經世之志豈曰旁行不流乎哉李子思云天下之事不至於決則不通故襍卦之次序與十三卦之制器尚象皆終于夬胡庭芳云襍卦以乾為首不終之以他卦而必終之以夬者葢夬以五陽決一隂決去一隂則復為純乾矣俞玊吾云易貴變變則不窮夬復為乾周流不息即六十四卦終以未濟亦此意也愚按傳既以襍卦名直是聖人見得易理无窮信手拈來无之非是若使有段落可求有象数可測便不謂之襍矣諸家説到此處大段費盡心力却祇是弄精魂也若其頗稱近似者有二説焉或依上下經之数分之其説本于胡仲虎謂易終于襍卦而交易變易之義愈可見矣自乾坤至困三十卦與上經之數相當而襍下經十二卦于其中自咸至夬三十四卦與下經之數相當而襍上經十二卦於其中此變易之義也坎離交之中者本居上經三十卦内今附于下三十四卦震艮巽兑交之偏者本居下經三十四卦内今附于上三十卦至若无反對者上經六卦下經二卦今附于上者二卦附于下者六卦皆交易之義也上三十卦終之以困柔揜剛也下三十四卦終之以夬剛决柔也柔揜剛君子不失其所亨剛决柔君子道長小人道憂矣或依八純卦分之第一節乾剛坤柔提綱自比至蒙皆義之有協于剛柔者第二節震起艮止提綱自損至賁皆義之有協于起止者第三節兌見巽伏提綱自隨至旅皆義之有協于見伏者第四節離上坎下提綱自小畜至夬皆義之有協于上下者之二説者其大段非不犂然可觀然欲一一而求其合則必有為之辭者矣若其配對繁瑣大義无關附會支離正經斯謬是果有當于斯人之心否乎愚无取焉竊謂易之微言妙道只在隂陽對列相乗相錯相生相克之間即終身味之不盡矣毋為舍𤣥珠而抱赤櫝也劉濬伯云周易六十四卦自乾坤屯蒙而下凡三十二變例其法或以隂陽或以剛柔或以形象或以性情莫不有道焉乾坤之變牝馬為龍神龍為馬屯蒙之變雲雷大難山水小難需訟之變待者不訟訟者不待師比之變親道多喜毒道多憂小畜履之變見雲不雨遇虎不暴泰否之變乆治者虞乆亂者喜同人大有之變或為小吝或為全福謙豫之變好徳者吉好樂者怠隨蠱之變以成為敗以敗為成臨觀之變入觀則㓙入臨則吉噬㗐賁之變噬者㓙事賁者吉道剝復之變果落可悲果生可喜无妄大畜之變徳以獲養養以尚賢頣大過之變兩實者固兩虚者顛坎離之變入水則滅入火則涸咸恒之變悦亦可乆乆亦可悦遯大壯之變遇遯陽消遇壯陽長晉明夷之變夷則明傷晉則明盛家人暌之變在外者離入内者合蹇解之變入解禍散入蹇禍至損益之變或被上福或受下報夬姤之變牽羊可悦羸豕可憂萃升之變升亦可悦萃亦可順困井之變坎險有災寒泉有利革鼎之變火爐去故烹器致新震艮之變以懼致福以止修徳漸歸妹之變得漸者貞匪漸者慝豐旅之變豐則多憂旅則深念巽兑之變得悦寡貞得順寡㫁渙節之變渙則多離節則多止中孚小過之變豚魚感信飛鳥罹㓙既濟未濟之變得位而通失位而窮此三十二法者周公之特筆也遺此法而以序求之於義逺矣于令升云凡易既分為六十四卦以為上下經天人之事各有始終夫子又為序卦爻明其象承受之義然則文王周公所遭遇之運武王成王所先後之政蒼精受命短長之期備於此矣而夫子又重為襍卦以易其次第襍卦之末又改其例不以兩卦反覆相酬者以示來聖後王明道非常道事非常事也化而裁之者存乎變是以終之以決言能決㫁其中唯陽徳之主也故曰易變則通通則乆總而觀之伏羲黄帝皆繫世象賢欲使天下世有常君也而堯舜禪代非黄農之化朱均頑也湯武逆取非唐虞之迹桀紂不君也伊尹廢立非從順之節使太甲思愆也周公攝政非湯武之典成王幼年也此皆聖賢所遭遇異時者也夏政尚忠忠之弊野故殷自野以教敬敬之弊鬼故周自鬼以教文文弊薄故春秋閲諸三代而損益之顔淵問為邦子曰行夏之時乗殷之輅服周之冕弟子問政者數也而夫子不與言三代損益以非其任也回則備王者之佐伊尹之人也故夫子與之言是故聖人之於天下也同不是異不非百事以俟聖人而不惑一以貫之矣古周易訂詁卷十六
